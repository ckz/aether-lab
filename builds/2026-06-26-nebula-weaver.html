<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nebula Weaver</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #0a0a0f;
  overflow: hidden;
  font-family: 'Courier New', monospace;
  cursor: crosshair;
}
canvas { display: block; }
#overlay {
  position: fixed;
  top: 20px;
  left: 50%;
  transform: translateX(-50%);
  color: rgba(255, 255, 255, 0.7);
  font-size: 12px;
  letter-spacing: 3px;
  text-transform: uppercase;
  pointer-events: none;
  z-index: 10;
  text-shadow: 0 0 10px rgba(120, 80, 255, 0.5);
  animation: fadeInOut 4s ease-in-out;
}
#stats {
  position: fixed;
  bottom: 20px;
  left: 20px;
  color: rgba(255, 255, 255, 0.4);
  font-size: 11px;
  letter-spacing: 1px;
  pointer-events: none;
  z-index: 10;
}
#controls {
  position: fixed;
  bottom: 20px;
  right: 20px;
  display: flex;
  gap: 8px;
  z-index: 10;
}
#controls button {
  background: rgba(255, 255, 255, 0.1);
  border: 1px solid rgba(255, 255, 255, 0.2);
  color: rgba(255, 255, 255, 0.7);
  padding: 8px 14px;
  font-size: 11px;
  letter-spacing: 1px;
  cursor: pointer;
  border-radius: 4px;
  transition: all 0.3s;
  font-family: 'Courier New', monospace;
}
#controls button:hover {
  background: rgba(255, 255, 255, 0.2);
  border-color: rgba(255, 255, 255, 0.4);
  color: white;
}
@keyframes fadeInOut {
  0%, 100% { opacity: 0; }
  20%, 80% { opacity: 1; }
}
</style>
</head>
<body>
<div id="overlay">move your cursor to weave the nebula</div>
<div id="stats"></div>
<div id="controls">
  <button onclick="cycleMode()">mode</button>
  <button onclick="cyclePalette()">palette</button>
  <button onclick="toggleGravity()">gravity</button>
  <button onclick="burst()">burst</button>
</div>
<canvas id="canvas"></canvas>
<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const stats = document.getElementById('stats');

let width, height;
let particles = [];
let mouse = { x: 0, y: 0, active: false };
let mode = 0; // 0: weave, 1: repel, 2: orbit
let paletteIndex = 0;
let gravity = true;
let frameCount = 0;
let fps = 60;

const palettes = [
  { name: 'Cosmic', colors: ['#7c3aed', '#3b82f6', '#06b6d4', '#10b981', '#8b5cf6'] },
  { name: 'Ember', colors: ['#f59e0b', '#ef4444', '#dc2626', '#f97316', '#fb923c'] },
  { name: 'Aurora', colors: ['#06b6d4', '#10b981', '#84cc16', '#22d3ee', '#34d399'] },
  { name: 'Nebula', colors: ['#a855f7', '#ec4899', '#f43f5e', '#d946ef', '#e879f9'] },
  { name: 'Monochrome', colors: ['#ffffff', '#d4d4d8', '#a1a1aa', '#71717a', '#e4e4e7'] }
];

class Particle {
  constructor(x, y) {
    this.x = x || Math.random() * width;
    this.y = y || Math.random() * height;
    this.vx = (Math.random() - 0.5) * 2;
    this.vy = (Math.random() - 0.5) * 2;
    this.radius = Math.random() * 2 + 1;
    this.baseRadius = this.radius;
    this.color = palettes[paletteIndex].colors[Math.floor(Math.random() * 5)];
    this.life = 1;
    this.decay = Math.random() * 0.0005 + 0.0002;
    this.pulse = Math.random() * Math.PI * 2;
    this.pulseSpeed = Math.random() * 0.05 + 0.02;
  }
  
  update() {
    this.pulse += this.pulseSpeed;
    this.radius = this.baseRadius * (0.8 + 0.4 * Math.sin(this.pulse));
    
    // Mouse interaction
    if (mouse.active) {
      const dx = mouse.x - this.x;
      const dy = mouse.y - this.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      const maxDist = 200;
      
      if (dist < maxDist) {
        const force = (maxDist - dist) / maxDist;
        const angle = Math.atan2(dy, dx);
        
        switch(mode) {
          case 0: // weave - attract with swirl
            this.vx += Math.cos(angle + Math.PI/2) * force * 0.3;
            this.vy += Math.sin(angle + Math.PI/2) * force * 0.3;
            this.vx += dx * force * 0.01;
            this.vy += dy * force * 0.01;
            break;
          case 1: // repel
            this.vx -= Math.cos(angle) * force * 0.5;
            this.vy -= Math.sin(angle) * force * 0.5;
            break;
          case 2: // orbit
            this.vx += Math.cos(angle + Math.PI/2) * force * 0.4;
            this.vy += Math.sin(angle + Math.PI/2) * force * 0.4;
            break;
        }
      }
    }
    
    // Gravity toward center (optional)
    if (gravity) {
      const cx = width / 2;
      const cy = height / 2;
      const dx = cx - this.x;
      const dy = cy - this.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist > 100) {
        this.vx += dx / dist * 0.01;
        this.vy += dy / dist * 0.01;
      }
    }
    
    // Friction
    this.vx *= 0.99;
    this.vy *= 0.99;
    
    // Update position
    this.x += this.vx;
    this.y += this.vy;
    
    // Wrap around edges
    if (this.x < 0) this.x = width;
    if (this.x > width) this.x = 0;
    if (this.y < 0) this.y = height;
    if (this.y > height) this.y = 0;
    
    // Life decay
    this.life -= this.decay;
  }
  
  draw() {
    const alpha = this.life * 0.8;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
    ctx.fillStyle = this.color + Math.floor(alpha * 255).toString(16).padStart(2, '0');
    ctx.fill();
    
    // Glow effect
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.radius * 2, 0, Math.PI * 2);
    ctx.fillStyle = this.color + Math.floor(alpha * 60).toString(16).padStart(2, '0');
    ctx.fill();
  }
}

function init() {
  width = window.innerWidth;
  height = window.innerHeight;
  canvas.width = width;
  canvas.height = height;
  particles = [];
  
  // Create initial particle cloud
  for (let i = 0; i < 300; i++) {
    particles.push(new Particle());
  }
}

function drawConnections() {
  const maxDist = 100;
  
  for (let i = 0; i < particles.length; i++) {
    for (let j = i + 1; j < particles.length; j++) {
      const dx = particles[i].x - particles[j].x;
      const dy = particles[i].y - particles[j].y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      
      if (dist < maxDist) {
        const alpha = (1 - dist / maxDist) * 0.3;
        const gradient = ctx.createLinearGradient(
          particles[i].x, particles[i].y,
          particles[j].x, particles[j].y
        );
        gradient.addColorStop(0, particles[i].color + Math.floor(alpha * 255).toString(16).padStart(2, '0'));
        gradient.addColorStop(1, particles[j].color + Math.floor(alpha * 255).toString(16).padStart(2, '0'));
        
        ctx.beginPath();
        ctx.moveTo(particles[i].x, particles[i].y);
        ctx.lineTo(particles[j].x, particles[j].y);
        ctx.strokeStyle = gradient;
        ctx.lineWidth = 0.5;
        ctx.stroke();
      }
    }
  }
}

function animate() {
  // Fade effect for trails
  ctx.fillStyle = 'rgba(10, 10, 15, 0.15)';
  ctx.fillRect(0, 0, width, height);
  
  // Draw connections
  drawConnections();
  
  // Update and draw particles
  particles = particles.filter(p => p.life > 0);
  
  // Maintain particle count
  while (particles.length < 300) {
    particles.push(new Particle());
  }
  
  particles.forEach(p => {
    p.update();
    p.draw();
  });
  
  // Mouse glow
  if (mouse.active) {
    const gradient = ctx.createRadialGradient(mouse.x, mouse.y, 0, mouse.x, mouse.y, 150);
    gradient.addColorStop(0, palettes[paletteIndex].colors[0] + '20');
    gradient.addColorStop(1, 'transparent');
    ctx.fillStyle = gradient;
    ctx.fillRect(0, 0, width, height);
  }
  
  frameCount++;
  if (frameCount % 30 === 0) {
    fps = Math.round(1000 / 16.67);
    stats.textContent = `particles: ${particles.length} | palette: ${palettes[paletteIndex].name} | mode: ${['weave', 'repel', 'orbit'][mode]} | gravity: ${gravity ? 'on' : 'off'}`;
  }
  
  requestAnimationFrame(animate);
}

// Controls
function cycleMode() {
  mode = (mode + 1) % 3;
}
function cyclePalette() {
  paletteIndex = (paletteIndex + 1) % palettes.length;
}
function toggleGravity() {
  gravity = !gravity;
}
function burst() {
  for (let i = 0; i < 50; i++) {
    const p = new Particle(mouse.x || width/2, mouse.y || height/2);
    const angle = Math.random() * Math.PI * 2;
    const speed = Math.random() * 5 + 2;
    p.vx = Math.cos(angle) * speed;
    p.vy = Math.sin(angle) * speed;
    particles.push(p);
  }
}

// Event listeners
canvas.addEventListener('mousemove', (e) => {
  mouse.x = e.clientX;
  mouse.y = e.clientY;
  mouse.active = true;
});

canvas.addEventListener('mouseleave', () => {
  mouse.active = false;
});

canvas.addEventListener('click', (e) => {
  mouse.x = e.clientX;
  mouse.y = e.clientY;
  burst();
});

window.addEventListener('resize', init);

// Start
init();
animate();
</script>
</body>
</html>
