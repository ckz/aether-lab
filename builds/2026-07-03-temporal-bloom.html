<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Temporal Bloom ✦</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: #05050a;
    color: #e0e0e0;
    overflow: hidden;
    height: 100vh;
    cursor: crosshair;
  }
  canvas { display: block; }
  .overlay {
    position: fixed;
    top: 1.5rem;
    left: 50%;
    transform: translateX(-50%);
    text-align: center;
    pointer-events: none;
    z-index: 10;
  }
  .overlay h1 {
    font-size: 1.8rem;
    font-weight: 300;
    letter-spacing: 0.2em;
    color: #fff;
    text-shadow: 0 0 20px rgba(255,255,255,0.3);
  }
  .overlay p {
    font-size: 0.85rem;
    color: #888;
    margin-top: 0.5rem;
    letter-spacing: 0.05em;
  }
  .time-indicator {
    position: fixed;
    bottom: 1.5rem;
    left: 50%;
    transform: translateX(-50%);
    font-size: 0.75rem;
    color: #666;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    pointer-events: none;
    z-index: 10;
  }
  .stats {
    position: fixed;
    top: 1.5rem;
    right: 1.5rem;
    font-size: 0.75rem;
    color: #555;
    text-align: right;
    pointer-events: none;
    z-index: 10;
    font-family: 'Courier New', monospace;
  }
</style>
</head>
<body>
  <div class="overlay">
    <h1>TEMPORAL BLOOM</h1>
    <p>Click to burst · Hold to fountain · Scroll to shift time</p>
  </div>
  <div class="stats" id="stats"></div>
  <div class="time-indicator" id="timeIndicator">Dawn</div>
  <canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const stats = document.getElementById('stats');
const timeIndicator = document.getElementById('timeIndicator');

let W, H;
function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// Time-of-day system (0-1 cycle)
let timeOfDay = 0.15; // starts at dawn
const timePhases = [
  { name: 'Dawn', bg: [5, 5, 15], hue: [280, 320, 340] },
  { name: 'Morning', bg: [10, 15, 25], hue: [180, 220, 260] },
  { name: 'Midday', bg: [15, 18, 30], hue: [160, 200, 240] },
  { name: 'Afternoon', bg: [18, 14, 22], hue: [280, 320, 360] },
  { name: 'Sunset', bg: [20, 10, 12], hue: [10, 30, 50] },
  { name: 'Dusk', bg: [10, 8, 18], hue: [240, 280, 320] },
  { name: 'Night', bg: [5, 5, 12], hue: [200, 240, 280] },
  { name: 'Midnight', bg: [3, 3, 10], hue: [260, 300, 340] },
];

function getTimePhase(t) {
  const phase = Math.floor(t * timePhases.length) % timePhases.length;
  return timePhases[phase];
}

// Particle system
const particles = [];
const MAX_PARTICLES = 1200;

class Particle {
  constructor(x, y, type = 'normal') {
    this.x = x || Math.random() * W;
    this.y = y || Math.random() * H;
    this.type = type; // 'normal', 'burst', 'fountain'
    
    const angle = Math.random() * Math.PI * 2;
    const speed = type === 'burst' ? 2 + Math.random() * 6 :
                  type === 'fountain' ? 3 + Math.random() * 4 :
                  0.2 + Math.random() * 0.8;
    
    this.vx = Math.cos(angle) * speed;
    this.vy = Math.sin(angle) * speed - (type === 'fountain' ? 3 : 0);
    
    this.life = 1.0;
    this.decay = type === 'burst' ? 0.008 + Math.random() * 0.012 :
                  type === 'fountain' ? 0.006 + Math.random() * 0.01 :
                  0.002 + Math.random() * 0.004;
    
    this.size = type === 'burst' ? 2 + Math.random() * 4 :
                type === 'fountain' ? 1.5 + Math.random() * 3 :
                1 + Math.random() * 2;
    
    this.wobble = Math.random() * Math.PI * 2;
    this.wobbleSpeed = 0.02 + Math.random() * 0.03;
  }

  update(phase) {
    this.wobble += this.wobbleSpeed;
    this.vx += Math.sin(this.wobble) * 0.05;
    this.vy += Math.cos(this.wobble) * 0.03 - 0.01; // gentle rise
    
    // Damping
    this.vx *= 0.99;
    this.vy *= 0.99;
    
    this.x += this.vx;
    this.y += this.vy;
    
    this.life -= this.decay;
    
    // Wrap around edges
    if (this.x < 0) this.x = W;
    if (this.x > W) this.x = 0;
    if (this.y < 0) this.y = H;
    if (this.y > H) this.y = 0;
    
    return this.life > 0;
  }

  draw(phase) {
    const alpha = this.life * 0.8;
    const hueRange = phase.hue;
    const hue = hueRange[0] + (hueRange[1] - hueRange[0]) * (this.x / W);
    const sat = 70 + this.life * 30;
    const light = 50 + this.life * 30;
    
    // Glow
    const gradient = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.size * 3);
    gradient.addColorStop(0, `hsla(${hue}, ${sat}%, ${light}%, ${alpha})`);
    gradient.addColorStop(0.5, `hsla(${hue}, ${sat}%, ${light}%, ${alpha * 0.3})`);
    gradient.addColorStop(1, `hsla(${hue}, ${sat}%, ${light}%, 0)`);
    
    ctx.fillStyle = gradient;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size * 3, 0, Math.PI * 2);
    ctx.fill();
    
    // Core
    ctx.fillStyle = `hsla(${hue}, ${sat}%, ${light + 20}%, ${alpha})`;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fill();
  }
}

// Mouse interaction
let mouse = { x: W / 2, y: H / 2, down: false, active: false };
let fountainInterval = null;

canvas.addEventListener('mousemove', (e) => {
  mouse.x = e.clientX;
  mouse.y = e.clientY;
  mouse.active = true;
  
  // Spawn ambient particles on move
  if (particles.length < MAX_PARTICLES && Math.random() > 0.5) {
    particles.push(new Particle(mouse.x, mouse.y));
  }
});

canvas.addEventListener('mousedown', (e) => {
  mouse.down = true;
  // Burst on click
  const count = 30 + Math.floor(Math.random() * 20);
  for (let i = 0; i < count; i++) {
    if (particles.length < MAX_PARTICLES) {
      particles.push(new Particle(e.clientX, e.clientY, 'burst'));
    }
  }
  // Start fountain
  fountainInterval = setInterval(() => {
    if (mouse.down && particles.length < MAX_PARTICLES) {
      for (let i = 0; i < 5; i++) {
        particles.push(new Particle(mouse.x + (Math.random() - 0.5) * 20, mouse.y + (Math.random() - 0.5) * 20, 'fountain'));
      }
    }
  }, 50);
});

canvas.addEventListener('mouseup', () => {
  mouse.down = false;
  if (fountainInterval) {
    clearInterval(fountainInterval);
    fountainInterval = null;
  }
});

canvas.addEventListener('mouseleave', () => {
  mouse.active = false;
  mouse.down = false;
  if (fountainInterval) {
    clearInterval(fountainInterval);
    fountainInterval = null;
  }
});

canvas.addEventListener('wheel', (e) => {
  e.preventDefault();
  timeOfDay += e.deltaY * 0.0005;
  if (timeOfDay < 0) timeOfDay = 1;
  if (timeOfDay > 1) timeOfDay = 0;
}, { passive: false });

// Touch support
canvas.addEventListener('touchstart', (e) => {
  e.preventDefault();
  const touch = e.touches[0];
  mouse.x = touch.clientX;
  mouse.y = touch.clientY;
  mouse.down = true;
  mouse.active = true;
  const count = 30 + Math.floor(Math.random() * 20);
  for (let i = 0; i < count; i++) {
    if (particles.length < MAX_PARTICLES) {
      particles.push(new Particle(touch.clientX, touch.clientY, 'burst'));
    }
  }
  fountainInterval = setInterval(() => {
    if (mouse.down && particles.length < MAX_PARTICLES) {
      for (let i = 0; i < 5; i++) {
        particles.push(new Particle(mouse.x + (Math.random() - 0.5) * 20, mouse.y + (Math.random() - 0.5) * 20, 'fountain'));
      }
    }
  }, 50);
});

canvas.addEventListener('touchmove', (e) => {
  e.preventDefault();
  const touch = e.touches[0];
  mouse.x = touch.clientX;
  mouse.y = touch.clientY;
});

canvas.addEventListener('touchend', () => {
  mouse.down = false;
  if (fountainInterval) {
    clearInterval(fountainInterval);
    fountainInterval = null;
  }
});

// Animation loop
let lastTime = 0;
let frameCount = 0;
let fps = 0;
let fpsTime = 0;

function animate(timestamp) {
  // FPS calculation
  frameCount++;
  if (timestamp - fpsTime > 1000) {
    fps = frameCount;
    frameCount = 0;
    fpsTime = timestamp;
  }
  
  const phase = getTimePhase(timeOfDay);
  
  // Fade background (creates trails)
  const bg = phase.bg;
  ctx.fillStyle = `rgba(${bg[0]}, ${bg[1]}, ${bg[2]}, 0.15)`;
  ctx.fillRect(0, 0, W, H);
  
  // Update and draw particles
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    if (!p.update(phase)) {
      particles.splice(i, 1);
    } else {
      p.draw(phase);
    }
  }
  
  // Spawn ambient particles occasionally
  if (Math.random() > 0.95 && particles.length < MAX_PARTICLES) {
    particles.push(new Particle(
      Math.random() * W,
      H + 10
    ));
  }
  
  // Update UI
  timeIndicator.textContent = phase.name;
  timeIndicator.style.color = `hsl(${phase.hue[1]}, 50%, 60%)`;
  stats.innerHTML = `Particles: ${particles.length}<br>FPS: ${fps}`;
  
  requestAnimationFrame(animate);
}

requestAnimationFrame(animate);
</script>
</body>
</html>
