<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dreaming City</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: #080810;
    color: #e0e0e0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2rem 1rem;
  }

  header {
    text-align: center;
    margin-bottom: 2rem;
  }

  header h1 {
    font-size: 2.2rem;
    font-weight: 300;
    letter-spacing: 0.12em;
    color: #fff;
    margin-bottom: 0.4rem;
  }

  header p {
    font-size: 0.95rem;
    color: #777;
    max-width: 500px;
    margin: 0 auto;
    line-height: 1.6;
  }

  canvas {
    border-radius: 12px;
    cursor: crosshair;
    box-shadow: 0 0 60px rgba(30, 50, 100, 0.3);
    max-width: 100%;
  }

  .controls {
    margin-top: 1.5rem;
    display: flex;
    gap: 1rem;
    flex-wrap: wrap;
    justify-content: center;
    align-items: center;
  }

  .controls button {
    background: #14141f;
    border: 1px solid #2a2a3e;
    color: #aaa;
    padding: 0.5rem 1rem;
    border-radius: 6px;
    cursor: pointer;
    font-size: 0.85rem;
    transition: all 0.2s ease;
    font-family: inherit;
  }

  .controls button:hover {
    background: #1e1e2e;
    border-color: #4a4a6e;
    color: #fff;
  }

  .controls button.active {
    background: #2a2a4e;
    border-color: #6a6a9e;
    color: #fff;
  }

  .controls label {
    color: #888;
    font-size: 0.8rem;
    display: flex;
    align-items: center;
    gap: 0.4rem;
  }

  .controls input[type="range"] {
    width: 100px;
    accent-color: #6a6a9e;
  }

  .hint {
    margin-top: 1rem;
    color: #555;
    font-size: 0.75rem;
    text-align: center;
    font-style: italic;
  }
</style>
</head>
<body>

<header>
  <h1>🌃 Dreaming City</h1>
  <p>A generative nighttime cityscape. Buildings rise, windows flicker to life, clouds drift, and shooting stars cross the sky. Click anywhere to send a pulse of light through the city.</p>
</header>

<canvas id="city" width="900" height="600"></canvas>

<div class="controls">
  <button id="btnRegenerate" title="Generate a new city">🏙️ New City</button>
  <button id="btnPulse" title="Send a pulse of light">⚡ Pulse</button>
  <button id="btnToggleClouds" class="active" title="Toggle clouds">☁️ Clouds</button>
  <button id="btnToggleStars" class="active" title="Toggle stars">⭐ Stars</button>
  <button id="btnToggleShooting" class="active" title="Toggle shooting stars">🌠 Meteors</button>
  <label>Density <input type="range" id="density" min="30" max="100" value="65"></label>
  <label>Height <input type="range" id="heightRange" min="50" max="200" value="130"></label>
</div>

<p class="hint">Click anywhere to send a pulse of light through the city.</p>

<script>
const canvas = document.getElementById('city');
const ctx = canvas.getContext('2d');
const W = canvas.width;
const H = canvas.height;

let config = {
  density: 65,
  maxHeight: 130,
  showClouds: true,
  showStars: true,
  showShooting: true,
  skyHue: 220,
};

let buildings = [];
let windows = [];
let clouds = [];
let stars = [];
let pulses = [];
let shootingStars = [];
let time = 0;

function rand(min, max) { return Math.random() * (max - min) + min; }
function lerp(a, b, t) { return a + (b - a) * t; }

function generateCity() {
  buildings = [];
  windows = [];
  clouds = [];
  stars = [];
  pulses = [];
  shootingStars = [];

  // Sky gradient
  const skyTop = `hsl(${config.skyHue}, 40%, ${rand(3, 6)}%)`;
  const skyMid = `hsl(${config.skyHue + 10}, 30%, ${rand(8, 14)}%)`;
  const skyBot = `hsl(${config.skyHue + 20}, 25%, ${rand(12, 20)}%)`;

  // Stars
  for (let i = 0; i < 200; i++) {
    stars.push({
      x: rand(0, W),
      y: rand(0, H * 0.6),
      size: rand(0.3, 1.8),
      brightness: rand(0.3, 1),
      twinkleSpeed: rand(0.01, 0.04),
      twinkleOffset: rand(0, Math.PI * 2),
    });
  }

  // Buildings
  let x = -10;
  while (x < W + 10) {
    const width = rand(25, 60);
    const height = rand(40, config.maxHeight);
    const hue = rand(200, 260);
    const sat = rand(5, 20);
    const light = rand(8, 18);
    
    buildings.push({
      x, width, height,
      color: `hsl(${hue}, ${sat}%, ${light}%)`,
      highlight: `hsl(${hue}, ${sat}%, ${light + 4}%)`,
      shadow: `hsl(${hue}, ${sat}%, ${light - 3}%)`,
      windows: Math.floor(rand(3, 8)),
      windowRows: Math.floor(rand(2, 6)),
      roofType: Math.random() > 0.7 ? 'antenna' : (Math.random() > 0.5 ? 'flat' : 'stepped'),
      antennaHeight: rand(8, 20),
      hasBlink: Math.random() > 0.85,
      blinkPhase: rand(0, Math.PI * 2),
    });

    // Generate windows for this building
    const winW = (width - 8) / buildings[buildings.length - 1].windows;
    const winH = (height - 15) / buildings[buildings.length - 1].windowRows;
    for (let row = 0; row < buildings[buildings.length - 1].windowRows; row++) {
      for (let col = 0; col < buildings[buildings.length - 1].windows; col++) {
        if (Math.random() > 0.35) {
          windows.push({
            building: buildings.length - 1,
            col, row,
            x: x + 4 + col * winW,
            y: H - height + 10 + row * winH,
            w: winW - 2,
            h: winH - 2,
            lit: Math.random() > 0.4,
            hue: rand(30, 55),
            brightness: rand(40, 80),
            flickerSpeed: rand(0.005, 0.02),
            flickerOffset: rand(0, Math.PI * 2),
            pulse: 0,
          });
        }
      }
    }

    x += width + rand(-2, 5);
  }

  // Clouds
  for (let i = 0; i < 8; i++) {
    clouds.push({
      x: rand(-100, W + 100),
      y: rand(20, H * 0.35),
      width: rand(80, 200),
      height: rand(15, 35),
      speed: rand(0.1, 0.4),
      opacity: rand(0.03, 0.12),
      hue: rand(200, 240),
    });
  }
}

function spawnShootingStar() {
  if (!config.showShooting) return;
  if (Math.random() > 0.003) return;
  shootingStars.push({
    x: rand(0, W),
    y: rand(0, H * 0.4),
    vx: rand(3, 7),
    vy: rand(1, 3),
    life: 1,
    length: rand(20, 50),
    hue: rand(30, 60),
  });
}

function sendPulse(px, py) {
  pulses.push({ x: px, y: py, radius: 0, maxRadius: 250, life: 1 });
  // Light up nearby windows
  windows.forEach(w => {
    const wx = w.x + w.w / 2;
    const wy = w.y + w.h / 2;
    const dx = wx - px;
    const dy = wy - py;
    const dist = Math.sqrt(dx * dx + dy * dy);
    if (dist < 200) {
      w.lit = true;
      w.brightness = Math.min(100, w.brightness + 30);
      w.pulse = 1;
    }
  });
}

canvas.addEventListener('click', (e) => {
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;
  sendPulse((e.clientX - rect.left) * scaleX, (e.clientY - rect.top) * scaleY);
});

document.getElementById('btnRegenerate').addEventListener('click', () => {
  config.skyHue = rand(200, 260);
  generateCity();
});
document.getElementById('btnPulse').addEventListener('click', () => {
  sendPulse(W / 2, H / 2);
});
document.getElementById('btnToggleClouds').addEventListener('click', function() {
  config.showClouds = !config.showClouds;
  this.classList.toggle('active');
});
document.getElementById('btnToggleStars').addEventListener('click', function() {
  config.showStars = !config.showStars;
  this.classList.toggle('active');
});
document.getElementById('btnToggleShooting').addEventListener('click', function() {
  config.showShooting = !config.showShooting;
  this.classList.toggle('active');
});
document.getElementById('density').addEventListener('input', function() {
  config.density = parseInt(this.value);
  generateCity();
});
document.getElementById('heightRange').addEventListener('input', function() {
  config.maxHeight = parseInt(this.value);
  generateCity();
});

function drawSky() {
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, `hsl(${config.skyHue}, 40%, 3%)`);
  grad.addColorStop(0.5, `hsl(${config.skyHue + 10}, 30%, 7%)`);
  grad.addColorStop(1, `hsl(${config.skyHue + 20}, 25%, 12%)`);
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // Distant glow on horizon
  const glow = ctx.createRadialGradient(W * 0.7, H, 0, W * 0.7, H, 300);
  glow.addColorStop(0, `hsla(${config.skyHue + 30}, 40%, 30%, 0.08)`);
  glow.addColorStop(1, 'transparent');
  ctx.fillStyle = glow;
  ctx.fillRect(0, H * 0.6, W, H * 0.4);
}

function drawStars() {
  if (!config.showStars) return;
  stars.forEach(s => {
    const alpha = s.brightness * (0.6 + 0.4 * Math.sin(time * s.twinkleSpeed + s.twinkleOffset));
    ctx.fillStyle = `hsla(40, 20%, 90%, ${alpha})`;
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
    ctx.fill();
  });
}

function drawClouds() {
  if (!config.showClouds) return;
  clouds.forEach(c => {
    c.x += c.speed;
    if (c.x > W + c.width) c.x = -c.width;
    
    const grad = ctx.createRadialGradient(c.x + c.width/2, c.y + c.height/2, 0, c.x + c.width/2, c.y + c.height/2, c.width/2);
    grad.addColorStop(0, `hsla(${c.hue}, 20%, 30%, ${c.opacity})`);
    grad.addColorStop(1, 'transparent');
    ctx.fillStyle = grad;
    ctx.fillRect(c.x, c.y, c.width, c.height);
  });
}

function drawBuildings() {
  buildings.forEach((b, idx) => {
    // Main building body
    ctx.fillStyle = b.color;
    ctx.fillRect(b.x, H - b.height, b.width, b.height);

    // Edge highlight
    ctx.fillStyle = b.highlight;
    ctx.fillRect(b.x, H - b.height, 2, b.height);
    ctx.fillRect(b.x + b.width - 2, H - b.height, 2, b.height);

    // Roof details
    if (b.roofType === 'antenna') {
      ctx.strokeStyle = b.shadow;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(b.x + b.width / 2, H - b.height);
      ctx.lineTo(b.x + b.width / 2, H - b.height - b.antennaHeight);
      ctx.stroke();
      
      // Blinking light
      if (b.hasBlink) {
        const blink = Math.sin(time * 0.05 + b.blinkPhase) > 0.7 ? 1 : 0.2;
        ctx.fillStyle = `rgba(255, 50, 50, ${blink})`;
        ctx.beginPath();
        ctx.arc(b.x + b.width / 2, H - b.height - b.antennaHeight, 2, 0, Math.PI * 2);
        ctx.fill();
      }
    }
  });
}

function drawWindows() {
  windows.forEach(w => {
    if (!w.lit) {
      // Dark window
      ctx.fillStyle = 'rgba(10, 15, 30, 0.6)';
      ctx.fillRect(w.x, w.y, w.w, w.h);
      return;
    }

    // Flicker
    const flicker = 0.85 + 0.15 * Math.sin(time * w.flickerSpeed + w.flickerOffset);
    const pulseBoost = w.pulse > 0 ? w.pulse * 30 : 0;
    const alpha = flicker * (w.brightness / 100);
    const hue = w.hue + pulseBoost;

    // Window glow
    const glow = ctx.createRadialGradient(
      w.x + w.w/2, w.y + w.h/2, 0,
      w.x + w.w/2, w.y + w.h/2, w.w * 2
    );
    glow.addColorStop(0, `hsla(${hue}, 60%, ${w.brightness}%, ${alpha * 0.3})`);
    glow.addColorStop(1, 'transparent');
    ctx.fillStyle = glow;
    ctx.fillRect(w.x - w.w, w.y - w.h, w.w * 3, w.h * 3);

    // Window itself
    ctx.fillStyle = `hsla(${hue}, 50%, ${w.brightness}%, ${alpha})`;
    ctx.fillRect(w.x, w.y, w.w, w.h);

    // Decay pulse
    if (w.pulse > 0) w.pulse *= 0.96;
  });
}

function drawPulses() {
  pulses = pulses.filter(p => p.life > 0);
  pulses.forEach(p => {
    p.radius += 3;
    p.life = 1 - p.radius / p.maxRadius;
    
    const grad = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.radius);
    grad.addColorStop(0, `hsla(${config.skyHue + 40}, 50%, 70%, 0)`);
    grad.addColorStop(0.5, `hsla(${config.skyHue + 40}, 50%, 70%, ${p.life * 0.15})`);
    grad.addColorStop(1, 'transparent');
    ctx.fillStyle = grad;
    ctx.fillRect(p.x - p.radius, p.y - p.radius, p.radius * 2, p.radius * 2);
  });
}

function drawShootingStars() {
  spawnShootingStar();
  shootingStars = shootingStars.filter(s => s.life > 0);
  shootingStars.forEach(s => {
    s.x += s.vx;
    s.y += s.vy;
    s.life -= 0.015;

    const tailX = s.x - s.vx * s.length * 0.3;
    const tailY = s.y - s.vy * s.length * 0.3;
    
    const grad = ctx.createLinearGradient(tailX, tailY, s.x, s.y);
    grad.addColorStop(0, `hsla(${s.hue}, 40%, 80%, 0)`);
    grad.addColorStop(1, `hsla(${s.hue}, 40%, 90%, ${s.life})`);
    
    ctx.strokeStyle = grad;
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(tailX, tailY);
    ctx.lineTo(s.x, s.y);
    ctx.stroke();
  });
}

function drawGround() {
  // Subtle ground glow from city lights
  const groundGlow = ctx.createLinearGradient(0, H - 15, 0, H);
  groundGlow.addColorStop(0, `hsla(${config.skyHue + 20}, 30%, 20%, 0)`);
  groundGlow.addColorStop(1, `hsla(${config.skyHue + 20}, 30%, 10%, 0.3)`);
  ctx.fillStyle = groundGlow;
  ctx.fillRect(0, H - 30, W, 30);

  // Ground line
  ctx.fillStyle = '#0a0a15';
  ctx.fillRect(0, H - 3, W, 3);
}

function animate() {
  time++;
  ctx.clearRect(0, 0, W, H);
  
  drawSky();
  drawStars();
  drawClouds();
  drawBuildings();
  drawWindows();
  drawGround();
  drawPulses();
  drawShootingStars();

  requestAnimationFrame(animate);
}

generateCity();
animate();
</script>

</body>
</html>
