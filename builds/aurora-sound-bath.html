<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aurora Sound Bath</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; overflow: hidden; font-family: monospace; color: #fff; }
canvas { display: block; cursor: crosshair; }
.ui { position: fixed; top: 12px; left: 16px; font-size: 12px; z-index: 10; text-shadow: 0 0 6px #000; opacity: 0.85; pointer-events: none; }
.ui .palette-name { font-size: 14px; margin-top: 4px; color: #7fefa8; }
.controls { position: fixed; bottom: 12px; left: 50%; transform: translateX(-50%); display: flex; gap: 10px; z-index: 10; }
.controls button { background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.2); color: #fff; padding: 6px 14px; cursor: pointer; font-size: 11px; font-family: monospace; border-radius: 20px; transition: 0.2s; }
.controls button:hover { background: rgba(255,255,255,0.2); border-color: rgba(255,255,255,0.5); }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="ui">
  <div>AURORA SOUND BATH</div>
  <div class="palette-name" id="pname">Arctic Borealis</div>
  <div style="margin-top:6px; font-size:10px; opacity:0.7;">Move mouse: wind · Click: solar flare · Space: palette</div>
</div>
<div class="controls">
  <button onclick="triggerFlare()">☀ Solar Flare</button>
  <button onclick="togglePause()">⏯ Pause</button>
  <button onclick="savePNG()">📷 Save</button>
</div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H;
function resize() { W = canvas.width = innerWidth; H = canvas.height = innerHeight; }
resize(); addEventListener('resize', resize);

const palettes = [
  { name: 'Arctic Borealis', colors: ['#4ade80','#22d3ee','#818cf8','#34d399','#60a5fa','#a78bfa'] },
  { name: 'Solar Storm', colors: ['#fbbf24','#f97316','#ef4444','#f59e0b','#dc2626','#fcd34d'] },
  { name: 'Cosmic Dust', colors: ['#c084fc','#f472b6','#818cf8','#e879f9','#a78bfa','#fb7185'] },
  { name: 'Deep Ocean', colors: ['#06b6d4','#3b82f6','#6366f1','#0ea5e9','#2563eb','#4f46e5'] },
  { name: 'Emerald Dream', colors: ['#34d399','#10b981','#6ee7b7','#059669','#a7f3d0','#14b8a6'] },
  { name: 'Monochrome', colors: ['#ffffff','#e5e5e5','#c4c4c4','#f5f5f5','#a3a3a3','#d4d4d4'] }
];
let palIdx = 0;
let palette = palettes[0];
let mouse = { x: W/2, y: H/2, active: false };
let time = 0;
let paused = false;

const curtains = [];
const NUM_CURTAINS = 28;
const shimmerParticles = [];
const NUM_SHIM = 200;

class Curtain {
  constructor() {
    this.x = Math.random() * W;
    this.baseX = this.x;
    this.width = 30 + Math.random() * 80;
    this.height = H * 0.3 + Math.random() * H * 0.6;
    this.y = H * 0.2 + Math.random() * H * 0.3;
    this.colorIdx = Math.floor(Math.random() * palette.colors.length);
    this.opacity = 0.1 + Math.random() * 0.4;
    this.speed = 0.003 + Math.random() * 0.008;
    this.phase = Math.random() * Math.PI * 2;
    this.amp = 20 + Math.random() * 80;
    this.freq = 0.002 + Math.random() * 0.004;
    this.waveY = 0;
    this.segments = 30;
    this.flareBoost = 0;
  }
  update(t, mx) {
    const dx = mx - this.baseX;
    const windInfluence = (mx / W - 0.5) * 0.6;
    this.waveY = Math.sin(t * this.speed + this.phase) * this.amp;
    this.waveY += Math.cos(t * this.speed * 1.7 + this.phase) * this.amp * 0.5;
    this.waveY += windInfluence * 60;
    this.waveY += Math.sin(t * 0.005 + this.baseX * 0.01) * 30;
    this.flareBoost *= 0.94;
    if (this.flareBoost < 0.01) this.flareBoost = 0;
  }
  draw(ctx, t) {
    ctx.beginPath();
    const color = palette.colors[this.colorIdx];
    const r = parseInt(color.slice(1,3),16), g = parseInt(color.slice(3,5),16), b = parseInt(color.slice(5,7),16);
    const totalOpacity = Math.min(1, this.opacity + this.flareBoost * 2);
    const grad = ctx.createLinearGradient(this.x, this.y, this.x, this.y + this.height);
    grad.addColorStop(0, `rgba(${r},${g},${b},0)`);
    grad.addColorStop(0.15, `rgba(${r},${g},${b},${totalOpacity * 0.6})`);
    grad.addColorStop(0.5, `rgba(${r},${g},${b},${totalOpacity})`);
    grad.addColorStop(0.85, `rgba(${r},${g},${b},${totalOpacity * 0.4})`);
    grad.addColorStop(1, `rgba(${r},${g},${b},0)`);
    ctx.fillStyle = grad;
    for (let i = 0; i <= this.segments; i++) {
      const frac = i / this.segments;
      const segY = this.y + this.height * frac;
      const wobble = Math.sin(t * 0.003 + frac * 6 + this.phase) * 15 * (1 - Math.abs(frac - 0.5) * 2);
      const sx = this.baseX + this.waveY + wobble;
      if (i === 0) ctx.moveTo(sx, segY);
      else ctx.lineTo(sx, segY);
    }
    for (let i = this.segments; i >= 0; i--) {
      const frac = i / this.segments;
      const segY = this.y + this.height * frac;
      const wobble = Math.sin(t * 0.003 + frac * 6 + this.phase) * 15 * (1 - Math.abs(frac - 0.5) * 2);
      const sx = this.baseX + this.width + this.waveY + wobble + (this.waveY * 0.3);
      ctx.lineTo(sx, segY);
    }
    ctx.closePath();
    ctx.fill();
    if (this.flareBoost > 0.01) {
      ctx.shadowBlur = 40 * this.flareBoost;
      ctx.shadowColor = color;
      ctx.fill();
      ctx.shadowBlur = 0;
    }
  }
}

class Shimmer {
  constructor() { this.reset(); }
  reset() {
    this.x = Math.random() * W;
    this.y = Math.random() * H;
    this.size = 0.5 + Math.random() * 2;
    this.opacity = 0;
    this.maxOpacity = 0.3 + Math.random() * 0.7;
    this.speed = 0.005 + Math.random() * 0.02;
    this.phase = Math.random() * Math.PI * 2;
    this.drift = 0.2 + Math.random() * 0.8;
  }
  update(t) {
    this.opacity = Math.max(0, Math.sin(t * this.speed + this.phase) * this.maxOpacity);
    this.y -= this.drift;
    this.x += Math.sin(t * 0.001 + this.phase) * 0.3;
    if (this.y < -10 || this.opacity <= 0 && Math.sin(t * this.speed + this.phase) < 0) this.reset();
    if (this.y < -10) this.y = H + 10;
  }
  draw(ctx) {
    if (this.opacity < 0.02) return;
    const color = palette.colors[Math.floor(Math.random() * palette.colors.length)];
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fillStyle = color.replace(')', `,${this.opacity})`).replace('rgb', 'rgba').replace('#', '');
    // Convert hex to rgba
    const r = parseInt(color.slice(1,3),16), g = parseInt(color.slice(3,5),16), b = parseInt(color.slice(5,7),16);
    ctx.fillStyle = `rgba(${r},${g},${b},${this.opacity})`;
    ctx.fill();
  }
}

for (let i = 0; i < NUM_CURTAINS; i++) curtains.push(new Curtain());
for (let i = 0; i < NUM_SHIM; i++) shimmerParticles.push(new Shimmer());

function triggerFlare() {
  curtains.forEach(c => { c.flareBoost = 0.8 + Math.random() * 0.2; c.opacity = Math.min(1, c.opacity + 0.5); });
  for (let i = 0; i < 60; i++) {
    const s = shimmerParticles[i];
    s.x = W * 0.3 + Math.random() * W * 0.4;
    s.y = H * 0.2 + Math.random() * H * 0.6;
    s.maxOpacity = 0.8 + Math.random() * 0.2;
    s.opacity = s.maxOpacity;
  }
}

function togglePause() { paused = !paused; }
function savePNG() {
  const link = document.createElement('a');
  link.download = 'aurora-sound-bath.png';
  link.href = canvas.toDataURL();
  link.click();
}

addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; mouse.active = true; });
addEventListener('click', e => {
  const cx = e.clientX, cy = e.clientY;
  curtains.forEach(c => {
    const d = Math.abs(c.baseX - cx);
    if (d < 300) c.flareBoost = Math.max(c.flareBoost, (1 - d/300) * 0.9);
  });
  for (let i = 0; i < 20; i++) {
    const s = shimmerParticles[i];
    s.x = cx + (Math.random()-0.5) * 300;
    s.y = cy + (Math.random()-0.5) * 200;
    s.maxOpacity = 0.9;
    s.opacity = s.maxOpacity;
  }
});
addEventListener('keydown', e => {
  if (e.code === 'Space') { e.preventDefault(); palIdx = (palIdx + 1) % palettes.length; palette = palettes[palIdx]; document.getElementById('pname').textContent = palette.name; }
});

function drawStars() {
  for (let i = 0; i < 120; i++) {
    const sx = (Math.sin(i * 127.1 + 311.7) * 0.5 + 0.5) * W;
    const sy = (Math.cos(i * 269.5 + 183.3) * 0.5 + 0.5) * H * 0.5;
    const flicker = 0.3 + 0.7 * Math.abs(Math.sin(time * 0.001 + i * 1.7));
    ctx.beginPath(); ctx.arc(sx, sy, 0.6, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255,255,255,${flicker * 0.5})`; ctx.fill();
  }
}

function drawHorizon() {
  const grad = ctx.createLinearGradient(0, H * 0.65, 0, H);
  grad.addColorStop(0, 'rgba(0,0,0,0)');
  grad.addColorStop(0.5, 'rgba(5,10,20,0.4)');
  grad.addColorStop(1, 'rgba(2,4,8,0.9)');
  ctx.fillStyle = grad;
  ctx.fillRect(0, H * 0.6, W, H * 0.4);
  // Terrain silhouette
  ctx.beginPath();
  ctx.moveTo(0, H);
  for (let x = 0; x <= W; x += 4) {
    const y = H * 0.88 + Math.sin(x * 0.005 + time * 0.0005) * 15 + Math.sin(x * 0.02) * 5;
    ctx.lineTo(x, y);
  }
  ctx.lineTo(W, H); ctx.closePath();
  ctx.fillStyle = 'rgba(0,0,0,0.7)'; ctx.fill();
}

function loop() {
  if (!paused) time += 1;
  ctx.fillStyle = 'rgba(0,0,0,0.12)';
  ctx.fillRect(0, 0, W, H);
  // Subtle sky gradient on first frames
  if (time < 60) {
    ctx.fillStyle = `rgba(5,10,25,${0.03 * (60 - time) / 60})`;
    ctx.fillRect(0, 0, W, H);
  }
  drawStars();
  curtains.forEach(c => { if (!paused) c.update(time, mouse.x); c.draw(ctx, time); });
  shimmerParticles.forEach(s => { if (!paused) s.update(time); s.draw(ctx); });
  drawHorizon();
  requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
