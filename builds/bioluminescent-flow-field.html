<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bioluminescent Flow Field</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; overflow: hidden; font-family: 'Courier New', monospace; }
canvas { display: block; }
#info {
  position: fixed; bottom: 16px; left: 16px;
  color: rgba(120, 255, 200, 0.7); font-size: 12px;
  pointer-events: none; z-index: 10;
}
#title {
  position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
  color: rgba(120, 255, 200, 0.6); font-size: 14px;
  letter-spacing: 4px; text-transform: uppercase;
  pointer-events: none; z-index: 10;
  animation: fadeTitle 4s ease-out forwards;
}
@keyframes fadeTitle { to { opacity: 0; } }
#hint {
  position: fixed; bottom: 16px; right: 16px;
  color: rgba(120, 255, 200, 0.4); font-size: 11px;
  pointer-events: none; z-index: 10;
  animation: fadeHint 6s ease-out 3s forwards; opacity: 0;
}
@keyframes fadeHint { to { opacity: 1; } }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="title">Bioluminescent Flow Field</div>
<div id="info"></div>
<div id="hint">move mouse to attract particles · click to burst</div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const info = document.getElementById('info');

let W, H, particles = [], flowField = [], cols, rows;
const SCALE = 20;
let time = 0;
let mouse = { x: -1000, y: -1000 };
let frameCount = 0;

// Deep ocean bioluminescent palette
const COLORS = [
  [0, 255, 180],   // cyan-green
  [0, 200, 255],   // electric blue
  [100, 180, 255], // soft blue
  [0, 255, 220],   // mint
  [150, 100, 255], // purple (rare)
  [255, 150, 100], // warm orange (very rare)
  [200, 255, 100], // lime (rare)
];

class Particle {
  constructor() { this.reset(); }
  reset() {
    this.x = Math.random() * W;
    this.y = Math.random() * H;
    this.vx = 0;
    this.vy = 0;
    this.size = Math.random() * 1.8 + 0.3;
    this.life = Math.random() * 300 + 200;
    this.maxLife = this.life;
    this.colorIdx = Math.random() < 0.08 ? 
      (Math.random() < 0.3 ? 4 : Math.random() < 0.5 ? 5 : 6) :
      Math.floor(Math.random() * 4);
    this.trail = [];
    this.maxTrail = Math.floor(Math.random() * 8) + 4;
    this.speed = Math.random() * 0.5 + 0.3;
  }
  update() {
    const col = Math.floor(this.x / SCALE);
    const row = Math.floor(this.y / SCALE);
    const idx = col + row * cols;
    const angle = flowField[idx] !== undefined ? flowField[idx] : Math.random() * Math.PI * 2;
    
    // Mouse attraction
    const dx = mouse.x - this.x;
    const dy = mouse.y - this.y;
    const dist = Math.sqrt(dx * dx + dy * dy);
    const mouseForce = dist < 200 ? (200 - dist) / 200 * 0.08 : 0;
    
    this.vx += Math.cos(angle) * this.speed * 0.3 + dx / dist * mouseForce;
    this.vy += Math.sin(angle) * this.speed * 0.3 + dy / dist * mouseForce;
    
    // Damping
    this.vx *= 0.92;
    this.vy *= 0.92;
    
    // Speed limit
    const spd = Math.sqrt(this.vx * this.vx + this.vy * this.vy);
    if (spd > 2) { this.vx = this.vx / spd * 2; this.vy = this.vy / spd * 2; }
    
    this.trail.push({ x: this.x, y: this.y });
    if (this.trail.length > this.maxTrail) this.trail.shift();
    
    this.x += this.vx;
    this.y += this.vy;
    this.life--;
    
    // Wrap edges
    if (this.x < 0) this.x = W;
    if (this.x > W) this.x = 0;
    if (this.y < 0) this.y = H;
    if (this.y > H) this.y = 0;
    
    if (this.life <= 0) this.reset();
  }
  draw() {
    const alpha = Math.min(1, this.life / 50) * 0.7;
    const [r, g, b] = COLORS[this.colorIdx];
    
    // Trail
    if (this.trail.length > 1) {
      ctx.beginPath();
      ctx.moveTo(this.trail[0].x, this.trail[0].y);
      for (let i = 1; i < this.trail.length; i++) {
        ctx.lineTo(this.trail[i].x, this.trail[i].y);
      }
      ctx.strokeStyle = `rgba(${r}, ${g}, ${b}, ${alpha * 0.3})`;
      ctx.lineWidth = this.size * 0.5;
      ctx.stroke();
    }
    
    // Head glow
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(${r}, ${g}, ${b}, ${alpha})`;
    ctx.fill();
    
    // Glow halo
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size * 3, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(${r}, ${g}, ${b}, ${alpha * 0.1})`;
    ctx.fill();
  }
}

function init() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  cols = Math.ceil(W / SCALE) + 1;
  rows = Math.ceil(H / SCALE) + 1;
  
  const count = Math.min(1200, Math.floor(W * H / 800));
  particles = [];
  for (let i = 0; i < count; i++) particles.push(new Particle());
}

function updateFlowField() {
  flowField = new Array(cols * rows);
  for (let row = 0; row < rows; row++) {
    for (let col = 0; col < cols; col++) {
      const x = col * SCALE;
      const y = row * SCALE;
      
      // Simplex-like noise using sin combinations
      const n1 = Math.sin(x * 0.003 + time * 0.3) * Math.cos(y * 0.003 + time * 0.2);
      const n2 = Math.sin(x * 0.007 - time * 0.15) * Math.sin(y * 0.005 + time * 0.25);
      const n3 = Math.cos((x + y) * 0.002 + time * 0.1);
      const n = (n1 + n2 + n3) / 3;
      
      flowField[col + row * cols] = n * Math.PI * 4;
    }
  }
}

function animate() {
  // Fade instead of clear for ghosting effect
  ctx.fillStyle = 'rgba(0, 2, 8, 0.08)';
  ctx.fillRect(0, 0, W, H);
  
  time += 0.005;
  updateFlowField();
  
  particles.forEach(p => { p.update(); p.draw(); });
  
  frameCount++;
  if (frameCount % 30 === 0) {
    info.textContent = `${particles.length} particles · ${(frameCount / 60).toFixed(0)}s`;
  }
  
  requestAnimationFrame(animate);
}

window.addEventListener('resize', () => {
  init();
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, W, H);
});

window.addEventListener('mousemove', e => {
  mouse.x = e.clientX;
  mouse.y = e.clientY;
});

window.addEventListener('click', e => {
  // Burst particles at click location
  for (let i = 0; i < 50; i++) {
    const p = particles[Math.floor(Math.random() * particles.length)];
    p.x = e.clientX + (Math.random() - 0.5) * 40;
    p.y = e.clientY + (Math.random() - 0.5) * 40;
    p.vx = (Math.random() - 0.5) * 4;
    p.vy = (Math.random() - 0.5) * 4;
    p.life = p.maxLife;
    p.colorIdx = Math.random() < 0.5 ? 0 : 1;
  }
});

init();
animate();
</script>
</body>
</html>
