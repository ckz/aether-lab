<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cascade — Number Typing Game</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  body {
    font-family: 'Courier New', 'Fira Code', monospace;
    background: #05080a;
    color: #0f0;
    min-height: 100vh;
    overflow: hidden;
    user-select: none;
  }

  #gameCanvas {
    display: block;
    position: absolute;
    top: 0;
    left: 0;
  }

  #ui {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    padding: 1.2rem 1.5rem;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    pointer-events: none;
    z-index: 10;
  }

  .stat {
    background: rgba(5, 8, 10, 0.85);
    border: 1px solid #0f02;
    padding: 0.5rem 0.8rem;
    border-radius: 6px;
    font-size: 0.8rem;
    line-height: 1.6;
    backdrop-filter: blur(4px);
  }

  .stat-label {
    color: #0a0;
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    opacity: 0.8;
  }

  .stat-value {
    color: #0f0;
    font-size: 1.2rem;
    font-weight: bold;
    text-shadow: 0 0 8px #0f04;
  }

  .stat-value.combo {
    color: #ff0;
    text-shadow: 0 0 12px #ff04;
    animation: pulse 0.3s ease;
  }

  @keyframes pulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.2); }
    100% { transform: scale(1); }
  }

  #input-display {
    position: absolute;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%);
    font-size: 2rem;
    color: #0f0;
    text-shadow: 0 0 20px #0f08, 0 0 40px #0f04;
    letter-spacing: 0.3em;
    pointer-events: none;
    z-index: 10;
    min-height: 3rem;
  }

  #input-display .cursor {
    display: inline-block;
    width: 2px;
    height: 2rem;
    background: #0f0;
    margin-left: 2px;
    animation: blink 0.6s step-end infinite;
    vertical-align: middle;
    box-shadow: 0 0 10px #0f0;
  }

  @keyframes blink {
    50% { opacity: 0; }
  }

  #overlay {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(5, 8, 10, 0.92);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    backdrop-filter: blur(8px);
  }

  #overlay-content {
    text-align: center;
    max-width: 500px;
    padding: 2rem;
  }

  #overlay-content h1 {
    font-size: 3rem;
    color: #0f0;
    text-shadow: 0 0 30px #0f08;
    margin-bottom: 1rem;
    letter-spacing: 0.2em;
  }

  #overlay-content h2 {
    font-size: 2rem;
    color: #f00;
    text-shadow: 0 0 30px #f008;
    margin-bottom: 1rem;
    letter-spacing: 0.15em;
  }

  #overlay-content p {
    color: #0a0;
    font-size: 0.9rem;
    line-height: 1.8;
    margin-bottom: 0.8rem;
  }

  #overlay-content .final-score {
    font-size: 1.5rem;
    color: #ff0;
    text-shadow: 0 0 15px #ff04;
    margin: 1rem 0;
  }

  #overlay-content button {
    margin-top: 1.5rem;
    padding: 0.8rem 2rem;
    font-family: 'Courier New', monospace;
    font-size: 1rem;
    font-weight: bold;
    color: #050;
    background: #0f0;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    transition: all 0.2s;
    pointer-events: all;
    box-shadow: 0 0 20px #0f06;
  }

  #overlay-content button:hover {
    background: #0c0;
    box-shadow: 0 0 30px #0f0a;
    transform: translateY(-2px);
  }

  #overlay-content button:active {
    transform: translateY(0);
  }

  .hidden { display: none !important; }

  #lives {
    position: absolute;
    bottom: 1.5rem;
    right: 1.5rem;
    font-size: 1.5rem;
    letter-spacing: 0.3em;
    pointer-events: none;
    z-index: 10;
  }

  #level-indicator {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 3rem;
    color: #0ff;
    text-shadow: 0 0 40px #0f8;
    pointer-events: none;
    z-index: 50;
    opacity: 0;
    letter-spacing: 0.3em;
  }

  #level-indicator.show {
    animation: levelFlash 2s ease-out forwards;
  }

  @keyframes levelFlash {
    0% { opacity: 1; transform: translate(-50%, -50%) scale(1.5); }
    30% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
    100% { opacity: 0; transform: translate(-50%, -50%) scale(1); }
  }
</style>
</head>
<body>

<canvas id="gameCanvas"></canvas>

<div id="ui">
  <div class="stat">
    <div class="stat-label">Score</div>
    <div class="stat-value" id="score">0</div>
  </div>
  <div class="stat">
    <div class="stat-label">Combo</div>
    <div class="stat-value" id="combo">x1</div>
  </div>
  <div class="stat">
    <div class="stat-label">Wave</div>
    <div class="stat-value" id="wave">1</div>
  </div>
</div>

<div id="input-display"><span id="typed"></span><span class="cursor"></span></div>

<div id="lives"></div>

<div id="level-indicator"></div>

<div id="overlay">
  <div id="overlay-content">
    <h1>CASCADE</h1>
    <p>Numbers fall from the void. Type them before they reach the bottom.</p>
    <p>Chain correct hits for combo multipliers.<br>Miss too many and it's over.</p>
    <p style="color:#888; font-size:0.75rem;">Focus. Type fast. Survive the cascade.</p>
    <button id="start-btn">Initialize</button>
  </div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

let W, H;
function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// Game state
let gameState = 'start'; // start, playing, over
let score = 0;
let combo = 1;
let comboTimer = 0;
let wave = 1;
let lives = 3;
let maxLives = 3;
let numbers = [];
let particles = [];
let trails = [];
let spawnTimer = 0;
let spawnInterval = 120; // frames between spawns
let fallSpeed = 0.6;
let shakeAmount = 0;
let levelUpTimer = 0;
let totalDestroyed = 0;

// Typed input buffer
let typedBuffer = '';
let targetNumber = null;

// Colors
const palettes = [
  { primary: '#0f0', glow: '#0f04', bg: '#050a05' },
  { primary: '#0ff', glow: '#0ff4', bg: '#050a0a' },
  { primary: '#f0f', glow: '#f0f4', bg: '#0a050a' },
  { primary: '#ff0', glow: '#ff04', bg: '#0a0a05' },
  { primary: '#0f8', glow: '#0f84', bg: '#050a08' },
];
let palette = palettes[0];

class Number {
  constructor() {
    this.reset();
  }
  
  reset() {
    this.x = 40 + Math.random() * (W - 80);
    this.y = -30;
    this.value = this.generateValue();
    this.speed = fallSpeed + Math.random() * 0.3;
    this.size = 18 + Math.random() * 8;
    this.glow = 0;
    this.dying = false;
    this.deathTimer = 0;
    this.wobble = Math.random() * Math.PI * 2;
    this.wobbleSpeed = 0.02 + Math.random() * 0.02;
  }
  
  generateValue() {
    const maxDigits = Math.min(1 + Math.floor(wave / 3), 4);
    const digits = 1 + Math.floor(Math.random() * maxDigits);
    const max = Math.pow(10, digits) - 1;
    return Math.floor(Math.random() * max);
  }
  
  update() {
    if (this.dying) {
      this.deathTimer--;
      this.glow *= 0.9;
      return this.deathTimer > 0;
    }
    
    this.y += this.speed;
    this.wobble += this.wobbleSpeed;
    this.x += Math.sin(this.wobble) * 0.3;
    this.glow *= 0.95;
    
    // Check if reached bottom
    if (this.y > H - 100) {
      loseLife();
      // Create explosion at position
      for (let i = 0; i < 30; i++) {
        particles.push(new Particle(this.x, this.y, '#f00', 'burst'));
      }
      shakeAmount = 15;
      return false;
    }
    return true;
  }
  
  draw() {
    ctx.save();
    ctx.translate(this.x, this.y);
    
    if (this.dying) {
      ctx.globalAlpha = this.deathTimer / 20;
      ctx.scale(1 + (20 - this.deathTimer) * 0.05);
    }
    
    // Glow
    ctx.shadowColor = this.dying ? '#fff' : palette.primary;
    ctx.shadowBlur = this.dying ? 40 : 15 + this.glow * 20;
    
    // Text
    ctx.font = `bold ${this.size}px 'Courier New', monospace`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillStyle = this.dying ? '#fff' : palette.primary;
    ctx.fillText(this.value, 0, 0);
    
    // Mini ring around active target
    if (targetNumber === this && !this.dying) {
      ctx.strokeStyle = palette.primary;
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.arc(0, 0, this.size * 1.2, 0, Math.PI * 2);
      ctx.stroke();
    }
    
    ctx.restore();
  }
}

class Particle {
  constructor(x, y, color, type = 'burst') {
    this.x = x;
    this.y = y;
    this.color = color;
    this.type = type;
    const angle = Math.random() * Math.PI * 2;
    const speed = type === 'burst' ? 3 + Math.random() * 5 : 1 + Math.random() * 2;
    this.vx = Math.cos(angle) * speed;
    this.vy = Math.sin(angle) * speed;
    this.life = type === 'burst' ? 30 + Math.random() * 20 : 40 + Math.random() * 30;
    this.maxLife = this.life;
    this.size = type === 'burst' ? 2 + Math.random() * 3 : 1 + Math.random() * 2;
  }
  
  update() {
    this.x += this.vx;
    this.y += this.vy;
    this.vx *= 0.97;
    this.vy *= 0.97;
    this.life--;
    return this.life > 0;
  }
  
  draw() {
    ctx.save();
    ctx.globalAlpha = this.life / this.maxLife;
    ctx.shadowColor = this.color;
    ctx.shadowBlur = 10;
    ctx.fillStyle = this.color;
    ctx.fillRect(this.x - this.size/2, this.y - this.size/2, this.size, this.size);
    ctx.restore();
  }
}

class Trail {
  constructor(x, y, size) {
    this.x = x;
    this.y = y;
    this.size = size;
    this.life = 60;
    this.maxLife = 60;
  }
  
  update() {
    this.life--;
    this.size *= 0.98;
    return this.life > 0;
  }
  
  draw() {
    ctx.save();
    ctx.globalAlpha = (this.life / this.maxLife) * 0.3;
    ctx.fillStyle = palette.primary;
    ctx.shadowColor = palette.primary;
    ctx.shadowBlur = 15;
    ctx.fillRect(this.x - this.size/2, this.y - this.size/2, this.size, this.size);
    ctx.restore();
  }
}

function spawnNumber() {
  const n = new Number();
  numbers.push(n);
}

function destroyNumber(num) {
  num.dying = true;
  num.deathTimer = 20;
  
  // Particles
  for (let i = 0; i < 25; i++) {
    particles.push(new Particle(num.x, num.y, palette.primary, 'burst'));
  }
  for (let i = 0; i < 10; i++) {
    particles.push(new Particle(num.x, num.y, '#fff', 'burst'));
  }
  
  // Trail
  for (let i = 0; i < 8; i++) {
    trails.push(new Trail(num.x + (Math.random()-0.5) * 20, num.y + (Math.random()-0.5) * 20, num.size));
  }
  
  // Score
  const basePoints = parseInt(num.value) * 10;
  const comboBonus = Math.floor(basePoints * (combo - 1) * 0.5);
  score += basePoints + comboBonus;
  
  // Combo
  combo = Math.min(combo + 1, 20);
  comboTimer = 120;
  
  totalDestroyed++;
  
  // Wave progression
  if (totalDestroyed > 0 && totalDestroyed % 15 === 0) {
    waveUp();
  }
}

function waveUp() {
  wave++;
  spawnInterval = Math.max(30, spawnInterval - 10);
  fallSpeed = Math.min(2.5, fallSpeed + 0.15);
  
  // Show level indicator
  const indicator = document.getElementById('level-indicator');
  indicator.textContent = `WAVE ${wave}`;
  indicator.classList.remove('show');
  void indicator.offsetWidth; // Trigger reflow
  indicator.classList.add('show');
}

function loseLife() {
  lives--;
  combo = 1;
  comboTimer = 0;
  shakeAmount = 20;
  
  // Flash red
  document.body.style.boxShadow = 'inset 0 0 100px #f002';
  setTimeout(() => { document.body.style.boxShadow = 'none'; }, 200);
  
  if (lives <= 0) {
    gameOver();
  }
}

function gameOver() {
  gameState = 'over';
  const overlay = document.getElementById('overlay');
  const content = document.getElementById('overlay-content');
  content.innerHTML = `
    <h2>CRITICAL FAILURE</h2>
    <p>The cascade consumed the system.</p>
    <div class="final-score">${score} points</div>
    <p>Wave ${wave} · ${totalDestroyed} destroyed</p>
    <p style="color:#666; font-size:0.75rem;">The void remains hungry.</p>
    <button id="restart-btn">Reboot</button>
  `;
  overlay.classList.remove('hidden');
  
  document.getElementById('restart-btn').addEventListener('click', startGame);
}

function startGame() {
  gameState = 'playing';
  score = 0;
  combo = 1;
  comboTimer = 0;
  wave = 1;
  lives = 3;
  numbers = [];
  particles = [];
  trails = [];
  spawnTimer = 0;
  spawnInterval = 120;
  fallSpeed = 0.6;
  totalDestroyed = 0;
  typedBuffer = '';
  targetNumber = null;
  
  document.getElementById('overlay').classList.add('hidden');
  document.getElementById('score').textContent = '0';
  document.getElementById('combo').textContent = 'x1';
  document.getElementById('combo').classList.remove('combo');
  document.getElementById('wave').textContent = '1';
  updateLives();
  
  // Initial spawn
  for (let i = 0; i < 3; i++) {
    setTimeout(() => spawnNumber(), i * 500);
  }
}

function updateLives() {
  const el = document.getElementById('lives');
  let hearts = '';
  for (let i = 0; i < maxLives; i++) {
    hearts += i < lives ? '♥' : '♡';
  }
  el.textContent = hearts;
  el.style.color = lives <= 1 ? '#f00' : '#f04';
  el.style.textShadow = lives <= 1 ? '0 0 15px #f08' : '0 0 10px #f004';
}

function handleInput(e) {
  if (gameState !== 'playing') return;
  
  // Only accept digits and backspace
  if (e.key >= '0' && e.key <= '9') {
    typedBuffer += e.key;
    
    // Try to match
    if (!targetNumber || !numbers.includes(targetNumber)) {
      targetNumber = null;
    }
    
    if (!targetNumber) {
      // Find first number whose value starts with typed buffer
      const match = numbers.find(n => 
        !n.dying && n.value.toString().startsWith(typedBuffer) && n.y < H - 150
      );
      if (match) {
        targetNumber = match;
        targetNumber.glow = 1;
      }
    } else {
      // Check if buffer matches target
      const targetStr = targetNumber.value.toString();
      if (!targetStr.startsWith(typedBuffer)) {
        // Wrong number - reset
        typedBuffer = '';
        targetNumber = null;
        combo = 1;
        comboTimer = 0;
      }
    }
    
    // Check if complete match
    const matchComplete = numbers.find(n => !n.dying && n.value.toString() === typedBuffer);
    if (matchComplete) {
      destroyNumber(matchComplete);
      typedBuffer = '';
      targetNumber = null;
      
      // UI feedback
      const comboEl = document.getElementById('combo');
      comboEl.textContent = `x${combo}`;
      comboEl.classList.add('combo');
      setTimeout(() => comboEl.classList.remove('combo'), 300);
    }
    
    document.getElementById('typed').textContent = typedBuffer;
    
  } else if (e.key === 'Backspace') {
    typedBuffer = typedBuffer.slice(0, -1);
    if (typedBuffer === '') {
      targetNumber = null;
    }
    document.getElementById('typed').textContent = typedBuffer;
  }
}

document.addEventListener('keydown', handleInput);

document.getElementById('start-btn').addEventListener('click', startGame);

// Draw scan lines
function drawScanlines() {
  ctx.save();
  ctx.globalAlpha = 0.03;
  ctx.fillStyle = '#000';
  for (let y = 0; y < H; y += 3) {
    ctx.fillRect(0, y, W, 1);
  }
  ctx.restore();
}

// Draw grid
function drawGrid() {
  ctx.save();
  ctx.globalAlpha = 0.03;
  ctx.strokeStyle = palette.primary;
  ctx.lineWidth = 0.5;
  const gridSize = 40;
  for (let x = 0; x < W; x += gridSize) {
    ctx.beginPath();
    ctx.moveTo(x, 0);
    ctx.lineTo(x, H);
    ctx.stroke();
  }
  for (let y = 0; y < H; y += gridSize) {
    ctx.beginPath();
    ctx.moveTo(0, y);
    ctx.lineTo(W, y);
    ctx.stroke();
  }
  ctx.restore();
}

// Main loop
let lastTime = 0;
function gameLoop(timestamp) {
  const dt = timestamp - lastTime;
  lastTime = timestamp;
  
  // Clear with fade
  ctx.fillStyle = palette.bg;
  ctx.fillRect(0, 0, W, H);
  
  // Background elements
  drawGrid();
  drawScanlines();
  
  // Screen shake
  ctx.save();
  if (shakeAmount > 0) {
    ctx.translate(
      (Math.random() - 0.5) * shakeAmount,
      (Math.random() - 0.5) * shakeAmount
    );
    shakeAmount *= 0.9;
    if (shakeAmount < 0.5) shakeAmount = 0;
  }
  
  if (gameState === 'playing') {
    // Combo decay
    if (comboTimer > 0) {
      comboTimer--;
      if (comboTimer === 0) {
        combo = 1;
        document.getElementById('combo').textContent = 'x1';
        document.getElementById('combo').classList.remove('combo');
      }
    }
    
    // Spawn numbers
    spawnTimer++;
    if (spawnTimer >= spawnInterval) {
      spawnTimer = 0;
      spawnNumber();
      
      // Sometimes spawn multiple at higher waves
      if (wave > 3 && Math.random() < 0.3) {
        setTimeout(() => spawnNumber(), 300);
      }
      if (wave > 6 && Math.random() < 0.2) {
        setTimeout(() => spawnNumber(), 600);
      }
    }
    
    // Update numbers
    numbers = numbers.filter(n => n.update());
    
    // Clear dead target reference
    if (targetNumber && !numbers.includes(targetNumber)) {
      targetNumber = null;
      typedBuffer = '';
      document.getElementById('typed').textContent = '';
    }
    
    // Update particles
    particles = particles.filter(p => p.update());
    
    // Update trails
    trails = trails.filter(t => t.update());
  }
  
  // Draw trails
  trails.forEach(t => t.draw());
  
  // Draw numbers
  numbers.forEach(n => n.draw());
  
  // Draw particles
  particles.forEach(p => p.draw());
  
  ctx.restore();
  
  // Draw bottom danger zone indicator
  ctx.save();
  const gradient = ctx.createLinearGradient(0, H - 80, 0, H);
  gradient.addColorStop(0, 'rgba(255, 0, 0, 0)');
  gradient.addColorStop(1, `rgba(255, 0, 0, ${0.1 + Math.sin(Date.now() * 0.005) * 0.05})`);
  ctx.fillStyle = gradient;
  ctx.fillRect(0, H - 80, W, 80);
  
  // Danger line
  ctx.strokeStyle = `rgba(255, 0, 0, ${0.3 + Math.sin(Date.now() * 0.008) * 0.2})`;
  ctx.lineWidth = 1;
  ctx.setLineDash([5, 10]);
  ctx.beginPath();
  ctx.moveTo(0, H - 60);
  ctx.lineTo(W, H - 60);
  ctx.stroke();
  ctx.setLineDash([]);
  ctx.restore();
  
  // Update UI
  if (gameState === 'playing') {
    document.getElementById('score').textContent = score;
  }
  
  requestAnimationFrame(gameLoop);
}

requestAnimationFrame(gameLoop);

// Focus handling
window.addEventListener('click', () => {
  if (gameState === 'playing') {
    // Keep focus for typing
  }
});
</script>

</body>
</html>
