<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chromatic Drift — Generative Art</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0f;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Courier New', monospace;
    overflow: hidden;
    color: #ccc;
  }
  canvas {
    border-radius: 8px;
    box-shadow: 0 0 60px rgba(100, 120, 255, 0.15);
    cursor: crosshair;
  }
  .controls {
    margin-top: 20px;
    display: flex;
    gap: 16px;
    align-items: center;
    z-index: 10;
  }
  .controls label {
    font-size: 12px;
    color: #888;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .controls input[type="range"] {
    width: 120px;
    accent-color: #7b8cff;
  }
  button {
    background: transparent;
    border: 1px solid #3a3a5c;
    color: #aaa;
    padding: 8px 18px;
    border-radius: 6px;
    cursor: pointer;
    font-family: inherit;
    font-size: 12px;
    letter-spacing: 1px;
    transition: all 0.3s;
    text-transform: uppercase;
  }
  button:hover {
    border-color: #7b8cff;
    color: #fff;
    box-shadow: 0 0 20px rgba(100, 120, 255, 0.2);
  }
  .info {
    position: fixed;
    bottom: 20px;
    font-size: 10px;
    color: #444;
    letter-spacing: 2px;
    text-transform: uppercase;
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="controls">
  <label>Particles <input type="range" id="pCount" min="30" max="300" value="120"></label>
  <label>Flow <input type="range" id="flow" min="1" max="10" value="5"></label>
  <label>Trail <input type="range" id="trail" min="1" max="20" value="8"></label>
  <button id="reset">⟳ New Seed</button>
  <button id="pause">❚❚ Pause</button>
</div>
<div class="info">click canvas · move mouse · chromatic drift v1</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H;
let particles = [];
let mouse = { x: null, y: null };
let paused = false;
let time = 0;

function resize() {
  W = canvas.width = Math.min(window.innerWidth - 40, 1000);
  H = canvas.height = Math.min(window.innerHeight - 160, 700);
}
resize();
window.addEventListener('resize', () => { resize(); init(); });

// Simplex-like noise (simplified)
class Noise {
  constructor(seed) {
    this.seed = seed;
    this.perm = new Uint8Array(512);
    const p = new Uint8Array(256);
    for (let i = 0; i < 256; i++) p[i] = i;
    // Shuffle with seed
    let s = seed;
    for (let i = 255; i > 0; i--) {
      s = (s * 16807 + 0) % 2147483647;
      const j = s % (i + 1);
      [p[i], p[j]] = [p[j], p[i]];
    }
    for (let i = 0; i < 512; i++) this.perm[i] = p[i & 255];
  }
  noise2D(x, y) {
    const X = Math.floor(x) & 255;
    const Y = Math.floor(y) & 255;
    const xf = x - Math.floor(x);
    const yf = y - Math.floor(y);
    const u = xf * xf * (3 - 2 * xf);
    const v = yf * yf * (3 - 2 * yf);
    const a = this.perm[X] + Y;
    const b = this.perm[X + 1] + Y;
    const g1 = (this.perm[a] & 7) / 7 * Math.PI * 2;
    const g2 = (this.perm[b] & 7) / 7 * Math.PI * 2;
    const g3 = (this.perm[a + 1] & 7) / 7 * Math.PI * 2;
    const g4 = (this.perm[b + 1] & 7) / 7 * Math.PI * 2;
    const dx = xf, dy = yf;
    const n1 = Math.cos(g1) * dx + Math.sin(g1) * dy;
    const n2 = Math.cos(g2) * (dx - 1) + Math.sin(g2) * dy;
    const n3 = Math.cos(g3) * dx + Math.sin(g3) * (dy - 1);
    const n4 = Math.cos(g4) * (dx - 1) + Math.sin(g4) * (dy - 1);
    const nx1 = n1 + u * (n2 - n1);
    const nx2 = n3 + u * (n4 - n3);
    return nx1 + v * (nx2 - nx1);
  }
}

let noise = new Noise(Math.floor(Math.random() * 99999));
let seed = Math.floor(Math.random() * 99999);

function init() {
  const count = parseInt(document.getElementById('pCount').value);
  particles = [];
  for (let i = 0; i < count; i++) {
    particles.push({
      x: Math.random() * W,
      y: Math.random() * H,
      speed: 0.5 + Math.random() * 1.5,
      hueOffset: Math.random() * 60 - 30,
      size: 0.5 + Math.random() * 1.5,
      life: Math.random() * 100,
    });
  }
}

function draw() {
  if (paused) return;
  time += 0.003;
  const flow = parseInt(document.getElementById('flow').value) * 0.15;
  const trail = parseInt(document.getElementById('trail').value) / 100;

  // Semi-transparent fade for trails
  ctx.fillStyle = `rgba(10, 10, 15, ${trail})`;
  ctx.fillRect(0, 0, W, H);

  for (const p of particles) {
    p.life += 0.01;
    const angle = noise.noise2D(p.x * 0.003, p.y * 0.003 + time) * Math.PI * 2;
    const n2 = noise.noise2D(p.x * 0.006 + 100, p.y * 0.006 + time * 0.7);
    let vx = Math.cos(angle + n2) * p.speed * flow;
    let vy = Math.sin(angle + n2) * p.speed * flow;

    // Mouse attraction/repulsion
    if (mouse.x !== null) {
      const dx = mouse.x - p.x;
      const dy = mouse.y - p.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < 150) {
        const force = (150 - dist) / 150;
        vx += (dx / dist) * force * 2;
        vy += (dy / dist) * force * 2;
      }
    }

    p.x += vx;
    p.y += vy;

    // Wrap edges with soft fade
    if (p.x < -20) p.x = W + 20;
    if (p.x > W + 20) p.x = -20;
    if (p.y < -20) p.y = H + 20;
    if (p.y > H + 20) p.y = -20;

    // Color: flowing hues based on position and time
    const hue = (p.x / W * 80 + p.y / H * 80 + time * 30 + p.hueOffset + 220) % 360;
    const alpha = 0.4 + Math.sin(p.life * 2) * 0.3;

    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fillStyle = `hsla(${hue}, 80%, 60%, ${alpha})`;
    ctx.fill();

    // Glow
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * 3, 0, Math.PI * 2);
    ctx.fillStyle = `hsla(${hue}, 90%, 55%, ${alpha * 0.2})`;
    ctx.fill();
  }

  requestAnimationFrame(draw);
}

canvas.addEventListener('mousemove', (e) => {
  const rect = canvas.getBoundingClientRect();
  mouse.x = e.clientX - rect.left;
  mouse.y = e.clientY - rect.top;
});
canvas.addEventListener('mouseleave', () => {
  mouse.x = null;
  mouse.y = null;
});

document.getElementById('pCount').addEventListener('input', init);
document.getElementById('reset').addEventListener('click', () => {
  seed = Math.floor(Math.random() * 99999);
  noise = new Noise(seed);
  ctx.fillStyle = '#0a0a0f';
  ctx.fillRect(0, 0, W, H);
  init();
});
document.getElementById('pause').addEventListener('click', (e) => {
  paused = !paused;
  e.target.textContent = paused ? '▶ Play' : '❚❚ Pause';
  if (!paused) draw();
});

init();
draw();
</script>
</body>
</html>
