<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chromatic Drift — Generative Art</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #0a0a0f;
  overflow: hidden;
  font-family: 'Courier New', monospace;
  cursor: crosshair;
}
canvas { display: block; }
.info {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  color: rgba(255,255,255,0.4);
  font-size: 12px;
  letter-spacing: 2px;
  text-transform: uppercase;
  pointer-events: none;
  z-index: 10;
}
.title {
  position: fixed;
  top: 30px;
  left: 50%;
  transform: translateX(-50%);
  color: rgba(255,255,255,0.15);
  font-size: 14px;
  letter-spacing: 6px;
  text-transform: uppercase;
  pointer-events: none;
  z-index: 10;
}
</style>
</head>
<body>
<div class="title">Chromatic Drift</div>
<canvas id="canvas"></canvas>
<div class="info">move mouse to influence the flow</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

let W, H;
let mouse = { x: 0, y: 0, active: false };
let particles = [];
let time = 0;
let hueOffset = 0;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

canvas.addEventListener('mousemove', (e) => {
  mouse.x = e.clientX;
  mouse.y = e.clientY;
  mouse.active = true;
});
canvas.addEventListener('mouseleave', () => {
  mouse.active = false;
});
canvas.addEventListener('touchmove', (e) => {
  mouse.x = e.touches[0].clientX;
  mouse.y = e.touches[0].clientY;
  mouse.active = true;
});

class Particle {
  constructor() {
    this.reset();
  }

  reset() {
    this.x = Math.random() * W;
    this.y = Math.random() * H;
    this.vx = 0;
    this.vy = 0;
    this.life = Math.random() * 300 + 200;
    this.maxLife = this.life;
    this.size = Math.random() * 2 + 0.5;
    this.hue = Math.random() * 60;
    this.freq = Math.random() * 0.02 + 0.005;
    this.amp = Math.random() * 100 + 50;
    this.phase = Math.random() * Math.PI * 2;
    this.speed = Math.random() * 0.5 + 0.2;
  }

  update(t) {
    // Flow field using sine waves
    const angle = Math.sin(this.x * this.freq + t * 0.5 + this.phase) *
                  Math.cos(this.y * this.freq + t * 0.3) * Math.PI * 2;

    // Mouse influence
    let mx = 0, my = 0;
    if (mouse.active) {
      const dx = mouse.x - this.x;
      const dy = mouse.y - this.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      const influence = Math.max(0, 1 - dist / 300);
      const mouseAngle = Math.atan2(dy, dx);
      mx = Math.cos(mouseAngle + Math.PI * 0.5) * influence * 3;
      my = Math.sin(mouseAngle + Math.PI * 0.5) * influence * 3;
    }

    this.vx += Math.cos(angle) * 0.1 + mx * 0.05;
    this.vy += Math.sin(angle) * 0.1 + my * 0.05;

    // Damping
    this.vx *= 0.98;
    this.vy *= 0.98;

    this.x += this.vx * this.speed;
    this.y += this.vy * this.speed;

    this.life--;

    // Wrap around edges
    if (this.x < 0) this.x = W;
    if (this.x > W) this.x = 0;
    if (this.y < 0) this.y = H;
    if (this.y > H) this.y = 0;

    if (this.life <= 0) this.reset();
  }

  draw(t) {
    const alpha = (this.life / this.maxLife) * 0.6;
    const hue = (this.hue + hueOffset + t * 10) % 360;

    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fillStyle = `hsla(${hue}, 80%, 60%, ${alpha})`;
    ctx.fill();

    // Trail
    const trailLen = Math.sqrt(this.vx * this.vx + this.vy * this.vy) * 3;
    if (trailLen > 1) {
      ctx.beginPath();
      ctx.moveTo(this.x, this.y);
      ctx.lineTo(this.x - this.vx * 3, this.y - this.vy * 3);
      ctx.strokeStyle = `hsla(${hue}, 80%, 60%, ${alpha * 0.3})`;
      ctx.lineWidth = this.size * 0.5;
      ctx.stroke();
    }
  }
}

// Initialize particles
const PARTICLE_COUNT = 800;
for (let i = 0; i < PARTICLE_COUNT; i++) {
  particles.push(new Particle());
}

// Connection lines
function drawConnections() {
  const connectionDist = 80;
  for (let i = 0; i < particles.length; i++) {
    for (let j = i + 1; j < particles.length; j++) {
      const dx = particles[i].x - particles[j].x;
      const dy = particles[i].y - particles[j].y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < connectionDist) {
        const alpha = (1 - dist / connectionDist) * 0.1;
        const hue = (particles[i].hue + hueOffset + time * 10) % 360;
        ctx.beginPath();
        ctx.moveTo(particles[i].x, particles[i].y);
        ctx.lineTo(particles[j].x, particles[j].y);
        ctx.strokeStyle = `hsla(${hue}, 70%, 50%, ${alpha})`;
        ctx.lineWidth = 0.5;
        ctx.stroke();
      }
    }
  }
}

function animate() {
  // Semi-transparent overlay for trail effect
  ctx.fillStyle = 'rgba(10, 10, 15, 0.05)';
  ctx.fillRect(0, 0, W, H);

  time += 0.01;
  hueOffset = (hueOffset + 0.2) % 360;

  // Update and draw particles
  particles.forEach(p => {
    p.update(time);
    p.draw(time);
  });

  // Draw connections (skip for performance)
  if (time % 2 < 0.5) {
    drawConnections();
  }

  requestAnimationFrame(animate);
}

animate();
</script>
</body>
</html>
