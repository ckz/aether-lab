<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chromatic Rain — Musical Drop Machine</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  body {
    background: #0a0a14;
    overflow: hidden;
    font-family: 'SF Mono', 'Monaco', 'Courier New', monospace;
    color: #a0a0c0;
    user-select: none;
  }
  
  canvas {
    display: block;
    position: fixed;
    top: 0;
    left: 0;
  }
  
  #ui {
    position: fixed;
    top: 20px;
    left: 20px;
    z-index: 100;
    background: rgba(10, 10, 20, 0.85);
    padding: 16px 20px;
    border-radius: 12px;
    border: 1px solid rgba(160, 160, 192, 0.2);
    backdrop-filter: blur(10px);
    max-width: 320px;
  }
  
  #ui h1 {
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: #c0c0e0;
    margin-bottom: 8px;
  }
  
  #ui p {
    font-size: 11px;
    line-height: 1.5;
    color: #8080a0;
    margin-bottom: 12px;
  }
  
  #ui .control {
    margin-bottom: 10px;
  }
  
  #ui label {
    display: block;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: #a0a0c0;
    margin-bottom: 4px;
  }
  
  #ui select, #ui input[type="range"] {
    width: 100%;
    background: rgba(30, 30, 50, 0.8);
    border: 1px solid rgba(160, 160, 192, 0.3);
    color: #c0c0e0;
    padding: 6px 8px;
    border-radius: 6px;
    font-family: inherit;
    font-size: 11px;
    outline: none;
  }
  
  #ui select:focus, #ui input:focus {
    border-color: rgba(160, 160, 192, 0.6);
  }
  
  #stats {
    position: fixed;
    bottom: 20px;
    right: 20px;
    font-size: 10px;
    color: #606080;
    text-align: right;
    z-index: 100;
  }
  
  #click-hint {
    position: fixed;
    bottom: 40px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 11px;
    color: #606080;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    z-index: 100;
    opacity: 0.7;
    pointer-events: none;
    transition: opacity 2s;
  }
  
  .hidden { opacity: 0 !important; }
</style>
</head>
<body>
<canvas id="canvas"></canvas>

<div id="ui">
  <h1>Chromatic Rain</h1>
  <p>Musical drops fall and sing. Click to plant drops, hold to downpour.</p>
  
  <div class="control">
    <label>Mood / Scale</label>
    <select id="scale">
      <option value="pentatonic">Pentatonic (calm)</option>
      <option value="major">Major (bright)</option>
      <option value="minor">Minor (melancholy)</option>
      <option value="dorian">Dorian (mysterious)</option>
      <option value="chromatic">Chromatic (wild)</option>
      <option value="japanese">Japanese (in scale)</option>
    </select>
  </div>
  
  <div class="control">
    <label>Density</label>
    <input type="range" id="density" min="1" max="10" value="4">
  </div>
  
  <div class="control">
    <label>Wind</label>
    <input type="range" id="wind" min="-5" max="5" value="0" step="0.5">
  </div>
</div>

<div id="stats">
  <div id="drop-count">drops: 0</div>
  <div id="note-count">notes: 0</div>
</div>

<div id="click-hint">click anywhere to plant drops</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

let W, H;
function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// Audio context (lazy init on first interaction)
let audioCtx = null;
function initAudio() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  if (audioCtx.state === 'suspended') audioCtx.resume();
}

// Scales (frequencies in Hz, spanning ~3 octaves)
const SCALES = {
  pentatonic: [130.81, 146.83, 164.81, 196.00, 220.00, 261.63, 293.66, 329.63, 392.00, 440.00, 523.25, 587.33, 659.25, 783.99, 880.00],
  major:      [130.81, 146.83, 164.81, 174.61, 196.00, 220.00, 246.94, 261.63, 293.66, 329.63, 349.23, 392.00, 440.00, 493.88, 523.25],
  minor:      [130.81, 146.83, 155.56, 174.61, 196.00, 220.00, 233.08, 261.63, 293.66, 311.13, 349.23, 392.00, 440.00, 466.16, 523.25],
  dorian:     [130.81, 146.83, 155.56, 174.61, 196.00, 220.00, 246.94, 261.63, 293.66, 311.13, 349.23, 392.00, 440.00, 493.88, 523.25],
  chromatic:  [130.81, 138.59, 146.83, 155.56, 164.81, 174.61, 185.00, 196.00, 207.65, 220.00, 233.08, 246.94, 261.63, 277.18, 293.66],
  japanese:   [130.81, 146.83, 164.81, 174.61, 196.00, 220.00, 246.94, 261.63, 293.66, 329.63, 349.23, 392.00, 440.00, 493.88, 523.25]
};

let currentScale = 'pentatonic';
let density = 4;
let wind = 0;

document.getElementById('scale').addEventListener('change', e => currentScale = e.target.value);
document.getElementById('density').addEventListener('input', e => density = parseInt(e.target.value));
document.getElementById('wind').addEventListener('input', e => wind = parseFloat(e.target.value));

// Color palettes mapped to pitch height
function getDropColor(index, total) {
  const hue = (index / total) * 360;
  return `hsl(${hue}, 75%, 65%)`;
}

function getDropHSL(index, total) {
  const hue = (index / total) * 360;
  return { h: hue, s: 75, l: 65 };
}

// Drop class
class Drop {
  constructor(x, y, manual = false) {
    this.x = x || Math.random() * W;
    this.y = y || -20;
    this.vy = 2 + Math.random() * 4;
    this.vx = (Math.random() - 0.5) * 0.5 + wind * 0.3;
    this.size = 2 + Math.random() * 3;
    this.trail = [];
    this.alive = true;
    this.hue = Math.random() * 360;
    this.noteIndex = Math.floor(Math.random() * SCALES[currentScale].length);
    this.played = false;
    this.manual = manual;
  }
  
  update() {
    this.trail.push({ x: this.x, y: this.y, a: 1 });
    if (this.trail.length > 12) this.trail.shift();
    this.trail.forEach(t => t.a *= 0.85);
    
    this.vy += 0.05; // gravity
    this.vx += (wind * 0.01 - this.vx * 0.01);
    this.x += this.vx;
    this.y += this.vy;
    
    if (this.y > H - 30 && !this.played) {
      this.playNote();
      this.splash();
      this.alive = false;
    }
    
    if (this.x < -50 || this.x > W + 50 || this.y > H + 50) {
      this.alive = false;
    }
  }
  
  playNote() {
    if (!audioCtx) return;
    const freq = SCALES[currentScale][this.noteIndex % SCALES[currentScale].length];
    
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    const filter = audioCtx.createBiquadFilter();
    
    // Vary timbre by hue
    const waveType = this.hue < 120 ? 'sine' : this.hue < 240 ? 'triangle' : 'sine';
    osc.type = waveType;
    osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
    
    filter.type = 'lowpass';
    filter.frequency.setValueAtTime(2000 + (this.hue / 360) * 4000, audioCtx.currentTime);
    
    gain.gain.setValueAtTime(0.08, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 1.5);
    
    osc.connect(filter);
    filter.connect(gain);
    gain.connect(audioCtx.destination);
    
    osc.start(audioCtx.currentTime);
    osc.stop(audioCtx.currentTime + 1.5);
    
    noteCount++;
  }
  
  splash() {
    for (let i = 0; i < 8; i++) {
      ripples.push(new Ripple(this.x, H - 30, this.hue));
    }
  }
  
  draw() {
    // Trail
    for (let i = 0; i < this.trail.length; i++) {
      const t = this.trail[i];
      ctx.beginPath();
      ctx.arc(t.x, t.y, this.size * 0.6, 0, Math.PI * 2);
      ctx.fillStyle = `hsla(${this.hue}, 75%, 65%, ${t.a * 0.4})`;
      ctx.fill();
    }
    
    // Drop
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fillStyle = `hsl(${this.hue}, 75%, 70%)`;
    ctx.fill();
    
    // Glow
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size * 2.5, 0, Math.PI * 2);
    const grad = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.size * 2.5);
    grad.addColorStop(0, `hsla(${this.hue}, 75%, 65%, 0.4)`);
    grad.addColorStop(1, `hsla(${this.hue}, 75%, 65%, 0)`);
    ctx.fillStyle = grad;
    ctx.fill();
  }
}

// Ripple class
class Ripple {
  constructor(x, y, hue) {
    this.x = x;
    this.y = y;
    this.hue = hue;
    this.r = 2;
    this.maxR = 30 + Math.random() * 40;
    this.alive = true;
    this.speed = 1 + Math.random() * 1.5;
  }
  
  update() {
    this.r += this.speed;
    if (this.r > this.maxR) this.alive = false;
  }
  
  draw() {
    const alpha = 1 - (this.r / this.maxR);
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
    ctx.strokeStyle = `hsla(${this.hue}, 75%, 65%, ${alpha * 0.6})`;
    ctx.lineWidth = 1.5;
    ctx.stroke();
  }
}

// Ground glow
function drawGround() {
  const y = H - 30;
  const grad = ctx.createLinearGradient(0, y - 20, 0, H);
  grad.addColorStop(0, 'rgba(20, 20, 40, 0)');
  grad.addColorStop(1, 'rgba(30, 30, 60, 0.6)');
  ctx.fillStyle = grad;
  ctx.fillRect(0, y - 20, W, 50);
  
  // Surface line
  ctx.beginPath();
  ctx.moveTo(0, y);
  for (let x = 0; x < W; x += 3) {
    ctx.lineTo(x, y + Math.sin(x * 0.02 + Date.now() * 0.001) * 1.5);
  }
  ctx.strokeStyle = 'rgba(100, 100, 140, 0.3)';
  ctx.lineWidth = 1;
  ctx.stroke();
}

let drops = [];
let ripples = [];
let dropCount = 0;
let noteCount = 0;

// Spawn natural rain
function spawnRain() {
  const count = Math.ceil(density / 3);
  for (let i = 0; i < count; i++) {
    drops.push(new Drop());
    dropCount++;
  }
}

// Mouse interaction
let mouseDown = false;
let mouseX = 0, mouseY = 0;

canvas.addEventListener('mousedown', e => {
  initAudio();
  mouseDown = true;
  mouseX = e.clientX;
  mouseY = e.clientY;
  document.getElementById('click-hint').classList.add('hidden');
  
  // Plant drops on click
  for (let i = 0; i < 5; i++) {
    const d = new Drop(e.clientX + (Math.random() - 0.5) * 40, e.clientY + (Math.random() - 0.5) * 20, true);
    d.vy = 1 + Math.random() * 2;
    drops.push(d);
    dropCount++;
  }
});

canvas.addEventListener('mousemove', e => {
  mouseX = e.clientX;
  mouseY = e.clientY;
  if (mouseDown && Math.random() < 0.3) {
    const d = new Drop(mouseX + (Math.random() - 0.5) * 30, mouseY - 20, true);
    d.vy = 1 + Math.random();
    drops.push(d);
    dropCount++;
  }
});

canvas.addEventListener('mouseup', () => mouseDown = false);
canvas.addEventListener('mouseleave', () => mouseDown = false);

// Touch support
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  initAudio();
  mouseDown = true;
  mouseX = e.touches[0].clientX;
  mouseY = e.touches[0].clientY;
  document.getElementById('click-hint').classList.add('hidden');
  
  for (let i = 0; i < 5; i++) {
    const d = new Drop(mouseX + (Math.random() - 0.5) * 40, mouseY + (Math.random() - 0.5) * 20, true);
    d.vy = 1 + Math.random() * 2;
    drops.push(d);
    dropCount++;
  }
});

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  mouseX = e.touches[0].clientX;
  mouseY = e.touches[0].clientY;
  if (Math.random() < 0.3) {
    const d = new Drop(mouseX + (Math.random() - 0.5) * 30, mouseY - 20, true);
    d.vy = 1 + Math.random();
    drops.push(d);
    dropCount++;
  }
});

canvas.addEventListener('touchend', () => mouseDown = false);

// Space to clear
document.addEventListener('keydown', e => {
  if (e.code === 'Space') {
    e.preventDefault();
    drops = [];
    ripples = [];
  }
});

// Main loop
let lastSpawn = 0;
function loop(time) {
  // Spawn rain
  const spawnRate = Math.max(50, 400 - density * 35);
  if (time - lastSpawn > spawnRate) {
    spawnRain();
    lastSpawn = time;
  }
  
  // Clear with fade
  ctx.fillStyle = 'rgba(10, 10, 20, 0.15)';
  ctx.fillRect(0, 0, W, H);
  
  // Ground
  drawGround();
  
  // Update & draw ripples
  ripples = ripples.filter(r => r.alive);
  ripples.forEach(r => { r.update(); r.draw(); });
  
  // Update & draw drops
  drops = drops.filter(d => d.alive);
  drops.forEach(d => { d.update(); d.draw(); });
  
  // Stats
  document.getElementById('drop-count').textContent = `drops: ${dropCount}`;
  document.getElementById('note-count').textContent = `notes: ${noteCount}`;
  
  requestAnimationFrame(loop);
}

requestAnimationFrame(loop);
</script>
</body>
</html>
