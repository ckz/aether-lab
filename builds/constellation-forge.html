<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Aether's Constellation Forge</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; background: radial-gradient(ellipse at center, #0b0d17 0%, #000 100%); font-family: 'Segoe UI', sans-serif; color: #e6e6fa; }
    canvas { display: block; cursor: crosshair; }
    #ui { position: fixed; top: 16px; left: 50%; transform: translateX(-50%); display: flex; gap: 12px; z-index: 5; }
    .pill { background: rgba(255,255,255,.08); backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,.12); border-radius: 999px; padding: 8px 14px; font-size: 13px; color: #d8d8ff; cursor: pointer; user-select: none; }
    .pill:hover { background: rgba(255,255,255,.16); }
    .pill.active { background: rgba(120, 120, 255, .25); border-color: rgba(160,160,255,.5); color: #fff; }
    #hint { position: fixed; bottom: 18px; left: 50%; transform: translateX(-50%); font-size: 12px; color: rgba(220,220,255,.7); z-index: 5; letter-spacing: .04em; }
  </style>
</head>
<body>
  <div id="ui">
    <div class="pill active" data-mode="draw">✦ Draw stars</div>
    <div class="pill" data-mode="connect">︱ Connect</div>
    <div class="pill" data-mode="twinkle">✧ Twinkle</div>
    <div class="pill" data-mode="wipe">◌ Wipe</div>
  </div>
  <div id="hint">Click or drag to create. Scroll to change size. Space clears the sky.</div>
  <canvas id="c"></canvas>
  <script>
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    let W, H;
    const resize = () => { W = canvas.width = innerWidth; H = canvas.height = innerHeight; };
    addEventListener('resize', resize); resize();

    const modeEls = document.querySelectorAll('.pill');
    let mode = 'draw';
    modeEls.forEach(el => el.addEventListener('click', () => {
      modeEls.forEach(e => e.classList.remove('active'));
      el.classList.add('active');
      mode = el.dataset.mode;
    }));

    const stars = []; // {x,y,r,color,vx,vy,phase,linked:[index]}
    const hue = (i) => 210 + (i * 37) % 120;
    const rand = (a=1,b=0)=>Math.random()*(a-b)+b;
    const dist = (a,b) => Math.hypot(a.x-b.x, a.y-b.y);

    const starColors = ['#ffffff','#ffe9c4','#d4fbff','#ffb6c1','#e0c3fc','#c2f0fc','#ffd166'];

    const addStar = (x,y,r=rand(1.6, 2.8)) => {
      stars.push({
        x, y, r,
        color: starColors[Math.floor(rand(starColors.length))],
        phase: rand(Math.PI*2),
        speed: rand(.6, 2.2),
        linked: []
      });
      if (stars.length > 600) stars.shift();
    };

    let painting = false;
    let radius = 3;
    addEventListener('mousedown', e => {
      if (e.target !== canvas) return;
      painting = true;
      addStar(e.clientX, e.clientY, radius);
    });
    addEventListener('mousemove', e => {
      if (!painting) return;
      if (mode === 'draw') addStar(e.clientX, e.clientY, radius);
    });
    addEventListener('mouseup', () => painting = false);
    addEventListener('wheel', e => { radius = Math.max(1, Math.min(12, radius - Math.sign(e.deltaY))); });

    // Connect mode: draw between nearby stars
    addEventListener('click', e => {
      if (mode !== 'connect' || e.target !== canvas) return;
      const a = {x: e.clientX, y: e.clientY};
      stars.forEach(s => {
        if (dist(a,s) < 90) s.linked.push(-1); // placeholder "clicked"
      });
    });

    // Wipe mode: remove stars near cursor
    addEventListener('mousemove', e => {
      if (mode !== 'wipe' || e.buttons !== 1) return;
      for (let i = stars.length - 1; i >= 0; i--) {
        if (dist({x:e.clientX, y:e.clientY}, stars[i]) < 40) stars.splice(i, 1);
      }
    });

    // Twinkle mode: toggle nearby star brightness/speed
    addEventListener('click', e => {
      if (mode !== 'twinkle' || e.target !== canvas) return;
      stars.forEach(s => {
        if (dist({x:e.clientX, y:e.clientY}, s) < 100) {
          s.speed = rand(.2, 4);
          s.color = starColors[Math.floor(rand(starColors.length))];
        }
      });
    });

    // Touch
    addEventListener('touchstart', e => {
      const t = e.touches[0];
      addStar(t.clientX, t.clientY, radius);
      painting = true;
    }, {passive:true});
    addEventListener('touchmove', e => {
      if (!painting) return;
      const t = e.touches[0];
      if (mode === 'draw') addStar(t.clientX, t.clientY, radius);
      if (mode === 'wipe') {
        for (let i = stars.length - 1; i >= 0; i--) {
          if (dist({x:t.clientX, y:t.clientY}, stars[i]) < 40) stars.splice(i, 1);
        }
      }
    }, {passive:true});
    addEventListener('touchend', () => painting = false);

    addEventListener('keydown', e => {
      if (e.code === 'Space') { stars.length = 0; e.preventDefault(); }
    });

    // Shooting star
    const meteors = [];
    const spawnMeteor = () => {
      if (Math.random() > .004) return;
      meteors.push({
        x: rand(W*.2, W*.8),
        y: 0,
        vx: rand(3, 7) * (Math.random()>.5?1:-1),
        vy: rand(4, 9),
        life: 1
      });
    };

    const draw = t => {
      ctx.fillStyle = 'rgba(11,13,23,.18)';
      ctx.fillRect(0,0,W,H);

      stars.forEach(s => {
        const a = .4 + .6 * (.5 + .5 * Math.sin(t * .001 * s.speed + s.phase));
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        ctx.fillStyle = s.color;
        ctx.globalAlpha = a;
        ctx.fill();
        ctx.globalAlpha = 1;
      });

      // connections in connect mode
      if (mode === 'connect' || true) {
        ctx.lineWidth = .4;
        for (let i = 0; i < stars.length; i++) {
          for (let j = i+1; j < stars.length; j++) {
            const d = dist(stars[i], stars[j]);
            if (d < 70) {
              ctx.beginPath();
              ctx.moveTo(stars[i].x, stars[i].y);
              ctx.lineTo(stars[j].x, stars[j].y);
              ctx.strokeStyle = `rgba(180,200,255,${.25*(1-d/70)})`;
              ctx.stroke();
            }
          }
        }
      }

      spawnMeteor();
      meteors.forEach((m,i) => {
        m.x += m.vx; m.y += m.vy; m.life -= .015;
        ctx.beginPath();
        ctx.moveTo(m.x, m.y);
        ctx.lineTo(m.x - m.vx*5, m.y - m.vy*5);
        ctx.strokeStyle = `rgba(255,255,255,${m.life})`;
        ctx.lineWidth = 1.5;
        ctx.stroke();
        if (m.life <= 0 || m.x < 0 || m.x > W || m.y > H) meteors.splice(i,1);
      });

      // ambient nebula glow
      const g = ctx.createRadialGradient(W/2, H/2, 0, W/2, H/2, W*.7);
      g.addColorStop(0, 'rgba(40,20,90,.05)');
      g.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = g;
      ctx.fillRect(0,0,W,H);

      requestAnimationFrame(draw);
    };

    // seed with a few initial stars
    for (let i = 0; i < 80; i++) addStar(rand(W), rand(H), rand(1,2.5));
    requestAnimationFrame(draw);
  </script>
</body>
</html>
