<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cosmic Flow Field</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a1a; overflow: hidden; font-family: 'Courier New', monospace; }
  canvas { display: block; }
  #ui { position: fixed; top: 16px; left: 16px; color: rgba(255,255,255,0.7); font-size: 12px; pointer-events: none; z-index: 10; }
  #controls { position: fixed; bottom: 16px; left: 16px; display: flex; gap: 8px; z-index: 10; }
  #controls button { background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.2); color: #ccc; padding: 6px 14px; cursor: pointer; font-size: 12px; border-radius: 4px; transition: all 0.2s; }
  #controls button:hover { background: rgba(255,255,255,0.18); color: #fff; }
  .title { position: fixed; top: 16px; right: 16px; color: rgba(255,255,255,0.25); font-size: 11px; z-index: 10; pointer-events: none; }
</style>
</head>
<body>
<canvas id="canvas"></canvas>
<div id="ui">
  <div>PARTICLES: <span id="pcount">0</span></div>
  <div>FPS: <span id="fps">0</span></div>
</div>
<div class="title">✦ COSMIC FLOW FIELD ✦</div>
<div id="controls">
  <button onclick="resetField()">⟳ Regenerate</button>
  <button onclick="toggleTrails()">◐ Trails</button>
  <button onclick="togglePalette()">◈ Palette</button>
  <button onclick="saveSnapshot()">⬇ Save</button>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

let W, H;
function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

const PARTICLE_COUNT = 2000;
const NOISE_SCALE = 0.003;
const SPEED = 1.2;

let particles = [];
let trails = true;
let paletteIndex = 0;
let time = 0;
let mouse = { x: W/2, y: H/2, active: false };

const palettes = [
  ['#00ff88', '#00ccff', '#8844ff', '#ff44aa', '#ffaa00'],
  ['#ff6b6b', '#feca57', '#48dbfb', '#ff9ff3', '#54a0ff'],
  ['#00d2ff', '#3a7bd5', '#6a3093', '#a044ff', '#ff6fd8'],
  ['#0aff0a', '#0affed', '#0a7aff', '#ff0a8f', '#ffba0a'],
  ['#e0e0e0', '#ffffff', '#aaaaff', '#ffaaaa', '#aaffaa']
];

// Simplex-like noise using sin-based pseudo-noise
function noise(x, y, t) {
  const s1 = Math.sin(x * 1.3 + t) * Math.cos(y * 0.9 + t * 0.7);
  const s2 = Math.sin(y * 1.1 - t * 0.8) * Math.cos(x * 0.7 + t * 0.6);
  const s3 = Math.sin((x + y) * 0.5 + t * 0.5);
  return (s1 + s2 + s3) / 3;
}

function getAngle(x, y, t) {
  const n = noise(x * NOISE_SCALE, y * NOISE_SCALE, t * 0.3);
  return n * Math.PI * 4;
}

class Particle {
  constructor() { this.reset(); }

  reset() {
    this.x = Math.random() * W;
    this.y = Math.random() * H;
    this.prevX = this.x;
    this.prevY = this.y;
    this.life = Math.random() * 200 + 100;
    this.maxLife = this.life;
    this.paletteIdx = Math.floor(Math.random() * 5);
    this.size = Math.random() * 1.5 + 0.5;
  }

  update() {
    this.prevX = this.x;
    this.prevY = this.y;
    const angle = getAngle(this.x, this.y, time);
    this.x += Math.cos(angle) * SPEED;
    this.y += Math.sin(angle) * SPEED;

    // Mouse attraction
    if (mouse.active) {
      const dx = mouse.x - this.x;
      const dy = mouse.y - this.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < 200) {
        const force = (200 - dist) / 200 * 0.5;
        this.x += (dx / dist) * force;
        this.y += (dy / dist) * force;
      }
    }

    this.life--;

    if (this.life <= 0 || this.x < 0 || this.x > W || this.y < 0 || this.y > H) {
      this.reset();
    }
  }

  draw() {
    const alpha = (this.life / this.maxLife) * 0.6;
    const palette = palettes[paletteIndex];
    const color = palette[this.paletteIdx];

    ctx.beginPath();
    ctx.strokeStyle = color + Math.floor(alpha * 255).toString(16).padStart(2, '0');
    ctx.lineWidth = this.size;
    ctx.moveTo(this.prevX, this.prevY);
    ctx.lineTo(this.x, this.y);
    ctx.stroke();
  }
}

function initParticles() {
  particles = [];
  for (let i = 0; i < PARTICLE_COUNT; i++) {
    particles.push(new Particle());
  }
}

function resetField() {
  ctx.fillStyle = '#0a0a1a';
  ctx.fillRect(0, 0, W, H);
  initParticles();
}

function toggleTrails() {
  trails = !trails;
  if (!trails) {
    ctx.fillStyle = 'rgba(10, 10, 26, 0.08)';
  }
}

function togglePalette() {
  paletteIndex = (paletteIndex + 1) % palettes.length;
}

function saveSnapshot() {
  const link = document.createElement('a');
  link.download = 'cosmic-flow-' + Date.now() + '.png';
  link.href = canvas.toDataURL('image/png');
  link.click();
}

// Mouse tracking
canvas.addEventListener('mousemove', (e) => {
  mouse.x = e.clientX;
  mouse.y = e.clientY;
  mouse.active = true;
});
canvas.addEventListener('mouseleave', () => { mouse.active = false; });
canvas.addEventListener('touchmove', (e) => {
  e.preventDefault();
  mouse.x = e.touches[0].clientX;
  mouse.y = e.touches[0].clientY;
  mouse.active = true;
}, { passive: false });
canvas.addEventListener('touchend', () => { mouse.active = false; });

// FPS counter
let fpsFrames = 0;
let fpsTime = performance.now();

initParticles();

function animate() {
  if (trails) {
    ctx.fillStyle = 'rgba(10, 10, 26, 0.04)';
  } else {
    ctx.fillStyle = 'rgba(10, 10, 26, 0.15)';
  }
  ctx.fillRect(0, 0, W, H);

  time += 0.005;

  for (let p of particles) {
    p.update();
    p.draw();
  }

  fpsFrames++;
  const now = performance.now();
  if (now - fpsTime >= 1000) {
    document.getElementById('fps').textContent = fpsFrames;
    fpsFrames = 0;
    fpsTime = now;
  }
  document.getElementById('pcount').textContent = PARTICLE_COUNT;

  requestAnimationFrame(animate);
}
animate();
</script>
</body>
</html>
