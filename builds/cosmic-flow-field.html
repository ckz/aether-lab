<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cosmic Flow Field — Generative Art</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0f;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Courier New', monospace;
    color: #aaa;
    overflow: hidden;
  }
  canvas {
    border-radius: 8px;
    box-shadow: 0 0 60px rgba(80, 120, 255, 0.15);
    cursor: crosshair;
  }
  .controls {
    position: fixed;
    bottom: 20px;
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    justify-content: center;
    z-index: 10;
  }
  .controls button {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.12);
    color: #ccc;
    padding: 8px 18px;
    border-radius: 20px;
    cursor: pointer;
    font-family: inherit;
    font-size: 13px;
    transition: all 0.2s;
  }
  .controls button:hover {
    background: rgba(255,255,255,0.12);
    border-color: rgba(255,255,255,0.25);
    color: #fff;
  }
  .title {
    position: fixed;
    top: 20px;
    font-size: 14px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.25);
  }
  .info {
    position: fixed;
    top: 44px;
    font-size: 11px;
    color: rgba(255,255,255,0.15);
    letter-spacing: 1px;
  }
</style>
</head>
<body>
<div class="title">Cosmic Flow Field</div>
<div class="info">click & drag to attract · scroll to zoom · space to pause</div>
<canvas id="c"></canvas>
<div class="controls">
  <button onclick="reset()">↻ Reset</button>
  <button onclick="togglePalette()">◐ Palette</button>
  <button onclick="saveFrame()">⬇ Save</button>
  <button onclick="toggleTrails()">◌ Trails</button>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

let W, H, DPR;
let particles = [];
let flowField = [];
let cols, rows;
const CELL = 18;
let time = 0;
let paused = false;
let mouse = { x: -9999, y: -9999, down: false };
let trailMode = 0;
let paletteIndex = 0;

const palettes = [
  // Cosmic nebula
  [[20,10,40],[60,20,80],[120,40,160],[40,80,200],[20,150,220],[100,200,255],[200,220,255]],
  // Aurora
  [[5,15,10],[10,60,40],[20,120,80],[40,180,120],[80,220,160],[160,255,200],[220,255,240]],
  // Solar flare
  [[30,5,5],[80,15,10],[150,30,15],[200,60,10],[240,120,20],[255,180,60],[255,230,150]],
  // Ocean depths
  [[5,5,30],[10,20,60],[15,40,100],[20,80,140],[40,140,180],[80,200,220],[160,240,255]],
  // Ember
  [[20,5,0],[50,10,0],[100,20,5],[160,40,10],[200,80,15],[230,140,30],[255,200,80]],
];

function resize() {
  DPR = window.devicePixelRatio || 1;
  W = Math.min(window.innerWidth - 40, 1400);
  H = Math.min(window.innerHeight - 140, 900);
  canvas.width = W * DPR;
  canvas.height = H * DPR;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  cols = Math.ceil(W / CELL) + 1;
  rows = Math.ceil(H / CELL) + 1;
}

function noise(x, y, t) {
  // Simplified Perlin-like using sin layers
  let v = Math.sin(x * 0.8 + t * 0.3) * Math.cos(y * 0.6 + t * 0.2);
  v += Math.sin(x * 1.5 - t * 0.5) * Math.cos(y * 1.2 + t * 0.4) * 0.5;
  v += Math.sin((x + y) * 0.7 + t * 0.15) * 0.3;
  v += Math.cos(x * 2.1 + y * 1.8 - t * 0.6) * 0.2;
  return v;
}

function getAngle(x, y) {
  const n = noise(x, y, time);
  return n * Math.PI * 4;
}

function getColor(x, y, speed) {
  const pal = palettes[paletteIndex];
  const n = noise(x * 0.3, y * 0.3, time * 0.5);
  const idx = ((n + 1) * 0.5) * (pal.length - 1);
  const i = Math.floor(idx) % (pal.length - 1);
  const f = idx - i;
  const c1 = pal[i], c2 = pal[i + 1];
  const boost = Math.min(speed * 2, 1);
  return [
    c1[0] + (c2[0] - c1[0]) * f + boost * 40,
    c1[1] + (c2[1] - c1[1]) * f + boost * 30,
    c1[2] + (c2[2] - c1[2]) * f + boost * 20,
  ];
}

class Particle {
  constructor() {
    this.reset();
  }
  reset() {
    this.x = Math.random() * W;
    this.y = Math.random() * H;
    this.prevX = this.x;
    this.prevY = this.y;
    this.speed = 0;
    this.life = Math.random() * 300 + 200;
    this.age = 0;
    this.size = Math.random() * 1.5 + 0.5;
  }
  update() {
    this.prevX = this.x;
    this.prevY = this.y;

    const angle = getAngle(this.x * 0.005, this.y * 0.005);
    let fx = Math.cos(angle) * 1.5;
    let fy = Math.sin(angle) * 1.5;

    // Mouse attraction
    if (mouse.down) {
      const dx = mouse.x - this.x;
      const dy = mouse.y - this.y;
      const dist = Math.sqrt(dx * dx + dy * dy) + 1;
      if (dist < 250) {
        const force = (250 - dist) / 250 * 3;
        fx += (dx / dist) * force;
        fy += (dy / dist) * force;
      }
    }

    this.x += fx;
    this.y += fy;
    this.speed = Math.sqrt(fx * fx + fy * fy);
    this.age++;

    // Wrap
    if (this.x < 0) this.x += W;
    if (this.x > W) this.x -= W;
    if (this.y < 0) this.y += H;
    if (this.y > H) this.y -= H;

    if (this.age > this.life ||
        this.x < -10 || this.x > W + 10 ||
        this.y < -10 || this.y > H + 10) {
      this.reset();
    }
  }
  draw() {
    const alpha = Math.min(this.age / 20, 1) * Math.max(0, 1 - this.age / this.life) * 0.7;
    const [r, g, b] = getColor(this.x, this.y, this.speed);
    ctx.beginPath();
    ctx.moveTo(this.prevX, this.prevY);
    ctx.lineTo(this.x, this.y);
    ctx.strokeStyle = `rgba(${r|0},${g|0},${b|0},${alpha})`;
    ctx.lineWidth = this.size;
    ctx.stroke();
  }
}

function init() {
  resize();
  particles = [];
  const count = Math.min(Math.floor((W * H) / 600), 4000);
  for (let i = 0; i < count; i++) {
    particles.push(new Particle());
  }
  ctx.fillStyle = '#0a0a0f';
  ctx.fillRect(0, 0, W, H);
}

function draw() {
  if (!paused) {
    if (trailMode === 0) {
      ctx.fillStyle = 'rgba(10,10,15,0.03)';
    } else {
      ctx.fillStyle = 'rgba(10,10,15,0.15)';
    }
    ctx.fillRect(0, 0, W, H);

    for (const p of particles) {
      p.update();
      p.draw();
    }
    time += 0.005;
  }
  requestAnimationFrame(draw);
}

function reset() {
  paletteIndex = (paletteIndex + 1) % palettes.length;
  ctx.fillStyle = '#0a0a0f';
  ctx.fillRect(0, 0, W, H);
  for (const p of particles) p.reset();
}

function togglePalette() {
  paletteIndex = (paletteIndex + 1) % palettes.length;
}

function toggleTrails() {
  trailMode = (trailMode + 1) % 3;
}

function saveFrame() {
  const link = document.createElement('a');
  link.download = `flow-field-${Date.now()}.png`;
  link.href = canvas.toDataURL('image/png');
  link.click();
}

window.addEventListener('resize', () => {
  // Don't full reset on resize, just update bounds
  const oldW = W, oldH = H;
  resize();
  for (const p of particles) {
    p.x = (p.x / oldW) * W;
    p.y = (p.y / oldH) * H;
    p.prevX = p.x;
    p.prevY = p.y;
  }
});

canvas.addEventListener('mousedown', e => {
  const rect = canvas.getBoundingClientRect();
  mouse.x = e.clientX - rect.left;
  mouse.y = e.clientY - rect.top;
  mouse.down = true;
});
canvas.addEventListener('mousemove', e => {
  const rect = canvas.getBoundingClientRect();
  mouse.x = e.clientX - rect.left;
  mouse.y = e.clientY - rect.top;
});
canvas.addEventListener('mouseup', () => mouse.down = false);
canvas.addEventListener('mouseleave', () => mouse.down = false);

canvas.addEventListener('wheel', e => {
  e.preventDefault();
  // Zoom by adjusting particle attraction range (visual feedback via trail alpha)
  trailMode = (trailMode + 1) % 3;
}, { passive: false });

document.addEventListener('keydown', e => {
  if (e.code === 'Space') {
    e.preventDefault();
    paused = !paused;
  }
});

init();
draw();
</script>
</body>
</html>
