<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cosmic Loom — Generative Mandala</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #0a0a0f;
  color: #e0e0e0;
  font-family: 'Segoe UI', system-ui, sans-serif;
  overflow: hidden;
  height: 100vh;
  display: flex;
  flex-direction: column;
}
canvas { display: block; cursor: crosshair; }

#controls {
  position: fixed;
  top: 16px;
  right: 16px;
  background: rgba(10, 10, 20, 0.85);
  backdrop-filter: blur(12px);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 16px;
  padding: 20px 24px;
  z-index: 10;
  min-width: 240px;
  font-size: 13px;
  transition: opacity 0.3s;
}
#controls:hover { opacity: 1 !important; }
#controls h2 {
  font-size: 14px;
  font-weight: 600;
  margin-bottom: 16px;
  color: #aab;
  letter-spacing: 0.5px;
  text-transform: uppercase;
}
.ctrl-group { margin-bottom: 12px; }
.ctrl-group label {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 4px;
  color: #99a;
  font-size: 12px;
}
.ctrl-group label span { color: #6af; font-weight: 600; }
.ctrl-group input[type="range"] {
  width: 100%;
  height: 4px;
  -webkit-appearance: none;
  appearance: none;
  background: rgba(255,255,255,0.08);
  border-radius: 2px;
  outline: none;
}
.ctrl-group input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 14px; height: 14px;
  border-radius: 50%;
  background: #6af;
  cursor: pointer;
  box-shadow: 0 0 8px rgba(100,170,255,0.4);
}
.ctrl-group input[type="range"]::-moz-range-thumb {
  width: 14px; height: 14px;
  border-radius: 50%;
  background: #6af;
  cursor: pointer;
  border: none;
}
button {
  background: rgba(100,170,255,0.1);
  border: 1px solid rgba(100,170,255,0.25);
  color: #6af;
  padding: 8px 16px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.3px;
  transition: all 0.2s;
  width: 100%;
  margin-top: 4px;
}
button:hover { background: rgba(100,170,255,0.2); }
.color-row {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}
.color-swatch {
  width: 24px; height: 24px;
  border-radius: 6px;
  cursor: pointer;
  border: 2px solid transparent;
  transition: all 0.2s;
}
.color-swatch:hover, .color-swatch.active {
  border-color: white;
  transform: scale(1.15);
}

#hint {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  color: rgba(255,255,255,0.3);
  font-size: 12px;
  pointer-events: none;
  z-index: 5;
  transition: opacity 2s;
}
</style>
</head>
<body>

<canvas id="canvas"></canvas>

<div id="controls">
  <h2>⚙ Cosmic Loom</h2>

  <div class="ctrl-group">
    <label>Particles <span id="v-particles">800</span></label>
    <input type="range" id="particles" min="100" max="3000" value="800" step="50">
  </div>
  <div class="ctrl-group">
    <label>Complexity <span id="v-complexity">5</span></label>
    <input type="range" id="complexity" min="2" max="12" value="5" step="1">
  </div>
  <div class="ctrl-group">
    <label>Speed <span id="v-speed">1.0</span></label>
    <input type="range" id="speed" min="0.1" max="3" value="1" step="0.1">
  </div>
  <div class="ctrl-group">
    <label>Trail Length <span id="v-trail">0.92</span></label>
    <input type="range" id="trail" min="0.8" max="0.99" value="0.92" step="0.01">
  </div>
  <div class="ctrl-group">
    <label>Harmonics <span id="v-harmonics">3</span></label>
    <input type="range" id="harmonics" min="1" max="8" value="3" step="1">
  </div>
  <div class="ctrl-group">
    <label>Spread <span id="v-spread">1.0</span></label>
    <input type="range" id="spread" min="0.2" max="3" value="1" step="0.1">
  </div>

  <div class="ctrl-group">
    <label>Palette</label>
    <div class="color-row" id="palettes"></div>
  </div>

  <button id="btn-screenshot">📸 Save Image</button>
  <button id="btn-reset">↻ Reset Seeds</button>
</div>

<div id="hint">Move your mouse to attract the cosmos</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let W, H, cx, cy;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  cx = W / 2;
  cy = H / 2;
}
resize();
window.addEventListener('resize', resize);

const palettes = [
  { name: 'Nebula',   colors: ['#ff6b6b','#ffa07a','#ffd700','#7ec8e3','#a78bfa','#c084fc'] },
  { name: 'Ocean',    colors: ['#0077b6','#00b4d8','#48cae4','#90e0ef','#023e8a','#03045e'] },
  { name: 'Aurora',   colors: ['#00ff87','#60efff','#0061ff','#a855f7','#ec4899','#fbbf24'] },
  { name: 'Ember',    colors: ['#ff4500','#ff6b35','#ffa500','#ffd700','#ff1493','#ff6347'] },
  { name: 'Frost',    colors: ['#e0f7fa','#b2ebf2','#80deea','#4dd0e1','#a7f3d0','#d1fae5'] },
  { name: 'Void',     colors: ['#6366f1','#8b5cf6','#a855f7','#d946ef','#ec4899','#f43f5e'] },
  { name: 'Forest',   colors: ['#2d6a4f','#40916c','#52b788','#74c69d','#95d5b2','#1b4332'] },
  { name: 'Gold',     colors: ['#f59e0b','#fbbf24','#fcd34d','#fef3c7','#d97706','#b45309'] },
];

let currentPalette = 0;

function initPaletteUI() {
  const row = document.getElementById('palettes');
  palettes.forEach((p, i) => {
    const el = document.createElement('div');
    el.className = 'color-swatch' + (i === 0 ? ' active' : '');
    el.style.background = `linear-gradient(135deg, ${p.colors[0]}, ${p.colors[3]})`;
    el.title = p.name;
    el.onclick = () => {
      document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('active'));
      el.classList.add('active');
      currentPalette = i;
    };
    row.appendChild(el);
  });
}
initPaletteUI();

// State
let mouse = { x: cx, y: cy, active: false };
let particles = [];
let time = 0;
let seed = Math.random() * 1000;

const params = {
  particles: 800,
  complexity: 5,
  speed: 1.0,
  trail: 0.92,
  harmonics: 3,
  spread: 1.0,
};

// Slider bindings
function bindSlider(id, param, transform = v => v) {
  const el = document.getElementById(id);
  const val = document.getElementById('v-' + id);
  el.addEventListener('input', () => {
    const v = parseFloat(el.value);
    params[param] = transform(v);
    val.textContent = el.value;
    if (param === 'particles') rebuildParticles();
  });
}
bindSlider('particles', 'particles');
bindSlider('complexity', 'complexity');
bindSlider('speed', 'speed');
bindSlider('trail', 'trail');
bindSlider('harmonics', 'harmonics');
bindSlider('spread', 'spread');

window.addEventListener('mousemove', e => {
  mouse.x = e.clientX;
  mouse.y = e.clientY;
  mouse.active = true;
});
window.addEventListener('touchmove', e => {
  mouse.x = e.touches[0].clientX;
  mouse.y = e.touches[0].clientY;
  mouse.active = true;
}, { passive: true });

function createParticle(i) {
  const pal = palettes[currentPalette].colors;
  return {
    angle: (i / params.particles) * Math.PI * 2,
    radius: Math.random() * Math.min(W, H) * 0.35,
    baseRadius: Math.random() * Math.min(W, H) * 0.35,
    speed: 0.002 + Math.random() * 0.008,
    phase: Math.random() * Math.PI * 2,
    amplitude: 5 + Math.random() * 30,
    freq: 1 + Math.floor(Math.random() * params.complexity),
    size: 0.5 + Math.random() * 2,
    color: pal[Math.floor(Math.random() * pal.length)],
    life: Math.random(),
    harmonic: Math.floor(Math.random() * params.harmonics),
  };
}

function rebuildParticles() {
  const old = particles.length;
  if (params.particles > old) {
    for (let i = old; i < params.particles; i++) {
      particles.push(createParticle(i));
    }
  } else {
    particles.length = params.particles;
  }
  // Update existing
  particles.forEach((p, i) => {
    const pal = palettes[currentPalette].colors;
    p.color = pal[Math.floor(Math.random() * pal.length)];
    p.freq = 1 + Math.floor(Math.random() * params.complexity);
  });
}

function drawParticle(p, t) {
  const a = p.angle + t * p.speed * params.speed;
  const freq = p.freq + 1;
  const amp = p.amplitude * params.spread;

  // Rose curve / Maurer rose influence
  const r = p.baseRadius
    + amp * Math.sin(freq * a + p.phase + t * 0.5)
    + amp * 0.5 * Math.cos(params.harmonics * a + seed);

  const x = cx + r * Math.cos(a);
  const y = cy + r * Math.sin(a);

  // Mouse influence
  if (mouse.active) {
    const dx = mouse.x - x;
    const dy = mouse.y - y;
    const dist = Math.sqrt(dx * dx + dy * dy);
    const force = Math.max(0, 1 - dist / 200) * 30;
    const angle = Math.atan2(dy, dx);
    const fx = -Math.cos(angle) * force;
    const fy = -Math.sin(angle) * force;
    // draw offset
    ctx.beginPath();
    ctx.arc(x + fx, y + fy, p.size * 1.5, 0, Math.PI * 2);
    ctx.fillStyle = p.color;
    ctx.globalAlpha = 0.3;
    ctx.fill();
  }

  ctx.beginPath();
  ctx.arc(x, y, p.size, 0, Math.PI * 2);
  ctx.fillStyle = p.color;
  ctx.globalAlpha = 0.7 + 0.3 * Math.sin(t * 2 + p.phase);
  ctx.fill();
}

function animate() {
  // Trail fade
  ctx.globalAlpha = 1;
  ctx.fillStyle = `rgba(10, 10, 15, ${1 - params.trail})`;
  ctx.fillRect(0, 0, W, H);

  time += 0.016 * params.speed;

  // Draw connections between nearby particles (sparse for performance)
  ctx.globalAlpha = 0.04;
  ctx.strokeStyle = palettes[currentPalette].colors[0];
  ctx.lineWidth = 0.5;
  // Only sample subset for connections
  for (let i = 0; i < Math.min(particles.length, 200); i++) {
    const p = particles[i];
    const a = p.angle + time * p.speed * params.speed;
    const r = p.baseRadius + p.amplitude * Math.sin(p.freq * a + p.phase + time * 0.5) * params.spread;
    const x1 = cx + r * Math.cos(a);
    const y1 = cy + r * Math.sin(a);
    for (let j = i + 1; j < Math.min(particles.length, 200); j += 3) {
      const q = particles[j];
      const a2 = q.angle + time * q.speed * params.speed;
      const r2 = q.baseRadius + q.amplitude * Math.sin(q.freq * a2 + q.phase + time * 0.5) * params.spread;
      const x2 = cx + r2 * Math.cos(a2);
      const y2 = cy + r2 * Math.sin(a2);
      const d = Math.hypot(x1 - x2, y1 - y2);
      if (d < 40) {
        ctx.beginPath();
        ctx.moveTo(x1, y1);
        ctx.lineTo(x2, y2);
        ctx.stroke();
      }
    }
  }

  // Draw particles
  particles.forEach(p => drawParticle(p, time));

  // Center glow
  const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, 80);
  const pal = palettes[currentPalette].colors;
  grad.addColorStop(0, pal[0] + '15');
  grad.addColorStop(1, 'transparent');
  ctx.globalAlpha = 1;
  ctx.fillStyle = grad;
  ctx.fillRect(cx - 80, cy - 80, 160, 160);

  ctx.globalAlpha = 1;
  requestAnimationFrame(animate);
}

// Init
rebuildParticles();
for (let i = 0; i < params.particles; i++) particles.push(createParticle(i));
animate();

// Fade hint
setTimeout(() => { document.getElementById('hint').style.opacity = '0'; }, 5000);

// Buttons
document.getElementById('btn-screenshot').onclick = () => {
  const link = document.createElement('a');
  link.download = `cosmic-loom-${Date.now()}.png`;
  link.href = canvas.toDataURL('image/png');
  link.click();
};
document.getElementById('btn-reset').onclick = () => {
  seed = Math.random() * 1000;
  ctx.fillStyle = '#0a0a0f';
  ctx.fillRect(0, 0, W, H);
};
</script>
</body>
</html>
