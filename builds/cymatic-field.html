<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cymatic Field</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #050508;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    color: #ccc;
    cursor: crosshair;
  }
  canvas { display: block; }
  #ui {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 12px;
    align-items: center;
    background: rgba(10, 10, 18, 0.85);
    backdrop-filter: blur(12px);
    padding: 12px 20px;
    border-radius: 50px;
    border: 1px solid #1e1e2e;
    z-index: 10;
  }
  .btn {
    background: #1a1a2e;
    color: #ccc;
    border: 1px solid #2a2a3e;
    padding: 8px 16px;
    border-radius: 20px;
    cursor: pointer;
    font-size: 0.8rem;
    letter-spacing: 0.05em;
    transition: all 0.2s;
  }
  .btn:hover { background: #2a2a3e; color: #fff; border-color: #4a4a6e; }
  .btn.active { background: #3a3a5e; color: #fff; border-color: #6a6a9e; }
  .info {
    position: fixed;
    top: 24px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 0.75rem;
    color: #555;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    z-index: 10;
  }
  #count {
    position: fixed;
    top: 24px;
    right: 28px;
    font-size: 0.75rem;
    color: #444;
    z-index: 10;
    font-variant-numeric: tabular-nums;
  }
</style>
</head>
<body>
<div class="info">click to plant a source · double-click to change frequency · space to clear</div>
<div id="count">sources: 0</div>
<div id="ui">
  <button class="btn active" data-palette="oil">Oil</button>
  <button class="btn" data-palette="neon">Neon</button>
  <button class="btn" data-palette="mono">Mono</button>
  <button class="btn" data-palette="fire">Fire</button>
  <button class="btn" data-palette="ocean">Ocean</button>
  <button class="btn" data-palette="void">Void</button>
</div>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H, dpr;

const PALETTES = {
  oil:   { bg: '#080810', colors: ['#d4a574','#8b5e3c','#c9945e','#e8c49a','#a0724a','#d4956b','#bf8a5c','#e0b68a'] },
  neon:  { bg: '#050510', colors: ['#ff00ff','#00ffff','#ff0080','#80ff00','#ffff00','#ff4040','#40ffff','#ff80ff'] },
  mono:  { bg: '#080808', colors: ['#ffffff','#cccccc','#999999','#666666','#e0e0e0','#b0b0b0','#d0d0d0','#a0a0a0'] },
  fire:  { bg: '#100500', colors: ['#ff4500','#ff6a00','#ff8c00','#ffb347','#ff2400','#ffaa00','#ff5500','#ffcc66'] },
  ocean: { bg: '#030812', colors: ['#0077b6','#00b4d8','#90e0ef','#48cae4','#023e8a','#0096c7','#ade8f4','#03045e'] },
  void:  { bg: '#000000', colors: ['#ffffff','#aaaaaa','#777777','#cccccc','#999999','#dddddd','#bbbbbb','#888888'] }
};

let sources = [];
let currentPalette = 'oil';
let frame = 0;

class Source {
  constructor(x, y, freq) {
    this.x = x;
    this.y = y;
    this.freq = freq || [0.02, 0.035, 0.05, 0.07, 0.09, 0.11][Math.floor(Math.random() * 6)];
    this.phase = Math.random() * Math.PI * 2;
    this.colorIdx = Math.floor(Math.random() * PALETTES[currentPalette].colors.length);
    this.born = frame;
    this.opacity = 0;
  }
}

function resize() {
  dpr = Math.min(window.devicePixelRatio || 1, 2);
  W = canvas.width = window.innerWidth * dpr;
  H = canvas.height = window.innerHeight * dpr;
  canvas.style.width = window.innerWidth + 'px';
  canvas.style.height = window.innerHeight + 'px';
  ctx.scale(1, 1);
}
window.addEventListener('resize', resize);
resize();

canvas.addEventListener('click', (e) => {
  const rect = canvas.getBoundingClientRect();
  const x = (e.clientX - rect.left) * dpr;
  const y = (e.clientY - rect.top) * dpr;
  sources.push(new Source(x, y));
  updateCount();
});

canvas.addEventListener('dblclick', (e) => {
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  const x = (e.clientX - rect.left) * dpr;
  const y = (e.clientY - rect.top) * dpr;
  // Find nearest source and change its frequency
  let nearest = null, minDist = Infinity;
  for (const s of sources) {
    const d = Math.hypot(s.x - x, s.y - y);
    if (d < minDist) { minDist = d; nearest = s; }
  }
  if (nearest && minDist < 80 * dpr) {
    const freqs = [0.015, 0.025, 0.04, 0.06, 0.08, 0.1, 0.13, 0.16];
    nearest.freq = freqs[Math.floor(Math.random() * freqs.length)];
  } else {
    sources.push(new Source(x, y));
    updateCount();
  }
});

document.addEventListener('keydown', (e) => {
  if (e.code === 'Space') { e.preventDefault(); sources = []; updateCount(); }
  if (e.key >= '1' && e.key <= '6') {
    const keys = Object.keys(PALETTES);
    setPalette(keys[parseInt(e.key) - 1]);
  }
});

document.querySelectorAll('.btn').forEach(btn => {
  btn.addEventListener('click', () => setPalette(btn.dataset.palette));
});

function setPalette(name) {
  currentPalette = name;
  document.querySelectorAll('.btn').forEach(b => b.classList.toggle('active', b.dataset.palette === name));
}

function updateCount() {
  document.getElementById('count').textContent = `sources: ${sources.length}`;
}

// Compute cymatic value at point (x,y) from all sources
function cymaticValue(x, y, t) {
  let val = 0;
  for (const s of sources) {
    const dx = x - s.x;
    const dy = y - s.y;
    const dist = Math.sqrt(dx * dx + dy * dy);
    // Standing wave: sin(dist * freq - time) * envelope
    const envelope = Math.max(0, 1 - dist / (Math.min(W, H) * 0.45));
    val += Math.sin(dist * s.freq - t * 0.02 + s.phase) * envelope;
  }
  return val;
}

function draw() {
  frame++;
  const pal = PALETTES[currentPalette];
  
  // Fade
  ctx.fillStyle = pal.bg;
  ctx.globalAlpha = 0.15;
  ctx.fillRect(0, 0, W, H);
  ctx.globalAlpha = 1;
  
  if (sources.length === 0) {
    // Draw subtle ambient rings
    const t = frame * 0.01;
    ctx.strokeStyle = pal.colors[0];
    ctx.globalAlpha = 0.03;
    ctx.lineWidth = 1;
    for (let i = 0; i < 3; i++) {
      ctx.beginPath();
      ctx.arc(W/2, H/2, 100 + i * 120 + Math.sin(t + i) * 20, 0, Math.PI * 2);
      ctx.stroke();
    }
    ctx.globalAlpha = 1;
    requestAnimationFrame(draw);
    return;
  }
  
  const resolution = 6; // pixels per sample
  const t = frame;
  
  // Fade-in for new sources
  for (const s of sources) {
    s.opacity = Math.min(1, s.opacity + 0.02);
  }
  
  // Sample cymatic field and draw
  for (let y = 0; y < H; y += resolution) {
    for (let x = 0; x < W; x += resolution) {
      const val = cymaticValue(x, y, t);
      // Map value to intensity
      const intensity = Math.abs(val);
      if (intensity < 0.05) continue;
      
      // Find dominant source for color
      let bestSource = sources[0], bestInfluence = 0;
      for (const s of sources) {
        const dx = x - s.x;
        const dy = y - s.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        const env = Math.max(0, 1 - dist / (Math.min(W, H) * 0.45));
        if (env > bestInfluence) { bestInfluence = env; bestSource = s; }
      }
      
      const color = pal.colors[bestSource.colorIdx % pal.colors.length];
      const alpha = Math.min(1, intensity * 0.6) * bestSource.opacity;
      
      ctx.fillStyle = color;
      ctx.globalAlpha = alpha;
      ctx.fillRect(x, y, resolution, resolution);
    }
  }
  
  // Draw source nodes
  ctx.globalAlpha = 1;
  for (const s of sources) {
    const pulse = 4 + Math.sin(frame * 0.05 + s.phase) * 2;
    const color = pal.colors[s.colorIdx % pal.colors.length];
    ctx.fillStyle = color;
    ctx.globalAlpha = s.opacity * 0.9;
    ctx.beginPath();
    ctx.arc(s.x, s.y, pulse * dpr, 0, Math.PI * 2);
    ctx.fill();
    
    // Frequency ring
    ctx.strokeStyle = color;
    ctx.globalAlpha = s.opacity * 0.2;
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.arc(s.x, s.y, 18 * dpr + Math.sin(frame * 0.03) * 4, 0, Math.PI * 2);
    ctx.stroke();
  }
  
  ctx.globalAlpha = 1;
  requestAnimationFrame(draw);
}

draw();
</script>
</body>
</html>
