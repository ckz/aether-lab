<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cymatic Garden — Sound Made Visible</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a0f; font-family: 'SF Mono', 'Fira Code', monospace; }
  canvas { display: block; cursor: crosshair; }
  #ui {
    position: fixed; top: 16px; left: 50%; transform: translateX(-50%);
    display: flex; gap: 10px; z-index: 10; flex-wrap: wrap; justify-content: center;
  }
  .btn {
    background: rgba(20, 20, 30, 0.75); color: #ccc; border: 1px solid rgba(255,255,255,0.12);
    padding: 7px 14px; border-radius: 20px; font-size: 12px; cursor: pointer;
    backdrop-filter: blur(10px); transition: all 0.2s;
  }
  .btn:hover { background: rgba(40, 40, 60, 0.85); color: #fff; border-color: rgba(255,255,255,0.3); }
  .btn.active { background: rgba(60, 60, 100, 0.85); color: #fff; border-color: rgba(180,180,255,0.5); }
  #hint {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    color: rgba(255,255,255,0.4); font-size: 11px; z-index: 10; pointer-events: none;
    text-align: center; letter-spacing: 0.5px;
  }
  #title {
    position: fixed; top: 60px; left: 50%; transform: translateX(-50%);
    color: rgba(255,255,255,0.25); font-size: 10px; z-index: 10; pointer-events: none;
    letter-spacing: 3px; text-transform: uppercase;
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="ui">
  <button class="btn active" data-palette="0">Chladni</button>
  <button class="btn" data-palette="1">Bioluminescent</button>
  <button class="btn" data-palette="2">Ember</button>
  <button class="btn" data-palette="3">Arctic</button>
  <button class="btn" data-palette="4">Violet</button>
  <button class="btn" data-palette="5">Gold</button>
  <button class="btn" id="clearBtn">Clear</button>
  <button class="btn" id="saveBtn">Save PNG</button>
</div>
<div id="title">Cymatic Garden — Sound Made Visible</div>
<div id="hint">Click to excite · drag to paint resonance · scroll to tune frequency · Space to cycle palettes</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H, cx, cy, plateR;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  cx = W / 2; cy = H / 2;
  plateR = Math.min(W, H) * 0.42;
}
resize();
window.addEventListener('resize', resize);

// State
let paletteIdx = 0;
let frequency = 8;      // base mode count
let freqTarget = 8;
let energy = [];         // {x, y, strength, life, maxLife}
let time = 0;
let paused = false;
let mouse = { x: cx, y: cy, down: false };

const palettes = [
  { name: 'Chladni',    bg: '#0a0a12', colors: ['#4a9eff','#6db3f8','#3a7bd5','#8ec5fc','#a8d8ff','#2c5fa1'], glow: 'rgba(74,158,255,' },
  { name: 'Bioluminescent', bg: '#040a0f', colors: ['#00ffc8','#00e5b0','#00ff9d','#7fffd4','#40ffd0','#20ccaa'], glow: 'rgba(0,255,200,' },
  { name: 'Ember',      bg: '#0f0805', colors: ['#ff6b2c','#ff8c42','#ff5500','#ffaa66','#ff3300','#ff9955'], glow: 'rgba(255,107,44,' },
  { name: 'Arctic',     bg: '#060a10', colors: ['#a8e6ff','#7dd3fc','#bae6fd','#e0f2fe','#67e8f9','#cffafe'], glow: 'rgba(168,230,255,' },
  { name: 'Violet',     bg: '#0a0612', colors: ['#c084fc','#a855f7','#d8b4fe','#e879f9','#c026d3','#f0abfc'], glow: 'rgba(192,132,252,' },
  { name: 'Gold',       bg: '#0f0c04', colors: ['#fbbf24','#f59e0b','#fcd34d','#fde68a','#f59e0b','#fef3c7'], glow: 'rgba(251,191,36,' }
];

// Energy sources — mouse deposits resonance
function addEnergy(x, y, strength) {
  energy.push({ x, y, strength: strength || 0.6, life: 1, maxLife: 180 + Math.random() * 120 });
  if (energy.length > 200) energy.shift();
}

// Cymatic standing-wave field
// We simulate nodal patterns using interference of circular waves from energy sources
// plus a base mode structure from Bessel-function-like radial modes.
function cymaticField(px, py, t) {
  const dx = px - cx, dy = py - cy;
  const r = Math.sqrt(dx*dx + dy*dy);
  const theta = Math.atan2(dy, dx);

  // Base plate modes — radial Bessel-like standing waves
  let field = 0;
  const m = frequency;
  for (let k = 1; k <= m; k++) {
    const modeR = (k / m) * plateR;
    const envelope = Math.exp(-((r - modeR) * (r - modeR)) / (plateR * plateR * 0.04));
    const angular = Math.cos(k * 3 * theta + t * 0.4 * (k % 2 === 0 ? 1 : -1));
    field += envelope * angular * (1.5 - k * 0.15);
  }

  // Energy-source driven waves (circular wave propagation)
  for (const e of energy) {
    const edx = px - e.x, edy = py - e.y;
    const er = Math.sqrt(edx*edx + edy*edy);
    const dist = Math.sqrt((cx - e.x)**2 + (cy - e.y)**2);
    const waveR = ((t * 2.5 + dist * 0.8) % (plateR * 2.2));
    const ringDist = Math.abs(er - waveR);
    const ring = Math.exp(-ringDist * ringDist / (plateR * plateR * 0.003));
    const decay = e.life;
    field += ring * decay * e.strength * 0.8;

    // Secondary ripple
    const ring2Dist = Math.abs(er - (waveR + 30));
    field += Math.exp(-ring2Dist * ring2Dist / (plateR * plateR * 0.005)) * decay * e.strength * 0.3;
  }

  return field;
}

// Render frame
function render() {
  const pal = palettes[paletteIdx];

  // Fade background
  ctx.fillStyle = pal.bg;
  ctx.fillRect(0, 0, W, H);

  // Ambient plate glow
  const grd = ctx.createRadialGradient(cx, cy, plateR * 0.3, cx, cy, plateR * 1.6);
  grd.addColorStop(0, pal.glow + '0.04)');
  grd.addColorStop(0.5, pal.glow + '0.02)');
  grd.addColorStop(1, 'transparent');
  ctx.fillStyle = grd;
  ctx.fillRect(0, 0, W, H);

  // Smooth frequency transition
  frequency += (freqTarget - frequency) * 0.02;

  // Resolution — adaptive
  const step = Math.max(3, Math.floor(plateR / 120));

  // Draw cymatic field
  const imgData = ctx.getImageData(0, 0, W, H);
  const data = imgData.data;

  for (let py = Math.floor(cy - plateR * 1.15); py < Math.ceil(cy + plateR * 1.15); py += step) {
    for (let px = Math.floor(cx - plateR * 1.15); px < Math.ceil(cx + plateR * 1.15); px += step) {
      if (px < 0 || py < 0 || px >= W || py >= H) continue;
      const dx = px - cx, dy = py - cy;
      const r = Math.sqrt(dx*dx + dy*dy);
      if (r > plateR * 1.15) continue;

      const f = cymaticField(px, py, time);

      // Threshold-like amplification for nodal lines
      const nodal = 1 / (1 + Math.abs(f) * 3);
      const fieldMag = Math.abs(f);

      // Color from palette based on field strength
      const ci = Math.floor(((fieldMag * 0.7 + nodal * 0.3) * pal.colors.length) % pal.colors.length);
      const hex = pal.colors[ci];
      const rr = parseInt(hex.slice(1,3), 16);
      const gg = parseInt(hex.slice(3,5), 16);
      const bb = parseInt(hex.slice(5,7), 16);

      // Brightness: nodal lines are bright, antinodes are dimmer
      const brightness = Math.min(1, nodal * 1.2 + fieldMag * 0.3);
      const alpha = brightness * (1 - r / (plateR * 1.2));

      if (alpha < 0.01) continue;

      // Fill step×step block
      for (let sy = 0; sy < step && py + sy < H; sy++) {
        for (let sx = 0; sx < step && px + sx < W; sx++) {
          const idx = ((py + sy) * W + (px + sx)) * 4;
          data[idx]   = rr;
          data[idx+1] = gg;
          data[idx+2] = bb;
          data[idx+3] = Math.floor(alpha * 220);
        }
      }
    }
  }
  ctx.putImageData(imgData, 0, 0);

  // Glowing plate rim
  ctx.beginPath();
  ctx.arc(cx, cy, plateR, 0, Math.PI * 2);
  ctx.strokeStyle = pal.glow + '0.25)';
  ctx.lineWidth = 2;
  ctx.stroke();

  // Inner ring decorations
  for (let i = 1; i <= 3; i++) {
    ctx.beginPath();
    ctx.arc(cx, cy, plateR * (0.3 + i * 0.2), 0, Math.PI * 2);
    ctx.strokeStyle = pal.glow + '0.08)';
    ctx.lineWidth = 1;
    ctx.stroke();
  }

  // Mouse influence glow
  if (mouse.x > 0 && mouse.y > 0) {
    const mdx = mouse.x - cx, mdy = mouse.y - cy;
    const mr = Math.sqrt(mdx*mdx + mdy*mdy);
    if (mr < plateR * 1.1) {
      const mgrd = ctx.createRadialGradient(mouse.x, mouse.y, 0, mouse.x, mouse.y, 50);
      mgrd.addColorStop(0, pal.glow + '0.25)');
      mgrd.addColorStop(1, 'transparent');
      ctx.fillStyle = mgrd;
      ctx.beginPath();
      ctx.arc(mouse.x, mouse.y, 50, 0, Math.PI * 2);
      ctx.fill();
    }
  }
}

// Update energy
function updateEnergy() {
  for (let i = energy.length - 1; i >= 0; i--) {
    energy[i].life -= 1 / energy[i].maxLife;
    if (energy[i].life <= 0) energy.splice(i, 1);
  }
}

// Animation loop
function loop() {
  if (!paused) {
    time += 0.016;
    updateEnergy();
  }
  render();
  requestAnimationFrame(loop);
}

// Interaction
canvas.addEventListener('mousemove', e => {
  mouse.x = e.clientX; mouse.y = e.clientY;
  if (mouse.down) {
    const mdx = e.clientX - cx, mdy = e.clientY - cy;
    const mr = Math.sqrt(mdx*mdx + mdy*mdy);
    if (mr < plateR * 1.05) {
      addEnergy(e.clientX, e.clientY, 0.25);
    }
  }
});
canvas.addEventListener('mousedown', e => {
  mouse.down = true;
  const mdx = e.clientX - cx, mdy = e.clientY - cy;
  const mr = Math.sqrt(mdx*mdx + mdy*mdy);
  if (mr < plateR * 1.1) {
    addEnergy(e.clientX, e.clientY, 1.2);
  }
});
canvas.addEventListener('mouseup', () => mouse.down = false);
canvas.addEventListener('mouseleave', () => mouse.down = false);

// Touch support
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  const t = e.touches[0];
  mouse.x = t.clientX; mouse.y = t.clientY; mouse.down = true;
  const mdx = t.clientX - cx, mdy = t.clientY - cy;
  const mr = Math.sqrt(mdx*mdx + mdy*mdy);
  if (mr < plateR * 1.1) addEnergy(t.clientX, t.clientY, 1.2);
}, { passive: false });
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  const t = e.touches[0];
  mouse.x = t.clientX; mouse.y = t.clientY;
  if (mouse.down) {
    const mdx = t.clientX - cx, mdy = t.clientY - cy;
    const mr = Math.sqrt(mdx*mdx + mdy*mdy);
    if (mr < plateR * 1.05) addEnergy(t.clientX, t.clientY, 0.25);
  }
}, { passive: false });
canvas.addEventListener('touchend', () => mouse.down = false);

canvas.addEventListener('wheel', e => {
  e.preventDefault();
  freqTarget = Math.max(3, Math.min(20, freqTarget - Math.sign(e.deltaY) * 0.8));
}, { passive: false });

document.addEventListener('keydown', e => {
  if (e.code === 'Space') {
    e.preventDefault();
    paletteIdx = (paletteIdx + 1) % palettes.length;
    document.querySelectorAll('.btn[data-palette]').forEach(b => {
      b.classList.toggle('active', parseInt(b.dataset.palette) === paletteIdx);
    });
  }
  if (e.code === 'KeyS' && !e.ctrlKey && !e.metaKey) {
    savePNG();
  }
  if (e.code === 'KeyC') {
    energy = [];
  }
});

document.querySelectorAll('.btn[data-palette]').forEach(btn => {
  btn.addEventListener('click', () => {
    paletteIdx = parseInt(btn.dataset.palette);
    document.querySelectorAll('.btn[data-palette]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  });
});

document.getElementById('clearBtn').addEventListener('click', () => { energy = []; });
document.getElementById('saveBtn').addEventListener('click', savePNG);

function savePNG() {
  const link = document.createElement('a');
  link.download = `cymatic-garden-${Date.now()}.png`;
  link.href = canvas.toDataURL('image/png');
  link.click();
}

// Seed initial energy
for (let i = 0; i < 5; i++) {
  const angle = (i / 5) * Math.PI * 2;
  const dist = plateR * (0.3 + Math.random() * 0.4);
  addEnergy(cx + Math.cos(angle) * dist, cy + Math.sin(angle) * dist, 0.5);
}

loop();
</script>
</body>
</html>
