<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Demoscene Tribute — 4K Experience</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    overflow: hidden;
    font-family: 'Courier New', monospace;
  }
  canvas {
    display: block;
    width: 100vw;
    height: 100vh;
  }
  #overlay {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
  }
  #text {
    color: #0ff;
    font-size: clamp(18px, 4vw, 36px);
    text-align: center;
    text-shadow: 0 0 20px #0ff, 0 0 40px #0ff;
    opacity: 0;
    transition: opacity 2s;
    letter-spacing: 0.3em;
    padding: 1rem;
  }
  #text.visible { opacity: 1; }
  .hidden { opacity: 0; }
  #info {
    position: absolute;
    bottom: 1rem; left: 1rem;
    color: #0ff8;
    font-size: 11px;
    letter-spacing: 0.15em;
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="overlay"><div id="text"></div></div>
<div id="info">4K DEMO • PURE CODE • NO ASSETS</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H, DPR;

function resize() {
  DPR = window.devicePixelRatio || 1;
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = W * DPR;
  canvas.height = H * DPR;
  ctx.scale(DPR, DPR);
}
resize();
window.addEventListener('resize', resize);

const textEl = document.getElementById('text');
const phases = [
  { t: 0, text: "THE DEMOSCENE", duration: 3000 },
  { t: 3000, text: "4 KILOBYTES", duration: 2500 },
  { t: 5500, text: "INFINITE WORLDS", duration: 3000 },
  { t: 8500, text: "CODE IS ART", duration: 3000 },
  { t: 11500, text: "PUSH THE LIMITS", duration: 3000 },
  { t: 14500, text: "FOREVER", duration: 4000 }
];

let startTime = null;
let phaseIndex = 0;

const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
let synthStarted = false;

function playNote(freq, time, dur, type='square', vol=0.04) {
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type;
  osc.frequency.value = freq;
  gain.gain.setValueAtTime(vol, time);
  gain.gain.exponentialRampToValueAtTime(0.001, time + dur);
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start(time);
  osc.stop(time + dur);
}

function playArp(time) {
  const scale = [261.63, 329.63, 392.00, 523.25, 659.25, 783.99, 1046.50];
  for (let i = 0; i < 8; i++) {
    const f = scale[Math.floor(Math.random() * scale.length)] * (Math.random() > 0.5 ? 1 : 0.5);
    const t = time + i * 0.12;
    playNote(f, t, 0.3, 'square', 0.025);
  }
}

function playChord(time, freqs) {
  freqs.forEach(f => playNote(f, time, 1.5, 'sine', 0.03));
}

const musicPhases = [
  { t: 0, chord: [261.63, 329.63, 392.00], arp: true },
  { t: 4000, chord: [220.00, 277.18, 329.63], arp: true },
  { t: 8000, chord: [196.00, 246.94, 293.66], arp: true },
  { t: 12000, chord: [174.61, 220.00, 261.63], arp: true },
  { t: 16000, chord: [130.81, 164.81, 196.00], arp: false }
];

let lastMusicPhase = -1;

class Particle {
  constructor() {
    this.reset();
  }
  reset() {
    this.x = (Math.random() - 0.5) * W * 2;
    this.y = (Math.random() - 0.5) * H * 2;
    this.z = Math.random() * 2000;
    this.pz = this.z;
    this.hue = Math.random() * 60 + 160;
  }
  update(speed) {
    this.z -= speed * 8;
    if (this.z < 1) this.reset();
  }
}

const particles = [];
for (let i = 0; i < 1500; i++) particles.push(new Particle());

let starField = [];
for (let i = 0; i < 400; i++) {
  starField.push({
    x: Math.random() * 2 - 1,
    y: Math.random() * 2 - 1,
    z: Math.random(),
    bright: Math.random()
  });
}

function project(x, y, z, cx, cy) {
  const fov = 500;
  const scale = fov / (fov + z);
  return {
    x: cx + x * scale,
    y: cy + y * scale,
    scale: scale
  };
}

function drawStarField(t) {
  const cx = W / 2;
  const cy = H / 2;
  starField.forEach(s => {
    const p = project(s.x * W * 0.8, s.y * H * 0.8, s.z * 1000 + 200, cx, cy);
    const twinkle = 0.5 + 0.5 * Math.sin(t * 0.003 + s.bright * 10);
    const a = s.bright * twinkle * 0.6;
    ctx.fillStyle = `rgba(200,220,255,${a})`;
    ctx.fillRect(p.x, p.y, 1.5, 1.5);
  });
}

function drawTunnel(t) {
  const cx = W / 2;
  const cy = H / 2;
  const maxR = Math.min(W, H) * 0.45;

  for (let ring = 0; ring < 25; ring++) {
    const z = (ring / 25 + (t * 0.0002) % 0.05) % 1;
    const r = maxR * (0.15 + z * 0.85);
    const hue = (t * 0.05 + ring * 15) % 360;
    const a = (1 - z) * 0.5;

    ctx.strokeStyle = `hsla(${hue}, 80%, 60%, ${a})`;
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, Math.PI * 2);
    ctx.stroke();

    for (let i = 0; i < 8; i++) {
      const angle = (i / 8) * Math.PI * 2 + t * 0.001 * (ring % 2 ? 1 : -1);
      const px = cx + Math.cos(angle) * r;
      const py = cy + Math.sin(angle) * r;
      ctx.fillStyle = `hsla(${hue + 30}, 90%, 70%, ${a * 0.7})`;
      ctx.beginPath();
      ctx.arc(px, py, 2, 0, Math.PI * 2);
      ctx.fill();
    }
  }
}

let torusAngle = 0;
function drawTorusKnot(t) {
  const cx = W / 2;
  const cy = H / 2;
  const scale = Math.min(W, H) * 0.008;

  torusAngle = t * 0.0005;
  const R = 3, r = 1.2, p = 2, q = 3;
  const N = 600;

  ctx.lineWidth = 1.5;
  for (let i = 0; i < N - 1; i++) {
    const u = (i / N) * Math.PI * 2 * q;
    const cu = Math.cos(u), su = Math.sin(u);
    const quOverP = q / p * u;
    const cv = Math.cos(quOverP), sv = Math.sin(quOverP);

    let x = (R + r * cv) * cu;
    let y = (R + r * cv) * su;
    let z = r * sv;

    const cosA = Math.cos(torusAngle), sinA = Math.sin(torusAngle);
    const x2 = x * cosA - z * sinA;
    const z2 = x * sinA + z * cosA;
    x = x2; z = z2;

    const proj = project(x * 50, y * 50, z * 50 + 500, cx, cy);

    const u2 = ((i + 1) / N) * Math.PI * 2 * q;
    const cu2 = Math.cos(u2), su2 = Math.sin(u2);
    const quOverP2 = q / p * u2;
    const cv2 = Math.cos(quOverP2), sv2 = Math.sin(quOverP2);

    let x3 = (R + r * cv2) * cu2;
    let y3 = (R + r * cv2) * su2;
    let z3 = r * sv2;

    const x4 = x3 * cosA - z3 * sinA;
    const z4 = x3 * sinA + z3 * cosA;
    x3 = x4; z3 = z4;

    const proj2 = project(x3 * 50, y3 * 50, z3 * 50 + 500, cx, cy);

    const hue = (i / N * 360 + t * 0.1) % 360;
    ctx.strokeStyle = `hsla(${hue}, 85%, 60%, 0.8)`;
    ctx.beginPath();
    ctx.moveTo(proj.x, proj.y);
    ctx.lineTo(proj2.x, proj2.y);
    ctx.stroke();
  }
}

function drawPlasma(t) {
  const res = 40;
  const stepX = W / res;
  const stepY = H / res;

  for (let y = 0; y < res; y++) {
    for (let x = 0; x < res; x++) {
      const px = x * stepX;
      const py = y * stepY;

      const v1 = Math.sin(x * 0.3 + t * 0.002);
      const v2 = Math.sin(y * 0.3 + t * 0.003);
      const v3 = Math.sin((x + y) * 0.2 + t * 0.001);
      const v4 = Math.sin(Math.sqrt(x * x + y * y) * 0.2 + t * 0.004);
      const v = (v1 + v2 + v3 + v4) / 4;

      const hue = (v * 180 + 180 + t * 0.02) % 360;
      const light = 40 + v * 20;
      ctx.fillStyle = `hsl(${hue}, 80%, ${light}%)`;
      ctx.fillRect(px, py, stepX + 1, stepY + 1);
    }
  }
}

function drawDeformPlane(t) {
  const cx = W / 2;
  const cy = H / 2;
  const res = 35;
  const size = Math.min(W, H) * 0.8;
  const step = size / res;
  const offset = -size / 2;

  for (let y = 0; y < res; y++) {
    for (let x = 0; x < res; x++) {
      const px = cx + offset + x * step;
      const py = cy + offset + y * step;

      const dx = x - res / 2;
      const dy = y - res / 2;
      const dist = Math.sqrt(dx * dx + dy * dy);
      const angle = Math.atan2(dy, dx);

      const wave = Math.sin(dist * 0.4 - t * 0.003) * 30;
      const twist = Math.sin(angle * 3 + t * 0.002) * 20;
      const size2 = 1 + Math.sin(dist * 0.3 + t * 0.002) * 0.4;

      const hue = (dist * 5 + t * 0.05) % 360;
      const a = 0.3 + Math.sin(dist * 0.3 + t * 0.002) * 0.2;
      ctx.fillStyle = `hsla(${hue}, 75%, 55%, ${a})`;
      ctx.beginPath();
      ctx.arc(px + wave + twist, py + wave - twist, step * size2 * 0.7, 0, Math.PI * 2);
      ctx.fill();
    }
  }
}

const scenes = [
  { name: 'starfield', draw: (t) => drawStarField(t) },
  { name: 'tunnel', draw: (t) => drawTunnel(t) },
  { name: 'torusknot', draw: (t) => drawTorusKnot(t) },
  { name: 'plasma', draw: (t) => drawPlasma(t) },
  { name: 'deformplane', draw: (t) => drawDeformPlane(t) }
];

let sceneIndex = 0;
let lastSceneSwitch = 0;
const sceneDuration = 4500;

function updateText(timestamp) {
  if (!startTime) startTime = timestamp;
  const elapsed = timestamp - startTime;

  phases.forEach((phase, i) => {
    if (elapsed >= phase.t && elapsed < phase.t + phase.duration) {
      if (phaseIndex !== i) {
        phaseIndex = i;
        textEl.classList.remove('visible');
        setTimeout(() => {
          textEl.textContent = phase.text;
          textEl.classList.add('visible');
        }, 200);
      }
    }
  });

  if (elapsed > phases[phases.length - 1].t + phases[phases.length - 1].duration + 2000) {
    textEl.classList.remove('visible');
  }

  if (elapsed - lastSceneSwitch > sceneDuration) {
    sceneIndex = (sceneIndex + 1) % scenes.length;
    lastSceneSwitch = elapsed;
  }

  if (!synthStarted && elapsed > 500) {
    synthStarted = true;
    audioCtx.resume().then(() => {
      let musicTime = audioCtx.currentTime;
      musicPhases.forEach(mp => {
        const mt = musicTime + mp.t / 1000;
        if (mp.arp) {
          for (let b = 0; b < 32; b++) {
            const bt = mt + b * 0.18;
            const scale = [261.63, 329.63, 392.00, 523.25, 659.25];
            const f = scale[b % scale.length] * (Math.random() > 0.7 ? 0.5 : 1);
            playNote(f, bt, 0.2, 'square', 0.02);
          }
        } else {
          mp.chord.forEach(f => playNote(f, mt, musicPhases[musicPhases.length - 1].t / 1000 + 5, 'sine', 0.025));
        }
      });
    });
  }

  if (!synthStarted && elapsed > 1000 && audioCtx.state === 'suspended') {
    audioCtx.resume();
  }
}

function render(timestamp) {
  updateText(timestamp);

  const fade = 0.15;
  ctx.fillStyle = `rgba(0,0,0,${fade})`;
  ctx.fillRect(0, 0, W, H);

  scenes[sceneIndex].draw(timestamp);

  requestAnimationFrame(render);
}

requestAnimationFrame(render);

document.addEventListener('click', () => {
  audioCtx.resume().then(() => {
    const t = audioCtx.currentTime;
    playArp(t);
  });
  sceneIndex = (sceneIndex + 1) % scenes.length;
  lastSceneSwitch = performance.now();
});

document.addEventListener('keydown', (e) => {
  if (e.code === 'Space') {
    e.preventDefault();
    audioCtx.resume().then(() => {
      playArp(audioCtx.currentTime);
    });
    sceneIndex = (sceneIndex + 1) % scenes.length;
    lastSceneSwitch = performance.now();
  }
});
</script>
</body>
</html>
