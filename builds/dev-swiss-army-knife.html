<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dev Swiss Army Knife</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  :root {
    --bg: #0a0a0f;
    --panel: #12121a;
    --border: #1e1e2e;
    --accent: #00ffc8;
    --accent2: #ff6b9d;
    --accent3: #6b8aff;
    --text: #e0e0e0;
    --muted: #888;
    --code-bg: #0d0d14;
  }

  body {
    font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 2rem;
  }

  header {
    max-width: 900px;
    margin: 0 auto 2rem;
    text-align: center;
  }

  header h1 {
    font-size: 1.8rem;
    font-weight: 400;
    letter-spacing: 0.2em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 0.5rem;
  }

  header h1 span { font-weight: 700; }

  header p {
    color: var(--muted);
    font-size: 0.85rem;
    letter-spacing: 0.05em;
  }

  .toolbar {
    max-width: 900px;
    margin: 0 auto 1.5rem;
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
    justify-content: center;
  }

  .tool-btn {
    background: var(--panel);
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 0.5rem 1rem;
    border-radius: 6px;
    cursor: pointer;
    font-family: inherit;
    font-size: 0.8rem;
    letter-spacing: 0.05em;
    transition: all 0.15s;
  }

  .tool-btn:hover { border-color: var(--accent); color: var(--text); }
  .tool-btn.active { border-color: var(--accent); color: var(--accent); background: #0d1f1a; }

  .grid {
    max-width: 900px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1rem;
  }

  @media (max-width: 600px) {
    .grid { grid-template-columns: 1fr; }
    body { padding: 1rem; }
  }

  .panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1.25rem;
    transition: border-color 0.2s;
  }

  .panel:hover { border-color: #2a2a3e; }
  .panel.full { grid-column: 1 / -1; }

  .panel h2 {
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    color: var(--accent);
    margin-bottom: 0.75rem;
    font-weight: 600;
  }

  .panel h2 .icon { margin-right: 0.4rem; }

  textarea, input[type="text"] {
    width: 100%;
    background: var(--code-bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 0.75rem;
    border-radius: 6px;
    font-family: inherit;
    font-size: 0.85rem;
    resize: vertical;
    transition: border-color 0.2s;
  }

  textarea:focus, input[type="text"]:focus {
    outline: none;
    border-color: var(--accent);
  }

  textarea { min-height: 80px; }

  .row {
    display: flex;
    gap: 0.5rem;
    margin-top: 0.5rem;
    flex-wrap: wrap;
  }

  button {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text);
    padding: 0.4rem 0.8rem;
    border-radius: 5px;
    cursor: pointer;
    font-family: inherit;
    font-size: 0.75rem;
    letter-spacing: 0.05em;
    transition: all 0.15s;
    text-transform: uppercase;
  }

  button:hover { border-color: var(--accent); color: var(--accent); }
  button.primary { background: #0d1f1a; border-color: var(--accent); color: var(--accent); }
  button.primary:hover { background: var(--accent); color: var(--bg); }

  .output {
    background: var(--code-bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 0.75rem;
    font-size: 0.8rem;
    color: var(--accent);
    word-break: break-all;
    min-height: 40px;
    margin-top: 0.5rem;
    line-height: 1.5;
  }

  .meta {
    font-size: 0.7rem;
    color: var(--muted);
    margin-top: 0.4rem;
    letter-spacing: 0.03em;
  }

  .case-btns { display: flex; gap: 0.4rem; flex-wrap: wrap; }

  select {
    background: var(--code-bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 0.4rem 0.6rem;
    border-radius: 5px;
    font-family: inherit;
    font-size: 0.75rem;
    cursor: pointer;
  }

  .regex-row {
    display: flex;
    gap: 0.5rem;
    align-items: center;
    flex-wrap: wrap;
  }

  .regex-row input { flex: 1; min-width: 120px; }

  .matches {
    margin-top: 0.5rem;
    font-size: 0.8rem;
    color: var(--accent2);
  }

  .char-count {
    text-align: right;
    font-size: 0.7rem;
    color: var(--muted);
    margin-top: 0.3rem;
  }

  footer {
    max-width: 900px;
    margin: 2rem auto 0;
    text-align: center;
    font-size: 0.75rem;
    color: #444;
    letter-spacing: 0.05em;
  }

  .hidden { display: none; }
</style>
</head>
<body>

<header>
  <h1><span>Dev</span> Swiss Army Knife</h1>
  <p>Quick utilities for everyday dev work — base64, case, hash, regex, JSON, color.</p>
</header>

<div class="toolbar">
  <button class="tool-btn active" data-panel="all">ALL</button>
  <button class="tool-btn" data-panel="base64">Base64</button>
  <button class="tool-btn" data-panel="case">Case</button>
  <button class="tool-btn" data-panel="hash">Hash</button>
  <button class="tool-btn" data-panel="regex">Regex</button>
  <button class="tool-btn" data-panel="json">JSON</button>
  <button class="tool-btn" data-panel="color">Color</button>
</div>

<div class="grid" id="grid">

  <!-- Base64 -->
  <div class="panel full" data-group="base64">
    <h2><span class="icon">🔐</span>Base64</h2>
    <textarea id="b64-input" placeholder="Paste text to encode / decode..."></textarea>
    <div class="row">
      <button class="primary" onclick="b64Encode()">ENCODE</button>
      <button onclick="b64Decode()">DECODE</button>
      <button onclick="copyToClipboard('b64-out')">COPY</button>
      <button onclick="document.getElementById('b64-input').value='';document.getElementById('b64-out').textContent=''">CLEAR</button>
    </div>
    <div class="output" id="b64-out">—</div>
  </div>

  <!-- Case Converter -->
  <div class="panel full" data-group="case">
    <h2><span class="icon">🔠</span>Case Converter</h2>
    <textarea id="case-input" placeholder="Type something..."></textarea>
    <div class="case-btns">
      <button class="primary" onclick="toCase('camel')">camelCase</button>
      <button onclick="toCase('snake')">snake_case</button>
      <button onclick="toCase('kebab')">kebab-case</button>
      <button onclick="toCase('pascal')">PascalCase</button>
      <button onclick="toCase('upper')">UPPER</button>
      <button onclick="toCase('lower')">lower</button>
      <button onclick="toCase('title')">Title Case</button>
      <button onclick="toCase('constant')">CONSTANT_CASE</button>
    </div>
    <div class="output" id="case-out">—</div>
    <div class="char-count" id="case-meta"></div>
  </div>

  <!-- Hash -->
  <div class="panel" data-group="hash">
    <h2><span class="icon">#️⃣</span>Quick Hash</h2>
    <input type="text" id="hash-input" placeholder="Text to hash">
    <div class="row">
      <button class="primary" onclick="computeHashes()">HASH</button>
      <button onclick="copyToClipboard('hash-out')">COPY</button>
    </div>
    <div class="output" id="hash-out" style="font-size:0.7rem;line-height:1.8;">—</div>
  </div>

  <!-- Regex Tester -->
  <div class="panel" data-group="regex">
    <h2><span class="icon">🔍</span>Regex Tester</h2>
    <input type="text" id="regex-pattern" placeholder="Pattern, e.g. \d{3}-\d{4}">
    <textarea id="regex-input" placeholder="Text to search..." style="margin-top:0.5rem;"></textarea>
    <div class="row">
      <button class="primary" onclick="testRegex()">TEST</button>
      <label style="display:flex;align-items:center;gap:0.3rem;font-size:0.75rem;color:var(--muted);">
        <input type="checkbox" id="regex-g"> global
      </label>
      <label style="display:flex;align-items:center;gap:0.3rem;font-size:0.75rem;color:var(--muted);">
        <input type="checkbox" id="regex-i"> case-i
      </label>
    </div>
    <div class="matches" id="regex-out"></div>
  </div>

  <!-- JSON Formatter -->
  <div class="panel" data-group="json">
    <h2><span class="icon">📋</span>JSON Formatter</h2>
    <textarea id="json-input" placeholder='Paste JSON here...'></textarea>
    <div class="row">
      <button class="primary" onclick="formatJSON()">PRETTIFY</button>
      <button onclick="minifyJSON()">MINIFY</button>
      <button onclick="copyToClipboard('json-out')">COPY</button>
    </div>
    <div class="output" id="json-out" style="font-size:0.75rem;">—</div>
  </div>

  <!-- Color Palette -->
  <div class="panel" data-group="color">
    <h2><span class="icon">🎨</span>Color Palette</h2>
    <div class="row">
      <input type="color" id="color-base" value="#00ffc8" style="width:50px;height:36px;border:none;background:transparent;cursor:pointer;">
      <button class="primary" onclick="genPalette()">GENERATE</button>
      <button onclick="copyToClipboard('palette-out')">COPY ALL</button>
    </div>
    <div class="output" id="palette-out" style="font-size:0.75rem;line-height:2;"></div>
  </div>

</div>

<footer>
  Built by Aether ✨ — because every dev needs a pocket knife.
</footer>

<script>
  // Toolbar filtering
  document.querySelectorAll('.tool-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      const target = btn.dataset.panel;
      document.querySelectorAll('[data-group]').forEach(p => {
        p.classList.toggle('hidden', target !== 'all' && p.dataset.group !== target);
      });
    });
  });

  // Base64
  function b64Encode() {
    const v = document.getElementById('b64-input').value;
    try {
      document.getElementById('b64-out').textContent = btoa(unescape(encodeURIComponent(v)));
    } catch(e) { document.getElementById('b64-out').textContent = 'Error: ' + e.message; }
  }
  function b64Decode() {
    const v = document.getElementById('b64-input').value.trim();
    try {
      document.getElementById('b64-out').textContent = decodeURIComponent(escape(atob(v)));
    } catch(e) { document.getElementById('b64-out').textContent = 'Error: invalid base64'; }
  }

  // Case
  function toCase(type) {
    const v = document.getElementById('case-input').value;
    let out = '';
    switch(type) {
      case 'camel': out = v.replace(/[^a-zA-Z0-9]+(.)/g, (_, c) => c.toUpperCase()).replace(/^[A-Z]/, c => c.toLowerCase()); break;
      case 'snake': out = v.replace(/[^a-zA-Z0-9]+/g, '_').replace(/^[A-Z]/, c => c.toLowerCase()).replace(/[A-Z]/g, m => '_' + m.toLowerCase()); break;
      case 'kebab': out = v.replace(/[^a-zA-Z0-9]+/g, '-').replace(/^[A-Z]/, c => c.toLowerCase()).replace(/[A-Z]/g, m => '-' + m.toLowerCase()); break;
      case 'pascal': out = v.replace(/[^a-zA-Z0-9]+(.)/g, (_, c) => c.toUpperCase()).replace(/^[a-z]/, c => c.toUpperCase()); break;
      case 'upper': out = v.toUpperCase().replace(/[^A-Z0-9]+/g, '_'); break;
      case 'lower': out = v.toLowerCase().replace(/[^a-z0-9]+/g, '_'); break;
      case 'title': out = v.replace(/\w\S*/g, t => t.charAt(0).toUpperCase() + t.substr(1).toLowerCase()); break;
      case 'constant': out = v.toUpperCase().replace(/[^A-Z0-9]+/g, '_'); break;
    }
    document.getElementById('case-out').textContent = out || '—';
    const chars = v.length, words = v.trim() ? v.trim().split(/\s+/).length : 0;
    document.getElementById('case-meta').textContent = `${chars} chars · ${words} words`;
  }

  // Hash (using SubtleCrypto or fallback)
  async function computeHashes() {
    const v = document.getElementById('hash-input').value;
    if (!v) return;
    const buf = new TextEncoder().encode(v);
    const md5 = await subtle('MD5', buf);
    const sha1 = await subtle('SHA-1', buf);
    const sha256 = await subtle('SHA-256', buf);
    const sha512 = await subtle('SHA-512', buf);
    document.getElementById('hash-out').innerHTML =
      `MD5:    ${md5}\n` +
      `SHA-1:  ${sha1}\n` +
      `SHA-256:${sha256}\n` +
      `SHA-512:${sha512}`;
  }
  async function subtle(algo, buf) {
    const h = await crypto.subtle.digest(algo, buf);
    return Array.from(new Uint8Array(h)).map(b => b.toString(16).padStart(2, '0')).join('');
  }

  // Regex
  function testRegex() {
    const pattern = document.getElementById('regex-pattern').value;
    const text = document.getElementById('regex-input').value;
    const out = document.getElementById('regex-out');
    if (!pattern) { out.textContent = 'Enter a pattern'; return; }
    try {
      const flags = (document.getElementById('regex-g').checked ? 'g' : '') + (document.getElementById('regex-i').checked ? 'i' : '');
      const re = new RegExp(pattern, flags);
      const matches = text.match(re);
      if (matches) {
        out.innerHTML = `<strong>${matches.length} match${matches.length>1?'es':''}:</strong><br>` + matches.map(m => `→ "${m.replace(/</g,'&lt;')}"`).join('<br>');
      } else {
        out.textContent = 'No matches';
      }
    } catch(e) { out.textContent = 'Error: ' + e.message; }
  }

  // JSON
  function formatJSON() {
    const v = document.getElementById('json-input').value.trim();
    if (!v) return;
    try {
      const obj = JSON.parse(v);
      document.getElementById('json-out').textContent = JSON.stringify(obj, null, 2);
    } catch(e) { document.getElementById('json-out').textContent = 'Parse error: ' + e.message; }
  }
  function minifyJSON() {
    const v = document.getElementById('json-input').value.trim();
    if (!v) return;
    try {
      const obj = JSON.parse(v);
      document.getElementById('json-out').textContent = JSON.stringify(obj);
    } catch(e) { document.getElementById('json-out').textContent = 'Parse error: ' + e.message; }
  }

  // Color Palette
  function genPalette() {
    const base = document.getElementById('color-base').value;
    const pal = paletteFrom(base);
    document.getElementById('palette-out').innerHTML = pal.map(c =>
      `<span style="display:inline-block;width:14px;height:14px;background:${c};border-radius:2px;margin-right:4px;vertical-align:middle;"></span><code>${c}</code>`
    ).join('<br>');
  }
  function paletteFrom(hex) {
    const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
    const hsl = (ri, gi, bi) => {
      ri/=255; gi/=255; bi/=255;
      const max=Math.max(ri,gi,bi), min=Math.min(ri,gi,bi);
      let h,s,l=(max+min)/2;
      if(max===min){h=s=0;}else{
        const d=max-min; s=l>0.5?d/(2-max-min):d/(max+min);
        switch(max){case ri:h=((gi-bi)/d+(gi<bi?6:0))/6;break;case gi:h=((bi-ri)/d+2)/6;break;case b:h=((ri-gi)/d+4)/6;break;}
      }
      return [h*360,s*100,l*100];
    };
    const [h,s,l] = hsl(r,g,b);
    return [
      hex,
      hslToHex((h+30)%360, s, Math.min(l+15, 95)),
      hslToHex((h+180)%360, Math.max(s-20,20), Math.max(l-20, 10)),
      hslToHex((h-30+360)%360, Math.min(s+10,90), Math.max(l-10, 15)),
      hslToHex((h+90)%360, s, Math.min(l+25, 98)),
    ];
  }
  function hslToHex(h,s,l) {
    s/=100; l/=100;
    const a=s*Math.min(l,1-l);
    const f=n=>{const k=(n+h/30)%12;const c=l-a*Math.max(Math.min(k-3,9-k,1),-1);return Math.round(255*c).toString(16).padStart(2,'0');};
    return `#${f(0)}${f(8)}${f(4)}`;
  }

  // Clipboard
  function copyToClipboard(id) {
    const el = document.getElementById(id);
    const text = el.textContent || el.innerText;
    navigator.clipboard.writeText(text).then(() => {
      const old = el.textContent;
      el.textContent = 'COPIED ✓';
      setTimeout(() => el.textContent = old, 1200);
    });
  }

  // Init
  genPalette();
</script>

</body>
</html>
