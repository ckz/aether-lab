<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Digital Zen Garden — Aether ✨</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: #0a0a0f;
    font-family: 'Courier New', monospace;
    cursor: crosshair;
  }
  canvas { display: block; }
  .overlay {
    position: fixed;
    top: 20px; left: 20px;
    color: rgba(255,255,255,0.7);
    font-size: 12px;
    pointer-events: none;
    z-index: 10;
    letter-spacing: 1px;
  }
  .overlay h1 {
    font-size: 18px;
    margin-bottom: 8px;
    background: linear-gradient(90deg, #ff6ec7, #7873f5, #4ade80);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    font-weight: bold;
  }
  .controls {
    position: fixed;
    bottom: 20px; left: 20px;
    color: rgba(255,255,255,0.5);
    font-size: 11px;
    pointer-events: none;
    z-index: 10;
    letter-spacing: 0.5px;
  }
  .palette {
    position: fixed;
    top: 20px; right: 20px;
    display: flex;
    gap: 8px;
    z-index: 10;
  }
  .palette button {
    width: 28px; height: 28px;
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.3);
    cursor: pointer;
    transition: all 0.3s;
    background: transparent;
  }
  .palette button:hover {
    border-color: rgba(255,255,255,0.9);
    transform: scale(1.2);
  }
  .palette button.active {
    border-color: white;
    box-shadow: 0 0 12px rgba(255,255,255,0.5);
  }
  .stats {
    position: fixed;
    bottom: 20px; right: 20px;
    color: rgba(255,255,255,0.4);
    font-size: 11px;
    z-index: 10;
    text-align: right;
  }
</style>
</head>
<body>
<div class="overlay">
  <h1>✦ DIGITAL ZEN GARDEN ✦</h1>
  <div>move mouse to weave light</div>
  <div>click & drag to plant seeds</div>
</div>

<div class="palette" id="palette"></div>

<div class="controls">
  [C] clear  [M] mirror  [G] gravity  [SPACE] pause
</div>

<div class="stats" id="stats"></div>

<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

let W, H;
function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// --- Palettes ---
const palettes = [
  { name: 'Neon', colors: ['#ff6ec7', '#7873f5', '#4ade80', '#facc15', '#38bdf8'] },
  { name: 'Sunset', colors: ['#ff6b6b', '#feca57', '#ff9ff3', '#f368e0', '#ff9a3c'] },
  { name: 'Ocean', colors: ['#00d2ff', '#3a7bd5', '#00d2ff', '#7f7fd5', '#86a8e7'] },
  { name: 'Forest', colors: ['#56ab2f', '#a8e063', '#11998e', '#38ef7d', '#134e5e'] },
  { name: 'Fire', colors: ['#f12711', '#f5af19', '#ff416c', '#ff4b2b', '#ffc371'] },
  { name: 'Cosmic', colors: ['#c471f5', '#fa71cd', '#764ba2', '#667eea', '#764ba2'] }
];

let currentPalette = 0;

// Create palette buttons
const paletteEl = document.getElementById('palette');
palettes.forEach((p, i) => {
  const btn = document.createElement('button');
  btn.style.background = `linear-gradient(135deg, ${p.colors[0]}, ${p.colors[2]})`;
  btn.title = p.name;
  if (i === 0) btn.classList.add('active');
  btn.addEventListener('click', () => {
    currentPalette = i;
    document.querySelectorAll('.palette button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  });
  paletteEl.appendChild(btn);
});

// --- Particles ---
const particles = [];
const MAX_PARTICLES = 800;
let mouse = { x: W/2, y: H/2, active: false };
let paused = false;
let mirror = false;
let gravity = false;
let frameCount = 0;
let seeds = []; // Click-created seeds

class Particle {
  constructor(x, y, color) {
    this.x = x;
    this.y = y;
    this.vx = (Math.random() - 0.5) * 2;
    this.vy = (Math.random() - 0.5) * 2;
    this.life = 1;
    this.decay = 0.002 + Math.random() * 0.005;
    this.radius = 1 + Math.random() * 2.5;
    this.color = color || palettes[currentPalette].colors[Math.floor(Math.random() * 5)];
    this.hue = Math.random() * 360;
  }

  update() {
    if (gravity) {
      this.vy += 0.02;
      this.vx += (Math.random() - 0.5) * 0.1;
    }

    // Mouse attraction
    if (mouse.active) {
      const dx = mouse.x - this.x;
      const dy = mouse.y - this.y;
      const dist = Math.sqrt(dx*dx + dy*dy);
      if (dist < 200) {
        const force = (200 - dist) / 200 * 0.03;
        this.vx += (dx / dist) * force;
        this.vy += (dy / dist) * force;
      }
    }

    // Seed attraction
    seeds.forEach(seed => {
      const dx = seed.x - this.x;
      const dy = seed.y - this.y;
      const dist = Math.sqrt(dx*dx + dy*dy);
      if (dist < 150) {
        const force = (150 - dist) / 150 * 0.05;
        this.vx += (dx / dist) * force;
        this.vy += (dy / dist) * force;
      }
    });

    this.vx *= 0.99;
    this.vy *= 0.99;
    this.x += this.vx;
    this.y += this.vy;
    this.life -= this.decay;
    this.hue += 0.5;
  }

  draw() {
    const alpha = this.life * 0.8;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
    ctx.fillStyle = this.color;
    ctx.globalAlpha = alpha;
    ctx.fill();

    // Glow
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.radius * 3, 0, Math.PI * 2);
    const glow = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.radius * 3);
    glow.addColorStop(0, this.color);
    glow.addColorStop(1, 'transparent');
    ctx.fillStyle = glow;
    ctx.globalAlpha = alpha * 0.3;
    ctx.fill();
    ctx.globalAlpha = 1;
  }
}

function spawnTrail(x, y, count = 3) {
  for (let i = 0; i < count; i++) {
    if (particles.length < MAX_PARTICLES) {
      particles.push(new Particle(x, y));
    }
  }
}

// Mouse events
canvas.addEventListener('mousemove', (e) => {
  mouse.x = e.clientX;
  mouse.y = e.clientY;
  mouse.active = true;
  spawnTrail(mouse.x, mouse.y, 2);
});

canvas.addEventListener('mouseleave', () => {
  mouse.active = false;
});

canvas.addEventListener('click', (e) => {
  // Plant a seed
  seeds.push({ x: e.clientX, y: e.clientY, life: 1 });
  if (seeds.length > 10) seeds.shift();

  // Burst of particles
  for (let i = 0; i < 30; i++) {
    if (particles.length < MAX_PARTICLES) {
      const p = new Particle(e.clientX, e.clientY);
      const angle = Math.random() * Math.PI * 2;
      const speed = 1 + Math.random() * 3;
      p.vx = Math.cos(angle) * speed;
      p.vy = Math.sin(angle) * speed;
      particles.push(p);
    }
  }
});

// Keyboard
document.addEventListener('keydown', (e) => {
  if (e.key === 'c' || e.key === 'C') {
    particles.length = 0;
    seeds.length = 0;
  }
  if (e.key === 'm' || e.key === 'M') mirror = !mirror;
  if (e.key === 'g' || e.key === 'G') gravity = !gravity;
  if (e.key === ' ') {
    e.preventDefault();
    paused = !paused;
  }
});

// Draw connections between nearby particles
function drawConnections() {
  const maxDist = 80;
  ctx.lineWidth = 0.5;

  for (let i = 0; i < particles.length; i += 3) { // Skip for performance
    for (let j = i + 1; j < particles.length; j += 3) {
      const dx = particles[i].x - particles[j].x;
      const dy = particles[i].y - particles[j].y;
      const dist = Math.sqrt(dx*dx + dy*dy);

      if (dist < maxDist) {
        const alpha = (1 - dist / maxDist) * 0.3;
        ctx.strokeStyle = particles[i].color;
        ctx.globalAlpha = alpha;
        ctx.beginPath();
        ctx.moveTo(particles[i].x, particles[i].y);
        ctx.lineTo(particles[j].x, particles[j].y);
        ctx.stroke();
      }
    }
  }
  ctx.globalAlpha = 1;
}

// Draw seeds
function drawSeeds() {
  seeds.forEach(seed => {
    seed.life -= 0.001;

    // Seed core
    ctx.beginPath();
    ctx.arc(seed.x, seed.y, 6, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
    ctx.fill();

    // Seed aura
    const gradient = ctx.createRadialGradient(seed.x, seed.y, 0, seed.x, seed.y, 40);
    gradient.addColorStop(0, 'rgba(255, 255, 255, 0.3)');
    gradient.addColorStop(1, 'transparent');
    ctx.beginPath();
    ctx.arc(seed.x, seed.y, 40, 0, Math.PI * 2);
    ctx.fillStyle = gradient;
    ctx.fill();
  });
}

// Ambient spawn
function ambientSpawn() {
  if (frameCount % 5 === 0 && particles.length < MAX_PARTICLES * 0.7) {
    const x = Math.random() * W;
    const y = Math.random() * H;
    particles.push(new Particle(x, y));
  }
}

// Main loop
function animate() {
  if (!paused) {
    // Fade trail
    ctx.fillStyle = 'rgba(10, 10, 15, 0.08)';
    ctx.fillRect(0, 0, W, H);

    ambientSpawn();

    // Update & draw particles
    for (let i = particles.length - 1; i >= 0; i--) {
      particles[i].update();
      if (particles[i].life <= 0) {
        particles.splice(i, 1);
      } else {
        particles[i].draw();
      }
    }

    drawConnections();
    drawSeeds();

    // Remove dead seeds
    seeds = seeds.filter(s => s.life > 0);

    frameCount++;
  }

  // Stats
  document.getElementById('stats').innerHTML =
    `particles: ${particles.length}<br>seeds: ${seeds.length}<br>palette: ${palettes[currentPalette].name}`;

  requestAnimationFrame(animate);
}

// Initial burst
for (let i = 0; i < 100; i++) {
  particles.push(new Particle(Math.random() * W, Math.random() * H));
}

animate();
</script>
</body>
</html>
