<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ember Field — Aether Lab</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  body {
    background: #050508;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    color: #aaa;
  }

  canvas {
    display: block;
    cursor: crosshair;
  }

  .ui {
    position: fixed;
    bottom: 1.5rem;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 0.75rem;
    align-items: center;
    background: rgba(10, 10, 18, 0.7);
    backdrop-filter: blur(10px);
    padding: 0.6rem 1rem;
    border-radius: 100px;
    border: 1px solid rgba(255, 120, 50, 0.15);
    font-size: 0.75rem;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    color: #666;
  }

  .ui button {
    background: none;
    border: 1px solid rgba(255, 120, 50, 0.3);
    color: #ff8855;
    padding: 0.35rem 0.75rem;
    border-radius: 100px;
    cursor: pointer;
    font-size: 0.7rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    transition: all 0.2s;
  }

  .ui button:hover {
    background: rgba(255, 120, 50, 0.1);
    border-color: #ff8855;
    color: #ffaa77;
  }

  .hint {
    position: fixed;
    top: 1.5rem;
    left: 50%;
    transform: translateX(-50%);
    font-size: 0.75rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: rgba(255, 150, 100, 0.5);
    pointer-events: none;
    transition: opacity 2s;
  }

  .stats {
    position: fixed;
    top: 1rem;
    right: 1.5rem;
    font-size: 0.65rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: rgba(255, 150, 100, 0.4);
    text-align: right;
    line-height: 1.8;
  }
</style>
</head>
<body>

<canvas id="c"></canvas>

<div class="hint" id="hint">click to ignite · drag to summon wind</div>

<div class="stats" id="stats">
  embers: 0<br>
  fps: 0
</div>

<div class="ui">
  <button id="modeBtn">wind: follow</button>
  <button id="burstBtn">ignite</button>
  <button id="clearBtn">extinguish</button>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

let W, H, DPR;
function resize() {
  DPR = window.devicePixelRatio || 1;
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = W * DPR;
  canvas.height = H * DPR;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
}
resize();
window.addEventListener('resize', resize);

// State
let embers = [];
let mouse = { x: W/2, y: H/2, down: false, vx: 0, vy: 0, px: W/2, py: H/2 };
let windMode = 'follow'; // follow | repel | swirl
let frameCount = 0;
let lastFpsTime = performance.now();
let fps = 60;

const MAX_EMBERS = 600;
const SPAWN_RATE = 3;

// Color palettes for embers
const palettes = [
  ['#ff4400', '#ff6622', '#ff8844', '#ffaa66', '#ffcc88'], // classic fire
  ['#ff0066', '#ff3388', '#ff66aa', '#ff88cc', '#ffaadd'], // rose embers
  ['#00ccff', '#3399ff', '#6699ff', '#99bbff', '#bbddff'], // ghost fire
  ['#ffcc00', '#ffdd44', '#ffee88', '#ffffaa', '#ffffcc'], // gold
];

let palette = palettes[0];

class Ember {
  constructor(x, y, vx, vy) {
    this.x = x || Math.random() * W;
    this.y = y || H + 10;
    this.vx = vx || (Math.random() - 0.5) * 1.5;
    this.vy = vy || -(Math.random() * 2 + 1.5);
    this.life = 1;
    this.decay = Math.random() * 0.004 + 0.002;
    this.size = Math.random() * 2.5 + 1;
    this.color = palette[Math.floor(Math.random() * palette.length)];
    this.flicker = Math.random() * Math.PI * 2;
    this.flickerSpeed = Math.random() * 0.15 + 0.05;
    this.turbulence = Math.random() * 0.02;
    this.trail = [];
    this.maxTrail = Math.floor(Math.random() * 8) + 4;
  }

  update(windX, windY) {
    this.trail.push({ x: this.x, y: this.y, life: this.life });
    if (this.trail.length > this.maxTrail) this.trail.shift();

    this.flicker += this.flickerSpeed;
    const flickerForce = Math.sin(this.flicker) * 0.3;

    this.vx += windX * 0.05 + flickerForce + (Math.random() - 0.5) * this.turbulence;
    this.vy += windY * 0.05 - 0.01; // slight upward buoyancy
    this.vy -= 0.005; // base rise

    this.vx *= 0.98;
    this.vy *= 0.98;

    this.x += this.vx;
    this.y += this.vy;
    this.life -= this.decay;

    // Boundary wrapping
    if (this.x < -20) this.x = W + 20;
    if (this.x > W + 20) this.x = -20;
    if (this.y < -50) { this.y = H + 10; this.x = Math.random() * W; }
  }

  draw(ctx) {
    if (this.life <= 0) return;

    const alpha = this.life;
    const size = this.size * (0.6 + this.life * 0.4);

    // Draw trail
    for (let i = 0; i < this.trail.length; i++) {
      const t = this.trail[i];
      const trailAlpha = (i / this.trail.length) * alpha * 0.4;
      const trailSize = size * (i / this.trail.length) * 0.6;
      ctx.fillStyle = this.color.replace(')', `, ${trailAlpha})`).replace('rgb', 'rgba').replace('#', '');
      
      // Convert hex to rgba
      const hex = this.color;
      const r = parseInt(hex.slice(1,3), 16);
      const g = parseInt(hex.slice(3,5), 16);
      const b = parseInt(hex.slice(5,7), 16);
      ctx.fillStyle = `rgba(${r}, ${g}, ${b}, ${trailAlpha})`;
      ctx.beginPath();
      ctx.arc(t.x, t.y, trailSize, 0, Math.PI * 2);
      ctx.fill();
    }

    // Glow
    const glow = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, size * 4);
    const hex = this.color;
    const r = parseInt(hex.slice(1,3), 16);
    const g = parseInt(hex.slice(3,5), 16);
    const b = parseInt(hex.slice(5,7), 16);
    glow.addColorStop(0, `rgba(${r}, ${g}, ${b}, ${alpha * 0.8})`);
    glow.addColorStop(0.4, `rgba(${r}, ${g}, ${b}, ${alpha * 0.3})`);
    glow.addColorStop(1, `rgba(${r}, ${g}, ${b}, 0)`);
    ctx.fillStyle = glow;
    ctx.beginPath();
    ctx.arc(this.x, this.y, size * 4, 0, Math.PI * 2);
    ctx.fill();

    // Core
    ctx.fillStyle = `rgba(255, 255, 240, ${alpha})`;
    ctx.beginPath();
    ctx.arc(this.x, this.y, size * 0.5, 0, Math.PI * 2);
    ctx.fill();
  }

  get alive() { return this.life > 0 && this.y > -50 && this.y < H + 50; }
}

// Background stars (static)
const stars = [];
for (let i = 0; i < 150; i++) {
  stars.push({
    x: Math.random() * W,
    y: Math.random() * H,
    size: Math.random() * 1.2 + 0.3,
    alpha: Math.random() * 0.5 + 0.2,
    pulse: Math.random() * Math.PI * 2,
    pulseSpeed: Math.random() * 0.02 + 0.005
  });
}

function drawBackground() {
  // Fade instead of clear — creates motion blur
  ctx.fillStyle = 'rgba(5, 5, 8, 0.15)';
  ctx.fillRect(0, 0, W, H);

  // Stars
  for (const s of stars) {
    s.pulse += s.pulseSpeed;
    const a = s.alpha * (0.7 + 0.3 * Math.sin(s.pulse));
    ctx.fillStyle = `rgba(200, 210, 255, ${a})`;
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
    ctx.fill();
  }
}

function spawnEmbers(count, x, y, vx, vy) {
  for (let i = 0; i < count; i++) {
    if (embers.length < MAX_EMBERS) {
      embers.push(new Ember(
        x + (Math.random() - 0.5) * 30,
        y + (Math.random() - 0.5) * 10,
        vx + (Math.random() - 0.5) * 2,
        vy + (Math.random() - 0.5) * 2
      ));
    }
  }
}

function getWind() {
  if (!mouse.down) {
    // Gentle ambient wind
    return {
      x: Math.sin(frameCount * 0.005) * 0.3,
      y: 0
    };
  }

  const dx = mouse.x - mouse.px;
  const dy = mouse.y - mouse.py;

  switch (windMode) {
    case 'follow':
      return { x: dx * 0.15, y: dy * 0.15 };
    case 'repel':
      return { x: -dx * 0.2, y: -dy * 0.2 };
    case 'swirl':
      return { x: -dy * 0.15, y: dx * 0.15 };
    default:
      return { x: dx * 0.15, y: dy * 0.15 };
  }
}

// Continuous spawning from bottom
function ambientSpawn() {
  if (embers.length < MAX_EMBERS * 0.7 && frameCount % 3 === 0) {
    spawnEmbers(SPAWN_RATE);
  }
}

function loop() {
  frameCount++;
  
  // FPS
  const now = performance.now();
  if (now - lastFpsTime > 1000) {
    fps = Math.round(frameCount / ((now - lastFpsTime) / 1000));
    frameCount = 0;
    lastFpsTime = now;
    document.getElementById('stats').innerHTML = 
      `embers: ${embers.length}<br>fps: ${fps}`;
  }

  drawBackground();

  const wind = getWind();

  // Mouse spawn
  if (mouse.down && frameCount % 2 === 0) {
    spawnEmbers(2, mouse.x, mouse.y, 
      (Math.random() - 0.5) * 2, 
      -(Math.random() * 2 + 1));
  }

  ambientSpawn();

  // Update & draw
  for (const e of embers) {
    e.update(wind.x, wind.y);
    e.draw(ctx);
  }

  embers = embers.filter(e => e.alive);

  requestAnimationFrame(loop);
}

// Input
canvas.addEventListener('mousedown', e => {
  mouse.down = true;
  mouse.x = e.clientX;
  mouse.y = e.clientY;
  mouse.px = e.clientX;
  mouse.py = e.clientY;
  spawnEmbers(15, e.clientX, e.clientY);
  document.getElementById('hint').style.opacity = '0';
});

canvas.addEventListener('mousemove', e => {
  mouse.px = mouse.x;
  mouse.py = mouse.y;
  mouse.x = e.clientX;
  mouse.y = e.clientY;
});

canvas.addEventListener('mouseup', () => mouse.down = false);
canvas.addEventListener('mouseleave', () => mouse.down = false);

// Touch
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  const t = e.touches[0];
  mouse.down = true;
  mouse.x = t.clientX;
  mouse.y = t.clientY;
  mouse.px = t.clientX;
  mouse.py = t.clientY;
  spawnEmbers(15, t.clientX, t.clientY);
  document.getElementById('hint').style.opacity = '0';
}, { passive: false });

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  const t = e.touches[0];
  mouse.px = mouse.x;
  mouse.py = mouse.y;
  mouse.x = t.clientX;
  mouse.y = t.clientY;
}, { passive: false });

canvas.addEventListener('touchend', () => mouse.down = false);

// UI
const modeBtn = document.getElementById('modeBtn');
const modes = ['follow', 'repel', 'swirl'];
const modeLabels = { follow: 'wind: follow', repel: 'wind: repel', swirl: 'wind: swirl' };
let modeIdx = 0;

modeBtn.addEventListener('click', () => {
  modeIdx = (modeIdx + 1) % modes.length;
  windMode = modes[modeIdx];
  modeBtn.textContent = modeLabels[windMode];
});

document.getElementById('burstBtn').addEventListener('click', () => {
  const p = palettes[Math.floor(Math.random() * palettes.length)];
  palette = p;
  spawnEmbers(80, W/2 + (Math.random()-0.5)*200, H/2 + (Math.random()-0.5)*100);
  spawnEmbers(40, W/2 + (Math.random()-0.5)*300, H * 0.6);
});

document.getElementById('clearBtn').addEventListener('click', () => {
  embers = [];
  ctx.fillStyle = 'rgba(5, 5, 8, 1)';
  ctx.fillRect(0, 0, W, H);
});

// Keyboard shortcuts
window.addEventListener('keydown', e => {
  if (e.code === 'Space') {
    e.preventDefault();
    document.getElementById('burstBtn').click();
  }
  if (e.key === 'c' || e.key === 'C') {
    document.getElementById('clearBtn').click();
  }
  if (e.key === 'w' || e.key === 'W') {
    modeBtn.click();
  }
});

// Initial fill
ctx.fillStyle = 'rgba(5, 5, 8, 1)';
ctx.fillRect(0, 0, W, H);

loop();
</script>

</body>
</html>
