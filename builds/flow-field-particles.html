<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flow Field — Generative Canvas</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a0f; }
  canvas { display: block; }
  #ui {
    position: fixed;
    bottom: 16px;
    left: 16px;
    color: rgba(255,255,255,0.6);
    font-family: 'Courier New', monospace;
    font-size: 12px;
    pointer-events: none;
    text-shadow: 0 1px 4px rgba(0,0,0,0.8);
  }
  #info {
    position: fixed;
    top: 16px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(255,255,255,0.5);
    font-family: 'Courier New', monospace;
    font-size: 11px;
    pointer-events: none;
    text-align: center;
    text-shadow: 0 1px 4px rgba(0,0,0,0.8);
    transition: opacity 2s;
  }
</style>
</head>
<body>
<canvas id="canvas"></canvas>
<div id="info">move mouse to attract particles · click to burst · press space to reset</div>
<div id="ui"></div>

<script>
(() => {
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');
  const ui = document.getElementById('ui');
  const info = document.getElementById('info');

  let W, H;
  function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  // --- Configuration ---
  const config = {
    particleCount: 1200,
    baseSpeed: 0.6,
    noiseScale: 0.004,
    trailAlpha: 0.03,
    mouseRadius: 200,
    mouseForce: 0.04,
    burstCount: 150,
    palette: [
      [0, 200, 255],   // cyan
      [120, 100, 255],  // violet
      [255, 100, 180],  // pink
      [100, 255, 200],  // mint
      [255, 180, 80],   // amber
    ]
  };

  // --- Simplex-ish noise (lightweight) ---
  // Using a hash-based gradient noise for flow field
  const permutation = new Uint8Array(512);
  const p = new Uint8Array(256);
  for (let i = 0; i < 256; i++) p[i] = i;
  for (let i = 255; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [p[i], p[j]] = [p[j], p[i]];
  }
  for (let i = 0; i < 512; i++) permutation[i] = p[i & 255];

  function fade(t) { return t * t * t * (t * (t * 6 - 15) + 10); }
  function lerp(a, b, t) { return a + t * (b - a); }

  function noise2D(x, y) {
    const X = Math.floor(x) & 255, Y = Math.floor(y) & 255;
    const xf = x - Math.floor(x), yf = y - Math.floor(y);
    const u = fade(xf), v = fade(yf);
    const aa = permutation[permutation[X] + Y];
    const ab = permutation[permutation[X] + Y + 1];
    const ba = permutation[permutation[X + 1] + Y];
    const bb = permutation[permutation[X + 1] + Y + 1];
    // Hash gradients
    const g = (h, x, y) => {
      const hh = h & 3;
      return ((hh & 1) ? -x : x) + ((hh & 2) ? -y : y);
    };
    return lerp(
      lerp(g(aa, xf, yf), g(ba, xf - 1, yf), u),
      lerp(g(ab, xf, yf - 1), g(bb, xf - 1, yf - 1), u),
      v
    );
  }

  // --- Particles ---
  let particles = [];
  let mouse = { x: W / 2, y: H / 2, active: false };
  let frame = 0;

  class Particle {
    constructor(x, y, burst) {
      this.x = x ?? Math.random() * W;
      this.y = y ?? Math.random() * H;
      this.prevX = this.x;
      this.prevY = this.y;
      const c = config.palette[Math.floor(Math.random() * config.palette.length)];
      this.r = c[0]; this.g = c[1]; this.b = c[2];
      this.life = burst ? 60 + Math.random() * 80 : 300 + Math.random() * 400;
      this.maxLife = this.life;
      this.speed = config.baseSpeed * (burst ? 1.5 + Math.random() * 2 : 0.5 + Math.random());
    }
    update() {
      this.prevX = this.x;
      this.prevY = this.y;
      const angle = noise2D(this.x * config.noiseScale, this.y * config.noiseScale + frame * 0.003) * Math.PI * 4;
      let vx = Math.cos(angle) * this.speed;
      let vy = Math.sin(angle) * this.speed;
      if (mouse.active) {
        const dx = mouse.x - this.x, dy = mouse.y - this.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < config.mouseRadius) {
          const force = (1 - dist / config.mouseRadius) * config.mouseForce;
          vx += (dx / dist) * force * dist;
          vy += (dy / dist) * force * dist;
        }
      }
      this.x += vx;
      this.y += vy;
      this.life--;
      // Wrap
      if (this.x < 0) this.x = W;
      if (this.x > W) this.x = 0;
      if (this.y < 0) this.y = H;
      if (this.y > H) this.y = 0;
    }
    draw() {
      const alpha = Math.min(1, this.life / 60) * 0.7;
      ctx.strokeStyle = `rgba(${this.r},${this.g},${this.b},${alpha})`;
      ctx.lineWidth = 1.2;
      ctx.beginPath();
      ctx.moveTo(this.prevX, this.prevY);
      ctx.lineTo(this.x, this.y);
      ctx.stroke();
    }
    dead() { return this.life <= 0; }
  }

  function initParticles() {
    particles = [];
    for (let i = 0; i < config.particleCount; i++) {
      particles.push(new Particle());
    }
  }
  initParticles();

  // --- Interaction ---
  canvas.addEventListener('mousemove', (e) => {
    mouse.x = e.clientX;
    mouse.y = e.clientY;
    mouse.active = true;
  });
  canvas.addEventListener('mouseleave', () => mouse.active = false);
  canvas.addEventListener('mousedown', (e) => {
    for (let i = 0; i < config.burstCount; i++) {
      const angle = Math.random() * Math.PI * 2;
      const speed = 2 + Math.random() * 4;
      const p = new Particle(e.clientX, e.clientY, true);
      p.speed = speed;
      particles.push(p);
    }
  });
  window.addEventListener('keydown', (e) => {
    if (e.code === 'Space') {
      e.preventDefault();
      initParticles();
      ctx.fillStyle = 'rgba(10,10,15,1)';
      ctx.fillRect(0, 0, W, H);
      frame = 0;
    }
  });

  // --- Animation loop ---
  // Fade overlay creates trails
  function animate() {
    // Trail effect: draw semi-transparent background
    ctx.fillStyle = `rgba(10,10,15,${config.trailAlpha})`;
    ctx.fillRect(0, 0, W, H);
    // Update and draw
    for (let i = particles.length - 1; i >= 0; i--) {
      particles[i].update();
      particles[i].draw();
      if (particles[i].dead()) {
        particles.splice(i, 1);
        if (particles.length < config.particleCount * 0.8) {
          particles.push(new Particle());
        }
      }
    }
    // Update UI
    if (frame % 30 === 0) {
      ui.textContent = `particles: ${particles.length} | frame: ${frame}`;
    }
    frame++;
    requestAnimationFrame(animate);
  }
  animate();

  // Fade info after a few seconds
  setTimeout(() => { info.style.opacity = '0'; }, 6000);
})();
</script>
</body>
</html>
