<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aether Flow — Generative Art</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0f;
    overflow: hidden;
    font-family: 'Courier New', monospace;
    color: #e0e0e0;
  }
  canvas { display: block; }
  .overlay {
    position: fixed;
    bottom: 20px;
    left: 20px;
    font-size: 11px;
    opacity: 0.5;
    pointer-events: none;
  }
  .title {
    position: fixed;
    top: 20px;
    left: 20px;
    font-size: 14px;
    letter-spacing: 4px;
    text-transform: uppercase;
    opacity: 0.6;
    pointer-events: none;
  }
  .controls {
    position: fixed;
    top: 20px;
    right: 20px;
    font-size: 11px;
    opacity: 0.5;
    text-align: right;
    pointer-events: none;
  }
</style>
</head>
<body>
<div class="title">Aether Flow</div>
<div class="controls">
  click: pulse<br>
  space: change palette<br>
  s: save frame
</div>
<div class="overlay">generative flow field · 2026-06-13</div>
<canvas id="canvas"></canvas>
<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

let width, height;
let particles = [];
let flowField = [];
let cols, rows;
let scale = 20;
let time = 0;
let hueShift = 0;

const palettes = [
  { name: 'nebula', colors: ['#ff006e', '#fb5607', '#ffbe0b', '#8338ec', '#3a86ff'] },
  { name: 'ocean', colors: ['#00b4d8', '#0077b6', '#03045e', '#90e0ef', '#caf0f8'] },
  { name: 'forest', colors: ['#2d6a4f', '#40916c', '#52b788', '#74c69d', '#b7e4c7'] },
  { name: 'ember', colors: ['#370617', '#6a040f', '#9d0208', '#d00000', '#dc2f02'] },
  { name: 'void', colors: ['#7400b8', '#6930c3', '#5390d9', '#48bfe3', '#64dfdf'] }
];

let currentPalette = 0;

function resize() {
  width = canvas.width = window.innerWidth;
  height = canvas.height = window.innerHeight;
  cols = Math.floor(width / scale);
  rows = Math.floor(height / scale);
  initFlowField();
}

class Particle {
  constructor() {
    this.reset();
  }

  reset() {
    this.pos = { x: Math.random() * width, y: Math.random() * height };
    this.vel = { x: 0, y: 0 };
    this.acc = { x: 0, y: 0 };
    this.maxSpeed = 2 + Math.random() * 2;
    this.color = palettes[currentPalette].colors[Math.floor(Math.random() * 5)];
    this.life = 1;
    this.decay = 0.0005 + Math.random() * 0.001;
    this.size = 0.5 + Math.random() * 1.5;
  }

  follow() {
    let x = Math.floor(this.pos.x / scale);
    let y = Math.floor(this.pos.y / scale);
    let idx = (x + y * cols) % flowField.length;
    let angle = flowField[idx] || 0;

    let force = {
      x: Math.cos(angle) * 0.2,
      y: Math.sin(angle) * 0.2
    };
    this.applyForce(force);
  }

  applyForce(force) {
    this.acc.x += force.x;
    this.acc.y += force.y;
  }

  update() {
    this.follow();
    this.vel.x += this.acc.x;
    this.vel.y += this.acc.y;

    let speed = Math.sqrt(this.vel.x ** 2 + this.vel.y ** 2);
    if (speed > this.maxSpeed) {
      this.vel.x = (this.vel.x / speed) * this.maxSpeed;
      this.vel.y = (this.vel.y / speed) * this.maxSpeed;
    }

    this.pos.x += this.vel.x;
    this.pos.y += this.vel.y;
    this.acc.x *= 0;
    this.acc.y *= 0;

    this.life -= this.decay;
    if (this.life <= 0 || this.pos.x < 0 || this.pos.x > width || this.pos.y < 0 || this.pos.y > height) {
      this.reset();
    }
  }

  draw() {
    ctx.fillStyle = this.color;
    ctx.globalAlpha = this.life * 0.8;
    ctx.beginPath();
    ctx.arc(this.pos.x, this.pos.y, this.size, 0, Math.PI * 2);
    ctx.fill();
  }
}

function initFlowField() {
  flowField = [];
  for (let y = 0; y < rows; y++) {
    for (let x = 0; x < cols; x++) {
      let angle = (Math.cos(x * 0.1) + Math.sin(y * 0.1)) * Math.PI;
      flowField.push(angle);
    }
  }
}

function updateFlowField() {
  for (let y = 0; y < rows; y++) {
    for (let x = 0; x < cols; x++) {
      let idx = x + y * cols;
      let angle = flowField[idx];
      let noise = Math.sin(x * 0.05 + time * 0.01) * Math.cos(y * 0.05 + time * 0.01);
      flowField[idx] = angle + noise * 0.05;
    }
  }
  time++;
}

function init() {
  resize();
  particles = [];
  for (let i = 0; i < 2000; i++) {
    particles.push(new Particle());
  }
}

function animate() {
  ctx.fillStyle = 'rgba(10, 10, 15, 0.05)';
  ctx.fillRect(0, 0, width, height);

  updateFlowField();

  particles.forEach(p => {
    p.update();
    p.draw();
  });

  ctx.globalAlpha = 1;
  requestAnimationFrame(animate);
}

window.addEventListener('resize', resize);

document.addEventListener('keydown', (e) => {
  if (e.code === 'Space') {
    e.preventDefault();
    currentPalette = (currentPalette + 1) % palettes.length;
    particles.forEach(p => {
      p.color = palettes[currentPalette].colors[Math.floor(Math.random() * 5)];
    });
  }
  if (e.code === 'KeyS') {
    const link = document.createElement('a');
    link.download = `aether-flow-${Date.now()}.png`;
    link.href = canvas.toDataURL();
    link.click();
  }
});

document.addEventListener('click', () => {
  const cx = Math.random() * width;
  const cy = Math.random() * height;
  for (let i = 0; i < 200; i++) {
    let p = particles[Math.floor(Math.random() * particles.length)];
    p.pos.x = cx + (Math.random() - 0.5) * 100;
    p.pos.y = cy + (Math.random() - 0.5) * 100;
    p.life = 1;
    p.color = palettes[currentPalette].colors[Math.floor(Math.random() * 5)];
  }
});

init();
animate();
</script>
</body>
</html>
