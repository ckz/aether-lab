<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flow Field — Generative Art by Aether</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0f;
    overflow: hidden;
    font-family: 'Segoe UI', system-ui, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
  }
  canvas { display: block; cursor: crosshair; }
  .overlay {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    text-align: center;
    pointer-events: none;
  }
  .overlay h1 {
    color: #e0e0f0;
    font-size: 1.2rem;
    font-weight: 300;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    opacity: 0.85;
    text-shadow: 0 0 20px rgba(160, 180, 255, 0.4);
  }
  .overlay p {
    color: #888;
    font-size: 0.75rem;
    letter-spacing: 0.15em;
    margin-top: 6px;
  }
  .controls {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    display: flex;
    gap: 10px;
    pointer-events: all;
  }
  .controls button {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.12);
    color: #bbb;
    padding: 8px 18px;
    border-radius: 30px;
    cursor: pointer;
    font-size: 0.75rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    transition: all 0.3s;
    backdrop-filter: blur(10px);
  }
  .controls button:hover {
    background: rgba(255,255,255,0.14);
    color: #fff;
    border-color: rgba(255,255,255,0.3);
  }
  .stats {
    position: fixed;
    top: 20px;
    right: 24px;
    color: #555;
    font-size: 0.65rem;
    letter-spacing: 0.08em;
    z-index: 10;
    pointer-events: none;
    text-align: right;
    line-height: 1.6;
  }
</style>
</head>
<body>

<div class="overlay">
  <h1>Flow Field</h1>
  <p>Move your mouse · Click to burst · Press R to regenerate</p>
</div>

<div class="stats" id="stats"></div>

<div class="controls">
  <button onclick="regenerate()">⟳ Regenerate</button>
  <button onclick="togglePalette()">◐ Palette</button>
  <button onclick="saveFrame()">↓ Save</button>
  <button onclick="clearTrails()">Clear</button>
</div>

<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const stats = document.getElementById('stats');

let W, H;
function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  ctx.fillStyle = '#0a0a0f';
  ctx.fillRect(0, 0, W, H);
}
resize();
window.addEventListener('resize', resize);

// ---- Noise (simplex-ish) ----
const perm = new Uint8Array(512);
function shufflePerm(seed) {
  const p = new Uint8Array(256);
  for (let i = 0; i < 256; i++) p[i] = i;
  let s = seed || 42;
  for (let i = 255; i > 0; i--) {
    s = (s * 16807 + 0) % 2147483647;
    const j = s % (i + 1);
    [p[i], p[j]] = [p[j], p[i]];
  }
  for (let i = 0; i < 512; i++) perm[i] = p[i & 255];
}
shufflePerm(Date.now());

function fade(t) { return t * t * t * (t * (t * 6 - 15) + 10); }
function lerp(a, b, t) { return a + t * (b - a); }
function grad(hash, x, y, z) {
  const h = hash & 15;
  const u = h < 8 ? x : y;
  const v = h < 4 ? y : h === 12 || h === 14 ? x : z;
  return ((h & 1) === 0 ? u : -u) + ((h & 2) === 0 ? v : -v);
}

function noise3D(x, y, z) {
  const X = Math.floor(x) & 255, Y = Math.floor(y) & 255, Z = Math.floor(z) & 255;
  x -= Math.floor(x); y -= Math.floor(y); z -= Math.floor(z);
  const u = fade(x), v = fade(y), w = fade(z);
  const A = perm[X] + Y, AA = perm[A] + Z, AB = perm[A + 1] + Z;
  const B = perm[X + 1] + Y, BA = perm[B] + Z, BB = perm[B + 1] + Z;
  return lerp(
    lerp(lerp(grad(perm[AA], x, y, z), grad(perm[BA], x - 1, y, z), u),
         lerp(grad(perm[AB], x, y - 1, z), grad(perm[BB], x - 1, y - 1, z), u), v),
    lerp(lerp(grad(perm[AA + 1], x, y, z - 1), grad(perm[BA + 1], x - 1, y, z - 1), u),
         lerp(grad(perm[AB + 1], x, y - 1, z - 1), grad(perm[BB + 1], x - 1, y - 1, z - 1), u), v),
    w);
}

// ---- Palette system ----
const palettes = [
  { name: 'Aurora', colors: [[120,220,255],[80,255,180],[160,120,255],[255,120,220],[100,200,255]], bg: [8,8,18] },
  { name: 'Ember', colors: [[255,100,50],[255,200,40],[255,60,80],[255,160,20],[200,40,40]], bg: [15,8,5] },
  { name: 'Ocean', colors: [[0,150,220],[0,220,180],[50,100,255],[0,180,200],[100,200,255]], bg: [5,10,18] },
  { name: 'Void', colors: [[180,180,220],[140,160,255],[200,140,255],[120,200,240],[220,220,255]], bg: [6,6,12] },
  { name: 'Forest', colors: [[80,200,80],[180,220,60],[60,180,120],[140,255,100],[100,220,160]], bg: [6,12,6] },
  { name: 'Sunset', colors: [[255,120,80],[255,180,60],[255,80,120],[240,200,80],[255,140,100]], bg: [15,8,12] },
];
let paletteIdx = 0;
let palette = palettes[0];

function togglePalette() {
  paletteIdx = (paletteIdx + 1) % palettes.length;
  palette = palettes[paletteIdx];
}

// ---- Flow field ----
const SCALE = 0.004;
const TIME_SPEED = 0.0004;
let time = 0;
let noiseZ = 0;

function flowAngle(x, y, t) {
  return noise3D(x * SCALE, y * SCALE, t) * Math.PI * 4;
}

// ---- Particles ----
const MAX_PARTICLES = 6000;
let particles = [];

function createParticle(x, y, burst) {
  const speed = burst ? (2 + Math.random() * 6) : (0.8 + Math.random() * 1.8);
  return {
    x: x !== undefined ? x : Math.random() * W,
    y: y !== undefined ? y : Math.random() * H,
    vx: 0,
    vy: 0,
    life: burst ? (40 + Math.random() * 60) : (200 + Math.random() * 400),
    maxLife: 0,
    speed,
    ci: Math.floor(Math.random() * palette.colors.length),
    width: 0.4 + Math.random() * 1.2,
    alpha: 0.15 + Math.random() * 0.4,
  };
}
particles.push(createParticle());
for (let i = 0; i < MAX_PARTICLES - 1; i++) {
  const p = createParticle();
  p.life = Math.random() * p.life; // stagger
  particles.push(p);
}

// ---- Mouse ----
let mouse = { x: W / 2, y: H / 2, active: false, burst: false };
canvas.addEventListener('mousemove', e => {
  mouse.x = e.clientX; mouse.y = e.clientY; mouse.active = true;
});
canvas.addEventListener('mouseleave', () => { mouse.active = false; });
canvas.addEventListener('mousedown', e => {
  mouse.burst = true;
  for (let i = 0; i < 200; i++) {
    if (particles.length < MAX_PARTICLES + 500) {
      const p = createParticle(e.clientX + (Math.random()-0.5)*40, e.clientY + (Math.random()-0.5)*40, true);
      p.ci = Math.floor(Math.random() * palette.colors.length);
      particles.push(p);
    }
  }
});
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  mouse.x = e.touches[0].clientX; mouse.y = e.touches[0].clientY; mouse.active = true;
}, { passive: false });
canvas.addEventListener('touchstart', e => {
  mouse.x = e.touches[0].clientX; mouse.y = e.touches[0].clientY;
  mouse.burst = true;
  for (let i = 0; i < 150; i++) {
    const p = createParticle(mouse.x + (Math.random()-0.5)*40, mouse.y + (Math.random()-0.5)*40, true);
    p.ci = Math.floor(Math.random() * palette.colors.length);
    particles.push(p);
  }
});

// ---- Rendering ----
function rgba(ci, a) {
  const c = palette.colors[ci % palette.colors.length];
  return `rgba(${c[0]|0},${c[1]|0},${c[2]|0},${a})`;
}

function draw() {
  // Very subtle fade for trails
  ctx.globalCompositeOperation = 'source-over';
  ctx.fillStyle = `rgba(${palette.bg[0]},${palette.bg[1]},${palette.bg[2]},0.03)`;
  ctx.fillRect(0, 0, W, H);

  time += TIME_SPEED;
  noiseZ = time * 0.5;

  ctx.globalCompositeOperation = 'lighter';

  let alive = 0;
  for (let i = 0; i < particles.length; i++) {
    const p = particles[i];

    // Flow angle
    const angle = flowAngle(p.x, p.y, noiseZ);
    const targetVx = Math.cos(angle) * p.speed;
    const targetVy = Math.sin(angle) * p.speed;

    // Smooth steering
    p.vx += (targetVx - p.vx) * 0.15;
    p.vy += (targetVy - p.vy) * 0.15;

    // Mouse attraction
    if (mouse.active) {
      const dx = mouse.x - p.x, dy = mouse.y - p.y;
      const dist = Math.sqrt(dx * dx + dy * dy) + 1;
      if (dist < 200) {
        const force = (200 - dist) / 200 * 0.8;
        p.vx += (dx / dist) * force;
        p.vy += (dy / dist) * force;
      }
    }

    const speed = Math.sqrt(p.vx * p.vx + p.vy * p.vy);
    const maxSpeed = p.speed * 3;
    if (speed > maxSpeed) {
      p.vx = (p.vx / speed) * maxSpeed;
      p.vy = (p.vy / speed) * maxSpeed;
    }

    const nx = p.x + p.vx;
    const ny = p.y + p.vy;

    // Draw line segment
    const lifeRatio = p.life / (p.maxLife || 1);
    const alpha = p.alpha * Math.min(lifeRatio * 3, 1) * (0.5 + 0.5 * Math.min(speed / 2, 1));

    ctx.beginPath();
    ctx.moveTo(p.x, p.y);
    ctx.lineTo(nx, ny);
    ctx.strokeStyle = rgba(p.ci, alpha);
    ctx.lineWidth = p.width;
    ctx.stroke();

    p.x = nx;
    p.y = ny;
    p.life--;

    if (p.life > 0 && p.x > -50 && p.x < W + 50 && p.y > -50 && p.y < H + 50) {
      alive++;
      if (p.maxLife === 0) p.maxLife = p.life;
    }
  }

  // Recycle dead particles
  while (particles.length > alive + 100) {
    const dead = particles.indexOf(particles.find(p => p.life <= 0));
    if (dead >= 0) particles.splice(dead, 1);
    else break;
  }
  while (particles.length < MAX_PARTICLES) {
    particles.push(createParticle());
  }

  // Stats
  const pal = palette.name;
  stats.innerHTML = `Palette: <span style="color:${rgba(0,0.8)}">${pal}</span><br>Particles: ${alive.toLocaleString()}<br>FPS: ${fps}`;

  requestAnimationFrame(draw);
}

// ---- FPS counter ----
let fps = 60;
let frameCount = 0;
let lastFpsUpdate = performance.now();
function trackFps() {
  frameCount++;
  const now = performance.now();
  if (now - lastFpsUpdate > 500) {
    fps = Math.round(frameCount / ((now - lastFpsUpdate) / 1000));
    frameCount = 0;
    lastFpsUpdate = now;
  }
  requestAnimationFrame(trackFps);
}

// ---- Controls ----
function regenerate() {
  shufflePerm(Math.floor(Math.random() * 999999));
  particles = [];
  for (let i = 0; i < MAX_PARTICLES; i++) {
    const p = createParticle();
    p.life = Math.random() * p.life;
    particles.push(p);
  }
  ctx.fillStyle = `rgb(${palette.bg.join(',')})`;
  ctx.fillRect(0, 0, W, H);
}

function clearTrails() {
  ctx.fillStyle = `rgb(${palette.bg.join(',')})`;
  ctx.fillRect(0, 0, W, H);
}

function saveFrame() {
  const link = document.createElement('a');
  link.download = `flowfield-${Date.now()}.png`;
  link.href = canvas.toDataURL('image/png');
  link.click();
}

document.addEventListener('keydown', e => {
  if (e.key === 'r' || e.key === 'R') regenerate();
});

// Start
trackFps();
draw();
</script>

</body>
</html>
