<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flow Field — Aether's Generative Art</title>
<style>
* { margin: 0; padding: 0; }
body { background: #0a0a0f; overflow: hidden; cursor: crosshair; }
canvas { display: block; }
#info {
  position: fixed; bottom: 16px; left: 16px;
  color: rgba(255,255,255,0.4); font: 12px monospace;
  pointer-events: none; z-index: 1;
}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="info">click to burst · move to bend the field · space to clear</div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H, cols, rows;
const SCALE = 20;
const PARTICLES = 1200;
let field = [];
let particles = [];
let mouse = { x: -1000, y: -1000 };
let time = 0;
let hueShift = 0;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  cols = Math.ceil(W / SCALE) + 1;
  rows = Math.ceil(H / SCALE) + 1;
  field = new Array(cols * rows);
}

function createParticle(x, y) {
  return {
    x: x !== undefined ? x : Math.random() * W,
    y: y !== undefined ? y : Math.random() * H,
    px: 0, py: 0,
    vx: 0, vy: 0,
    life: 300 + Math.random() * 500,
    maxLife: 0,
    hue: 0,
    speed: 0.5 + Math.random() * 1.5
  };
}

function init() {
  resize();
  particles = [];
  for (let i = 0; i < PARTICLES; i++) {
    particles.push(createParticle());
  }
}

function updateField() {
  const mx = mouse.x, my = mouse.y;
  for (let y = 0; y < rows; y++) {
    for (let x = 0; x < cols; x++) {
      const px = x * SCALE, py = y * SCALE;
      const dx = px - mx, dy = py - my;
      const dist = Math.sqrt(dx * dx + dy * dy);
      const mouseInfluence = dist < 200 ? Math.atan2(dy, dx) * (1 - dist / 200) * 2 : 0;

      const angle =
        Math.sin(x * 0.06 + time * 0.008) *
        Math.cos(y * 0.04 + time * 0.006) * Math.PI * 2 +
        Math.sin((x + y) * 0.03 + time * 0.01) * Math.PI +
        mouseInfluence;

      field[y * cols + x] = angle;
    }
  }
}

function updateParticles() {
  for (let i = 0; i < particles.length; i++) {
    const p = particles[i];
    p.px = p.x;
    p.py = p.y;

    const col = Math.floor(p.x / SCALE);
    const row = Math.floor(p.y / SCALE);

    if (col >= 0 && col < cols && row >= 0 && row < rows) {
      const angle = field[row * cols + col];
      p.vx += Math.cos(angle) * 0.3;
      p.vy += Math.sin(angle) * 0.3;
    }

    p.vx *= 0.96;
    p.vy *= 0.96;
    p.x += p.vx * p.speed;
    p.y += p.vy * p.speed;
    p.life--;

    if (p.life <= 0 || p.x < -20 || p.x > W + 20 || p.y < -20 || p.y > H + 20) {
      const np = createParticle();
      np.maxLife = np.life;
      np.hue = (hueShift + Math.random() * 60) % 360;
      particles[i] = np;
    }

    if (p.maxLife === 0) {
      p.maxLife = p.life;
      p.hue = (hueShift + Math.random() * 60) % 360;
    }
  }
}

function draw() {
  ctx.fillStyle = 'rgba(10, 10, 15, 0.05)';
  ctx.fillRect(0, 0, W, H);

  for (let i = 0; i < particles.length; i++) {
    const p = particles[i];
    if (p.px === 0 && p.py === 0) continue;

    const alpha = Math.min(1, p.life / p.maxLife * 2, (p.maxLife - p.life) / 30);
    const speed = Math.sqrt(p.vx * p.vx + p.vy * p.vy);
    const lightness = 45 + speed * 8;

    ctx.beginPath();
    ctx.moveTo(p.px, p.py);
    ctx.lineTo(p.x, p.y);
    ctx.strokeStyle = `hsla(${p.hue}, 80%, ${Math.min(lightness, 75)}%, ${alpha * 0.6})`;
    ctx.lineWidth = 1 + speed * 0.3;
    ctx.stroke();
  }
}

function burst(x, y) {
  for (let i = 0; i < 80; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 2 + Math.random() * 4;
    const p = createParticle(x, y);
    p.vx = Math.cos(angle) * speed;
    p.vy = Math.sin(angle) * speed;
    p.maxLife = p.life;
    p.hue = (hueShift + Math.random() * 120) % 360;
    particles.push(p);
  }
  // trim back to limit
  while (particles.length > PARTICLES + 200) particles.shift();
}

function loop() {
  time++;
  hueShift = (hueShift + 0.15) % 360;
  updateField();
  updateParticles();
  draw();
  requestAnimationFrame(loop);
}

canvas.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });
canvas.addEventListener('mouseleave', () => { mouse.x = -1000; mouse.y = -1000; });
canvas.addEventListener('click', e => burst(e.clientX, e.clientY));
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  const t = e.touches[0];
  mouse.x = t.clientX; mouse.y = t.clientY;
  burst(t.clientX, t.clientY);
});
canvas.addEventListener('touchmove', e => {
  const t = e.touches[0];
  mouse.x = t.clientX; mouse.y = t.clientY;
});
window.addEventListener('keydown', e => {
  if (e.code === 'Space') {
    e.preventDefault();
    ctx.fillStyle = '#0a0a0f';
    ctx.fillRect(0, 0, W, H);
  }
});
window.addEventListener('resize', resize);

init();
loop();
</script>
</body>
</html>
