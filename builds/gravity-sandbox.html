<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gravity Sandbox ✦ Aether Lab</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #0a0a0f;
  overflow: hidden;
  font-family: 'Courier New', monospace;
  cursor: crosshair;
}
canvas { display: block; }
#ui {
  position: fixed;
  top: 20px;
  left: 20px;
  color: #aaa;
  font-size: 13px;
  z-index: 10;
  pointer-events: none;
  line-height: 1.7;
}
#ui h1 {
  font-size: 18px;
  color: #fff;
  margin-bottom: 8px;
  letter-spacing: 2px;
}
#ui .key { color: #7eb8ff; }
#ui .val { color: #fff; }
#controls {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 12px;
  z-index: 10;
}
#controls button {
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.15);
  color: #ccc;
  padding: 8px 18px;
  border-radius: 20px;
  cursor: pointer;
  font-family: 'Courier New', monospace;
  font-size: 12px;
  letter-spacing: 1px;
  transition: all 0.2s;
  pointer-events: all;
}
#controls button:hover {
  background: rgba(255,255,255,0.14);
  color: #fff;
  border-color: rgba(255,255,255,0.4);
}
#controls button.active {
  background: rgba(126,184,255,0.2);
  border-color: #7eb8ff;
  color: #7eb8ff;
}
#hint {
  position: fixed;
  bottom: 60px;
  left: 50%;
  transform: translateX(-50%);
  color: rgba(255,255,255,0.3);
  font-size: 12px;
  z-index: 10;
  pointer-events: none;
  white-space: nowrap;
}
</style>
</head>
<body>
<canvas id="canvas"></canvas>
<div id="ui">
  <h1>✦ GRAVITY SANDBOX ✦</h1>
  <div><span class="key">particles:</span> <span class="val" id="count">0</span></div>
  <div><span class="key">mode:</span> <span class="val" id="mode">attract</span></div>
  <div><span class="key">click + drag</span> = spawn stream</div>
</div>
<div id="hint">click anywhere to begin</div>
<div id="controls">
  <button class="active" data-mode="attract">⊙ attract</button>
  <button data-mode="repel">⊗ repel</button>
  <button data-mode="vortex">⟳ vortex</button>
  <button data-mode="paint">◈ paint</button>
  <button id="clearBtn">✕ clear</button>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let W, H;
function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

const particles = [];
const MAX = 2500;
let mouse = { x: W/2, y: H/2, down: false };
let mode = 'attract';
let hue = 200;
let frame = 0;

// Color palettes
const palettes = [
  [200, 280],   // blue-purple
  [320, 380],   // pink-magenta
  [140, 200],   // teal-blue
  [20, 60],     // warm gold
  [0, 360],     // full rainbow
];
let palette = palettes[0];

class Particle {
  constructor(x, y, vx, vy) {
    this.x = x;
    this.y = y;
    this.vx = vx || (Math.random() - 0.5) * 2;
    this.vy = vy || (Math.random() - 0.5) * 2;
    this.life = 1;
    this.decay = 0.0003 + Math.random() * 0.0008;
    this.radius = 1 + Math.random() * 2.5;
    this.hueOffset = (Math.random() - 0.5) * 30;
    this.trail = [];
    this.maxTrail = 6 + Math.floor(Math.random() * 8);
  }
  update() {
    this.trail.push({ x: this.x, y: this.y });
    if (this.trail.length > this.maxTrail) this.trail.shift();

    const dx = mouse.x - this.x;
    const dy = mouse.y - this.y;
    const dist = Math.sqrt(dx * dx + dy * dy) || 1;
    const force = mouse.down ? 800 : 120;
    const strength = force / (dist * dist);
    const angle = Math.atan2(dy, dx);

    switch(mode) {
      case 'attract':
        this.vx += Math.cos(angle) * strength * 0.8;
        this.vy += Math.sin(angle) * strength * 0.8;
        break;
      case 'repel':
        this.vx -= Math.cos(angle) * strength * 1.2;
        this.vy -= Math.sin(angle) * strength * 1.2;
        break;
      case 'vortex':
        const perpAngle = angle + Math.PI * 0.5;
        const pull = mouse.down ? strength * 0.6 : strength * 0.15;
        this.vx += Math.cos(perpAngle) * pull + Math.cos(angle) * pull * 0.2;
        this.vy += Math.sin(perpAngle) * pull + Math.sin(angle) * pull * 0.2;
        break;
      case 'paint':
        if (mouse.down) {
          this.vx += Math.cos(angle) * strength * 0.3;
          this.vy += Math.sin(angle) * strength * 0.3;
        }
        break;
    }

    // Gentle damping
    this.vx *= 0.985;
    this.vy *= 0.985;

    // Speed cap
    const speed = Math.sqrt(this.vx * this.vx + this.vy * this.vy);
    if (speed > 8) {
      this.vx = (this.vx / speed) * 8;
      this.vy = (this.vy / speed) * 8;
    }

    this.x += this.vx;
    this.y += this.vy;

    // Subtle fade
    this.life -= this.decay;

    // Wrap edges
    if (this.x < -20) this.x = W + 20;
    if (this.x > W + 20) this.x = -20;
    if (this.y < -20) this.y = H + 20;
    if (this.y > H + 20) this.y = -20;

    // Color shifts based on speed
    this._hue = (palette[0] + this.hueOffset + speed * 12 + frame * 0.2) % 360;
  }
  draw() {
    const alpha = this.life * 0.85;
    if (alpha <= 0) return;

    // Trail
    if (this.trail.length > 1) {
      ctx.beginPath();
      ctx.moveTo(this.trail[0].x, this.trail[0].y);
      for (let i = 1; i < this.trail.length; i++) {
        ctx.lineTo(this.trail[i].x, this.trail[i].y);
      }
      ctx.strokeStyle = `hsla(${this._hue}, 80%, 60%, ${alpha * 0.2})`;
      ctx.lineWidth = this.radius * 0.5;
      ctx.stroke();
    }

    // Glow
    const glow = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.radius * 4);
    glow.addColorStop(0, `hsla(${this._hue}, 90%, 65%, ${alpha * 0.5})`);
    glow.addColorStop(1, `hsla(${this._hue}, 90%, 50%, 0)`);
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.radius * 4, 0, Math.PI * 2);
    ctx.fillStyle = glow;
    ctx.fill();

    // Core
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
    ctx.fillStyle = `hsla(${this._hue}, 85%, 75%, ${alpha})`;
    ctx.fill();
  }
}

function spawn(x, y, count, spread) {
  for (let i = 0; i < count; i++) {
    if (particles.length >= MAX) {
      // Remove oldest
      particles.shift();
    }
    const angle = Math.random() * Math.PI * 2;
    const speed = Math.random() * spread;
    particles.push(new Particle(
      x + (Math.random() - 0.5) * 20,
      y + (Math.random() - 0.5) * 20,
      Math.cos(angle) * speed,
      Math.sin(angle) * speed
    ));
  }
}

// Mouse events
canvas.addEventListener('mousemove', e => {
  mouse.x = e.clientX;
  mouse.y = e.clientY;
  if (mouse.down && mode === 'paint') {
    spawn(e.clientX, e.clientY, 3, 3);
  }
});
canvas.addEventListener('mousedown', e => {
  mouse.down = true;
  mouse.x = e.clientX;
  mouse.y = e.clientY;
  spawn(e.clientX, e.clientY, 30, 4);
  document.getElementById('hint').style.opacity = '0';
});
canvas.addEventListener('mouseup', () => mouse.down = false);
canvas.addEventListener('mouseleave', () => mouse.down = false);

// Touch support
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  mouse.down = true;
  mouse.x = e.touches[0].clientX;
  mouse.y = e.touches[0].clientY;
  spawn(mouse.x, mouse.y, 30, 4);
  document.getElementById('hint').style.opacity = '0';
});
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  mouse.x = e.touches[0].clientX;
  mouse.y = e.touches[0].clientY;
  if (mode === 'paint') spawn(mouse.x, mouse.y, 3, 3);
});
canvas.addEventListener('touchend', () => mouse.down = false);

// Controls
document.querySelectorAll('#controls button[data-mode]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('#controls button[data-mode]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    mode = btn.dataset.mode;
    document.getElementById('mode').textContent = mode;
  });
});

document.getElementById('clearBtn').addEventListener('click', () => {
  particles.length = 0;
});

// Cycle palette on space
document.addEventListener('keydown', e => {
  if (e.code === 'Space') {
    e.preventDefault();
    const idx = palettes.indexOf(palette);
    palette = palettes[(idx + 1) % palettes.length];
  }
  if (e.code === 'KeyC') {
    particles.length = 0;
  }
});

// Ambient spawn
function ambientSpawn() {
  if (particles.length < 50 && frame % 30 === 0) {
    const edge = Math.floor(Math.random() * 4);
    let x, y;
    switch(edge) {
      case 0: x = Math.random() * W; y = -10; break;
      case 1: x = W + 10; y = Math.random() * H; break;
      case 2: x = Math.random() * W; y = H + 10; break;
      case 3: x = -10; y = Math.random() * H; break;
    }
    spawn(x, y, 3, 2);
  }
}

// Animation loop
function animate() {
  frame++;

  // Fade effect instead of clear for trail
  ctx.fillStyle = 'rgba(10, 10, 15, 0.12)';
  ctx.fillRect(0, 0, W, H);

  ambientSpawn();

  // Continuous spawn while mouse down
  if (mouse.down && mode !== 'paint') {
    spawn(mouse.x, mouse.y, 2, 2);
  }

  // Update & draw
  for (let i = particles.length - 1; i >= 0; i--) {
    particles[i].update();
    particles[i].draw();
    if (particles[i].life <= 0) {
      particles.splice(i, 1);
    }
  }

  // Mouse cursor glow
  if (!mouse.down) {
    const cursorGlow = ctx.createRadialGradient(mouse.x, mouse.y, 0, mouse.x, mouse.y, 60);
    cursorGlow.addColorStop(0, `hsla(${palette[0]}, 60%, 60%, 0.04)`);
    cursorGlow.addColorStop(1, 'transparent');
    ctx.beginPath();
    ctx.arc(mouse.x, mouse.y, 60, 0, Math.PI * 2);
    ctx.fillStyle = cursorGlow;
    ctx.fill();
  }

  document.getElementById('count').textContent = particles.length;
  requestAnimationFrame(animate);
}

animate();
</script>
</body>
</html>
