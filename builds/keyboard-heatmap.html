<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Keyboard Heatmap</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0d1117;
    color: #c9d1d9;
    font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
    min-height: 100vh;
    padding: 20px;
  }
  .container { max-width: 1100px; margin: 0 auto; }
  h1 {
    font-size: 1.4rem;
    color: #58a6ff;
    margin-bottom: 4px;
    letter-spacing: -0.02em;
  }
  .subtitle { font-size: 0.8rem; color: #8b949e; margin-bottom: 20px; }
  .stats {
    display: flex;
    gap: 20px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }
  .stat {
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 8px;
    padding: 10px 16px;
    min-width: 140px;
  }
  .stat-label { font-size: 0.7rem; color: #8b949e; text-transform: uppercase; letter-spacing: 0.05em; }
  .stat-value { font-size: 1.4rem; color: #f0f6fc; font-weight: 600; margin-top: 2px; }
  .keyboard {
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 16px;
  }
  .row {
    display: flex;
    gap: 4px;
    margin-bottom: 4px;
    justify-content: center;
  }
  .key {
    background: #21262d;
    border: 1px solid #30363d;
    border-radius: 5px;
    color: #8b949e;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.65rem;
    font-weight: 500;
    height: 40px;
    position: relative;
    transition: background 0.3s, color 0.3s, border-color 0.3s;
    user-select: none;
    cursor: default;
  }
  .key .count {
    position: absolute;
    bottom: 2px;
    right: 4px;
    font-size: 0.55rem;
    opacity: 0.7;
  }
  .key.active {
    color: #f0f6fc;
    font-weight: 600;
  }
  .legend {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 0.7rem;
    color: #8b949e;
    margin-bottom: 12px;
  }
  .legend-bar {
    flex: 1;
    max-width: 300px;
    height: 10px;
    border-radius: 5px;
    background: linear-gradient(to right, #1a2332, #264f78, #3fb950, #d29922, #f85149);
  }
  .legend-labels {
    display: flex;
    justify-content: space-between;
    font-size: 0.65rem;
    color: #6e7681;
    margin-top: 2px;
    max-width: 300px;
  }
  .top-keys {
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 8px;
    padding: 12px 16px;
    margin-bottom: 12px;
  }
  .top-keys h3 { font-size: 0.75rem; color: #8b949e; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.05em; }
  .top-keys-list { display: flex; flex-wrap: wrap; gap: 6px; }
  .top-key-item {
    background: #21262d;
    border: 1px solid #30363d;
    border-radius: 4px;
    padding: 3px 8px;
    font-size: 0.7rem;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .top-key-item .key-name { color: #f0f6fc; }
  .top-key-item .key-count { color: #8b949e; }
  .controls {
    display: flex;
    gap: 8px;
    margin-bottom: 12px;
  }
  button {
    background: #21262d;
    border: 1px solid #30363d;
    color: #c9d1d9;
    padding: 8px 14px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 0.75rem;
    font-family: inherit;
    transition: all 0.15s;
  }
  button:hover { background: #30363d; border-color: #8b949e; }
  button.danger { color: #f85149; }
  button.danger:hover { background: #3d0d14; border-color: #f85149; }
  .hint {
    font-size: 0.7rem;
    color: #6e7681;
    margin-top: 12px;
  }
  .flash {
    animation: flash 0.15s ease-out;
  }
  @keyframes flash {
    from { background: #58a6ff; }
    to { background: inherit; }
  }
  .focus-ring:focus {
    outline: 2px solid #58a6ff;
    outline-offset: 2px;
  }
</style>
</head>
<body>
<div class="container">
  <h1>⌨️ Keyboard Heatmap</h1>
  <p class="subtitle">Start typing — this page tracks which keys you press most.</p>

  <div class="stats">
    <div class="stat">
      <div class="stat-label">Total Presses</div>
      <div class="stat-value" id="total">0</div>
    </div>
    <div class="stat">
      <div class="stat-label">Unique Keys</div>
      <div class="stat-value" id="unique">0</div>
    </div>
    <div class="stat">
      <div class="stat-label">Top Key</div>
      <div class="stat-value" id="topKey">—</div>
    </div>
  </div>

  <div class="legend">
    <span>Cold</span>
    <div>
      <div class="legend-bar"></div>
      <div class="legend-labels"><span>0</span><span>Hot</span></div>
    </div>
  </div>

  <div class="keyboard" id="keyboard"></div>

  <div class="top-keys">
    <h3>🔥 Top 10 Most Pressed Keys</h3>
    <div class="top-keys-list" id="topKeys">—</div>
  </div>

  <div class="controls">
    <button onclick="resetData()" class="danger">Reset All Data</button>
    <button onclick="exportData()">Export JSON</button>
    <button onclick="document.getElementById('importFile').click()">Import JSON</button>
    <input type="file" id="importFile" accept=".json" style="display:none" onchange="importData(event)">
  </div>

  <p class="hint">💾 Data persists in localStorage. Click any key to highlight it. Switch tabs to keep tracking.</p>
</div>

<script>
  const STORAGE_KEY = 'keyboard-heatmap-v1';
  let keyData = {};
  let totalPresses = 0;

  const layout = [
    // Row 0: Function row
    [
      { label: 'Esc', code: 'Escape', w: 1 },
      ...Array.from({length:12}, (_,i) => ({ label: 'F'+(i+1), code: 'F'+(i+1), w: 1 }))
    ],
    // Row 1: Numbers
    [
      { label: '~\n`', code: 'Backquote', w: 1 },
      { label: '!\n1', code: 'Digit1', w: 1 },
      { label: '@\n2', code: 'Digit2', w: 1 },
      { label: '#\n3', code: 'Digit3', w: 1 },
      { label: '$\n4', code: 'Digit4', w: 1 },
      { label: '%\n5', code: 'Digit5', w: 1 },
      { label: '^\n6', code: 'Digit6', w: 1 },
      { label: '&\n7', code: 'Digit7', w: 1 },
      { label: '*\n8', code: 'Digit8', w: 1 },
      { label: '(\n9', code: 'Digit9', w: 1 },
      { label: ')\n0', code: 'Digit0', w: 1 },
      { label: '_\n-', code: 'Minus', w: 1 },
      { label: '+\n=', code: 'Equal', w: 1 },
      { label: '⌫', code: 'Backspace', w: 2 }
    ],
    // Row 2: QWERTY top
    [
      { label: 'Tab', code: 'Tab', w: 1.5 },
      { label: 'Q', code: 'KeyQ', w: 1 },
      { label: 'W', code: 'KeyW', w: 1 },
      { label: 'E', code: 'KeyE', w: 1 },
      { label: 'R', code: 'KeyR', w: 1 },
      { label: 'T', code: 'KeyT', w: 1 },
      { label: 'Y', code: 'KeyY', w: 1 },
      { label: 'U', code: 'KeyU', w: 1 },
      { label: 'I', code: 'KeyI', w: 1 },
      { label: 'O', code: 'KeyO', w: 1 },
      { label: 'P', code: 'KeyP', w: 1 },
      { label: '{\n[', code: 'BracketLeft', w: 1 },
      { label: '}\n]', code: 'BracketRight', w: 1 },
      { label: '|\n\\', code: 'Backslash', w: 1.5 }
    ],
    // Row 3: Home row
    [
      { label: 'Caps', code: 'CapsLock', w: 1.75 },
      { label: 'A', code: 'KeyA', w: 1 },
      { label: 'S', code: 'KeyS', w: 1 },
      { label: 'D', code: 'KeyD', w: 1 },
      { label: 'F', code: 'KeyF', w: 1 },
      { label: 'G', code: 'KeyG', w: 1 },
      { label: 'H', code: 'KeyH', w: 1 },
      { label: 'J', code: 'KeyJ', w: 1 },
      { label: 'K', code: 'KeyK', w: 1 },
      { label: 'L', code: 'KeyL', w: 1 },
      { label: ':\n;', code: 'Semicolon', w: 1 },
      { label: '"\n\'', code: 'Quote', w: 1 },
      { label: 'Enter', code: 'Enter', w: 2.25 }
    ],
    // Row 4: Shift row
    [
      { label: 'Shift', code: 'ShiftLeft', w: 2.25 },
      { label: 'Z', code: 'KeyZ', w: 1 },
      { label: 'X', code: 'KeyX', w: 1 },
      { label: 'C', code: 'KeyC', w: 1 },
      { label: 'V', code: 'KeyV', w: 1 },
      { label: 'B', code: 'KeyB', w: 1 },
      { label: 'N', code: 'KeyN', w: 1 },
      { label: 'M', code: 'KeyM', w: 1 },
      { label: '<\n,', code: 'Comma', w: 1 },
      { label: '>\n.', code: 'Period', w: 1 },
      { label: '?\n/', code: 'Slash', w: 1 },
      { label: 'Shift', code: 'ShiftRight', w: 2.75 }
    ],
    // Row 5: Bottom row
    [
      { label: 'Ctrl', code: 'ControlLeft', w: 1.25 },
      { label: 'Win', code: 'MetaLeft', w: 1.25 },
      { label: 'Alt', code: 'AltLeft', w: 1.25 },
      { label: 'Space', code: 'Space', w: 6.25 },
      { label: 'Alt', code: 'AltRight', w: 1.25 },
      { label: 'Win', code: 'MetaRight', w: 1.25 },
      { label: 'Menu', code: 'ContextMenu', w: 1.25 },
      { label: 'Ctrl', code: 'ControlRight', w: 1.25 }
    ]
  ];

  function loadData() {
    try {
      const saved = localStorage.getItem(STORAGE_KEY);
      if (saved) {
        keyData = JSON.parse(saved);
        totalPresses = Object.values(keyData).reduce((a, b) => a + b, 0);
      }
    } catch(e) {}
  }

  function saveData() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(keyData));
  }

  function getHeatColor(count, maxCount) {
    if (count === 0) return '#21262d';
    if (maxCount === 0) return '#264f78';
    const ratio = count / maxCount;
    // cold(1) -> blue -> green -> yellow -> red(hot)
    const colors = [
      { r: 26,  g: 55,  b: 120 },  // deep blue
      { r: 38,  g: 79,  b: 120 },  // blue
      { r: 63,  g: 185, b: 80  },  // green
      { r: 210, g: 153, b: 34  },  // yellow
      { r: 248, g: 81,  b: 73  }   // red
    ];
    let idx = ratio * (colors.length - 1);
    let lower = Math.floor(idx);
    let upper = Math.min(lower + 1, colors.length - 1);
    let t = idx - lower;
    let r = Math.round(colors[lower].r + (colors[upper].r - colors[lower].r) * t);
    let g = Math.round(colors[lower].g + (colors[upper].g - colors[lower].g) * t);
    let b = Math.round(colors[lower].b + (colors[upper].b - colors[lower].b) * t);
    return `rgb(${r},${g},${b})`;
  }

  function renderKeyboard() {
    const kb = document.getElementById('keyboard');
    kb.innerHTML = '';
    const maxCount = Math.max(1, ...Object.values(keyData));

    layout.forEach(row => {
      const rowDiv = document.createElement('div');
      rowDiv.className = 'row';
      row.forEach(key => {
        const div = document.createElement('div');
        div.className = 'key focus-ring';
        div.dataset.code = key.code;
        div.style.width = (key.w * 56) + 'px';
        const count = keyData[key.code] || 0;
        div.style.background = getHeatColor(count, maxCount);
        div.style.borderColor = count > 0 ? 'transparent' : '#30363d';

        // Multi-line label
        const lines = key.label.split('\n');
        div.innerHTML = `<div style="text-align:center;line-height:1.1">${lines.join('<br>')}</div>` +
                        (count > 0 ? `<span class="count">${count}</span>` : '');

        if (count > 0) div.classList.add('active');
        div.onclick = () => flashKey(div);
        rowDiv.appendChild(div);
      });
      kb.appendChild(rowDiv);
    });
  }

  function flashKey(el) {
    el.classList.remove('flash');
    void el.offsetWidth;
    el.classList.add('flash');
  }

  function updateStats() {
    document.getElementById('total').textContent = totalPresses.toLocaleString();
    const unique = Object.values(keyData).filter(c => c > 0).length;
    document.getElementById('unique').textContent = unique;

    const sorted = Object.entries(keyData).sort((a, b) => b[1] - a[1]);
    const top = sorted[0];
    document.getElementById('topKey').textContent = top ? top[0] : '—';

    // Top 10 list
    const topKeys = document.getElementById('topKeys');
    if (sorted.length === 0) {
      topKeys.innerHTML = '<span style="color:#6e7681">Start typing to see your top keys...</span>';
    } else {
      topKeys.innerHTML = sorted.slice(0, 10).map(([code, count]) => {
        const keyObj = layout.flat().find(k => k.code === code);
        const name = keyObj ? keyObj.label.replace('\n', ' ') : code;
        return `<div class="top-key-item"><span class="key-name">${name}</span><span class="key-count">${count.toLocaleString()}</span></div>`;
      }).join('');
    }
  }

  function handleKey(e) {
    const code = e.code;
    // Ignore modifier-only repeats and system keys
    if (['ShiftLeft','ShiftRight','ControlLeft','ControlRight','AltLeft','AltRight','MetaLeft','MetaRight'].includes(code)) return;

    keyData[code] = (keyData[code] || 0) + 1;
    totalPresses++;
    saveData();
    renderKeyboard();
    updateStats();

    // Flash the pressed key
    const el = document.querySelector(`.key[data-code="${code}"]`);
    if (el) flashKey(el);
  }

  function resetData() {
    if (confirm('Clear all key press data? This cannot be undone.')) {
      keyData = {};
      totalPresses = 0;
      saveData();
      renderKeyboard();
      updateStats();
    }
  }

  function exportData() {
    const blob = new Blob([JSON.stringify({ keyData, totalPresses, exportedAt: new Date().toISOString() }, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `keyboard-heatmap-${new Date().toISOString().slice(0,10)}.json`;
    a.click();
    URL.revokeObjectURL(url);
  }

  function importData(event) {
    const file = event.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const data = JSON.parse(e.target.result);
        if (data.keyData && typeof data.keyData === 'object') {
          keyData = data.keyData;
          totalPresses = Object.values(keyData).reduce((a, b) => a + b, 0);
          saveData();
          renderKeyboard();
          updateStats();
          alert('Data imported successfully!');
        } else {
          alert('Invalid file format.');
        }
      } catch(err) {
        alert('Error parsing JSON: ' + err.message);
      }
    };
    reader.readAsText(file);
  }

  // Init
  loadData();
  renderKeyboard();
  updateStats();
  window.addEventListener('keydown', handleKey);
  document.addEventListener('visibilitychange', () => {
    if (!document.hidden) {
      loadData();
      renderKeyboard();
      updateStats();
    }
  });
</script>
</body>
</html>
