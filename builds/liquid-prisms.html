<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Liquid Prisms</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    background: #0a0a12;
    overflow: hidden;
    cursor: crosshair;
    font-family: 'Courier New', monospace;
  }
  canvas { display: block; }
  .hint {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(255,255,255,0.4);
    font-size: 13px;
    letter-spacing: 2px;
    pointer-events: none;
    transition: opacity 3s;
  }
  .hint.fade { opacity: 0; }
  .counter {
    position: fixed;
    top: 16px;
    right: 20px;
    color: rgba(255,255,255,0.15);
    font-size: 11px;
    letter-spacing: 1px;
    pointer-events: none;
  }
</style>
</head>
<body>
<canvas id="canvas"></canvas>
<div class="hint" id="hint">MOVE · CLICK · HOLD</div>
<div class="counter" id="counter"></div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const hint = document.getElementById('hint');
const counter = document.getElementById('counter');

let W, H, DPR;
function resize() {
  DPR = Math.min(window.devicePixelRatio || 1, 2);
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = W * DPR;
  canvas.height = H * DPR;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
}
resize();
window.addEventListener('resize', resize);

// ——— Blob system ———
const NUM_BLOBS = 7;
const TRAIL_LENGTH = 28;
const blobs = [];

const PALETTES = [
  ['#ff006e', '#fb5607', '#ffbe0b'],
  ['#00f5d4', '#00bbf9', '#9b5de5'],
  ['#f72585', '#7209b7', '#3a0ca3'],
  ['#06d6a0', '#118ab2', '#073b4c'],
  ['#e63946', '#f4a261', '#2a9d8f'],
  ['#ff595e', '#ffca3a', '#8ac926'],
  ['#7400b8', '#6930c3', '#5390d9'],
];

class Blob {
  constructor(index) {
    this.index = index;
    this.palette = PALETTES[index % PALETTES.length];
    this.x = Math.random() * W;
    this.y = Math.random() * H;
    this.vx = (Math.random() - 0.5) * 1.5;
    this.vy = (Math.random() - 0.5) * 1.5;
    this.radius = 60 + Math.random() * 100;
    this.baseRadius = this.radius;
    this.phase = Math.random() * Math.PI * 2;
    this.trail = [];
    this.hueShift = 0;
    this.targetX = this.x;
    this.targetY = this.y;
    this.wanderAngle = Math.random() * Math.PI * 2;
  }

  update(mouse, dt) {
    this.phase += 0.012 + this.index * 0.002;
    this.hueShift += 0.3;

    // Wander
    this.wanderAngle += (Math.random() - 0.5) * 0.3;
    this.vx += Math.cos(this.wanderAngle) * 0.05;
    this.vy += Math.sin(this.wanderAngle) * 0.05;

    // Mouse attraction
    if (mouse.active) {
      const dx = mouse.x - this.x;
      const dy = mouse.y - this.y;
      const dist = Math.sqrt(dx * dx + dy * dy) + 1;
      const force = Math.min(800 / (dist * dist), 0.8);
      this.vx += (dx / dist) * force;
      this.vy += (dy / dist) * force;
      this.radius = this.baseRadius * (1 + mouse.pressing ? 0.6 : 0.25);
    } else {
      this.radius += (this.baseRadius - this.radius) * 0.02;
    }

    // Damping
    this.vx *= 0.985;
    this.vy *= 0.985;

    // Speed cap
    const speed = Math.sqrt(this.vx * this.vx + this.vy * this.vy);
    if (speed > 4) {
      this.vx = (this.vx / speed) * 4;
      this.vy = (this.vy / speed) * 4;
    }

    this.x += this.vx;
    this.y += this.vy;

    // Wrap
    const margin = this.radius * 2;
    if (this.x < -margin) this.x = W + margin;
    if (this.x > W + margin) this.x = -margin;
    if (this.y < -margin) this.y = H + margin;
    if (this.y > H + margin) this.y = -margin;

    // Trail
    this.trail.unshift({ x: this.x, y: this.y, r: this.radius });
    if (this.trail.length > TRAIL_LENGTH) this.trail.pop();
  }

  draw(ctx) {
    for (let i = this.trail.length - 1; i >= 0; i--) {
      const t = this.trail[i];
      const alpha = (1 - i / TRAIL_LENGTH) * 0.12;
      const r = t.r * (1 - i / TRAIL_LENGTH * 0.4);
      if (r < 2 || alpha < 0.005) continue;

      const colorIdx = (this.index + Math.floor(i * 0.05)) % this.palette.length;
      const col = this.palette[colorIdx];

      const grad = ctx.createRadialGradient(t.x, t.y, 0, t.x, t.y, r);
      grad.addColorStop(0, this.hexToRgba(col, alpha));
      grad.addColorStop(0.5, this.hexToRgba(col, alpha * 0.5));
      grad.addColorStop(1, this.hexToRgba(col, 0));

      ctx.beginPath();
      ctx.arc(t.x, t.y, r, 0, Math.PI * 2);
      ctx.fillStyle = grad;
      ctx.fill();
    }

    // Core glow
    const coreAlpha = mouse.pressing ? 0.25 : 0.15;
    const coreR = this.radius * 0.5;
    const core = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, coreR);
    core.addColorStop(0, this.hexToRgba('#ffffff', coreAlpha));
    core.addColorStop(0.3, this.hexToRgba(this.palette[0], coreAlpha * 0.7));
    core.addColorStop(1, this.hexToRgba(this.palette[0], 0));
    ctx.beginPath();
    ctx.arc(this.x, this.y, coreR, 0, Math.PI * 2);
    ctx.fillStyle = core;
    ctx.fill();
  }

  hexToRgba(hex, alpha) {
    const r = parseInt(hex.slice(1, 3), 16);
    const g = parseInt(hex.slice(3, 5), 16);
    const b = parseInt(hex.slice(5, 7), 16);
    return `rgba(${r},${g},${b},${alpha})`;
  }
}

// ——— Sparkle system ———
const sparks = [];

class Spark {
  constructor(x, y) {
    this.x = x;
    this.y = y;
    this.vx = (Math.random() - 0.5) * 3;
    this.vy = (Math.random() - 0.5) * 3;
    this.life = 1;
    this.decay = 0.01 + Math.random() * 0.02;
    this.size = 1 + Math.random() * 2;
    this.color = `hsl(${Math.random() * 360}, 80%, 70%)`;
  }
  update() {
    this.x += this.vx;
    this.y += this.vy;
    this.vx *= 0.97;
    this.vy *= 0.97;
    this.life -= this.decay;
  }
  draw(ctx) {
    if (this.life <= 0) return;
    ctx.globalAlpha = this.life * 0.8;
    ctx.fillStyle = this.color;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size * this.life, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
  }
}

// ——— Mouse ———
const mouse = { x: W / 2, y: H / 2, active: false, pressing: false };

canvas.addEventListener('mousemove', e => {
  mouse.x = e.clientX;
  mouse.y = e.clientY;
  mouse.active = true;
  if (mouse.pressing) {
    for (let i = 0; i < 3; i++) sparks.push(new Spark(e.clientX, e.clientY));
  }
});
canvas.addEventListener('mousedown', e => {
  mouse.pressing = true;
  mouse.x = e.clientX;
  mouse.y = e.clientY;
  mouse.active = true;
  hint.classList.add('fade');
  // Burst
  for (let i = 0; i < 40; i++) sparks.push(new Spark(e.clientX, e.clientY));
});
canvas.addEventListener('mouseup', () => { mouse.pressing = false; });
canvas.addEventListener('mouseleave', () => { mouse.active = false; mouse.pressing = false; });

// Touch support
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  const t = e.touches[0];
  mouse.x = t.clientX;
  mouse.y = t.clientY;
  mouse.active = true;
  mouse.pressing = true;
  hint.classList.add('fade');
  for (let i = 0; i < 40; i++) sparks.push(new Spark(t.clientX, t.clientY));
}, { passive: false });
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  const t = e.touches[0];
  mouse.x = t.clientX;
  mouse.y = t.clientY;
  if (mouse.pressing) {
    for (let i = 0; i < 3; i++) sparks.push(new Spark(t.clientX, t.clientY));
  }
}, { passive: false });
canvas.addEventListener('touchend', () => { mouse.pressing = false; });

// ——— Init blobs ———
for (let i = 0; i < NUM_BLOBS; i++) blobs.push(new Blob(i));

// ——— Background grid ———
function drawGrid() {
  ctx.strokeStyle = 'rgba(255,255,255,0.012)';
  ctx.lineWidth = 0.5;
  const spacing = 60;
  for (let x = 0; x < W; x += spacing) {
    ctx.beginPath();
    ctx.moveTo(x, 0);
    ctx.lineTo(x, H);
    ctx.stroke();
  }
  for (let y = 0; y < H; y += spacing) {
    ctx.beginPath();
    ctx.moveTo(0, y);
    ctx.lineTo(W, y);
    ctx.stroke();
  }
}

// ——— Main loop ———
let frameCount = 0;
let lastTime = performance.now();

function animate(now) {
  requestAnimationFrame(animate);
  const dt = Math.min((now - lastTime) / 16.667, 3);
  lastTime = now;
  frameCount++;

  // Fade trail effect
  ctx.fillStyle = 'rgba(10, 10, 18, 0.08)';
  ctx.fillRect(0, 0, W, H);

  // Subtle grid
  if (frameCount % 60 === 0) drawGrid();

  // Composite: lighter = additive blending for blobs
  ctx.globalCompositeOperation = 'lighter';

  for (const blob of blobs) {
    blob.update(mouse, dt);
    blob.draw(ctx);
  }

  // Sparks
  for (let i = sparks.length - 1; i >= 0; i--) {
    sparks[i].update();
    sparks[i].draw(ctx);
    if (sparks[i].life <= 0) sparks.splice(i, 1);
  }

  ctx.globalCompositeOperation = 'source-over';

  // Connection lines between nearby blobs
  for (let i = 0; i < blobs.length; i++) {
    for (let j = i + 1; j < blobs.length; j++) {
      const dx = blobs[i].x - blobs[j].x;
      const dy = blobs[i].y - blobs[j].y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < 300) {
        const alpha = (1 - dist / 300) * 0.06;
        ctx.strokeStyle = `rgba(255,255,255,${alpha})`;
        ctx.lineWidth = 0.5;
        ctx.beginPath();
        ctx.moveTo(blobs[i].x, blobs[i].y);
        ctx.lineTo(blobs[j].x, blobs[j].y);
        ctx.stroke();
      }
    }
  }

  // Counter
  if (frameCount % 30 === 0) {
    counter.textContent = `blobs:${NUM_BLOBS} · sparks:${sparks.length}`;
  }
}

// Initial clear
ctx.fillStyle = '#0a0a12';
ctx.fillRect(0, 0, W, H);
drawGrid();

requestAnimationFrame(animate);

// Fade hint after 5s
setTimeout(() => hint.classList.add('fade'), 5000);
</script>
</body>
</html>
