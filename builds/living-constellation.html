<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Living Constellation — Generative Art</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #05060f;
    overflow: hidden;
    font-family: 'Courier New', monospace;
    cursor: crosshair;
  }
  canvas { display: block; }
  .overlay {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(180, 200, 255, 0.6);
    font-size: 12px;
    letter-spacing: 3px;
    text-transform: uppercase;
    pointer-events: none;
    text-align: center;
  }
  .controls {
    position: fixed;
    top: 16px;
    right: 16px;
    color: rgba(180, 200, 255, 0.5);
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    pointer-events: none;
    text-align: right;
    line-height: 1.8;
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="overlay">move your cursor · click to pulse · space to shift</div>
<div class="controls">
  nodes: <span id="nc">0</span><br>
  links: <span id="lc">0</span><br>
  era: <span id="era">I</span>
</div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

let W, H, DPR;
function resize() {
  DPR = window.devicePixelRatio || 1;
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = W * DPR;
  canvas.height = H * DPR;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
}
resize();
window.addEventListener('resize', resize);

// ── Palettes across eras ──
const ERAS = [
  { name: 'I — Abyss',    bg: '#05060f', nodes: ['#4fc3f7','#81d4fa','#b3e5fc'], link: 'rgba(79,195,247,', pulse: '#4fc3f7' },
  { name: 'II — Ember',   bg: '#0f0805', nodes: ['#ff8a65','#ffab91','#ffccbc'], link: 'rgba(255,138,101,', pulse: '#ff8a65' },
  { name: 'III — Neon',   bg: '#050f08', nodes: ['#69f0ae','#b9f6ca','#e8f5e9'], link: 'rgba(105,240,174,', pulse: '#69f0ae' },
  { name: 'IV — Void',    bg: '#0a0510', nodes: ['#ce93d8','#e1bee7','#f3e5f5'], link: 'rgba(206,147,216,', pulse: '#ce93d8' },
  { name: 'V — Solar',    bg: '#0f0c05', nodes: ['#ffd54f','#ffecb3','#fff9c4'], link: 'rgba(255,213,79,', pulse: '#ffd54f' },
];
let era = 0;

// ── Node class ──
const CONNECT_DIST = 140;
const NODE_COUNT = Math.min(Math.floor((window.innerWidth * window.innerHeight) / 9000), 160);
const nodes = [];

class Node {
  constructor() {
    this.x = Math.random() * W;
    this.y = Math.random() * H;
    this.vx = (Math.random() - 0.5) * 0.4;
    this.vy = (Math.random() - 0.5) * 0.4;
    this.r = 1.2 + Math.random() * 2;
    this.baseR = this.r;
    this.color = ERAS[era].nodes[Math.floor(Math.random() * 3)];
    this.pulsePhase = Math.random() * Math.PI * 2;
    this.pulseSpeed = 0.01 + Math.random() * 0.02;
    this.energy = 0;
  }
  update(mx, my) {
    // gentle drift
    this.vx += (Math.random() - 0.5) * 0.03;
    this.vy += (Math.random() - 0.5) * 0.03;

    // mouse attraction
    if (mx != null) {
      const dx = mx - this.x, dy = my - this.y;
      const d = Math.sqrt(dx*dx + dy*dy);
      if (d < 200) {
        const f = 0.015 * (1 - d/200);
        this.vx += dx * f;
        this.vy += dy * f;
      }
    }

    // dampen
    this.vx *= 0.999;
    this.vy *= 0.999;
    // speed cap
    const sp = Math.sqrt(this.vx*this.vx + this.vy*this.vy);
    if (sp > 1.2) { this.vx *= 1.2/sp; this.vy *= 1.2/sp; }

    this.x += this.vx;
    this.y += this.vy;

    // wrap
    if (this.x < -20) this.x = W + 20;
    if (this.x > W + 20) this.x = -20;
    if (this.y < -20) this.y = H + 20;
    if (this.y > H + 20) this.y = -20;

    // pulse
    this.pulsePhase += this.pulseSpeed;
    this.r = this.baseR + Math.sin(this.pulsePhase) * 0.6;

    // energy decay
    this.energy *= 0.94;
  }
  draw() {
    const a = 0.5 + this.energy * 3;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.r + this.energy * 6, 0, Math.PI * 2);
    ctx.fillStyle = this.color.replace(')', `,${Math.min(a,1)})`).replace('rgb', 'rgba');
    // handle hex colors
    if (this.color.startsWith('#')) {
      const r = parseInt(this.color.slice(1,3),16);
      const g = parseInt(this.color.slice(3,5),16);
      const b = parseInt(this.color.slice(5,7),16);
      ctx.fillStyle = `rgba(${r},${g},${b},${Math.min(a,1)})`;
    }
    ctx.fill();

    // core
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.r * 0.5, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255,255,255,${0.6 + this.energy * 2})`;
    ctx.fill();
  }
}

for (let i = 0; i < NODE_COUNT; i++) nodes.push(new Node());

// ── Mouse ──
let mx = null, my = null;
let pulseQueue = [];
window.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; });
window.addEventListener('mouseleave', () => { mx = null; my = null; });
window.addEventListener('click', e => {
  pulseQueue.push({ x: e.clientX, y: e.clientY, t: 0 });
  nodes.forEach(n => {
    const dx = e.clientX - n.x, dy = e.clientY - n.y;
    const d = Math.sqrt(dx*dx + dy*dy);
    if (d < 250) n.energy = Math.min(1, n.energy + (1 - d/250) * 1.5);
  });
});
window.addEventListener('keydown', e => {
  if (e.code === 'Space') {
    e.preventDefault();
    era = (era + 1) % ERAS.length;
    document.getElementById('era').textContent = ERAS[era].name;
    // re-color nodes
    nodes.forEach(n => {
      n.color = ERAS[era].nodes[Math.floor(Math.random() * 3)];
    });
  }
});

// ── Draw links ──
let linkCount = 0;
function drawLinks() {
  linkCount = 0;
  const pal = ERAS[era].link;
  for (let i = 0; i < nodes.length; i++) {
    for (let j = i + 1; j < nodes.length; j++) {
      const dx = nodes[i].x - nodes[j].x;
      const dy = nodes[i].y - nodes[j].y;
      const d = Math.sqrt(dx*dx + dy*dy);
      if (d < CONNECT_DIST) {
        const a = (1 - d/CONNECT_DIST) * 0.35;
        const eBoost = (nodes[i].energy + nodes[j].energy) * 0.5;
        ctx.beginPath();
        ctx.moveTo(nodes[i].x, nodes[i].y);
        ctx.lineTo(nodes[j].x, nodes[j].y);
        ctx.strokeStyle = pal + Math.min(a + eBoost, 0.9) + ')';
        ctx.lineWidth = 0.4 + eBoost * 1.5;
        ctx.stroke();
        linkCount++;
      }
    }
  }
}

// ── Pulse ripples ──
function drawPulses() {
  pulseQueue.forEach(p => {
    const r = p.t * 3;
    const a = Math.max(0, 1 - p.t / 80);
    ctx.beginPath();
    ctx.arc(p.x, p.y, r, 0, Math.PI * 2);
    ctx.strokeStyle = ERAS[era].pulse.replace(')', `,${a * 0.6})`).replace('#', '');
    // convert hex to rgba for stroke
    const hex = ERAS[era].pulse;
    const cr = parseInt(hex.slice(1,3),16);
    const cg = parseInt(hex.slice(3,5),16);
    const cb = parseInt(hex.slice(5,7),16);
    ctx.strokeStyle = `rgba(${cr},${cg},${cb},${a * 0.6})`;
    ctx.lineWidth = 1.5;
    ctx.stroke();
    p.t++;
  });
  pulseQueue = pulseQueue.filter(p => p.t < 80);
}

// ── Background dust ──
const dust = Array.from({length: 60}, () => ({
  x: Math.random() * W,
  y: Math.random() * H,
  s: Math.random() * 0.8,
  a: Math.random() * 0.3,
  v: 0.1 + Math.random() * 0.2
}));
function drawDust() {
  dust.forEach(d => {
    d.y -= d.v;
    if (d.y < -5) { d.y = H + 5; d.x = Math.random() * W; }
    ctx.beginPath();
    ctx.arc(d.x, d.y, d.s, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(200,220,255,${d.a})`;
    ctx.fill();
  });
}

// ── Main loop ──
function frame() {
  // background fade
  ctx.fillStyle = ERAS[era].bg;
  ctx.fillRect(0, 0, W, H);

  drawDust();

  nodes.forEach(n => n.update(mx, my));
  drawLinks();
  nodes.forEach(n => n.draw());
  drawPulses();

  document.getElementById('nc').textContent = nodes.length;
  document.getElementById('lc').textContent = linkCount;

  requestAnimationFrame(frame);
}
frame();
</script>
</body>
</html>
