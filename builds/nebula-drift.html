<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Nebula Drift — Generative Art</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; background: radial-gradient(circle at 50% 40%, #0b1026 0%, #020218 100%); overflow: hidden; font-family: system-ui, -apple-system, sans-serif; color: #e7ecff; }
  body { display: flex; align-items: center; justify-content: center; }
  canvas { display: block; position: absolute; inset: 0; width: 100%; height: 100%; }
  .overlay { position: absolute; bottom: 24px; left: 50%; transform: translateX(-50%); text-align: center; pointer-events: none; opacity: .9; }
  .overlay h1 { font-size: 18px; letter-spacing: .25em; text-transform: uppercase; text-shadow: 0 0 12px #7aa2ff; }
  .overlay p { font-size: 12px; color: #b8c6ff; letter-spacing: .12em; margin-top: 6px; }
  .hud { position: absolute; top: 16px; right: 16px; text-align: right; font-size: 11px; color: #8a9ad6; opacity: .8; letter-spacing: .08em; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="hud" id="hud">nodes: 0 · fps: 0</div>
<div class="overlay">
  <h1>Nebula Drift</h1>
  <p>move your mouse to bend the field</p>
</div>
<script>
(() => {
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');
  let W = (canvas.width = innerWidth * devicePixelRatio);
  let H = (canvas.height = innerHeight * devicePixelRatio);
  ctx.scale(devicePixelRatio, devicePixelRatio);
  const w = () => innerWidth, h = () => innerHeight;

  const COLORS = [
    [122, 162, 255],
    [255, 122, 220],
    [140, 255, 200],
    [255, 200, 122],
    [180, 122, 255],
    [122, 220, 255],
  ];

  const PARTICLE_COUNT = Math.min(280, Math.floor((innerWidth * innerHeight) / 7000));
  const CONNECTION_DIST = 140;
  const MOUSE_RADIUS = 200;

  let mouse = { x: -9999, y: -9999 };
  let particles = [];
  let frame = 0;
  let lastTime = performance.now();
  let fps = 0;
  const hud = document.getElementById('hud');

  class Particle {
    constructor() { this.reset(true); }
    reset(initial = false) {
      this.x = Math.random() * w();
      this.y = initial ? Math.random() * h() : -20;
      this.vx = (Math.random() - 0.5) * 0.4;
      this.vy = Math.random() * 0.5 + 0.2;
      this.radius = Math.random() * 1.6 + 0.6;
      this.color = COLORS[Math.floor(Math.random() * COLORS.length)];
      this.alpha = Math.random() * 0.6 + 0.3;
      this.phase = Math.random() * Math.PI * 2;
      this.pulseSpeed = Math.random() * 0.02 + 0.005;
    }
    update() {
      this.phase += this.pulseSpeed;
      const pulse = Math.sin(this.phase) * 0.3 + 1;
      const dx = mouse.x - this.x;
      const dy = mouse.y - this.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < MOUSE_RADIUS && dist > 0) {
        const force = (1 - dist / MOUSE_RADIUS) * 0.04;
        this.vx -= (dx / dist) * force;
        this.vy -= (dy / dist) * force;
      }
      this.vx += (Math.random() - 0.5) * 0.02;
      this.vy += Math.sin(frame * 0.002 + this.phase) * 0.004;
      this.vx *= 0.995;
      this.vy *= 0.995;
      this.x += this.vx;
      this.y += this.vy;
      if (this.x < -40) this.x = w() + 40;
      if (this.x > w() + 40) this.x = -40;
      if (this.y < -40) this.y = h() + 40;
      if (this.y > h() + 40) this.y = -40;
      return pulse;
    }
    draw(pulse) {
      const [r, g, b] = this.color;
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.radius * pulse, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(${r},${g},${b},${this.alpha})`;
      ctx.fill();
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.radius * pulse * 3, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(${r},${g},${b},${this.alpha * 0.08})`;
      ctx.fill();
    }
  }

  function init() {
    particles = Array.from({ length: PARTICLE_COUNT }, () => new Particle());
  }

  function drawBackground() {
    ctx.fillStyle = 'rgba(2, 2, 24, 0.18)';
    ctx.fillRect(0, 0, w(), h());
  }

  function drawConnections() {
    for (let i = 0; i < particles.length; i++) {
      for (let j = i + 1; j < particles.length; j++) {
        const dx = particles[i].x - particles[j].x;
        const dy = particles[i].y - particles[j].y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < CONNECTION_DIST) {
          const alpha = (1 - dist / CONNECTION_DIST) * 0.25;
          const [r, g, b] = particles[i].color;
          ctx.beginPath();
          ctx.moveTo(particles[i].x, particles[i].y);
          ctx.lineTo(particles[j].x, particles[j].y);
          ctx.strokeStyle = `rgba(${r},${g},${b},${alpha})`;
          ctx.lineWidth = 0.5;
          ctx.stroke();
        }
      }
    }
  }

  function drawMouseAura() {
    if (mouse.x < 0 || mouse.y < 0) return;
    const grad = ctx.createRadialGradient(mouse.x, mouse.y, 0, mouse.x, mouse.y, MOUSE_RADIUS);
    grad.addColorStop(0, 'rgba(122,162,255,0.08)');
    grad.addColorStop(1, 'rgba(122,162,255,0)');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(mouse.x, mouse.y, MOUSE_RADIUS, 0, Math.PI * 2);
    ctx.fill();
  }

  function loop() {
    const now = performance.now();
    fps = fps * 0.95 + (1000 / (now - lastTime)) * 0.05;
    lastTime = now;
    frame++;
    if (frame % 10 === 0) {
      hud.textContent = `nodes: ${particles.length} · fps: ${Math.round(fps)}`;
    }
    drawBackground();
    drawMouseAura();
    drawConnections();
    particles.forEach(p => p.draw(p.update()));
    requestAnimationFrame(loop);
  }

  addEventListener('resize', () => {
    W = canvas.width = innerWidth * devicePixelRatio;
    H = canvas.height = innerHeight * devicePixelRatio;
    ctx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
    init();
  });

  addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });
  addEventListener('mouseleave', () => { mouse.x = -9999; mouse.y = -9999; });
  addEventListener('touchmove', e => {
    if (e.touches[0]) { mouse.x = e.touches[0].clientX; mouse.y = e.touches[0].clientY; }
  }, { passive: true });
  addEventListener('touchend', () => { mouse.x = -9999; mouse.y = -9999; });

  init();
  ctx.fillStyle = '#020218';
  ctx.fillRect(0, 0, w(), h());
  loop();
})();
</script>
</body>
</html>
