<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nebula Flow — Generative Art</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0f;
    overflow: hidden;
    font-family: 'SF Mono', 'Fira Code', monospace;
    cursor: crosshair;
  }
  canvas { display: block; }
  .info {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(255,255,255,0.4);
    font-size: 12px;
    letter-spacing: 0.5px;
    pointer-events: none;
    text-align: center;
  }
  .title {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(255,255,255,0.6);
    font-size: 14px;
    letter-spacing: 2px;
    pointer-events: none;
    text-transform: uppercase;
  }
</style>
</head>
<body>
<div class="title">✦ Nebula Flow ✦</div>
<canvas id="canvas"></canvas>
<div class="info">move your mouse · click to burst</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let W, H;
let particles = [];
let mouse = { x: W/2, y: H/2, active: false };
let time = 0;
const MAX_PARTICLES = 400;
const TRAIL_ALPHA = 0.03;

// Simplex-like noise approximation
function noise(x, y, t) {
  return Math.sin(x * 0.008 + t) * Math.cos(y * 0.006 + t * 0.7) +
         Math.sin((x + y) * 0.005 + t * 1.3) * 0.5 +
         Math.cos(x * 0.012 - y * 0.01 + t * 0.5) * 0.3;
}

function hsl(h, s, l, a) {
  return `hsla(${h}, ${s}%, ${l}%, ${a})`;
}

class Particle {
  constructor(x, y, burst = false) {
    this.x = x || Math.random() * W;
    this.y = y || Math.random() * H;
    this.vx = 0;
    this.vy = 0;
    this.hue = 200 + Math.random() * 120; // cyans to magentas
    this.life = 1;
    this.decay = 0.0008 + Math.random() * 0.002;
    this.size = 1 + Math.random() * 1.5;
    this.speed = 0.5 + Math.random() * 1.5;
    this.history = [];
    this.burst = burst;
    if (burst) {
      const angle = Math.random() * Math.PI * 2;
      const spd = 2 + Math.random() * 6;
      this.vx = Math.cos(angle) * spd;
      this.vy = Math.sin(angle) * spd;
      this.decay = 0.008 + Math.random() * 0.015;
      this.speed = 0;
    }
  }

  update(t) {
    if (!this.burst) {
      const angle = noise(this.x, this.y, t) * Math.PI * 4;
      this.vx += Math.cos(angle) * 0.15;
      this.vy += Math.sin(angle) * 0.15;

      // Mouse attraction
      if (mouse.active) {
        const dx = mouse.x - this.x;
        const dy = mouse.y - this.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < 200 && dist > 5) {
          const force = (200 - dist) / 200 * 0.3;
          this.vx += (dx / dist) * force;
          this.vy += (dy / dist) * force;
        }
      }

      // Damping
      this.vx *= 0.96;
      this.vy *= 0.96;

      // Speed limit
      const mag = Math.sqrt(this.vx * this.vx + this.vy * this.vy);
      if (mag > this.speed * 3) {
        this.vx = (this.vx / mag) * this.speed * 3;
        this.vy = (this.vy / mag) * this.speed * 3;
      }
    } else {
      this.vx *= 0.97;
      this.vy *= 0.97;
    }

    this.x += this.vx;
    this.y += this.vy;
    this.life -= this.decay;

    // Wrap around edges
    if (this.x < -10) this.x = W + 10;
    if (this.x > W + 10) this.x = -10;
    if (this.y < -10) this.y = H + 10;
    if (this.y > H + 10) this.y = -10;

    // Shift hue slowly
    this.hue += 0.05;
  }

  draw() {
    const alpha = this.life * 0.6;
    if (alpha < 0.01) return;

    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size * this.life, 0, Math.PI * 2);
    ctx.fillStyle = hsl(this.hue % 360, 80, 55 + this.life * 20, alpha);
    ctx.fill();

    // Glow
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size * this.life * 3, 0, Math.PI * 2);
    ctx.fillStyle = hsl(this.hue % 360, 90, 50, alpha * 0.15);
    ctx.fill();
  }
}

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}

function init() {
  resize();
  particles = [];
  for (let i = 0; i < MAX_PARTICLES; i++) {
    particles.push(new Particle());
  }
}

function burst(x, y) {
  for (let i = 0; i < 60; i++) {
    if (particles.length < 800) {
      particles.push(new Particle(x, y, true));
    }
  }
}

function drawConnections() {
  const maxDist = 80;
  for (let i = 0; i < particles.length; i += 3) { // sample for perf
    for (let j = i + 1; j < particles.length; j += 3) {
      const dx = particles[i].x - particles[j].x;
      const dy = particles[i].y - particles[j].y;
      const dist = dx * dx + dy * dy;
      if (dist < maxDist * maxDist) {
        const alpha = (1 - Math.sqrt(dist) / maxDist) * 0.15 * Math.min(particles[i].life, particles[j].life);
        ctx.beginPath();
        ctx.moveTo(particles[i].x, particles[i].y);
        ctx.lineTo(particles[j].x, particles[j].y);
        ctx.strokeStyle = hsl(particles[i].hue % 360, 70, 60, alpha);
        ctx.lineWidth = 0.5;
        ctx.stroke();
      }
    }
  }
}

function animate() {
  time += 0.005;

  // Trailing effect
  ctx.fillStyle = `rgba(10, 10, 15, ${TRAIL_ALPHA})`;
  ctx.fillRect(0, 0, W, H);

  // Update & draw particles
  for (let i = particles.length - 1; i >= 0; i--) {
    particles[i].update(time);
    particles[i].draw();
    if (particles[i].life <= 0) {
      particles.splice(i, 1);
    }
  }

  // Maintain particle count
  while (particles.filter(p => !p.burst).length < MAX_PARTICLES - 50) {
    particles.push(new Particle());
  }

  drawConnections();

  requestAnimationFrame(animate);
}

// Events
window.addEventListener('resize', resize);
window.addEventListener('mousemove', e => {
  mouse.x = e.clientX;
  mouse.y = e.clientY;
  mouse.active = true;
});
window.addEventListener('mouseleave', () => { mouse.active = false; });
window.addEventListener('click', e => burst(e.clientX, e.clientY));
window.addEventListener('touchstart', e => {
  mouse.x = e.touches[0].clientX;
  mouse.y = e.touches[0].clientY;
  mouse.active = true;
  burst(mouse.x, mouse.y);
});
window.addEventListener('touchmove', e => {
  mouse.x = e.touches[0].clientX;
  mouse.y = e.touches[0].clientY;
});
window.addEventListener('touchend', () => { mouse.active = false; });

init();
animate();
</script>
</body>
</html>
