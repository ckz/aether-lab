<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nebula Lattice</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0f;
    overflow: hidden;
    font-family: 'Courier New', monospace;
    color: #aab;
    height: 100vh;
    width: 100vw;
  }
  canvas {
    display: block;
    position: fixed;
    top: 0; left: 0;
  }
  #info {
    position: fixed;
    bottom: 20px;
    left: 20px;
    z-index: 10;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    opacity: 0.5;
    pointer-events: none;
  }
  #title {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    z-index: 10;
    font-size: 14px;
    letter-spacing: 6px;
    text-transform: uppercase;
    opacity: 0;
    pointer-events: none;
    transition: opacity 2s ease;
  }
  #title.visible { opacity: 0.4; }
</style>
</head>
<body>
<canvas id="canvas"></canvas>
<div id="info">move mouse · click to pulse</div>
<div id="title">nebula lattice</div>
<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let W, H;
function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

const mouse = { x: W / 2, y: H / 2, active: false };
window.addEventListener('mousemove', e => {
  mouse.x = e.clientX;
  mouse.y = e.clientY;
  mouse.active = true;
});
window.addEventListener('mouseleave', () => mouse.active = false);
window.addEventListener('click', () => {
  pulseCount = 40;
  pulseOrigin = { x: mouse.x, y: mouse.y };
});

// Star field
const stars = [];
const NUM_STARS = 200;
for (let i = 0; i < NUM_STARS; i++) {
  stars.push({
    x: Math.random() * W,
    y: Math.random() * H,
    vx: (Math.random() - 0.5) * 0.3,
    vy: (Math.random() - 0.5) * 0.3,
    size: Math.random() * 1.5 + 0.5,
    brightness: Math.random(),
    phase: Math.random() * Math.PI * 2,
    hue: Math.random() < 0.3 ? 200 + Math.random() * 40 : 280 + Math.random() * 60
  });
}

let pulseCount = 0;
let pulseOrigin = { x: 0, y: 0 };
let time = 0;

function draw() {
  time += 0.005;
  
  // Trail effect
  ctx.fillStyle = 'rgba(10, 10, 15, 0.15)';
  ctx.fillRect(0, 0, W, H);
  
  // Pulse wave
  if (pulseCount > 0) {
    pulseCount--;
    const radius = (40 - pulseCount) * 8;
    const alpha = pulseCount / 40;
    ctx.beginPath();
    ctx.arc(pulseOrigin.x, pulseOrigin.y, radius, 0, Math.PI * 2);
    ctx.strokeStyle = `hsla(220, 80%, 70%, ${alpha * 0.4})`;
    ctx.lineWidth = 2;
    ctx.stroke();
  }
  
  // Mouse glow
  if (mouse.active) {
    const glow = ctx.createRadialGradient(mouse.x, mouse.y, 0, mouse.x, mouse.y, 150);
    glow.addColorStop(0, 'rgba(100, 140, 220, 0.05)');
    glow.addColorStop(1, 'rgba(100, 140, 220, 0)');
    ctx.fillStyle = glow;
    ctx.fillRect(mouse.x - 150, mouse.y - 150, 300, 300);
  }
  
  // Update and draw stars
  for (let i = 0; i < stars.length; i++) {
    const s = stars[i];
    s.x += s.vx + Math.sin(time + s.phase) * 0.1;
    s.y += s.vy + Math.cos(time + s.phase) * 0.1;
    
    // Wrap around
    if (s.x < 0) s.x = W;
    if (s.x > W) s.x = 0;
    if (s.y < 0) s.y = H;
    if (s.y > H) s.y = 0;
    
    // Twinkle
    const twinkle = 0.5 + 0.5 * Math.sin(time * 2 + s.phase);
    const alpha = (s.brightness * 0.6 + twinkle * 0.4);
    
    // Draw star
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
    ctx.fillStyle = `hsla(${s.hue}, 70%, 80%, ${alpha})`;
    ctx.fill();
    
    // Connect nearby stars
    for (let j = i + 1; j < stars.length; j++) {
      const t = stars[j];
      const dx = s.x - t.x;
      const dy = s.y - t.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      const connectDist = 100 + Math.sin(time + i) * 20;
      
      if (dist < connectDist) {
        const lineAlpha = (1 - dist / connectDist) * 0.15 * alpha;
        ctx.beginPath();
        ctx.moveTo(s.x, s.y);
        ctx.lineTo(t.x, t.y);
        ctx.strokeStyle = `hsla(${(s.hue + t.hue) / 2}, 60%, 70%, ${lineAlpha})`;
        ctx.lineWidth = 0.5;
        ctx.stroke();
      }
    }
  }
  
  // Nebula background blobs
  for (let i = 0; i < 3; i++) {
    const bx = W * (0.2 + i * 0.3) + Math.sin(time + i) * 100;
    const by = H * 0.5 + Math.cos(time * 0.7 + i) * 80;
    const radius = 200 + i * 50;
    const nebula = ctx.createRadialGradient(bx, by, 0, bx, by, radius);
    const hue = 200 + i * 40;
    nebula.addColorStop(0, `hsla(${hue}, 80%, 50%, 0.02)`);
    nebula.addColorStop(1, `hsla(${hue}, 80%, 50%, 0)`);
    ctx.fillStyle = nebula;
    ctx.beginPath();
    ctx.arc(bx, by, radius, 0, Math.PI * 2);
    ctx.fill();
  }
  
  requestAnimationFrame(draw);
}

draw();

// Show title briefly
setTimeout(() => document.getElementById('title').classList.add('visible'), 100);
setTimeout(() => document.getElementById('title').classList.remove('visible'), 5000);
</script>
</body>
</html>
