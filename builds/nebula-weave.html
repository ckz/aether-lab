<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nebula Weave — Generative Flow</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #05060f;
    overflow: hidden;
    font-family: 'Courier New', monospace;
    cursor: crosshair;
  }
  canvas { display: block; }
  #hud {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(180, 200, 255, 0.7);
    font-size: 12px;
    letter-spacing: 0.15em;
    text-align: center;
    pointer-events: none;
    text-shadow: 0 0 8px rgba(100, 140, 255, 0.5);
    transition: opacity 3s;
  }
  #title {
    position: fixed;
    top: 32px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(200, 180, 255, 0.6);
    font-size: 13px;
    letter-spacing: 0.4em;
    pointer-events: none;
    text-shadow: 0 0 12px rgba(140, 100, 255, 0.4);
  }
</style>
</head>
<body>
<div id="title">✦ NEBULA WEAVE ✦</div>
<canvas id="c"></canvas>
<div id="hud">move your cursor to sculpt the flow · click to pulse · scroll to shift hue</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H, DPR = Math.min(window.devicePixelRatio || 1, 2);

function resize() {
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = W * DPR;
  canvas.height = H * DPR;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
}
resize();
window.addEventListener('resize', resize);

// State
let mouse = { x: W / 2, y: H / 2, active: false };
let hueShift = 0;
let time = 0;

// Particles
const PARTICLE_COUNT = 600;
const particles = [];

class Particle {
  constructor() { this.reset(true); }
  reset(initial = false) {
    this.x = initial ? Math.random() * W : Math.random() * W;
    this.y = initial ? Math.random() * H : Math.random() * H;
    this.vx = 0;
    this.vy = 0;
    this.life = initial ? Math.random() * 300 : 200 + Math.random() * 200;
    this.maxLife = this.life;
    this.size = 0.5 + Math.random() * 1.8;
    this.hueOffset = Math.random() * 60 - 30;
    this.speed = 0.4 + Math.random() * 0.8;
    this.trail = [];
    this.trailMax = 6 + Math.floor(Math.random() * 10);
  }
  update() {
    // Flow field using simplex-like noise approximation
    const scale = 0.003;
    const angle = this.flowAngle(this.x, this.y, time * 0.0003);
    
    // Mouse influence — gentle attraction with swirl
    if (mouse.active) {
      const dx = mouse.x - this.x;
      const dy = mouse.y - this.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      const radius = 200;
      if (dist < radius) {
        const force = (1 - dist / radius) * 0.06;
        const swirl = Math.atan2(dy, dx) + Math.PI * 0.5;
        this.vx += Math.cos(swirl) * force + dx * force * 0.3;
        this.vy += Math.sin(swirl) * force + dy * force * 0.3;
      }
    }
    
    this.vx += Math.cos(angle) * this.speed * 0.15;
    this.vy += Math.sin(angle) * this.speed * 0.15;
    
    // Damping
    this.vx *= 0.96;
    this.vy *= 0.96;
    
    this.trail.push({ x: this.x, y: this.y });
    if (this.trail.length > this.trailMax) this.trail.shift();
    
    this.x += this.vx;
    this.y += this.vy;
    this.life--;
    
    // Wrap
    if (this.x < -20) this.x = W + 20;
    if (this.x > W + 20) this.x = -20;
    if (this.y < -20) this.y = H + 20;
    if (this.y > H + 20) this.y = -20;
    
    if (this.life <= 0) this.reset();
  }
  flowAngle(x, y, t) {
    // Pseudo-noise using sin composition
    const n1 = Math.sin(x * 0.01 + t) + Math.cos(y * 0.013 - t * 0.7);
    const n2 = Math.sin((x + y) * 0.007 + t * 1.3);
    const n3 = Math.cos(x * 0.019 - y * 0.011 + t * 0.5);
    return (n1 + n2 * 0.7 + n3 * 0.5) * Math.PI + hueShift * 0.01;
  }
  draw() {
    const alpha = Math.min(1, this.life / 80) * 0.7;
    const hue = (210 + hueShift + this.hueOffset) % 360;
    const sat = 70 + Math.sin(time * 0.001 + this.x * 0.01) * 20;
    
    // Trail
    if (this.trail.length > 1) {
      ctx.beginPath();
      ctx.moveTo(this.trail[0].x, this.trail[0].y);
      for (let i = 1; i < this.trail.length; i++) {
        ctx.lineTo(this.trail[i].x, this.trail[i].y);
      }
      ctx.strokeStyle = `hsla(${hue}, ${sat}%, 65%, ${alpha * 0.25})`;
      ctx.lineWidth = this.size * 0.6;
      ctx.stroke();
    }
    
    // Head glow
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fillStyle = `hsla(${hue}, ${sat}%, 75%, ${alpha})`;
    ctx.fill();
    
    // Soft halo
    if (this.size > 1.2) {
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.size * 2.5, 0, Math.PI * 2);
      ctx.fillStyle = `hsla(${hue}, ${sat}%, 60%, ${alpha * 0.08})`;
      ctx.fill();
    }
  }
}

// Initialize particles
for (let i = 0; i < PARTICLE_COUNT; i++) particles.push(new Particle());

// Pulse rings on click
const pulses = [];
canvas.addEventListener('mousedown', (e) => {
  pulses.push({ x: e.clientX, y: e.clientY, r: 0, maxR: 250, life: 1 });
  // Burst nearby particles
  particles.forEach(p => {
    const dx = p.x - e.clientX;
    const dy = p.y - e.clientY;
    const dist = Math.sqrt(dx * dx + dy * dy);
    if (dist < 250) {
      const force = (1 - dist / 250) * 4;
      p.vx += (dx / dist) * force;
      p.vy += (dy / dist) * force;
    }
  });
});

canvas.addEventListener('mousemove', (e) => {
  mouse.x = e.clientX;
  mouse.y = e.clientY;
  mouse.active = true;
});
canvas.addEventListener('mouseleave', () => { mouse.active = false; });

canvas.addEventListener('wheel', (e) => {
  hueShift = (hueShift + e.deltaY * 0.1 + 360) % 360;
});

// Touch support
canvas.addEventListener('touchmove', (e) => {
  e.preventDefault();
  mouse.x = e.touches[0].clientX;
  mouse.y = e.touches[0].clientY;
  mouse.active = true;
}, { passive: false });
canvas.addEventListener('touchstart', (e) => {
  mouse.x = e.touches[0].clientX;
  mouse.y = e.touches[0].clientY;
  mouse.active = true;
  pulses.push({ x: mouse.x, y: mouse.y, r: 0, maxR: 250, life: 1 });
});
canvas.addEventListener('touchend', () => { mouse.active = false; });

// Fade overlay for trails
function drawBackground() {
  ctx.fillStyle = 'rgba(5, 6, 15, 0.12)';
  ctx.fillRect(0, 0, W, H);
}

// Pulse rings
function drawPulses() {
  for (let i = pulses.length - 1; i >= 0; i--) {
    const p = pulses[i];
    p.r += 3;
    p.life -= 0.015;
    if (p.life <= 0) { pulses.splice(i, 1); continue; }
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.strokeStyle = `hsla(${(220 + hueShift) % 360}, 80%, 70%, ${p.life * 0.4})`;
    ctx.lineWidth = 1.5 * p.life;
    ctx.stroke();
  }
}

// Ambient glow at mouse
function drawMouseGlow() {
  if (!mouse.active) return;
  const grad = ctx.createRadialGradient(mouse.x, mouse.y, 0, mouse.x, mouse.y, 120);
  const hue = (230 + hueShift) % 360;
  grad.addColorStop(0, `hsla(${hue}, 80%, 60%, 0.06)`);
  grad.addColorStop(1, `hsla(${hue}, 80%, 40%, 0)`);
  ctx.fillStyle = grad;
  ctx.fillRect(mouse.x - 150, mouse.y - 150, 300, 300);
}

// Main loop
function animate() {
  time++;
  drawBackground();
  drawMouseGlow();
  
  particles.forEach(p => {
    p.update();
    p.draw();
  });
  
  drawPulses();
  requestAnimationFrame(animate);
}

// Initial full clear
ctx.fillStyle = '#05060f';
ctx.fillRect(0, 0, W, H);

animate();

// Fade hud
setTimeout(() => {
  document.getElementById('hud').style.opacity = '0.3';
}, 8000);
</script>
</body>
</html>
