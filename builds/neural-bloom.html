<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neural Bloom</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #0a0a0f;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  font-family: 'Courier New', monospace;
  overflow: hidden;
  cursor: crosshair;
}
#canvas { display: block; }
.overlay {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  color: #444;
  font-size: 11px;
  text-align: center;
  pointer-events: none;
  letter-spacing: 2px;
}
.overlay span { color: #888; }
</style>
</head>
<body>
<canvas id="canvas"></canvas>
<div class="overlay">NEURAL BLOOM <span>|</span> CLICK TO SEED</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];
let seeds = [];
let mouse = { x: canvas.width/2, y: canvas.height/2 };
let time = 0;

const HUE_BASE = 200 + Math.random() * 60;

class Seed {
  constructor(x, y) {
    this.x = x; this.y = y;
    this.energy = 200;
    this.hue = HUE_BASE + Math.random() * 80 - 40;
    this.particles = [];
    for (let i = 0; i < 35; i++) {
      const angle = Math.random() * Math.PI * 2;
      const speed = 0.3 + Math.random() * 1.5;
      this.particles.push({
        x: x, y: y,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        life: 1,
        size: 1 + Math.random() * 2.5,
        angle: angle,
        drift: (Math.random() - 0.5) * 0.02
      });
    }
  }
  update() {
    this.energy--;
    let alive = false;
    for (const p of this.particles) {
      if (p.life <= 0) continue;
      alive = true;
      p.angle += p.drift + Math.sin(time * 0.01 + p.x * 0.005) * 0.015;
      p.vx += Math.cos(p.angle) * 0.015;
      p.vy += Math.sin(p.angle) * 0.015;
      p.vx *= 0.985; p.vy *= 0.985;
      p.x += p.vx; p.y += p.vy;
      p.life -= 0.0015;
    }
    return alive && this.energy > 0;
  }
  draw() {
    for (const p of this.particles) {
      if (p.life <= 0) continue;
      const alpha = p.life * 0.8;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
      ctx.fillStyle = `hsla(${this.hue + p.x * 0.02}, 85%, 65%, ${alpha})`;
      ctx.fill();
      if (Math.random() < 0.008 * p.life) {
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size * 2.5 * p.life, 0, Math.PI * 2);
        ctx.fillStyle = `hsla(${this.hue}, 90%, 80%, ${alpha * 0.25})`;
        ctx.fill();
      }
    }
  }
}

class Drifter {
  constructor() {
    this.x = Math.random() * canvas.width;
    this.y = Math.random() * canvas.height;
    this.vx = (Math.random() - 0.5) * 0.4;
    this.vy = (Math.random() - 0.5) * 0.4;
    this.size = 0.5 + Math.random() * 1.5;
    this.phase = Math.random() * Math.PI * 2;
  }
  update() {
    this.x += this.vx + Math.sin(time * 0.005 + this.phase) * 0.2;
    this.y += this.vy + Math.cos(time * 0.004 + this.phase) * 0.2;
    if (this.x < 0) this.x = canvas.width;
    if (this.x > canvas.width) this.x = 0;
    if (this.y < 0) this.y = canvas.height;
    if (this.y > canvas.height) this.y = 0;
  }
  draw() {
    const a = 0.15 + Math.sin(time * 0.02 + this.phase) * 0.1;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fillStyle = `hsla(220, 40%, 75%, ${a})`;
    ctx.fill();
  }
}

let drifters = Array.from({length: 80}, () => new Drifter());

function drawConnections() {
  for (let i = 0; i < drifters.length; i++) {
    for (let j = i + 1; j < drifters.length; j++) {
      const dx = drifters[i].x - drifters[j].x;
      const dy = drifters[i].y - drifters[j].y;
      const dist = Math.sqrt(dx*dx + dy*dy);
      if (dist < 120) {
        ctx.beginPath();
        ctx.moveTo(drifters[i].x, drifters[i].y);
        ctx.lineTo(drifters[j].x, drifters[j].y);
        ctx.strokeStyle = `hsla(220, 30%, 55%, ${0.08 * (1 - dist/120)})`;
        ctx.lineWidth = 0.5;
        ctx.stroke();
      }
    }
  }
}

canvas.addEventListener('mousemove', e => {
  mouse.x = e.clientX; mouse.y = e.clientY;
  if (Math.random() < 0.3) {
    seeds.push(new Seed(e.clientX, e.clientY));
  }
});

canvas.addEventListener('click', e => {
  const count = 3 + Math.floor(Math.random() * 4);
  for (let i = 0; i < count; i++) {
    const ox = e.clientX + (Math.random() - 0.5) * 80;
    const oy = e.clientY + (Math.random() - 0.5) * 80;
    seeds.push(new Seed(ox, oy));
  }
});

function animate() {
  time++;
  ctx.fillStyle = 'rgba(10, 10, 18, 0.12)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  if (Math.random() < 0.05) {
    ctx.fillStyle = `hsla(${HUE_BASE}, 20%, 8%, 0.3)`;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
  }
  if (time % 40 === 0 && seeds.length < 40) {
    seeds.push(new Seed(
      Math.random() * canvas.width,
      Math.random() * canvas.height
    ));
  }
  drifters.forEach(d => { d.update(); d.draw(); });
  drawConnections();
  seeds = seeds.filter(s => { s.draw(); return s.update(); });
  requestAnimationFrame(animate);
}

window.addEventListener('resize', () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  drifters = Array.from({length: 80}, () => new Drifter());
});

animate();
</script>
</body>
</html>
