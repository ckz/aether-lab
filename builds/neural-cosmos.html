<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neural Cosmos — Generative Visualization</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #05060f;
    overflow: hidden;
    font-family: 'Courier New', monospace;
    color: #c8d6e5;
    height: 100vh;
    cursor: crosshair;
  }
  canvas {
    display: block;
    position: fixed;
    top: 0; left: 0;
    z-index: 1;
  }
  .overlay {
    position: fixed;
    z-index: 10;
    bottom: 24px;
    left: 24px;
    pointer-events: none;
  }
  .title {
    font-size: 11px;
    letter-spacing: 6px;
    text-transform: uppercase;
    color: #4a69bd;
    opacity: 0.8;
  }
  .subtitle {
    font-size: 9px;
    letter-spacing: 3px;
    color: #6a89cc;
    opacity: 0.5;
    margin-top: 4px;
  }
  .stats {
    position: fixed;
    z-index: 10;
    top: 20px;
    right: 24px;
    text-align: right;
    font-size: 9px;
    letter-spacing: 2px;
    color: #3c4f7a;
    opacity: 0.6;
    pointer-events: none;
  }
  .instruction {
    position: fixed;
    z-index: 10;
    top: 20px;
    left: 24px;
    font-size: 9px;
    letter-spacing: 2px;
    color: #3c4f7a;
    opacity: 0.5;
    pointer-events: none;
  }
  .pulse-ring {
    position: fixed;
    border-radius: 50%;
    border: 1px solid rgba(74, 105, 189, 0.3);
    pointer-events: none;
    z-index: 5;
    animation: pulse 2s ease-out forwards;
  }
  @keyframes pulse {
    0% { transform: translate(-50%, -50%) scale(0); opacity: 1; }
    100% { transform: translate(-50%, -50%) scale(3); opacity: 0; }
  }
</style>
</head>
<body>

<canvas id="c"></canvas>

<div class="instruction">MOVE · CLICK · WATCH</div>
<div class="stats" id="stats">NODES: 0<br>CONNECTIONS: 0<br>GENERATION: 0</div>
<div class="overlay">
  <div class="title">Neural Cosmos</div>
  <div class="subtitle">generative field · v∞</div>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H;
let nodes = [];
let mouse = { x: -1000, y: -1000, active: false };
let generation = 0;
let connectionsDrawn = 0;

const CONFIG = {
  nodeCount: 90,
  maxDist: 140,
  mouseRadius: 200,
  colors: [
    { r: 74,  g: 105, b: 189 },  // blue
    { r: 106, g: 137, b: 204 },  // light blue
    { r: 72,  g: 219, b: 251 },  // cyan
    { r: 155, g: 89,  b: 182 },  // purple
    { r: 52,  g: 152, b: 219 },  // deep blue
  ],
  baseSpeed: 0.3,
  pulseSpeed: 0.02
};

class Node {
  constructor(x, y) {
    this.x = x || Math.random() * W;
    this.y = y || Math.random() * H;
    this.vx = (Math.random() - 0.5) * CONFIG.baseSpeed;
    this.vy = (Math.random() - 0.5) * CONFIG.baseSpeed;
    this.radius = Math.random() * 2 + 1;
    this.baseRadius = this.radius;
    this.color = CONFIG.colors[Math.floor(Math.random() * CONFIG.colors.length)];
    this.phase = Math.random() * Math.PI * 2;
    this.pulseOffset = Math.random() * 100;
    this.energy = 0;
    this.trail = [];
  }

  update(t) {
    this.phase += CONFIG.pulseSpeed;
    this.radius = this.baseRadius + Math.sin(this.phase) * 0.5;

    // drift
    this.x += this.vx;
    this.y += this.vy;

    // soft wrap
    if (this.x < -20) this.x = W + 20;
    if (this.x > W + 20) this.x = -20;
    if (this.y < -20) this.y = H + 20;
    if (this.y > H + 20) this.y = -20;

    // mouse attraction / repulsion
    if (mouse.active) {
      const dx = this.x - mouse.x;
      const dy = this.y - mouse.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < CONFIG.mouseRadius) {
        const force = (1 - dist / CONFIG.mouseRadius) * 0.03;
        this.vx += (dx / dist) * force;
        this.vy += (dy / dist) * force;
        this.energy = Math.min(1, this.energy + 0.1);
      } else {
        this.energy *= 0.95;
      }
    } else {
      this.energy *= 0.95;
    }

    // dampen
    this.vx *= 0.999;
    this.vy *= 0.999;

    // speed limit
    const speed = Math.sqrt(this.vx * this.vx + this.vy * this.vy);
    if (speed > 2) {
      this.vx = (this.vx / speed) * 2;
      this.vy = (this.vy / speed) * 2;
    }

    // trail
    if (this.energy > 0.2) {
      this.trail.push({ x: this.x, y: this.y, life: 1 });
    }
    this.trail = this.trail.filter(t => {
      t.life -= 0.03;
      return t.life > 0;
    });
  }

  draw() {
    const { r, g, b } = this.color;
    const alpha = 0.6 + this.energy * 0.4;

    // trail
    if (this.trail.length > 1) {
      ctx.beginPath();
      ctx.moveTo(this.trail[0].x, this.trail[0].y);
      for (let i = 1; i < this.trail.length; i++) {
        ctx.lineTo(this.trail[i].x, this.trail[i].y);
      }
      ctx.strokeStyle = `rgba(${r},${g},${b},${alpha * 0.2})`;
      ctx.lineWidth = this.radius * 0.5;
      ctx.stroke();
    }

    // glow
    const gradient = ctx.createRadialGradient(
      this.x, this.y, 0,
      this.x, this.y, this.radius * 4
    );
    gradient.addColorStop(0, `rgba(${r},${g},${b},${alpha})`);
    gradient.addColorStop(1, `rgba(${r},${g},${b},0)`);
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.radius * 4, 0, Math.PI * 2);
    ctx.fillStyle = gradient;
    ctx.fill();

    // core
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(${Math.min(255, r+80)},${Math.min(255, g+80)},${Math.min(255, b+80)},${alpha})`;
    ctx.fill();
  }
}

function init() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  nodes = [];
  for (let i = 0; i < CONFIG.nodeCount; i++) {
    nodes.push(new Node());
  }
  generation++;
}

function drawConnections() {
  let count = 0;
  for (let i = 0; i < nodes.length; i++) {
    for (let j = i + 1; j < nodes.length; j++) {
      const dx = nodes[i].x - nodes[j].x;
      const dy = nodes[i].y - nodes[j].y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < CONFIG.maxDist) {
        const opacity = (1 - dist / CONFIG.maxDist) * 0.25;
        const c1 = nodes[i].color;
        const c2 = nodes[j].color;
        const mr = Math.round((c1.r + c2.r) / 2);
        const mg = Math.round((c1.g + c2.g) / 2);
        const mb = Math.round((c1.b + c2.b) / 2);

        const energyBoost = (nodes[i].energy + nodes[j].energy) * 0.5;

        ctx.beginPath();
        ctx.moveTo(nodes[i].x, nodes[i].y);
        ctx.lineTo(nodes[j].x, nodes[j].y);
        ctx.strokeStyle = `rgba(${mr},${mg},${mb},${opacity + energyBoost * 0.3})`;
        ctx.lineWidth = 0.5 + energyBoost * 1.5;
        ctx.stroke();
        count++;
      }
    }
  }
  connectionsDrawn = count;
}

function drawMouseField() {
  if (!mouse.active) return;
  const gradient = ctx.createRadialGradient(
    mouse.x, mouse.y, 0,
    mouse.x, mouse.y, CONFIG.mouseRadius
  );
  gradient.addColorStop(0, 'rgba(72, 219, 251, 0.08)');
  gradient.addColorStop(0.5, 'rgba(74, 105, 189, 0.04)');
  gradient.addColorStop(1, 'rgba(74, 105, 189, 0)');
  ctx.beginPath();
  ctx.arc(mouse.x, mouse.y, CONFIG.mouseRadius, 0, Math.PI * 2);
  ctx.fillStyle = gradient;
  ctx.fill();
}

function animate(t) {
  ctx.fillStyle = 'rgba(5, 6, 15, 0.15)';
  ctx.fillRect(0, 0, W, H);

  drawMouseField();
  drawConnections();

  nodes.forEach(n => {
    n.update(t);
    n.draw();
  });

  // stats
  document.getElementById('stats').innerHTML =
    `NODES: ${nodes.length}<br>CONNECTIONS: ${connectionsDrawn}<br>GENERATION: ${generation}`;

  requestAnimationFrame(animate);
}

// events
canvas.addEventListener('mousemove', e => {
  mouse.x = e.clientX;
  mouse.y = e.clientY;
  mouse.active = true;
});

canvas.addEventListener('mouseleave', () => {
  mouse.active = false;
});

canvas.addEventListener('click', e => {
  // spawn burst of nodes
  for (let i = 0; i < 5; i++) {
    const angle = Math.random() * Math.PI * 2;
    const dist = Math.random() * 30;
    nodes.push(new Node(
      e.clientX + Math.cos(angle) * dist,
      e.clientY + Math.sin(angle) * dist
    ));
  }
  // cap total nodes
  if (nodes.length > 200) {
    nodes.splice(0, nodes.length - 200);
  }
  generation++;
  spawnPulse(e.clientX, e.clientY);
});

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  const touch = e.touches[0];
  mouse.x = touch.clientX;
  mouse.y = touch.clientY;
  mouse.active = true;
}, { passive: false });

canvas.addEventListener('touchend', () => {
  mouse.active = false;
});

function spawnPulse(x, y) {
  const ring = document.createElement('div');
  ring.className = 'pulse-ring';
  ring.style.left = x + 'px';
  ring.style.top = y + 'px';
  ring.style.width = '40px';
  ring.style.height = '40px';
  document.body.appendChild(ring);
  setTimeout(() => ring.remove(), 2000);
}

window.addEventListener('resize', () => {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
});

init();
requestAnimationFrame(animate);
</script>

</body>
</html>
