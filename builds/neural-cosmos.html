<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neural Cosmos — Generative Art</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0f;
    overflow: hidden;
    font-family: 'Courier New', monospace;
    cursor: crosshair;
  }
  canvas { display: block; }
  #ui {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(255,255,255,0.4);
    font-size: 12px;
    letter-spacing: 2px;
    text-transform: uppercase;
    pointer-events: none;
    z-index: 10;
  }
  #title {
    position: fixed;
    top: 30px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(255,255,255,0.08);
    font-size: 14px;
    letter-spacing: 8px;
    text-transform: uppercase;
    pointer-events: none;
    z-index: 10;
    white-space: nowrap;
  }
</style>
</head>
<body>
<div id="title">Neural Cosmos</div>
<canvas id="canvas"></canvas>
<div id="ui">move mouse to create · click to burst · scroll to shift</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

let W, H;
function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

const mouse = { x: W/2, y: H/2, active: false };
window.addEventListener('mousemove', e => {
  mouse.x = e.clientX;
  mouse.y = e.clientY;
  mouse.active = true;
});
window.addEventListener('mouseleave', () => mouse.active = false);
window.addEventListener('click', e => burst(e.clientX, e.clientY));
window.addEventListener('touchmove', e => {
  e.preventDefault();
  mouse.x = e.touches[0].clientX;
  mouse.y = e.touches[0].clientY;
  mouse.active = true;
}, { passive: false });
window.addEventListener('touchstart', e => {
  burst(e.touches[0].clientX, e.touches[0].clientY);
});

const PALETTES = [
  ['#00d4ff', '#7b2fff', '#ff2d95', '#00ffc8'],
  ['#ff6b35', '#f7c548', '#2dd4bf', '#6366f1'],
  ['#f43f5e', '#8b5cf6', '#06b6d4', '#84cc16'],
  ['#e879f9', '#3b82f6', '#10b981', '#f97316'],
];
let palette = PALETTES[0];
let hueShift = 0;
window.addEventListener('wheel', e => {
  hueShift += e.deltaY * 0.01;
  const idx = Math.floor(Math.abs(hueShift) % PALETTES.length);
  palette = PALETTES[idx];
});

const MAX_NODES = 180;
const CONNECTION_DIST = 140;
const MOUSE_RADIUS = 200;

class Node {
  constructor(x, y, burst) {
    this.x = x || Math.random() * W;
    this.y = y || Math.random() * H;
    this.vx = burst ? (Math.random() - 0.5) * 6 : (Math.random() - 0.5) * 0.5;
    this.vy = burst ? (Math.random() - 0.5) * 6 : (Math.random() - 0.5) * 0.5;
    this.radius = burst ? Math.random() * 3 + 1 : Math.random() * 2 + 0.5;
    this.color = palette[Math.floor(Math.random() * palette.length)];
    this.life = 1;
    this.decay = burst ? 0.008 + Math.random() * 0.01 : 0;
    this.pulsePhase = Math.random() * Math.PI * 2;
    this.pulseSpeed = 0.02 + Math.random() * 0.03;
  }
  update() {
    this.x += this.vx;
    this.y += this.vy;
    this.vx *= 0.98;
    this.vy *= 0.98;
    if (!mouse.active) {
      this.vx += (Math.random() - 0.5) * 0.05;
      this.vy += (Math.random() - 0.5) * 0.05;
    }
    // Wrap
    if (this.x < -50) this.x = W + 50;
    if (this.x > W + 50) this.x = -50;
    if (this.y < -50) this.y = H + 50;
    if (this.y > H + 50) this.y = -50;
    this.life -= this.decay;
    this.pulsePhase += this.pulseSpeed;
  }
  draw() {
    const pulse = 1 + Math.sin(this.pulsePhase) * 0.3;
    const alpha = this.life * (0.6 + Math.sin(this.pulsePhase) * 0.4);
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.radius * pulse, 0, Math.PI * 2);
    ctx.fillStyle = this.color;
    ctx.globalAlpha = alpha;
    ctx.fill();
    // glow
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.radius * pulse * 3, 0, Math.PI * 2);
    ctx.fillStyle = this.color;
    ctx.globalAlpha = alpha * 0.1;
    ctx.fill();
    ctx.globalAlpha = 1;
  }
}

let nodes = [];
for (let i = 0; i < 80; i++) nodes.push(new Node());

function burst(x, y) {
  const count = 25;
  for (let i = 0; i < count; i++) {
    if (nodes.length < MAX_NODES + count) {
      nodes.push(new Node(x, y, true));
    }
  }
}

let frame = 0;
function animate() {
  // Fade trail
  ctx.fillStyle = 'rgba(10, 10, 15, 0.12)';
  ctx.fillRect(0, 0, W, H);

  // Add ambient nodes
  if (nodes.length < 80 && frame % 10 === 0) {
    nodes.push(new Node());
  }

  // Mouse gravity
  nodes.forEach(n => {
    if (mouse.active) {
      const dx = mouse.x - n.x;
      const dy = mouse.y - n.y;
      const dist = Math.sqrt(dx*dx + dy*dy);
      if (dist < MOUSE_RADIUS) {
        const force = (MOUSE_RADIUS - dist) / MOUSE_RADIUS * 0.02;
        n.vx += dx * force;
        n.vy += dy * force;
      }
    }
  });

  // Update & cull
  nodes = nodes.filter(n => n.life > 0);
  nodes.forEach(n => n.update());

  // Connections
  for (let i = 0; i < nodes.length; i++) {
    for (let j = i + 1; j < nodes.length; j++) {
      const dx = nodes[i].x - nodes[j].x;
      const dy = nodes[i].y - nodes[j].y;
      const dist = Math.sqrt(dx*dx + dy*dy);
      if (dist < CONNECTION_DIST) {
        const alpha = (1 - dist / CONNECTION_DIST) * 0.3;
        ctx.beginPath();
        ctx.moveTo(nodes[i].x, nodes[i].y);
        ctx.lineTo(nodes[j].x, nodes[j].y);
        ctx.strokeStyle = `rgba(100, 200, 255, ${alpha})`;
        ctx.lineWidth = 0.5;
        ctx.stroke();
      }
    }
  }

  // Mouse connections
  if (mouse.active) {
    nodes.forEach(n => {
      const dx = mouse.x - n.x;
      const dy = mouse.y - n.y;
      const dist = Math.sqrt(dx*dx + dy*dy);
      if (dist < MOUSE_RADIUS) {
        const alpha = (1 - dist / MOUSE_RADIUS) * 0.5;
        ctx.beginPath();
        ctx.moveTo(n.x, n.y);
        ctx.lineTo(mouse.x, mouse.y);
        ctx.strokeStyle = `rgba(255, 255, 255, ${alpha})`;
        ctx.lineWidth = 0.3;
        ctx.stroke();
      }
    });
  }

  // Draw
  nodes.forEach(n => n.draw());

  frame++;
  requestAnimationFrame(animate);
}
animate();
</script>
</body>
</html>
