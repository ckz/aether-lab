<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nocturne — Generative City Skyline</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  body {
    background: #0a0a14;
    overflow: hidden;
    font-family: -apple-system, system-ui, sans-serif;
    color: #aab;
    cursor: crosshair;
  }
  
  canvas { display: block; }
  
  .overlay {
    position: fixed;
    top: 1.2rem;
    left: 50%;
    transform: translateX(-50%);
    text-align: center;
    pointer-events: none;
    z-index: 10;
  }
  
  .overlay h1 {
    font-size: 1.1rem;
    font-weight: 300;
    letter-spacing: 0.5em;
    color: rgba(255, 255, 255, 0.6);
    text-transform: uppercase;
  }
  
  .overlay p {
    font-size: 0.7rem;
    letter-spacing: 0.3em;
    color: rgba(255, 255, 255, 0.3);
    margin-top: 0.3rem;
    text-transform: uppercase;
  }
  
  .stats {
    position: fixed;
    bottom: 1rem;
    left: 1rem;
    font-size: 0.65rem;
    color: rgba(255, 255, 255, 0.3);
    letter-spacing: 0.1em;
    z-index: 10;
  }
</style>
</head>
<body>

<div class="overlay">
  <h1>Nocturne</h1>
  <p>click to launch fireworks · space to reshuffle</p>
</div>

<div class="stats" id="stats"></div>

<canvas id="c"></canvas>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

let W, H, groundY;
let buildings = [];
let stars = [];
let clouds = [];
let fireworks = [];
let sparks = [];
let shootingStars = [];
let frame = 0;
let seed = Math.random() * 10000;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  groundY = H * 0.88;
}

// Simple seeded RNG
function seededRandom(s) {
  let x = Math.sin(s * 127.1 + 311.7) * 43758.5453;
  return x - Math.floor(x);
}

function init() {
  seed = Math.random() * 10000;
  buildings = [];
  stars = [];
  clouds = [];
  fireworks = [];
  sparks = [];
  shootingStars = [];
  
  // Stars
  for (let i = 0; i < 300; i++) {
    stars.push({
      x: seededRandom(seed + i) * W,
      y: seededRandom(seed + i + 1000) * H * 0.6,
      r: seededRandom(seed + i + 2000) * 1.5 + 0.3,
      twinkleSpeed: seededRandom(seed + i + 3000) * 0.05 + 0.01,
      twinkleOffset: seededRandom(seed + i + 4000) * Math.PI * 2
    });
  }
  
  // Buildings — layered depth
  const layers = [
    { count: 25, yBase: 0.75, heightRange: [0.08, 0.18], widthRange: [30, 70], speed: 0.05, color: [25, 30, 45] },
    { count: 20, yBase: 0.80, heightRange: [0.12, 0.22], widthRange: [40, 90], speed: 0.15, color: [20, 25, 40] },
    { count: 15, yBase: 0.85, heightRange: [0.18, 0.30], widthRange: [60, 130], speed: 0.3, color: [15, 18, 32] }
  ];
  
  layers.forEach((layer, li) => {
    let x = 0;
    for (let i = 0; i < layer.count; i++) {
      const w = seededRandom(seed + li * 100 + i) * (layer.widthRange[1] - layer.widthRange[0]) + layer.widthRange[0];
      const h = seededRandom(seed + li * 100 + i + 50) * (layer.heightRange[1] - layer.heightRange[0]) * H + layer.heightRange[0] * H;
      const y = groundY - h + (layer.yBase - 0.88) * H * 0.3;
      
      // Windows
      const windows = [];
      const cols = Math.floor(w / 12);
      const rows = Math.floor(h / 18);
      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          if (seededRandom(seed + li * 100 + i + r * 100 + c) > 0.35) {
            windows.push({
              x: 4 + c * 12,
              y: 8 + r * 18,
              lit: seededRandom(seed + li * 100 + i + r * 100 + c + 5000) > 0.4,
              warmth: seededRandom(seed + li * 100 + i + r * 100 + c + 6000),
              flicker: seededRandom(seed + li * 100 + i + r * 100 + c + 7000) > 0.92
            });
          }
        }
      }
      
      // Roof details
      const hasAntenna = seededRandom(seed + li * 100 + i + 100) > 0.6;
      const hasSpire = seededRandom(seed + li * 100 + i + 200) > 0.75;
      
      buildings.push({
        x, y, w, h, layer: li, speed: layer.speed,
        baseColor: layer.color,
        windows,
        hasAntenna,
        hasSpire,
        antennaHeight: seededRandom(seed + li * 100 + i + 300) * 30 + 15,
        spireHeight: seededRandom(seed + li * 100 + i + 400) * 50 + 25
      });
      
      x += w - 5;
    }
  });
  
  // Clouds
  for (let i = 0; i < 6; i++) {
    clouds.push({
      x: seededRandom(seed + 9000 + i) * W,
      y: seededRandom(seed + 9000 + i + 100) * H * 0.25 + H * 0.05,
      w: seededRandom(seed + 9000 + i + 200) * 200 + 100,
      h: seededRandom(seed + 9000 + i + 300) * 30 + 15,
      speed: seededRandom(seed + 9000 + i + 400) * 0.3 + 0.1,
      opacity: seededRandom(seed + 9000 + i + 500) * 0.15 + 0.05
    });
  }
}

function drawSky() {
  // Night gradient
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, '#050510');
  grad.addColorStop(0.5, '#0a0a1e');
  grad.addColorStop(1, '#121230');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);
  
  // Moon glow
  const moonX = W * 0.78;
  const moonY = H * 0.15;
  const moonGrad = ctx.createRadialGradient(moonX, moonY, 0, moonX, moonY, 120);
  moonGrad.addColorStop(0, 'rgba(255, 250, 230, 0.9)');
  moonGrad.addColorStop(0.1, 'rgba(255, 245, 210, 0.5)');
  moonGrad.addColorStop(0.3, 'rgba(200, 210, 255, 0.15)');
  moonGrad.addColorStop(1, 'rgba(100, 120, 200, 0)');
  ctx.fillStyle = moonGrad;
  ctx.fillRect(0, 0, W, H);
  
  // Moon body
  ctx.beginPath();
  ctx.arc(moonX, moonY, 22, 0, Math.PI * 2);
  ctx.fillStyle = '#fff8e7';
  ctx.fill();
}

function drawStars() {
  stars.forEach(s => {
    const alpha = 0.4 + 0.6 * (0.5 + 0.5 * Math.sin(frame * s.twinkleSpeed + s.twinkleOffset));
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255, 255, 240, ${alpha})`;
    ctx.fill();
  });
}

function drawClouds() {
  clouds.forEach(c => {
    c.x += c.speed;
    if (c.x > W + c.w) c.x = -c.w;
    
    ctx.beginPath();
    ctx.ellipse(c.x, c.y, c.w / 2, c.h / 2, 0, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(180, 190, 220, ${c.opacity})`;
    ctx.fill();
  });
}

function drawBuildings() {
  // Sort back to front
  const sorted = [...buildings].sort((a, b) => a.layer - b.layer);
  
  sorted.forEach(b => {
    // Parallax
    const px = b.x - frame * b.speed;
    
    // Building body
    ctx.fillStyle = `rgb(${b.baseColor[0]}, ${b.baseColor[1]}, ${b.baseColor[2]})`;
    ctx.fillRect(px, b.y, b.w, b.h);
    
    // Roof detail
    if (b.hasSpire) {
      ctx.beginPath();
      ctx.moveTo(px + b.w * 0.4, b.y);
      ctx.lineTo(px + b.w * 0.5, b.y - b.spireHeight);
      ctx.lineTo(px + b.w * 0.6, b.y);
      ctx.fillStyle = `rgb(${b.baseColor[0] - 5}, ${b.baseColor[1] - 5}, ${b.baseColor[2] - 5})`;
      ctx.fill();
    }
    
    if (b.hasAntenna) {
      ctx.strokeStyle = `rgba(150, 160, 180, 0.6)`;
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(px + b.w * 0.5, b.y - (b.hasSpire ? b.spireHeight : 0));
      ctx.lineTo(px + b.w * 0.5, b.y - (b.hasSpire ? b.spireHeight : 0) - b.antennaHeight);
      ctx.stroke();
      
      // Blinking light
      if (Math.sin(frame * 0.05) > 0.3) {
        ctx.beginPath();
        ctx.arc(px + b.w * 0.5, b.y - (b.hasSpire ? b.spireHeight : 0) - b.antennaHeight, 1.5, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(255, 50, 50, 0.9)';
        ctx.fill();
      }
    }
    
    // Windows
    b.windows.forEach(w => {
      if (!w.lit) return;
      
      let flicker = 1;
      if (w.flicker) {
        flicker = 0.5 + 0.5 * Math.sin(frame * 0.1 + w.warmth * 100);
      }
      
      const warmth = w.warmth;
      const r = Math.floor(255);
      const g = Math.floor(200 + warmth * 55);
      const bv = Math.floor(100 + warmth * 80);
      
      ctx.fillStyle = `rgba(${r}, ${g}, ${bv}, ${0.7 * flicker})`;
      ctx.fillRect(px + w.x, b.y + w.y, 6, 10);
      
      // Soft glow on lit windows
      if (w.flicker || Math.random() > 0.995) {
        ctx.fillStyle = `rgba(${r}, ${g}, ${bv}, 0.15)`;
        ctx.fillRect(px + w.x - 2, b.y + w.y - 2, 10, 14);
      }
    });
  });
  
  // Ground
  ctx.fillStyle = '#080810';
  ctx.fillRect(0, groundY, W, H - groundY);
}

function drawShootingStars() {
  // Random spawn
  if (Math.random() > 0.996) {
    shootingStars.push({
      x: Math.random() * W * 0.8,
      y: Math.random() * H * 0.3,
      vx: 8 + Math.random() * 6,
      vy: 2 + Math.random() * 2,
      life: 40 + Math.random() * 30,
      trail: []
    });
  }
  
  shootingStars = shootingStars.filter(s => {
    s.x += s.vx;
    s.y += s.vy;
    s.life--;
    
    s.trail.push({ x: s.x, y: s.y });
    if (s.trail.length > 15) s.trail.shift();
    
    // Draw trail
    s.trail.forEach((p, i) => {
      const alpha = i / s.trail.length;
      ctx.beginPath();
      ctx.arc(p.x, p.y, 1.5 * alpha, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255, 255, 240, ${alpha * 0.8})`;
      ctx.fill();
    });
    
    return s.life > 0 && s.x < W && s.y < H;
  });
}

function launchFirework(x, y) {
  const colors = [
    [255, 100, 100], // red
    [255, 200, 50],  // gold
    [100, 200, 255], // blue
    [255, 150, 200], // pink
    [150, 255, 150], // green
    [200, 150, 255], // purple
    [255, 220, 100], // yellow
    [100, 255, 200]  // cyan
  ];
  
  const color = colors[Math.floor(Math.random() * colors.length)];
  const count = 60 + Math.floor(Math.random() * 60);
  
  fireworks.push({
    x, y,
    color,
    particles: Array.from({ length: count }, () => ({
      angle: Math.random() * Math.PI * 2,
      speed: Math.random() * 5 + 1.5,
      life: 80 + Math.random() * 60,
      maxLife: 140,
      decay: 0.96 + Math.random() * 0.03
    })),
    expanding: true,
    radius: 0
  });
}

function updateFireworks() {
  fireworks = fireworks.filter(f => {
    if (f.expanding) {
      f.radius += 3;
      if (f.radius > 80 + Math.random() * 40) {
        f.expanding = false;
      }
      return true;
    }
    
    let alive = false;
    f.particles.forEach(p => {
      if (p.life > 0) {
        alive = true;
        p.speed *= p.decay;
        const px = f.x + Math.cos(p.angle) * (f.radius + (p.maxLife - p.life) * 0.5);
        const py = f.y + Math.sin(p.angle) * (f.radius + (p.maxLife - p.life) * 0.5) + (p.maxLife - p.life) * 0.1;
        
        sparks.push({
          x: px, y: py,
          vx: Math.cos(p.angle) * p.speed,
          vy: Math.sin(p.angle) * p.speed + 0.1,
          life: p.life,
          color: f.color,
          size: 2
        });
        p.life--;
      }
    });
    return alive;
  });
}

function drawSparks() {
  sparks = sparks.filter(s => {
    s.x += s.vx;
    s.y += s.vy;
    s.vy += 0.03;
    s.life--;
    s.size *= 0.98;
    
    if (s.life > 0) {
      const alpha = s.life / 140;
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(${s.color[0]}, ${s.color[1]}, ${s.color[2]}, ${alpha})`;
      ctx.fill();
      
      // Glow
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.size * 3, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(${s.color[0]}, ${s.color[1]}, ${s.color[2]}, ${alpha * 0.2})`;
      ctx.fill();
    }
    
    return s.life > 0;
  });
}

function drawReflection() {
  // Water / ground reflection hint
  ctx.fillStyle = 'rgba(10, 10, 30, 0.3)';
  ctx.fillRect(0, groundY, W, H - groundY);
  
  // Reflection of fireworks
  sparks.forEach(s => {
    if (s.life > 20) {
      const alpha = (s.life / 140) * 0.1;
      const ry = groundY + (groundY - s.y) * 0.2;
      ctx.beginPath();
      ctx.arc(s.x, ry, s.size * 1.5, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(${s.color[0]}, ${s.color[1]}, ${s.color[2]}, ${alpha})`;
      ctx.fill();
    }
  });
}

function animate() {
  frame++;
  
  ctx.clearRect(0, 0, W, H);
  
  drawSky();
  drawStars();
  drawClouds();
  drawShootingStars();
  updateFireworks();
  drawBuildings();
  drawSparks();
  drawReflection();
  
  document.getElementById('stats').textContent = 
    `stars: ${stars.length} · buildings: ${buildings.length} · fireworks: ${fireworks.length}`;
  
  requestAnimationFrame(animate);
}

// Input
canvas.addEventListener('click', e => {
  launchFirework(e.clientX, Math.min(e.clientY, groundY - 20));
});

window.addEventListener('resize', () => {
  resize();
  init();
});

window.addEventListener('keydown', e => {
  if (e.code === 'Space') {
    e.preventDefault();
    init();
  }
});

resize();
init();
animate();
</script>

</body>
</html>
