<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Paper Nebula — Generative Origami</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: #08080c;
    color: #e0e0e0;
    overflow: hidden;
    height: 100vh;
    cursor: crosshair;
  }

  canvas {
    display: block;
    position: fixed;
    top: 0;
    left: 0;
    z-index: 1;
  }

  .ui {
    position: fixed;
    z-index: 10;
    pointer-events: none;
  }

  .title {
    top: 1.5rem;
    left: 50%;
    transform: translateX(-50%);
    text-align: center;
    background: rgba(8, 8, 12, 0.6);
    backdrop-filter: blur(10px);
    padding: 0.75rem 1.5rem;
    border-radius: 50px;
    border: 1px solid rgba(255, 255, 255, 0.1);
  }

  .title h1 {
    font-size: 1.1rem;
    font-weight: 400;
    letter-spacing: 0.2em;
    color: #fff;
    text-transform: uppercase;
  }

  .controls {
    bottom: 1.5rem;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 0.5rem;
    background: rgba(8, 8, 12, 0.6);
    backdrop-filter: blur(10px);
    padding: 0.5rem;
    border-radius: 12px;
    border: 1px solid rgba(255, 255, 255, 0.1);
    pointer-events: auto;
  }

  .controls button {
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid rgba(255, 255, 255, 0.1);
    color: #aaa;
    padding: 0.5rem 1rem;
    border-radius: 8px;
    cursor: pointer;
    font-size: 0.8rem;
    letter-spacing: 0.05em;
    transition: all 0.2s;
  }

  .controls button:hover {
    background: rgba(255, 255, 255, 0.1);
    color: #fff;
    border-color: rgba(255, 255, 255, 0.3);
  }

  .controls button.active {
    background: rgba(255, 255, 255, 0.15);
    color: #fff;
    border-color: rgba(255, 255, 255, 0.4);
  }

  .hint {
    bottom: 5rem;
    left: 50%;
    transform: translateX(-50%);
    font-size: 0.75rem;
    color: rgba(255, 255, 255, 0.4);
    letter-spacing: 0.1em;
    text-align: center;
    transition: opacity 2s;
  }

  @media (max-width: 600px) {
    .controls { flex-wrap: wrap; justify-content: center; }
    .title h1 { font-size: 0.9rem; }
  }
</style>
</head>
<body>

<canvas id="canvas"></canvas>

<div class="ui title">
  <h1>✦ Paper Nebula</h1>
</div>

<div class="ui hint" id="hint">Click to fold · Drag to crease · Scroll to shift</div>

<div class="ui controls">
  <button id="modeFold" class="active">Fold</button>
  <button id="modeCrease">Crease</button>
  <button id="modeBurst">Burst</button>
  <button id="palette">Palette</button>
  <button id="clear">Clear</button>
  <button id="save">Save</button>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let W, H;
function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// State
let mouse = { x: W/2, y: H/2, down: false };
let particles = [];
let folds = [];
let mode = 'fold';
let frame = 0;
let autoMode = true;

// Palettes — each is [bg, fold colors, crease color]
const palettes = [
  { name: 'Midnight Origami', bg: '#08080c', colors: ['#ff6b9d', '#c44569', '#f8b500', '#ff8c42', '#e8e8e8'], accent: '#ffffff' },
  { name: 'Frost Crystal', bg: '#0a0f1a', colors: ['#a8edea', '#fed6e3', '#d4fcff', '#c2e9fb', '#e0f7fa'], accent: '#ffffff' },
  { name: 'Ember Fold', bg: '#0f0808', colors: ['#ff6b35', '#f7931e', '#ffcc02', '#ff4444', '#ffaa00'], accent: '#ffe4b5' },
  { name: 'Aurora Veil', bg: '#080f0a', colors: ['#56ab2f', '#a8e063', '#00b4db', '#0083b0', '#64b5f6'], accent: '#e0f7fa' },
  { name: 'Void Silk', bg: '#08080c', colors: ['#667eea', '#764ba2', '#f093fb', '#f5576c', '#4facfe'], accent: '#ffffff' },
  { name: 'Gold Leaf', bg: '#0c0a06', colors: ['#ffd700', '#ffec8b', '#fffacd', '#daa520', '#f0e68c'], accent: '#fff8dc' }
];
let paletteIndex = 0;
let palette = palettes[0];

// Particle class
class Particle {
  constructor(x, y, type = 'fold') {
    this.x = x;
    this.y = y;
    this.ox = x; // origin
    this.oy = y;
    this.vx = (Math.random() - 0.5) * 2;
    this.vy = (Math.random() - 0.5) * 2;
    this.life = 1;
    this.decay = 0.0008 + Math.random() * 0.002;
    this.size = 1.5 + Math.random() * 2.5;
    this.color = palette.colors[Math.floor(Math.random() * palette.colors.length)];
    this.type = type; // 'fold', 'crease', 'burst'
    this.angle = Math.random() * Math.PI * 2;
    this.angleV = (Math.random() - 0.5) * 0.02;
    this.foldPhase = Math.random() * Math.PI * 2;
    this.foldSpeed = 0.02 + Math.random() * 0.03;
    this.trail = [];
    this.maxTrail = type === 'crease' ? 20 : 12;
  }

  update() {
    // Trail
    this.trail.push({ x: this.x, y: this.y });
    if (this.trail.length > this.maxTrail) this.trail.shift();

    // Origami fold motion — sinusoidal drift
    this.foldPhase += this.foldSpeed;
    this.angle += this.angleV;
    
    const foldForce = Math.sin(this.foldPhase) * 0.3;
    this.vx += Math.cos(this.angle) * foldForce * 0.1;
    this.vy += Math.sin(this.angle) * foldForce * 0.1;

    // Mouse interaction
    if (mouse.down) {
      const dx = mouse.x - this.x;
      const dy = mouse.y - this.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < 200) {
        const force = (200 - dist) / 200;
        const angle = Math.atan2(dy, dx);
        if (mode === 'fold') {
          // Attract and orbit — origami fold effect
          this.vx += Math.cos(angle) * force * 0.5;
          this.vy += Math.sin(angle) * force * 0.5;
          this.angleV += force * 0.01;
        } else if (mode === 'crease') {
          // Sharp directional push — crease effect
          this.vx += Math.cos(angle + Math.PI/2) * force * 2;
          this.vy += Math.sin(angle + Math.PI/2) * force * 2;
        }
      }
    }

    // Damping
    this.vx *= 0.98;
    this.vy *= 0.98;

    // Speed limit
    const speed = Math.sqrt(this.vx * this.vx + this.vy * this.vy);
    if (speed > 4) {
      this.vx = (this.vx / speed) * 4;
      this.vy = (this.vy / speed) * 4;
    }

    this.x += this.vx;
    this.y += this.vy;
    this.life -= this.decay;

    // Bounce softly off edges
    if (this.x < 0 || this.x > W) this.vx *= -0.8;
    if (this.y < 0 || this.y > H) this.vy *= -0.8;
    this.x = Math.max(0, Math.min(W, this.x));
    this.y = Math.max(0, Math.min(H, this.y));
  }

  draw() {
    if (this.life <= 0) return;

    // Draw trail — origami fold lines
    if (this.trail.length > 1) {
      ctx.beginPath();
      ctx.moveTo(this.trail[0].x, this.trail[0].y);
      for (let i = 1; i < this.trail.length; i++) {
        ctx.lineTo(this.trail[i].x, this.trail[i].y);
      }
      ctx.strokeStyle = this.color + Math.floor(this.life * 80).toString(16).padStart(2, '0');
      ctx.lineWidth = this.size * this.life * 0.5;
      ctx.stroke();
    }

    // Draw particle — glowing fold point
    const alpha = this.life;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size * this.life, 0, Math.PI * 2);
    ctx.fillStyle = this.color + Math.floor(alpha * 200).toString(16).padStart(2, '0');
    ctx.fill();

    // Glow
    const glow = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.size * 4);
    glow.addColorStop(0, this.color + Math.floor(alpha * 60).toString(16).padStart(2, '0'));
    glow.addColorStop(1, this.color + '00');
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size * 4, 0, Math.PI * 2);
    ctx.fillStyle = glow;
    ctx.fill();
  }
}

// Burst class — for burst mode
class BurstRing {
  constructor(x, y) {
    this.x = x;
    this.y = y;
    this.radius = 0;
    this.maxRadius = 150 + Math.random() * 100;
    this.life = 1;
    this.speed = 3 + Math.random() * 2;
    this.color = palette.colors[Math.floor(Math.random() * palette.colors.length)];
    this.particles = [];
    for (let i = 0; i < 30; i++) {
      const angle = (Math.PI * 2 / 30) * i;
      this.particles.push({
        x: x, y: y,
        vx: Math.cos(angle) * this.speed,
        vy: Math.sin(angle) * this.speed,
        life: 1,
        decay: 0.01 + Math.random() * 0.01
      });
    }
  }

  update() {
    this.radius += this.speed;
    this.life = 1 - (this.radius / this.maxRadius);
    this.particles.forEach(p => {
      p.x += p.vx;
      p.y += p.vy;
      p.vx *= 0.98;
      p.vy *= 0.98;
      p.life -= p.decay;
    });
  }

  draw() {
    // Ring
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
    ctx.strokeStyle = this.color + Math.floor(this.life * 150).toString(16).padStart(2, '0');
    ctx.lineWidth = 2 * this.life;
    ctx.stroke();

    // Particles
    this.particles.forEach(p => {
      if (p.life > 0) {
        ctx.beginPath();
        ctx.arc(p.x, p.y, 2 * p.life, 0, Math.PI * 2);
        ctx.fillStyle = this.color + Math.floor(p.life * 200).toString(16).padStart(2, '0');
        ctx.fill();
      }
    });
  }
}

let bursts = [];

// Spawn particles
function spawnParticles(x, y, count, type = 'fold') {
  for (let i = 0; i < count; i++) {
    const px = x + (Math.random() - 0.5) * 40;
    const py = y + (Math.random() - 0.5) * 40;
    particles.push(new Particle(px, py, type));
  }
}

// Auto spawn
function autoSpawn() {
  if (autoMode && particles.length < 400) {
    const x = Math.random() * W;
    const y = Math.random() * H;
    spawnParticles(x, y, 2 + Math.floor(Math.random() * 3), 'fold');
  }
}

// Animation loop
function animate() {
  // Fade — creates trailing effect
  ctx.fillStyle = palette.bg + '18';
  ctx.fillRect(0, 0, W, H);

  frame++;

  // Auto spawn
  if (frame % 10 === 0) autoSpawn();

  // Update and draw particles
  particles = particles.filter(p => p.life > 0);
  particles.forEach(p => {
    p.update();
    p.draw();
  });

  // Update and draw bursts
  bursts = bursts.filter(b => b.life > 0);
  bursts.forEach(b => {
    b.update();
    b.draw();
  });

  // Draw fold lines between nearby particles
  if (mode === 'fold' || mode === 'crease') {
    ctx.lineWidth = 0.5;
    for (let i = 0; i < particles.length; i++) {
      for (let j = i + 1; j < particles.length; j++) {
        const dx = particles[i].x - particles[j].x;
        const dy = particles[i].y - particles[j].y;
        const dist = dx * dx + dy * dy;
        if (dist < 2500) { // within 50px
          const alpha = (1 - dist / 2500) * Math.min(particles[i].life, particles[j].life) * 0.4;
          ctx.beginPath();
          ctx.moveTo(particles[i].x, particles[i].y);
          ctx.lineTo(particles[j].x, particles[j].y);
          ctx.strokeStyle = `rgba(255, 255, 255, ${alpha})`;
          ctx.stroke();
        }
      }
    }
  }

  // Mouse glow
  if (mouse.x && mouse.y) {
    const glow = ctx.createRadialGradient(mouse.x, mouse.y, 0, mouse.x, mouse.y, 100);
    glow.addColorStop(0, 'rgba(255, 255, 255, 0.03)');
    glow.addColorStop(1, 'rgba(255, 255, 255, 0)');
    ctx.beginPath();
    ctx.arc(mouse.x, mouse.y, 100, 0, Math.PI * 2);
    ctx.fillStyle = glow;
    ctx.fill();
  }

  requestAnimationFrame(animate);
}

// Event listeners
canvas.addEventListener('mousemove', (e) => {
  mouse.x = e.clientX;
  mouse.y = e.clientY;
  if (mouse.down && mode === 'crease') {
    spawnParticles(e.clientX, e.clientY, 3, 'crease');
  }
});

canvas.addEventListener('mousedown', (e) => {
  mouse.down = true;
  mouse.x = e.clientX;
  mouse.y = e.clientY;
  
  // Hide hint
  const hint = document.getElementById('hint');
  if (hint) hint.style.opacity = '0';

  if (mode === 'fold') {
    spawnParticles(e.clientX, e.clientY, 15, 'fold');
  } else if (mode === 'burst') {
    bursts.push(new BurstRing(e.clientX, e.clientY));
    spawnParticles(e.clientX, e.clientY, 30, 'burst');
  }
});

canvas.addEventListener('mouseup', () => {
  mouse.down = false;
});

canvas.addEventListener('mouseleave', () => {
  mouse.down = false;
});

canvas.addEventListener('wheel', (e) => {
  e.preventDefault();
  paletteIndex = (paletteIndex + 1) % palettes.length;
  palette = palettes[paletteIndex];
  document.body.style.background = palette.bg;
  
  // Visual feedback
  const title = document.querySelector('.title h1');
  title.textContent = `✦ ${palette.name}`;
  setTimeout(() => { title.textContent = '✦ Paper Nebula'; }, 1500);
}, { passive: false });

// Touch support
canvas.addEventListener('touchstart', (e) => {
  e.preventDefault();
  const touch = e.touches[0];
  mouse.down = true;
  mouse.x = touch.clientX;
  mouse.y = touch.clientY;
  spawnParticles(touch.clientX, touch.clientY, 15, 'fold');
  const hint = document.getElementById('hint');
  if (hint) hint.style.opacity = '0';
}, { passive: false });

canvas.addEventListener('touchmove', (e) => {
  e.preventDefault();
  const touch = e.touches[0];
  mouse.x = touch.clientX;
  mouse.y = touch.clientY;
  if (mode === 'crease') {
    spawnParticles(touch.clientX, touch.clientY, 3, 'crease');
  }
}, { passive: false });

canvas.addEventListener('touchend', () => {
  mouse.down = false;
});

// Controls
document.getElementById('modeFold').addEventListener('click', () => {
  mode = 'fold';
  updateButtons();
});

document.getElementById('modeCrease').addEventListener('click', () => {
  mode = 'crease';
  updateButtons();
});

document.getElementById('modeBurst').addEventListener('click', () => {
  mode = 'burst';
  updateButtons();
});

document.getElementById('palette').addEventListener('click', () => {
  paletteIndex = (paletteIndex + 1) % palettes.length;
  palette = palettes[paletteIndex];
  document.body.style.background = palette.bg;
  const title = document.querySelector('.title h1');
  title.textContent = `✦ ${palette.name}`;
  setTimeout(() => { title.textContent = '✦ Paper Nebula'; }, 1500);
});

document.getElementById('clear').addEventListener('click', () => {
  particles = [];
  bursts = [];
  ctx.fillStyle = palette.bg;
  ctx.fillRect(0, 0, W, H);
});

document.getElementById('save').addEventListener('click', () => {
  const link = document.createElement('a');
  link.download = `paper-nebula-${Date.now()}.png`;
  link.href = canvas.toDataURL();
  link.click();
});

function updateButtons() {
  document.querySelectorAll('.controls button').forEach(btn => btn.classList.remove('active'));
  document.getElementById(`mode${mode.charAt(0).toUpperCase() + mode.slice(1)}`).classList.add('active');
}

// Keyboard
document.addEventListener('keydown', (e) => {
  if (e.code === 'Space') {
    e.preventDefault();
    bursts.push(new BurstRing(W/2, H/2));
    spawnParticles(W/2, H/2, 50, 'burst');
  } else if (e.code === 'KeyC') {
    particles = [];
    bursts = [];
  } else if (e.code === 'KeyP') {
    paletteIndex = (paletteIndex + 1) % palettes.length;
    palette = palettes[paletteIndex];
    document.body.style.background = palette.bg;
  }
});

// Start
animate();
</script>

</body>
</html>
