<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Polar Drift — Aurora Generator</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; background: #01030a; overflow: hidden; font-family: 'Courier New', monospace; }
  canvas { display: block; position: absolute; top: 0; left: 0; }
  #controls {
    position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%);
    background: rgba(2, 5, 20, 0.85); border: 1px solid rgba(120, 220, 255, 0.25);
    padding: 12px 18px; border-radius: 999px; color: #cfe9ff;
    display: flex; gap: 14px; align-items: center; z-index: 5; backdrop-filter: blur(8px);
  }
  button {
    background: rgba(120, 220, 255, 0.1); border: 1px solid rgba(120, 220, 255, 0.5);
    color: #cfe9ff; padding: 6px 14px; border-radius: 999px; cursor: pointer; font-family: inherit;
  }
  button:hover { background: rgba(120, 220, 255, 0.25); }
  .sep { width: 1px; height: 18px; background: rgba(120, 220, 255, 0.4); }
</style>
</head>
<body>
<canvas id="sky"></canvas>
<div id="controls">
  <button id="btnMode">Mood: Calm</button>
  <div class="sep"></div>
  <button id="btnSeed">New Seed</button>
  <div class="sep"></div>
  <button id="btnStars">Stars: On</button>
</div>

<script>
(() => {
  const canvas = document.getElementById('sky');
  const ctx = canvas.getContext('2d');

  let W = 0, H = 0;
  const resize = () => {
    W = canvas.width = innerWidth;
    H = canvas.height = innerHeight;
  };
  window.addEventListener('resize', resize);
  resize();

  // --- State ---
  let time = 0;
  let seed = Math.random() * 9999 | 0;
  let mood = 0; // 0 calm, 1 auroral, 2 storm
  const moodNames = ['Calm', 'Auroral', 'Storm'];
  let starsOn = true;

  // --- Random from seed ---
  let _rngState = 0;
  const setSeed = s => { _rngState = s * 1664525 + 1013904223 >>> 0; };
  const rand = () => {
    _rngState = (_rngState * 1664525 + 1013904223) >>> 0;
    return (_rngState >>> 8) / 16777216;
  };
  setSeed(seed);

  // --- Stars ---
  let stars = [];
  const makeStars = () => {
    stars = [];
    const n = 300 + Math.random() * 400 | 0;
    for (let i = 0; i < n; i++) {
      stars.push({
        x: Math.random() * W,
        y: Math.random() * H * 0.65,
        r: 0.4 + Math.random() * 1.6,
        tw: Math.random() * Math.PI * 2,
        speed: 0.8 + Math.random() * 2.4,
      });
    }
  };
  makeStars();

  // --- Terrain (mountains) ---
  let mountains = [];
  const makeTerrain = () => {
    mountains = [];
    const layers = 3;
    for (let l = 0; l < layers; l++) {
      const pts = [];
      const base = H * (0.65 + l * 0.12);
      const amp = 60 + l * 25;
      const freq = 0.0015 + l * 0.0004;
      let x = 0;
      while (x <= W) {
        const y = base + Math.sin(x * freq + l) * amp
                     + Math.sin(x * freq * 2.3 + l * 1.7) * amp * 0.5
                     + Math.sin(x * freq * 5.1 + rand() * 2) * amp * 0.2;
        pts.push({ x, y });
        x += 6;
      }
      const darkness = 0.04 + l * 0.025;
      mountains.push({ pts, color: `rgba(${2 + l*4}, ${6 + l*5}, ${18 + l*8}, 1)` });
    }
  };
  makeTerrain();

  // --- Aurora curtain parameters ---
  const aurora = (() => {
    const bands = 5 + Math.floor(rand() * 6);
    const base = [];
    for (let i = 0; i < bands; i++) {
      base.push({
        y: H * 0.12 + rand() * H * 0.25,
        amp: 25 + rand() * 80,
        freq: 0.3 + rand() * 1.4,
        speed: 0.2 + rand() * 0.8,
        phase: rand() * Math.PI * 2,
        width: 40 + rand() * 120,
        hue: 100 + rand() * 180, // greens and cyans with occasional purple
        alpha: 0.08 + rand() * 0.22,
        blur: 20 + rand() * 50,
      });
    }
    return { base };
  })();

  // --- Colors by mood ---
  const palettes = [
    { name: 'Calm', hueBase: 140, hueRange: 50, alpha: 0.7, speed: 1.0, wind: 0.3 },
    { name: 'Auroral', hueBase: 120, hueRange: 120, alpha: 1.1, speed: 1.8, wind: 0.9 },
    { name: 'Storm', hueBase: 90, hueRange: 200, alpha: 1.6, speed: 3.2, wind: 2.4 },
  ];

  // --- Draw helpers ---
  const lerp = (a, b, t) => a + (b - a) * t;
  const clamp = (v, lo, hi) => Math.max(lo, Math.min(hi, v));

  const drawStars = () => {
    if (!starsOn) return;
    for (const s of stars) {
      const tw = Math.sin(time * s.speed + s.tw) * 0.5 + 0.5;
      ctx.fillStyle = `rgba(210, 235, 255, ${0.4 + tw * 0.6})`;
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r * (0.7 + tw * 0.6), 0, Math.PI * 2);
      ctx.fill();
    }
  };

  const drawTerrain = () => {
    for (const layer of mountains) {
      ctx.fillStyle = layer.color;
      ctx.beginPath();
      ctx.moveTo(0, H);
      for (const p of layer.pts) ctx.lineTo(p.x, p.y);
      ctx.lineTo(W, H);
      ctx.closePath();
      ctx.fill();
    }
  };

  const drawAurora = () => {
    const pal = palettes[mood];
    for (const band of aurora.base) {
      ctx.save();
      ctx.globalCompositeOperation = 'screen';
      const grad = ctx.createLinearGradient(0, band.y - band.amp, 0, band.y + band.amp + 80);
      const h1 = (band.hue + Math.sin(time * 0.4) * 30 + pal.hueBase) % 360;
      const h2 = (h1 + 80) % 360;

      grad.addColorStop(0, `hsla(${h1}, 90%, 55%, 0)`);
      grad.addColorStop(0.3, `hsla(${h1}, 90%, 55%, ${band.alpha * pal.alpha * 0.3})`);
      grad.addColorStop(0.5, `hsla(${h2}, 95%, 60%, ${band.alpha * pal.alpha})`);
      grad.addColorStop(0.7, `hsla(${h1}, 90%, 55%, ${band.alpha * pal.alpha * 0.3})`);
      grad.addColorStop(1, `hsla(${h1}, 90%, 55%, 0)`);

      ctx.fillStyle = grad;
      ctx.filter = `blur(${band.blur}px)`;

      ctx.beginPath();
      ctx.moveTo(0, H);
      const step = 5;
      for (let x = 0; x <= W + step; x += step) {
        const wave1 = Math.sin(x * 0.003 + time * band.speed * pal.speed + band.phase) * band.amp;
        const wave2 = Math.sin(x * 0.009 + time * band.speed * 0.7 + 1.2) * band.amp * 0.4;
        const wind = Math.sin(time * 0.2 + x * 0.0003) * 20 * pal.wind;
        ctx.lineTo(x, band.y + wave1 + wave2 + wind);
      }
      ctx.lineTo(W, H);
      ctx.closePath();
      ctx.fill();
      ctx.restore();
    }
  };

  const draw = () => {
    // Night sky gradient
    const g = ctx.createLinearGradient(0, 0, 0, H);
    g.addColorStop(0, '#020412');
    g.addColorStop(0.5, '#050c1f');
    g.addColorStop(1, '#08101f');
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, W, H);

    // Aurora glow in the sky
    const glow = ctx.createRadialGradient(W * 0.5, H * 0.3, 0, W * 0.5, H * 0.3, W * 0.7);
    glow.addColorStop(0, 'rgba(60, 160, 200, 0.06)');
    glow.addColorStop(1, 'rgba(0, 0, 0, 0)');
    ctx.fillStyle = glow;
    ctx.fillRect(0, 0, W, H);

    drawStars();
    drawAurora();
    drawTerrain();

    time += 0.016;
    requestAnimationFrame(draw);
  };

  // --- Controls ---
  document.getElementById('btnMode').onclick = () => {
    mood = (mood + 1) % 3;
    document.getElementById('btnMode').textContent = 'Mood: ' + moodNames[mood];
  };
  document.getElementById('btnSeed').onclick = () => {
    seed = Math.random() * 9999 | 0;
    setSeed(seed);
    makeStars();
    makeTerrain();
  };
  document.getElementById('btnStars').onclick = (e) => {
    starsOn = !starsOn;
    e.target.textContent = 'Stars: ' + (starsOn ? 'On' : 'Off');
  };

  draw();
})();
</script>
</body>
</html>
