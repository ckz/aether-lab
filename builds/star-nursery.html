<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Star Nursery — Aether Lab</title>
<style>
  html,body{margin:0;height:100%;background:#05060d;color:#cfe0ff;font-family:system-ui,-apple-system,Segoe UI,Roboto,Ubuntu,Cantarell,Noto Sans,sans-serif;overflow:hidden}
  header{position:fixed;inset:auto 0 0 0;padding:14px 18px;display:flex;align-items:center;justify-content:space-between;pointer-events:none;z-index:2;background:linear-gradient(to top,rgba(5,6,13,.85),transparent)}
  h1{font-size:13px;letter-spacing:.5px;margin:0;opacity:.9}
  .controls{pointer-events:auto;display:flex;gap:8px}
  button{background:#10152a;color:#cfe0ff;border:1px solid #1f2a4a;padding:5px 10px;border-radius:10px;cursor:pointer;font:inherit;font-size:11px}
  button:hover{background:#182038}
  canvas{display:block;width:100vw;height:100vh}
  .meta{position:fixed;top:12px;left:16px;font-size:10px;opacity:.6;z-index:2;pointer-events:none;letter-spacing:.4px}
  .stats{position:fixed;top:12px;right:16px;font-size:10px;opacity:.6;z-index:2;pointer-events:none;text-align:right}
</style>
</head>
<body>
  <div class="meta">STAR NURSERY · Nebula Simulation</div>
  <div class="stats" id="stats">stars: 0</div>
  <header>
    <h1>✨ Star Nursery</h1>
    <div class="controls">
      <button id="burst">Burst</button>
      <button id="reset">Reset</button>
    </div>
  </header>
  <canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const stats = document.getElementById('stats');
let W, H, dpr;
let stars = [];
let nebulae = [];
let frame = 0;

const starColors = [
  '#aecbfa','#c9b1ff','#ffd1a9','#ffb3c1','#b8f2e6','#ffe9a0','#ffffff','#ffb347'
];

class Nebula {
  constructor(){
    this.x = Math.random() * W;
    this.y = Math.random() * H;
    this.r = 120 + Math.random() * 260;
    this.color = starColors[Math.floor(Math.random()*starColors.length)];
    this.alpha = .015 + Math.random() * .04;
    this.drift = { x: (Math.random()-.5)*.15, y: (Math.random()-.5)*.15 };
    this.phase = Math.random() * Math.PI * 2;
  }
  step(){
    this.x += this.drift.x;
    this.y += this.drift.y;
    this.phase += .003;
    if(this.x < -this.r) this.x = W + this.r;
    if(this.x > W + this.r) this.x = -this.r;
    if(this.y < -this.r) this.y = H + this.r;
    if(this.y > H + this.r) this.y = -this.r;
  }
  draw(){
    const g = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.r);
    const a = this.alpha * (.7 + .3 * Math.sin(this.phase));
    g.addColorStop(0, this.color + hexAlpha(a));
    g.addColorStop(1, this.color + '00');
    ctx.fillStyle = g;
    ctx.fillRect(this.x - this.r, this.y - this.r, this.r*2, this.r*2);
  }
}

class Star {
  constructor(x, y, age){
    this.x = x ?? Math.random() * W;
    this.y = y ?? Math.random() * H;
    this.age = age ?? 0;
    this.life = 400 + Math.random() * 600;
    this.birthSize = .4 + Math.random() * 2.2;
    this.drift = { x: (Math.random()-.5)*.25, y: (Math.random()-.5)*.25 };
    this.twinkleSpeed = .02 + Math.random() * .06;
    this.twinklePhase = Math.random() * Math.PI * 2;
    this.color = starColors[Math.floor(Math.random()*starColors.length)];
    this.hasGlow = Math.random() < .15;
  }
  step(){
    this.x += this.drift.x;
    this.y += this.drift.y;
    this.age += 1;
    this.twinklePhase += this.twinkleSpeed;
    if(this.age > this.life || this.x < -30 || this.x > W+30 || this.y < -30 || this.y > H+30){
      return false;
    }
    return true;
  }
  draw(){
    const t = this.age / this.life;
    const fade = Math.sin(t * Math.PI);
    const twinkle = .6 + .4 * Math.sin(this.twinklePhase);
    const alpha = fade * twinkle;
    const size = this.birthSize * (1 - t * .4);
    ctx.globalAlpha = alpha;
    ctx.fillStyle = this.color;
    ctx.beginPath();
    ctx.arc(this.x, this.y, size, 0, Math.PI*2);
    ctx.fill();
    if(this.hasGlow){
      ctx.globalAlpha = alpha * .25;
      ctx.beginPath();
      ctx.arc(this.x, this.y, size * 4, 0, Math.PI*2);
      ctx.fill();
    }
  }
}

function hexAlpha(a){
  return Math.round(Math.max(0,Math.min(1,a))*255).toString(16).padStart(2,'0');
}

function resize(){
  dpr = Math.min(window.devicePixelRatio || 1, 2);
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  ctx.setTransform(dpr,0,0,dpr,0,0);
}

function init(){
  resize();
  stars = [];
  nebulae = [];
  const nebulaCount = Math.max(4, Math.floor((W*H)/180000));
  for(let i=0;i<nebulaCount;i++) nebulae.push(new Nebula());
  const starCount = Math.min(900, Math.floor((W*H)/1600));
  for(let i=0;i<starCount;i++) stars.push(new Star(null, null, Math.floor(Math.random()*200)));
}

function burst(){
  const cx = W * (.2 + Math.random() * .6);
  const cy = H * (.2 + Math.random() * .6);
  for(let i=0;i<80;i++){
    const angle = Math.random() * Math.PI * 2;
    const dist = Math.random() * 120;
    stars.push(new Star(cx + Math.cos(angle)*dist, cy + Math.sin(angle)*dist, 0));
  }
}

function frameLoop(){
  ctx.globalCompositeOperation = 'source-over';
  ctx.globalAlpha = .08;
  ctx.fillStyle = '#05060d';
  ctx.fillRect(0,0,W,H);

  ctx.globalCompositeOperation = 'screen';
  for(const n of nebulae){ n.step(); n.draw(); }

  stars = stars.filter(s => s.step());
  for(const s of stars) s.draw();

  // gentle replenishment
  if(stars.length < 300 && frame % 4 === 0){
    stars.push(new Star(null, null, 0));
  }

  ctx.globalAlpha = 1;
  ctx.globalCompositeOperation = 'source-over';
  stats.textContent = `stars: ${stars.length}`;
  frame += 1;
  requestAnimationFrame(frameLoop);
}

document.getElementById('burst').onclick = burst;
document.getElementById('reset').onclick = init;
window.addEventListener('resize', init);
init();
frameLoop();
</script>
</body>
</html>
