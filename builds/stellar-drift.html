<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stellar Drift — Generative Cosmos</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #0a0a0f;
  overflow: hidden;
  font-family: 'Courier New', monospace;
  color: #aab;
}

canvas {
  display: block;
  position: fixed;
  top: 0;
  left: 0;
  z-index: 1;
}

.overlay {
  position: fixed;
  z-index: 10;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%);
  text-align: center;
  pointer-events: none;
}

.title {
  font-size: 14px;
  letter-spacing: 6px;
  text-transform: uppercase;
  color: rgba(170, 187, 204, 0.6);
  margin-bottom: 8px;
}

.hint {
  font-size: 11px;
  color: rgba(170, 187, 204, 0.3);
  letter-spacing: 2px;
}

.stats {
  position: fixed;
  top: 20px;
  right: 20px;
  z-index: 10;
  font-size: 10px;
  color: rgba(170, 187, 204, 0.25);
  text-align: right;
  line-height: 1.8;
  font-family: 'Courier New', monospace;
}
</style>
</head>
<body>

<canvas id="cosmos"></canvas>

<div class="stats" id="stats">
  STARS: 0<br>
  NEBULAE: 0<br>
  CONNECTIONS: 0<br>
  GENERATION: 0
</div>

<div class="overlay">
  <div class="title">Stellar Drift</div>
  <div class="hint">move mouse to warp gravity</div>
</div>

<script>
const canvas = document.getElementById('cosmos');
const ctx = canvas.getContext('2d');

let W, H;
function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

const mouse = { x: W / 2, y: H / 2, active: false };
document.addEventListener('mousemove', e => {
  mouse.x = e.clientX;
  mouse.y = e.clientY;
  mouse.active = true;
});
document.addEventListener('mouseleave', () => { mouse.active = false; });

// Nebula palettes — subtle color regions
const PALETTES = [
  { h: 220, s: 40, l: 60 },  // deep blue
  { h: 280, s: 30, l: 55 },  // purple
  { h: 340, s: 35, l: 55 },  // rose
  { h: 180, s: 30, l: 50 },  // teal
  { h: 30,  s: 40, l: 55 },  // amber
  { h: 260, s: 25, l: 50 },  // indigo
];

class Star {
  constructor() {
    this.reset();
  }

  reset() {
    this.x = Math.random() * W;
    this.y = Math.random() * H;
    this.z = Math.random();  // depth 0-1
    this.size = 0.3 + this.z * 2.2;
    this.baseSize = this.size;
    this.vx = (Math.random() - 0.5) * 0.15;
    this.vy = (Math.random() - 0.5) * 0.15;
    this.pulse = Math.random() * Math.PI * 2;
    this.pulseSpeed = 0.005 + Math.random() * 0.02;
    this.brightness = 0.3 + this.z * 0.7;
    const pal = PALETTES[Math.floor(Math.random() * PALETTES.length)];
    this.hue = pal.h + (Math.random() - 0.5) * 20;
    this.sat = pal.s;
    this.lit = pal.l;
  }

  update(gen) {
    this.pulse += this.pulseSpeed;
    this.size = this.baseSize + Math.sin(this.pulse) * 0.3;

    // Mouse gravity
    if (mouse.active) {
      const dx = mouse.x - this.x;
      const dy = mouse.y - this.y;
      const dist = Math.sqrt(dx * dx + dy * dy) + 0.01;
      const force = Math.min(50 / (dist * dist), 0.02);
      this.vx += (dx / dist) * force;
      this.vy += (dy / dist) * force;
    }

    // Gentle drift with generation-based turbulence
    this.vx += Math.sin(gen * 0.001 + this.y * 0.001) * 0.0005;
    this.vy += Math.cos(gen * 0.001 + this.x * 0.001) * 0.0005;

    // Damping
    this.vx *= 0.999;
    this.vy *= 0.999;

    this.x += this.vx;
    this.y += this.vy;

    // Wrap
    if (this.x < -20) this.x = W + 20;
    if (this.x > W + 20) this.x = -20;
    if (this.y < -20) this.y = H + 20;
    if (this.y > H + 20) this.y = -20;
  }

  draw() {
    const alpha = this.brightness * (0.6 + Math.sin(this.pulse) * 0.4);
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fillStyle = `hsla(${this.hue}, ${this.sat}%, ${this.lit}%, ${alpha})`;
    ctx.fill();

    // Glow for bright stars
    if (this.z > 0.7) {
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.size * 3, 0, Math.PI * 2);
      ctx.fillStyle = `hsla(${this.hue}, ${this.sat}%, ${this.lit}%, ${alpha * 0.1})`;
      ctx.fill();
    }
  }
}

class Nebula {
  constructor() {
    this.x = Math.random() * W;
    this.y = Math.random() * H;
    this.radius = 80 + Math.random() * 200;
    this.vx = (Math.random() - 0.5) * 0.08;
    this.vy = (Math.random() - 0.5) * 0.08;
    const pal = PALETTES[Math.floor(Math.random() * PALETTES.length)];
    this.hue = pal.h;
    this.alpha = 0.015 + Math.random() * 0.03;
    this.phase = Math.random() * Math.PI * 2;
  }

  update() {
    this.phase += 0.002;
    this.x += this.vx;
    this.y += this.vy;
    if (this.x < -this.radius) this.x = W + this.radius;
    if (this.x > W + this.radius) this.x = -this.radius;
    if (this.y < -this.radius) this.y = H + this.radius;
    if (this.y > H + this.radius) this.y = -this.radius;
  }

  draw() {
    const grad = ctx.createRadialGradient(
      this.x, this.y, 0,
      this.x, this.y, this.radius
    );
    const a = this.alpha * (0.5 + Math.sin(this.phase) * 0.5);
    grad.addColorStop(0, `hsla(${this.hue}, 50%, 40%, ${a})`);
    grad.addColorStop(1, `hsla(${this.hue}, 50%, 40%, 0)`);
    ctx.fillStyle = grad;
    ctx.fillRect(this.x - this.radius, this.y - this.radius, this.radius * 2, this.radius * 2);
  }
}

// Initialize
const NUM_STARS = 280;
const NUM_NEBULAE = 6;
let stars = [];
let nebulae = [];
let connections = 0;

function init() {
  stars = [];
  nebulae = [];
  for (let i = 0; i < NUM_STARS; i++) stars.push(new Star());
  for (let i = 0; i < NUM_NEBULAE; i++) nebulae.push(new Nebula());
}
init();

const CONNECTION_DIST = 100;
const statsEl = document.getElementById('stats');

function frame(gen) {
  // Fade trail
  ctx.fillStyle = 'rgba(10, 10, 15, 0.15)';
  ctx.fillRect(0, 0, W, H);

  connections = 0;

  // Draw nebulae (subtle background)
  nebulae.forEach(n => { n.update(); n.draw(); });

  // Update stars
  stars.forEach(s => s.update(gen));

  // Connections
  for (let i = 0; i < stars.length; i++) {
    for (let j = i + 1; j < stars.length; j++) {
      const dx = stars[i].x - stars[j].x;
      const dy = stars[i].y - stars[j].y;
      const dist = dx * dx + dy * dy;
      if (dist < CONNECTION_DIST * CONNECTION_DIST) {
        const alpha = (1 - Math.sqrt(dist) / CONNECTION_DIST) * 0.12;
        const hue = (stars[i].hue + stars[j].hue) / 2;
        ctx.beginPath();
        ctx.moveTo(stars[i].x, stars[i].y);
        ctx.lineTo(stars[j].x, stars[j].y);
        ctx.strokeStyle = `hsla(${hue}, 30%, 60%, ${alpha})`;
        ctx.lineWidth = 0.5;
        ctx.stroke();
        connections++;
      }
    }
  }

  // Draw stars
  stars.forEach(s => s.draw());

  // Stats (throttled)
  if (gen % 30 === 0) {
    statsEl.innerHTML = `STARS: ${stars.length}<br>NEBULAE: ${nebulae.length}<br>CONNECTIONS: ${connections}<br>GENERATION: ${gen}`;
  }

  requestAnimationFrame(() => frame(gen + 1));
}

frame(0);
</script>

</body>
</html>
