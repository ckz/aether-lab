<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stellar Drift — Generative Cosmos</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000010;
    overflow: hidden;
    font-family: 'Courier New', monospace;
    cursor: crosshair;
  }
  canvas { display: block; }
  #ui {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(255,255,255,0.4);
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    pointer-events: none;
    z-index: 10;
  }
  #info {
    position: fixed;
    top: 20px;
    right: 20px;
    color: rgba(255,255,255,0.3);
    font-size: 10px;
    letter-spacing: 1px;
    text-align: right;
    pointer-events: none;
    z-index: 10;
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="ui">move mouse to attract · click to pulse · space to reset</div>
<div id="info"></div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const info = document.getElementById('info');

let W, H;
function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// Simplex-like noise
class Noise {
  constructor() {
    this.perm = new Uint8Array(512);
    const p = new Uint8Array(256);
    for (let i = 0; i < 256; i++) p[i] = i;
    for (let i = 255; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [p[i], p[j]] = [p[j], p[i]];
    }
    for (let i = 0; i < 512; i++) this.perm[i] = p[i & 255];
  }
  fade(t) { return t * t * t * (t * (t * 6 - 15) + 10); }
  lerp(a, b, t) { return a + t * (b - a); }
  grad(hash, x, y) {
    const h = hash & 3;
    const u = h < 2 ? x : y;
    const v = h < 2 ? y : x;
    return ((h & 1) ? -u : u) + ((h & 2) ? -v : v);
  }
  get(x, y) {
    const X = Math.floor(x) & 255, Y = Math.floor(y) & 255;
    x -= Math.floor(x); y -= Math.floor(y);
    const u = this.fade(x), v = this.fade(y);
    const A = this.perm[X] + Y, B = this.perm[X + 1] + Y;
    return this.lerp(
      this.lerp(this.grad(this.perm[A], x, y), this.grad(this.perm[B], x - 1, y), u),
      this.lerp(this.grad(this.perm[A + 1], x, y - 1), this.grad(this.perm[B + 1], x - 1, y - 1), u),
      v
    );
  }
}

const noise = new Noise();
const mouse = { x: W / 2, y: H / 2, active: false };
let pulse = 0;
let frame = 0;

document.addEventListener('mousemove', e => {
  mouse.x = e.clientX;
  mouse.y = e.clientY;
  mouse.active = true;
});
document.addEventListener('mouseleave', () => mouse.active = false);
document.addEventListener('click', () => { pulse = 1; });
document.addEventListener('keydown', e => {
  if (e.code === 'Space') { e.preventDefault(); initParticles(); }
});

// Color palettes
const palettes = [
  ['#0a0a2e', '#1a1a4e', '#4a2f7c', '#9b59b6', '#e8d5b7', '#f5e6d3'],  // deep cosmic purple
  ['#000010', '#0a1628', '#1a3a5c', '#2e86ab', '#a3d5ff', '#f0f8ff'],  // deep ocean
  ['#0a0a0a', '#1a0a2e', '#4a1942', '#c9184a', '#ff758f', '#ffccd5'],  // nebula rose
  ['#001a0a', '#0a2e1a', '#1a5c3a', '#2eab6b', '#a3ffd5', '#d5fff0'],  // aurora
];

function randomColor(alpha = 1) {
  const palette = palettes[Math.floor(Math.random() * palettes.length)];
  const color = palette[Math.floor(Math.random() * palette.length)];
  const r = parseInt(color.slice(1, 3), 16);
  const g = parseInt(color.slice(3, 5), 16);
  const b = parseInt(color.slice(5, 7), 16);
  return `rgba(${r},${g},${b},${alpha})`;
}

class Particle {
  constructor() { this.reset(); }
  reset() {
    this.x = Math.random() * W;
    this.y = Math.random() * H;
    this.vx = 0;
    this.vy = 0;
    this.size = Math.random() * 2 + 0.5;
    this.life = Math.random() * 200 + 100;
    this.maxLife = this.life;
    this.hue = Math.random();
  }
  update(time) {
    const scale = 0.003;
    const n = noise.get(this.x * scale, this.y * scale + time * 0.0001);
    const angle = n * Math.PI * 4;
    
    this.vx += Math.cos(angle) * 0.15;
    this.vy += Math.sin(angle) * 0.15;
    
    // Mouse attraction
    if (mouse.active) {
      const dx = mouse.x - this.x;
      const dy = mouse.y - this.y;
      const dist = Math.sqrt(dx * dx + dy * dy) + 1;
      if (dist < 200) {
        const force = (200 - dist) / 200 * 0.5;
        this.vx += (dx / dist) * force;
        this.vy += (dy / dist) * force;
      }
    }
    
    // Pulse
    if (pulse > 0) {
      const dx = this.x - mouse.x;
      const dy = this.y - mouse.y;
      const dist = Math.sqrt(dx * dx + dy * dy) + 1;
      if (dist < 300) {
        const force = pulse * (300 - dist) / 300 * 3;
        this.vx += (dx / dist) * force;
        this.vy += (dy / dist) * force;
      }
    }
    
    // Damping
    this.vx *= 0.96;
    this.vy *= 0.96;
    
    this.x += this.vx;
    this.y += this.vy;
    this.life--;
    
    // Wrap
    if (this.x < -50) this.x = W + 50;
    if (this.x > W + 50) this.x = -50;
    if (this.y < -50) this.y = H + 50;
    if (this.y > H + 50) this.y = -50;
    
    if (this.life <= 0) this.reset();
  }
}

let particles = [];
const NUM_PARTICLES = 1200;

function initParticles() {
  particles = [];
  for (let i = 0; i < NUM_PARTICLES; i++) {
    particles.push(new Particle());
  }
}
initParticles();

// Connection distance
const CONNECT_DIST = 80;
const MOUSE_CONNECT = 150;

function draw(time) {
  // Trails
  ctx.fillStyle = 'rgba(0, 0, 10, 0.05)';
  ctx.fillRect(0, 0, W, H);
  
  frame++;
  
  // Update & draw particles
  for (let i = 0; i < particles.length; i++) {
    const p = particles[i];
    p.update(time);
    
    const alpha = (p.life / p.maxLife) * 0.8;
    const speed = Math.sqrt(p.vx * p.vx + p.vy * p.vy);
    const glow = Math.min(speed * 2, 1);
    
    // Core dot
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255, 255, 255, ${alpha * (0.5 + glow * 0.5)})`;
    ctx.fill();
    
    // Glow when fast
    if (speed > 1) {
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size * 3, 0, Math.PI * 2);
      ctx.fillStyle = randomColor(alpha * glow * 0.15);
      ctx.fill();
    }
  }
  
  // Connections (sparse for performance)
  ctx.lineWidth = 0.5;
  for (let i = 0; i < particles.length; i += 3) {
    const p = particles[i];
    // Mouse connections
    if (mouse.active) {
      const dx = p.x - mouse.x;
      const dy = p.y - mouse.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < MOUSE_CONNECT) {
        const alpha = (1 - dist / MOUSE_CONNECT) * 0.3;
        ctx.beginPath();
        ctx.moveTo(p.x, p.y);
        ctx.lineTo(mouse.x, mouse.y);
        ctx.strokeStyle = `rgba(200, 220, 255, ${alpha})`;
        ctx.stroke();
      }
    }
    // Particle connections (check subset)
    for (let j = i + 3; j < particles.length; j += 7) {
      const q = particles[j];
      const dx = p.x - q.x;
      const dy = p.y - q.y;
      const dist = dx * dx + dy * dy;
      if (dist < CONNECT_DIST * CONNECT_DIST) {
        const d = Math.sqrt(dist);
        const alpha = (1 - d / CONNECT_DIST) * 0.15;
        ctx.beginPath();
        ctx.moveTo(p.x, p.y);
        ctx.lineTo(q.x, q.y);
        ctx.strokeStyle = `rgba(180, 200, 255, ${alpha})`;
        ctx.stroke();
      }
    }
  }
  
  // Mouse glow
  if (mouse.active) {
    const grad = ctx.createRadialGradient(mouse.x, mouse.y, 0, mouse.x, mouse.y, 120);
    grad.addColorStop(0, 'rgba(100, 140, 255, 0.05)');
    grad.addColorStop(1, 'rgba(100, 140, 255, 0)');
    ctx.fillStyle = grad;
    ctx.fillRect(mouse.x - 120, mouse.y - 120, 240, 240);
  }
  
  // Pulse decay
  pulse *= 0.95;
  if (pulse < 0.001) pulse = 0;
  
  // Info
  const speed = particles.reduce((s, p) => s + Math.sqrt(p.vx * p.vx + p.vy * p.vy), 0) / particles.length;
  info.textContent = `${particles.length} particles\navg speed: ${speed.toFixed(2)}\nframe: ${frame}`;
  
  requestAnimationFrame(draw);
}

// Initial flash
ctx.fillStyle = '#000010';
ctx.fillRect(0, 0, W, H);

draw(0);
</script>
</body>
</html>
