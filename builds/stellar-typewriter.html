<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stellar Typewriter</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: #05050a;
    color: #e0e0e0;
    overflow: hidden;
    height: 100vh;
    cursor: crosshair;
  }

  canvas {
    display: block;
    position: fixed;
    top: 0;
    left: 0;
  }

  .ui {
    position: fixed;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%);
    text-align: center;
    z-index: 10;
    pointer-events: none;
  }

  .prompt {
    font-size: 0.9rem;
    color: #667;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 0.75rem;
    text-shadow: 0 0 20px rgba(100, 100, 255, 0.3);
  }

  .typed {
    font-size: 1.5rem;
    color: #fff;
    letter-spacing: 0.2em;
    font-weight: 200;
    text-shadow: 0 0 30px rgba(150, 150, 255, 0.5);
    min-height: 2rem;
  }

  .controls {
    position: fixed;
    top: 2rem;
    right: 2rem;
    z-index: 10;
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
  }

  .btn {
    background: rgba(20, 20, 40, 0.8);
    border: 1px solid #2a2a4a;
    color: #aab;
    padding: 0.6rem 1rem;
    border-radius: 8px;
    cursor: pointer;
    font-size: 0.8rem;
    letter-spacing: 0.05em;
    transition: all 0.3s ease;
    backdrop-filter: blur(10px);
  }

  .btn:hover {
    background: rgba(40, 40, 80, 0.9);
    border-color: #4a4a8a;
    color: #fff;
    transform: translateY(-2px);
  }

  .info {
    position: fixed;
    top: 2rem;
    left: 2rem;
    z-index: 10;
    color: #445;
    font-size: 0.75rem;
    line-height: 1.8;
    letter-spacing: 0.05em;
  }

  .info kbd {
    background: rgba(30, 30, 50, 0.8);
    border: 1px solid #2a2a4a;
    border-radius: 3px;
    padding: 0.1rem 0.4rem;
    font-family: monospace;
    font-size: 0.7rem;
    color: #889;
  }
</style>
</head>
<body>
<canvas id="canvas"></canvas>

<div class="info">
  <kbd>TYPE</kbd> to seed stars<br>
  <kbd>CLICK</kbd> to burst<br>
  <kbd>SPACE</kbd> clear<br>
  <kbd>S</kbd> save PNG
</div>

<div class="controls">
  <button class="btn" onclick="cyclePalette()">◈ Palette</button>
  <button class="btn" onclick="toggleTrails()">◉ Trails</button>
  <button class="btn" onclick="clearAll()">✕ Clear</button>
</div>

<div class="ui">
  <div class="prompt">Begin typing to seed your constellation...</div>
  <div class="typed" id="typed"></div>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

let W, H;
function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// --- Letter Shapes (simplified dot patterns) ---
const LETTER_SHAPES = {
  'A': [[0,4],[1,3],[2,2],[3,1],[4,0],[5,1],[6,2],[7,3],[8,4],[2,3],[3,3],[4,3],[5,3],[6,3]],
  'B': [[0,0],[0,1],[0,2],[0,3],[0,4],[1,0],[2,0],[3,1],[2,2],[1,2],[0,3],[1,3],[2,3],[3,4],[2,4],[1,4]],
  'C': [[4,0],[3,0],[2,0],[1,1],[0,2],[1,3],[2,4],[3,4],[4,4]],
  'D': [[0,0],[0,1],[0,2],[0,3],[0,4],[1,0],[2,0],[3,1],[3,2],[3,3],[2,4],[1,4]],
  'E': [[4,0],[0,0],[0,1],[2,1],[0,2],[0,3],[0,4],[4,4]],
  'F': [[4,0],[0,0],[0,1],[2,1],[0,2],[0,3],[0,4]],
  'G': [[3,0],[2,0],[1,1],[0,2],[1,3],[2,4],[3,4],[4,4],[4,3],[4,2]],
  'H': [[0,0],[0,1],[0,2],[0,3],[0,4],[4,0],[4,1],[4,2],[4,3],[4,4],[1,2],[2,2],[3,2]],
  'I': [[2,0],[1,1],[2,1],[3,1],[1,2],[2,2],[3,2],[1,3],[2,3],[3,3],[2,4]],
  'J': [[1,0],[2,0],[3,0],[3,1],[3,2],[3,3],[2,4],[1,4],[0,3]],
  'K': [[0,0],[0,1],[0,2],[0,3],[0,4],[4,0],[3,1],[2,2],[1,3],[0,4],[2,2],[3,3]],
  'L': [[0,0],[0,1],[0,2],[0,3],[0,4],[1,4],[2,4],[3,4],[4,4]],
  'M': [[0,4],[0,3],[0,2],[0,1],[0,0],[1,1],[2,2],[3,1],[4,0],[4,1],[4,2],[4,3],[4,4]],
  'N': [[0,4],[0,3],[0,2],[0,1],[0,0],[1,1],[2,2],[3,3],[4,0],[4,1],[4,2],[4,3],[4,4]],
  'O': [[1,0],[2,0],[3,0],[0,1],[4,1],[0,2],[4,2],[0,3],[4,3],[1,4],[2,4],[3,4]],
  'P': [[0,0],[0,1],[0,2],[0,3],[0,4],[1,0],[2,0],[3,0],[3,1],[2,2],[1,2],[0,3]],
  'Q': [[1,0],[2,0],[3,0],[0,1],[4,1],[0,2],[4,2],[0,3],[4,3],[1,4],[2,4],[3,4],[3,3],[4,2]],
  'R': [[0,0],[0,1],[0,2],[0,3],[0,4],[1,0],[2,0],[3,0],[3,1],[2,2],[1,2],[0,3],[2,3],[3,4]],
  'S': [[3,0],[2,0],[1,1],[2,1],[3,2],[2,3],[1,3],[0,4],[1,4],[2,4],[3,4]],
  'T': [[2,0],[0,1],[1,1],[2,1],[3,1],[4,1],[2,2],[2,3],[2,4]],
  'U': [[0,0],[0,1],[0,2],[0,3],[1,4],[2,4],[3,4],[4,3],[4,2],[4,1],[4,0]],
  'V': [[0,0],[1,1],[2,2],[3,1],[4,0]],
  'W': [[0,0],[0,1],[0,2],[1,1],[2,2],[3,1],[4,0],[4,1],[4,2]],
  'X': [[0,0],[1,1],[2,2],[3,3],[4,4],[0,4],[1,3],[3,1],[4,0]],
  'Y': [[0,0],[1,1],[2,2],[3,1],[4,0],[2,2],[2,3],[2,4]],
  'Z': [[0,0],[4,0],[3,1],[2,2],[1,3],[0,4],[1,4],[2,4],[3,4],[4,4]],
  ' ': [],
  '-': [[0,2],[1,2],[2,2],[3,2]],
  '!': [[2,0],[2,1],[2,2]],
  '.': [[2,4]],
  '?': [[0,0],[1,0],[2,0],[3,0],[3,1],[2,2],[2,3]],
  '0': [[1,0],[2,0],[3,0],[0,1],[4,1],[0,2],[4,2],[0,3],[4,3],[1,4],[2,4],[3,4]],
  '1': [[2,0],[1,1],[2,1],[2,2],[2,3],[1,4],[2,4],[3,4]],
  '2': [[1,0],[2,0],[3,0],[0,1],[4,1],[3,2],[2,2],[1,3],[0,4],[1,4],[2,4],[3,4],[4,4]],
  '3': [[1,0],[2,0],[3,0],[0,1],[4,1],[3,2],[2,2],[1,3],[4,4],[3,4],[2,4],[1,4]],
  '4': [[0,0],[0,1],[0,2],[1,2],[2,2],[3,2],[4,0],[4,1],[4,2],[4,3],[4,4]],
  '5': [[0,0],[1,0],[2,0],[3,0],[4,0],[0,1],[0,2],[1,2],[2,2],[3,2],[4,3],[4,4],[3,4],[2,4],[1,4]],
  '6': [[2,0],[1,1],[0,2],[0,3],[0,4],[1,4],[2,4],[3,4],[4,3],[3,2],[2,2],[1,2]],
  '7': [[0,0],[1,0],[2,0],[3,0],[4,0],[4,1],[3,1],[2,2],[2,3],[2,4]],
  '8': [[1,0],[2,0],[3,0],[0,1],[4,1],[1,4],[2,4],[3,4],[0,3],[4,3],[1,2],[3,2]],
  '9': [[3,0],[4,0],[0,1],[4,1],[3,2],[2,2],[1,2],[0,3],[4,4],[3,4],[2,4],[1,4]]
};

// --- State ---
let letters = []; // {x, y, stars: [{x,y,vx,vy,size,phase}]}
let bgStars = [];
let particles = [];
let currentText = '';
let paletteIndex = 0;
let showTrails = true;
let mouse = { x: W/2, y: H/2, active: false };

const PALETTES = [
  { name: 'Cosmic', bg: '#05050f', star: '#aaccff', glow: '#4466aa', accent: '#8899dd' },
  { name: 'Nebula', bg: '#0f050a', star: '#ffaadd', glow: '#aa4466', accent: '#dd8899' },
  { name: 'Aurora', bg: '#050f0a', star: '#aaffcc', glow: '#44aa66', accent: '#88ddaa' },
  { name: 'Ember', bg: '#0f0805', star: '#ffcc88', glow: '#aa6644', accent: '#dd9955' },
  { name: 'Void', bg: '#050505', star: '#ffffff', glow: '#888888', accent: '#cccccc' },
  { name: 'Rose', bg: '#0a0510', star: '#eebbff', glow: '#8844aa', accent: '#bb77dd' }
];

function getPalette() { return PALETTES[paletteIndex]; }

// --- Background stars ---
function initBgStars() {
  bgStars = [];
  for (let i = 0; i < 300; i++) {
    bgStars.push({
      x: Math.random() * W,
      y: Math.random() * H,
      size: Math.random() * 1.2 + 0.2,
      phase: Math.random() * Math.PI * 2,
      speed: Math.random() * 0.02 + 0.005
    });
  }
}
initBgStars();

// --- Letter star generation ---
function createLetterStars(letter, cx, cy) {
  const shape = LETTER_SHAPES[letter.toUpperCase()] || [];
  const scale = 8;
  const stars = [];
  const offsetX = shape.length > 0 ? shape.reduce((s,p) => s + p[0], 0) / shape.length * scale : 0;
  const offsetY = shape.length > 0 ? shape.reduce((s,p) => s + p[1], 0) / shape.length * scale : 0;
  
  shape.forEach(([sx, sy]) => {
    const px = cx + sx * scale - offsetX;
    const py = cy + sy * scale - offsetY;
    for (let i = 0; i < 3; i++) {
      stars.push({
        x: px + (Math.random() - 0.5) * scale * 0.8,
        y: py + (Math.random() - 0.5) * scale * 0.8,
        vx: (Math.random() - 0.5) * 0.3,
        vy: (Math.random() - 0.5) * 0.3,
        size: Math.random() * 2 + 1,
        phase: Math.random() * Math.PI * 2,
        originX: px,
        originY: py
      });
    }
  });
  return stars;
}

function addLetter(char) {
  const pal = getPalette();
  const totalWidth = currentText.length * 60 + 100;
  let startX = (W - totalWidth) / 2 + 50;
  if (startX < 100) startX = 100;
  
  const cx = startX + currentText.length * 60 + 25;
  const cy = H / 2 + (Math.random() - 0.5) * 100;
  
  const stars = createLetterStars(char, cx, cy);
  if (stars.length > 0) {
    letters.push({ x: cx, y: cy, stars, letter: char, born: Date.now() });
  }
  
  // Burst particles
  for (let i = 0; i < 15; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = Math.random() * 3 + 1;
    particles.push({
      x: cx, y: cy,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 1,
      decay: Math.random() * 0.02 + 0.01,
      size: Math.random() * 2 + 1,
      color: pal.accent
    });
  }
}

// --- Input ---
document.addEventListener('keydown', (e) => {
  if (e.key === ' ') {
    e.preventDefault();
    clearAll();
    return;
  }
  if (e.key === 's' || e.key === 'S') {
    savePNG();
    return;
  }
  if (e.key === 'Backspace') {
    if (currentText.length > 0) {
      currentText = currentText.slice(0, -1);
      if (letters.length > 0) letters.pop();
      document.getElementById('typed').textContent = currentText;
    }
    return;
  }
  if (e.key.length === 1 && /[a-zA-Z0-9 !.\-?]/.test(e.key)) {
    currentText += e.key;
    addLetter(e.key);
    document.getElementById('typed').textContent = currentText;
  }
});

// --- Mouse ---
canvas.addEventListener('mousemove', (e) => {
  mouse.x = e.clientX;
  mouse.y = e.clientY;
  mouse.active = true;
});

canvas.addEventListener('click', (e) => {
  const pal = getPalette();
  for (let i = 0; i < 40; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = Math.random() * 5 + 2;
    particles.push({
      x: e.clientX, y: e.clientY,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 1,
      decay: Math.random() * 0.015 + 0.008,
      size: Math.random() * 3 + 1,
      color: Math.random() > 0.5 ? pal.star : pal.accent
    });
  }
});

// --- Controls ---
function cyclePalette() {
  paletteIndex = (paletteIndex + 1) % PALETTES.length;
  const pal = getPalette();
  document.body.style.background = pal.bg;
}

function toggleTrails() {
  showTrails = !showTrails;
}

function clearAll() {
  letters = [];
  particles = [];
  currentText = '';
  document.getElementById('typed').textContent = '';
}

function savePNG() {
  const link = document.createElement('a');
  link.download = 'stellar-typewriter-' + Date.now() + '.png';
  link.href = canvas.toDataURL();
  link.click();
}

// --- Render ---
function draw(time) {
  const pal = getPalette();
  
  if (showTrails) {
    ctx.fillStyle = pal.bg + '15';
    ctx.fillRect(0, 0, W, H);
  } else {
    ctx.fillStyle = pal.bg;
    ctx.fillRect(0, 0, W, H);
  }
  
  // Background stars
  bgStars.forEach(s => {
    s.phase += s.speed;
    const alpha = 0.3 + Math.sin(s.phase) * 0.3;
    ctx.fillStyle = `rgba(200, 220, 255, ${alpha})`;
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
    ctx.fill();
  });
  
  // Connections between letters
  ctx.strokeStyle = pal.glow + '30';
  ctx.lineWidth = 0.5;
  for (let i = 0; i < letters.length; i++) {
    for (let j = i + 1; j < letters.length; j++) {
      const dx = letters[i].x - letters[j].x;
      const dy = letters[i].y - letters[j].y;
      const dist = Math.sqrt(dx*dx + dy*dy);
      if (dist < 200) {
        const alpha = (1 - dist / 200) * 0.3;
        ctx.strokeStyle = pal.glow + Math.floor(alpha * 255).toString(16).padStart(2, '0');
        ctx.beginPath();
        ctx.moveTo(letters[i].x, letters[i].y);
        ctx.lineTo(letters[j].x, letters[j].y);
        ctx.stroke();
      }
    }
  }
  
  // Letter stars
  letters.forEach(letter => {
    letter.stars.forEach(star => {
      // Drift back toward origin
      star.vx += (star.originX - star.x) * 0.0003;
      star.vy += (star.originY - star.y) * 0.0003;
      
      // Mouse influence
      if (mouse.active) {
        const dx = mouse.x - star.x;
        const dy = mouse.y - star.y;
        const dist = Math.sqrt(dx*dx + dy*dy);
        if (dist < 150) {
          const force = (150 - dist) / 150 * 0.02;
          star.vx += dx / dist * force;
          star.vy += dy / dist * force;
        }
      }
      
      star.x += star.vx;
      star.y += star.vy;
      star.vx *= 0.99;
      star.vy *= 0.99;
      star.phase += 0.05;
      
      const pulse = 0.6 + Math.sin(star.phase) * 0.4;
      const alpha = pulse;
      
      // Glow
      const gradient = ctx.createRadialGradient(star.x, star.y, 0, star.x, star.y, star.size * 4);
      gradient.addColorStop(0, pal.star + Math.floor(alpha * 200).toString(16).padStart(2, '0'));
      gradient.addColorStop(1, 'transparent');
      ctx.fillStyle = gradient;
      ctx.beginPath();
      ctx.arc(star.x, star.y, star.size * 4, 0, Math.PI * 2);
      ctx.fill();
      
      // Core
      ctx.fillStyle = pal.star + Math.floor(alpha * 255).toString(16).padStart(2, '0');
      ctx.beginPath();
      ctx.arc(star.x, star.y, star.size * pulse, 0, Math.PI * 2);
      ctx.fill();
    });
  });
  
  // Burst particles
  particles = particles.filter(p => p.life > 0);
  particles.forEach(p => {
    p.x += p.vx;
    p.y += p.vy;
    p.vx *= 0.98;
    p.vy *= 0.98;
    p.life -= p.decay;
    
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
  });
  
  // Vignette
  const vignette = ctx.createRadialGradient(W/2, H/2, H * 0.3, W/2, H/2, H * 0.8);
  vignette.addColorStop(0, 'transparent');
  vignette.addColorStop(1, 'rgba(0, 0, 0, 0.4)');
  ctx.fillStyle = vignette;
  ctx.fillRect(0, 0, W, H);
  
  requestAnimationFrame(draw);
}

requestAnimationFrame(draw);
</script>
</body>
</html>
