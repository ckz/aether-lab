<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Synaptic Bloom</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #030308;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    color: #fff;
  }
  canvas {
    display: block;
    position: fixed;
    top: 0;
    left: 0;
  }
  .ui {
    position: fixed;
    bottom: 1.5rem;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    text-align: center;
    pointer-events: none;
  }
  .ui h1 {
    font-size: 1.4rem;
    font-weight: 300;
    letter-spacing: 0.2em;
    color: #a0c4ff;
    text-shadow: 0 0 20px rgba(160, 196, 255, 0.5);
    margin-bottom: 0.3rem;
  }
  .ui p {
    font-size: 0.75rem;
    color: #667;
    letter-spacing: 0.1em;
  }
  .stats {
    position: fixed;
    top: 1rem;
    right: 1.5rem;
    font-size: 0.7rem;
    color: #445;
    text-align: right;
    z-index: 10;
    pointer-events: none;
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="ui">
  <h1>SYNAPTIC BLOOM</h1>
  <p>CLICK TO PLANT NEURONS · HOVER TO STIMULATE</p>
</div>
<div class="stats" id="stats"></div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// Configuration
const CONFIG = {
  neuronCount: 35,
  connectionDist: 180,
  pulseSpeed: 3.5,
  pulseInterval: 2500,
  driftSpeed: 0.3,
  colors: {
    neuron: [160, 196, 255],      // soft blue
    neuronActive: [255, 200, 150], // warm gold
    connection: [80, 120, 200],    // muted blue
    pulse: [200, 220, 255]         // bright white-blue
  }
};

class Neuron {
  constructor(x, y) {
    this.x = x || Math.random() * W;
    this.y = y || Math.random() * H;
    this.vx = (Math.random() - 0.5) * CONFIG.driftSpeed;
    this.vy = (Math.random() - 0.5) * CONFIG.driftSpeed;
    this.radius = 2 + Math.random() * 2.5;
    this.phase = Math.random() * Math.PI * 2;
    this.pulsePhase = 0;
    this.firing = false;
    this.firingTimer = 0;
    this.threshold = 0.7 + Math.random() * 0.3;
  }

  update(dt) {
    // Gentle drift with soft boundary wrap
    this.x += this.vx;
    this.y += this.vy;
    
    if (this.x < -20) this.x = W + 20;
    if (this.x > W + 20) this.x = -20;
    if (this.y < -20) this.y = H + 20;
    if (this.y > H + 20) this.y = -20;

    // Natural phase oscillation
    this.phase += dt * 0.001;
    
    // Firing state
    if (this.firing) {
      this.firingTimer -= dt;
      this.pulsePhase += dt * 0.008;
      if (this.firingTimer <= 0) {
        this.firing = false;
        this.firingTimer = 0;
      }
    }
  }

  get activity() {
    return this.firing ? 
      Math.min(1, this.firingTimer / 400) : 
      0.3 + 0.15 * Math.sin(this.phase);
  }

  getBrightness() {
    return this.firing ? 1 : 0.4 + 0.2 * Math.sin(this.phase);
  }

  stimulate() {
    if (!this.firing) {
      this.firing = true;
      this.firingTimer = 400 + Math.random() * 300;
    }
  }
}

class Pulse {
  constructor(from, to) {
    this.from = from;
    this.to = to;
    this.t = 0;
    this.speed = CONFIG.pulseSpeed / Math.hypot(to.x - from.x, to.y - from.y);
    this.alive = true;
  }

  update(dt) {
    this.t += this.speed * dt * 0.003;
    if (this.t >= 1) {
      this.alive = false;
      // Stimulate target neuron
      if (this.to && neurons.includes(this.to)) {
        this.to.stimulate();
        // Chain to nearby neurons
        neurons.forEach(n => {
          if (n !== this.to && Math.hypot(n.x - this.to.x, n.y - this.to.y) < 100) {
            if (Math.random() < 0.4) n.stimulate();
          }
        });
      }
    }
  }

  get x() { return this.from.x + (this.to.x - this.from.x) * this.t; }
  get y() { return this.from.y + (this.to.y - this.from.y) * this.t; }
}

// State
const neurons = [];
const pulses = [];
let lastTime = performance.now();
let mouse = { x: -1000, y: -1000, active: false };
let totalFirings = 0;

// Initialize neurons
for (let i = 0; i < CONFIG.neuronCount; i++) {
  neurons.push(new Neuron());
}

// Mouse interaction
canvas.addEventListener('mousemove', (e) => {
  mouse.x = e.clientX;
  mouse.y = e.clientY;
  mouse.active = true;
});

canvas.addEventListener('mouseleave', () => {
  mouse.active = false;
});

canvas.addEventListener('click', (e) => {
  neurons.push(new Neuron(e.clientX, e.clientY));
  // Stimulate nearby neurons
  neurons.forEach(n => {
    if (Math.hypot(n.x - e.clientX, n.y - e.clientY) < 150) {
      n.stimulate();
    }
  });
});

// Touch support
canvas.addEventListener('touchmove', (e) => {
  e.preventDefault();
  mouse.x = e.touches[0].clientX;
  mouse.y = e.touches[0].clientY;
  mouse.active = true;
}, { passive: false });

canvas.addEventListener('touchstart', (e) => {
  mouse.x = e.touches[0].clientX;
  mouse.y = e.touches[0].clientY;
  mouse.active = true;
  neurons.push(new Neuron(mouse.x, mouse.y));
});

canvas.addEventListener('touchend', () => {
  mouse.active = false;
});

// Auto-firing
setInterval(() => {
  if (neurons.length > 0) {
    const idx = Math.floor(Math.random() * neurons.length);
    neurons[idx].stimulate();
  }
}, CONFIG.pulseInterval);

// Utility
function lerp(a, b, t) { return a + (b - a) * t; }

// Main loop
function animate(now) {
  const dt = Math.min(now - lastTime, 50);
  lastTime = now;

  // Clear with fade effect
  ctx.fillStyle = 'rgba(3, 3, 8, 0.15)';
  ctx.fillRect(0, 0, W, H);

  // Update neurons
  neurons.forEach(n => n.update(dt));

  // Mouse stimulation
  if (mouse.active) {
    neurons.forEach(n => {
      const d = Math.hypot(n.x - mouse.x, n.y - mouse.y);
      if (d < 120) {
        const influence = 1 - d / 120;
        if (Math.random() < influence * 0.03) {
          n.stimulate();
        }
      }
    });
  }

  // Find connections
  const connections = [];
  for (let i = 0; i < neurons.length; i++) {
    for (let j = i + 1; j < neurons.length; j++) {
      const d = Math.hypot(neurons[i].x - neurons[j].x, neurons[i].y - neurons[j].y);
      if (d < CONFIG.connectionDist) {
        connections.push({ from: neurons[i], to: neurons[j], dist: d });
      }
    }
  }

  // Spawn pulses from firing neurons through active connections
  connections.forEach(conn => {
    if (conn.from.firing && Math.random() < 0.6) {
      pulses.push(new Pulse(conn.from, conn.to));
      conn.from.firing = false;
    }
    if (conn.to.firing && Math.random() < 0.6) {
      pulses.push(new Pulse(conn.to, conn.from));
      conn.to.firing = false;
    }
  });

  // Draw connections
  connections.forEach(conn => {
    const strength = 1 - conn.dist / CONFIG.connectionDist;
    const brightness = Math.min(conn.from.activity, conn.to.activity);
    
    ctx.beginPath();
    ctx.moveTo(conn.from.x, conn.from.y);
    ctx.lineTo(conn.to.x, conn.to.y);
    ctx.strokeStyle = `rgba(${CONFIG.colors.connection.join(',')}, ${strength * 0.25 * brightness})`;
    ctx.lineWidth = strength * 0.8;
    ctx.stroke();
  });

  // Update and draw pulses
  for (let i = pulses.length - 1; i >= 0; i--) {
    pulses[i].update(dt);
    if (!pulses[i].alive) {
      pulses.splice(i, 1);
      totalFirings++;
    }
  }

  pulses.forEach(p => {
    const size = 2.5 * Math.sin(p.t * Math.PI);
    const alpha = Math.sin(p.t * Math.PI);
    
    // Glow
    const grad = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, size * 6);
    grad.addColorStop(0, `rgba(${CONFIG.colors.pulse.join(',')}, ${alpha * 0.8})`);
    grad.addColorStop(0.5, `rgba(${CONFIG.colors.pulse.join(',')}, ${alpha * 0.3})`);
    grad.addColorStop(1, `rgba(${CONFIG.colors.pulse.join(',')}, 0)`);
    
    ctx.beginPath();
    ctx.arc(p.x, p.y, size * 6, 0, Math.PI * 2);
    ctx.fillStyle = grad;
    ctx.fill();
    
    // Core
    ctx.beginPath();
    ctx.arc(p.x, p.y, size, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255, 255, 255, ${alpha})`;
    ctx.fill();
  });

  // Draw neurons
  neurons.forEach(n => {
    const brightness = n.getBrightness();
    const r = CONFIG.colors.neuron;
    const active = n.firing ? CONFIG.colors.neuronActive : r;
    
    // Outer glow
    const grad = ctx.createRadialGradient(n.x, n.y, 0, n.x, n.y, n.radius * 8);
    grad.addColorStop(0, `rgba(${active.join(',')}, ${brightness * 0.6})`);
    grad.addColorStop(1, `rgba(${active.join(',')}, 0)`);
    
    ctx.beginPath();
    ctx.arc(n.x, n.y, n.radius * 8, 0, Math.PI * 2);
    ctx.fillStyle = grad;
    ctx.fill();
    
    // Core
    ctx.beginPath();
    ctx.arc(n.x, n.y, n.radius * brightness, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(${active.join(',')}, ${brightness})`;
    ctx.fill();
    
    // Bright center when firing
    if (n.firing) {
      ctx.beginPath();
      ctx.arc(n.x, n.y, n.radius * 0.5, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255, 255, 255, ${brightness})`;
      ctx.fill();
    }
  });

  // Stats
  document.getElementById('stats').innerHTML = `
    Neurons: ${neurons.length}<br>
    Connections: ${connections.length}<br>
    Pulses: ${pulses.length}<br>
    Firings: ${totalFirings}
  `;

  requestAnimationFrame(animate);
}

requestAnimationFrame(animate);
</script>
</body>
</html>
