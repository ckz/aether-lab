<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Topographic Dreams</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  body {
    background: #07080c;
    color: #e0e0e0;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    overflow: hidden;
    height: 100vh;
    cursor: crosshair;
  }

  canvas {
    display: block;
    position: fixed;
    top: 0;
    left: 0;
  }

  .controls {
    position: fixed;
    bottom: 1.5rem;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 0.5rem;
    background: rgba(10, 12, 20, 0.85);
    backdrop-filter: blur(10px);
    padding: 0.6rem 1rem;
    border-radius: 999px;
    border: 1px solid rgba(255,255,255,0.08);
    z-index: 10;
  }

  .controls button {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    color: #aaa;
    padding: 0.4rem 0.9rem;
    border-radius: 999px;
    cursor: pointer;
    font-size: 0.78rem;
    letter-spacing: 0.04em;
    transition: all 0.2s;
    font-family: inherit;
  }

  .controls button:hover {
    background: rgba(255,255,255,0.12);
    color: #fff;
    border-color: rgba(255,255,255,0.25);
  }

  .controls button.active {
    background: rgba(120, 180, 255, 0.15);
    color: #c0dfff;
    border-color: rgba(120, 180, 255, 0.3);
  }

  .info {
    position: fixed;
    top: 1.2rem;
    left: 50%;
    transform: translateX(-50%);
    font-size: 0.72rem;
    color: rgba(255,255,255,0.3);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    pointer-events: none;
    z-index: 10;
  }
</style>
</head>
<body>

<div class="info">Topographic Dreams — click to raise peaks, drag to sculpt</div>

<canvas id="canvas"></canvas>

<div class="controls">
  <button id="btnPalette" title="Cycle palette">◐ Palette</button>
  <button id="btnSpeed" title="Toggle speed">◎ Speed</button>
  <button id="btnDensity" title="Cycle density">≡ Density</button>
  <button id="btnSave" title="Save image">↓ Save</button>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

let W, H;
function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// --- Configuration ---
const PALETTES = [
  { name: 'Arctic',   bg: '#07080c', colors: ['#1a3a4a','#1e5568','#237a8a','#2a9dab','#3cc4d4','#5ae0ed'], peak: '#ffffff' },
  { name: 'Ember',    bg: '#0c0705', colors: ['#3d1a0a','#5c2a10','#7a3d18','#a05520','#c87028','#e89040'], peak: '#ffe0c0' },
  { name: 'Violet',   bg: '#0a0710', colors: ['#2a1545','#3d2068','#552d8a','#7040b0','#8a5cd4','#a878f0'], peak: '#e0d0ff' },
  { name: 'Forest',   bg: '#060c07', colors: ['#0f2a14','#154020','#1d5a2c','#287838','#35984a','#48b860'], peak: '#c0ffe0' },
  { name: 'Ocean',    bg: '#050a0f', colors: ['#0a2540','#0d3860','#105080','#1468a8','#1888d0','#1ca8f0'], peak: '#c0e8ff' },
  { name: 'Monochrome', bg: '#08080a', colors: ['#1a1a1e','#28282e','#3a3a42','#50505a','#6a6a78','#8888a0'], peak: '#e8e8f0' },
];

let paletteIdx = 0;
let palette = PALETTES[0];
let speedMode = 1; // 0=slow, 1=normal, 2=fast
const SPEEDS = [0.0003, 0.0008, 0.0018];
let speed = SPEEDS[1];
let densityLevel = 1; // 0=low, 1=mid, 2=high
const DENSITIES = [8, 14, 22];
let contourCount = DENSITIES[1];

let time = 0;
let mouse = { x: W/2, y: H/2, active: false, pressed: false };
let peaks = []; // {x, y, strength, birth}

// Add peak on click
function addPeak(x, y) {
  peaks.push({ x, y, strength: 1.0, birth: time });
  if (peaks.length > 20) peaks.shift();
}

canvas.addEventListener('mousemove', e => {
  mouse.x = e.clientX;
  mouse.y = e.clientY;
  mouse.active = true;
});
canvas.addEventListener('mousedown', e => {
  mouse.pressed = true;
  addPeak(e.clientX, e.clientY);
});
canvas.addEventListener('mouseup', () => mouse.pressed = false);
canvas.addEventListener('mouseleave', () => { mouse.active = false; mouse.pressed = false; });

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  const t = e.touches[0];
  mouse.x = t.clientX;
  mouse.y = t.clientY;
  mouse.active = true;
}, { passive: false });
canvas.addEventListener('touchstart', e => {
  const t = e.touches[0];
  mouse.x = t.clientX;
  mouse.y = t.clientY;
  mouse.active = true;
  mouse.pressed = true;
  addPeak(t.clientX, t.clientY);
});
canvas.addEventListener('touchend', () => mouse.pressed = false);

// --- Noise ---
// Simple 2D simplex-like noise using sin permutations
function noise2D(x, y) {
  const n = Math.sin(x * 12.9898 + y * 78.233) * 43758.5453;
  return n - Math.floor(n);
}

function smoothNoise(x, y) {
  const ix = Math.floor(x), iy = Math.floor(y);
  const fx = x - ix, fy = y - iy;
  const sx = fx * fx * (3 - 2 * fx);
  const sy = fy * fy * (3 - 2 * fy);
  
  const n00 = noise2D(ix, iy);
  const n10 = noise2D(ix+1, iy);
  const n01 = noise2D(ix, iy+1);
  const n11 = noise2D(ix+1, iy+1);
  
  const nx0 = n00 + (n10 - n00) * sx;
  const nx1 = n01 + (n11 - n01) * sx;
  return nx0 + (nx1 - nx0) * sy;
}

function fbm(x, y, octaves) {
  let val = 0, amp = 0.5, freq = 1;
  for (let i = 0; i < octaves; i++) {
    val += amp * smoothNoise(x * freq, y * freq);
    amp *= 0.5;
    freq *= 2.1;
  }
  return val;
}

// --- Terrain height ---
function terrain(x, y, t) {
  const scale = 0.0018;
  let h = fbm(x * scale + t * 0.15, y * scale + t * 0.1, 5);
  
  // Add ridge noise
  const ridge = 1 - Math.abs(fbm(x * scale * 1.5 + 100 + t * 0.08, y * scale * 1.5 + 100, 4) * 2 - 1);
  h += ridge * 0.3;
  
  // Mouse influence
  if (mouse.active) {
    const dx = x - mouse.x, dy = y - mouse.y;
    const dist = Math.sqrt(dx*dx + dy*dy);
    const radius = 180;
    if (dist < radius) {
      const influence = (1 - dist / radius) * (mouse.pressed ? 0.5 : 0.15);
      h += influence;
    }
  }
  
  // Peaks from clicks
  for (const p of peaks) {
    const dx = x - p.x, dy = y - p.y;
    const dist = Math.sqrt(dx*dx + dy*dy);
    const radius = 200;
    if (dist < radius) {
      const falloff = Math.pow(1 - dist / radius, 2);
      const age = (time - p.birth) * 0.5;
      const decay = Math.exp(-age * 0.4);
      h += falloff * 0.8 * p.strength * decay;
    }
  }
  
  return h;
}

// --- Marching squares for contour lines ---
function getContourValue(x, y, t) {
  return terrain(x, y, t);
}

function drawContours() {
  const step = 28; // pixel step for sampling
  const levels = contourCount;
  
  for (let level = 0; level < levels; level++) {
    const threshold = (level + 0.5) / levels;
    const colorIdx = Math.min(Math.floor(threshold * palette.colors.length), palette.colors.length - 1);
    const color = palette.colors[colorIdx];
    
    ctx.strokeStyle = color;
    ctx.lineWidth = 1.2;
    ctx.globalAlpha = 0.55;
    
    ctx.beginPath();
    
    for (let y = 0; y < H; y += step) {
      for (let x = 0; x < W; x += step) {
        const vals = [
          getContourValue(x, y, time),
          getContourValue(x + step, y, time),
          getContourValue(x, y + step, time),
          getContourValue(x + step, y + step, time)
        ];
        
        const config = vals.map(v => v > threshold ? 1 : 0);
        
        // Marching squares edge cases
        const edges = [];
        // top
        if (config[0] !== config[1]) {
          const t = (threshold - vals[0]) / (vals[1] - vals[0]);
          edges.push({ x1: x + t * step, y1: y, x2: x + t * step, y2: y });
        }
        // left
        if (config[0] !== config[2]) {
          const t = (threshold - vals[0]) / (vals[2] - vals[0]);
          edges.push({ x1: x, y1: y + t * step, x2: x, y2: y + t * step });
        }
        // right
        if (config[1] !== config[3]) {
          const t = (threshold - vals[1]) / (vals[3] - vals[1]);
          edges.push({ x1: x + step, y1: y + t * step, x2: x + step, y2: y + t * step });
        }
        // bottom
        if (config[2] !== config[3]) {
          const t = (threshold - vals[2]) / (vals[3] - vals[2]);
          edges.push({ x1: x + t * step, y1: y + step, x2: x + t * step, y2: y + step });
        }
        
        if (edges.length >= 2) {
          ctx.moveTo(edges[0].x1, edges[0].y1);
          ctx.lineTo(edges[1].x1, edges[1].y1);
        }
      }
    }
    
    ctx.stroke();
  }
  
  ctx.globalAlpha = 1;
}

// --- Peak glow ---
function drawPeakGlow() {
  for (const p of peaks) {
    const age = (time - p.birth);
    const decay = Math.exp(-age * 0.3);
    if (decay < 0.01) continue;
    
    const r = 180 * decay;
    const grad = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, r);
    grad.addColorStop(0, palette.peak + '60');
    grad.addColorStop(0.5, palette.colors[palette.colors.length - 1] + '30');
    grad.addColorStop(1, 'transparent');
    
    ctx.fillStyle = grad;
    ctx.globalAlpha = decay * 0.4;
    ctx.beginPath();
    ctx.arc(p.x, p.y, r, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

// --- Main loop ---
function frame() {
  time += speed * speedMode;
  
  // Fade background
  ctx.globalAlpha = 0.15;
  ctx.fillStyle = palette.bg;
  ctx.fillRect(0, 0, W, H);
  ctx.globalAlpha = 1;
  
  // Decay peaks
  peaks = peaks.filter(p => (time - p.birth) < 8);
  
  drawContours();
  drawPeakGlow();
  
  requestAnimationFrame(frame);
}

// Full clear on start
ctx.fillStyle = palette.bg;
ctx.fillRect(0, 0, W, H);

frame();

// --- Controls ---
document.getElementById('btnPalette').addEventListener('click', () => {
  paletteIdx = (paletteIdx + 1) % PALETTES.length;
  palette = PALETTES[paletteIdx];
  document.body.style.background = palette.bg;
});

document.getElementById('btnSpeed').addEventListener('click', function() {
  speedMode = (speedMode + 1) % 3;
  const labels = ['Slow', 'Normal', 'Fast'];
  this.textContent = '◎ ' + labels[speedMode];
  this.classList.toggle('active', speedMode !== 1);
});

document.getElementById('btnDensity').addEventListener('click', function() {
  densityLevel = (densityLevel + 1) % 3;
  contourCount = DENSITIES[densityLevel];
  const labels = ['Sparse', 'Medium', 'Dense'];
  this.textContent = '≡ ' + labels[densityLevel];
  this.classList.toggle('active', densityLevel === 2);
});

document.getElementById('btnSave').addEventListener('click', () => {
  const link = document.createElement('a');
  link.download = 'topographic-dreams.png';
  link.href = canvas.toDataURL('image/png');
  link.click();
});

// Keyboard
document.addEventListener('keydown', e => {
  if (e.code === 'Space') {
    e.preventDefault();
    paletteIdx = (paletteIdx + 1) % PALETTES.length;
    palette = PALETTES[paletteIdx];
  }
  if (e.code === 'KeyC') {
    peaks = [];
    ctx.fillStyle = palette.bg;
    ctx.fillRect(0, 0, W, H);
  }
  if (e.code === 'KeyS') {
    const link = document.createElement('a');
    link.download = 'topographic-dreams.png';
    link.href = canvas.toDataURL('image/png');
    link.click();
  }
});
</script>

</body>
</html>
